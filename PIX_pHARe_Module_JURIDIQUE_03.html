<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIX pHARe — Juridique 03</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root {
  --bg: #0a0e1a; --card: #111827; --dark: #1e293b;
  --border: rgba(255,255,255,.09);
  --text: #e2e8f0; --muted: #64748b;
  --accent: #8b5cf6;
  --green: #22c55e; --red: #ef4444; --warn: #f59e0b;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }

.app-container{ max-width:680px; margin:0 auto; padding:16px; }

/* ── Header ── */
.header{
  background:linear-gradient(135deg,#0f172a,#1e1b4b);
  border:1px solid var(--border); border-radius:12px;
  padding:16px 20px; margin-bottom:16px;
  display:flex; align-items:center; gap:14px;
}
.header-icon{ font-size:2rem; }
.header-info{ flex:1; }
.header-title{ font-weight:800; font-size:1.05rem; color:var(--accent); }
.header-sub{ color:var(--muted); font-size:.8rem; margin-top:2px; }
.header-xp{ font-weight:700; color:var(--green); font-size:1rem; }
.player-info{
  text-align:center; padding:10px 16px; margin-bottom:12px;
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:10px; font-size:.85rem;
}
.player-connected{ color:var(--green); }
.player-disconnected{ color:var(--red); }

/* ── Progression ── */
.progress-section{ margin-bottom:16px; }
.progress-levels{ display:flex; gap:8px; margin-bottom:8px; }
.level-pill{
  flex:1; text-align:center; padding:6px 4px;
  border-radius:8px; font-size:.75rem; font-weight:700;
  border:1px solid var(--border);
  background:var(--dark); color:var(--muted);
  transition: all .3s;
}
.level-pill.active{ background:var(--accent); color:#fff; border-color:var(--accent); }
.level-pill.done{ background:var(--green); color:#000; border-color:var(--green); }
.progress-bar{ height:4px; background:rgba(255,255,255,.07); border-radius:2px; }
.progress-fill{ height:4px; background:var(--accent); border-radius:2px; transition:width .4s; }

/* ── Cards ── */
.card{
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:20px; margin-bottom:14px;
}
.section-title{
  font-size:.75rem; font-weight:700; letter-spacing:1px;
  color:var(--accent); text-transform:uppercase; margin-bottom:12px;
}

/* ── Flashcard flip 3D ── */
.flashcard-scene{
  perspective:1000px; margin:8px 0 16px;
}
.flashcard-flip{
  position:relative; width:100%;
  min-height:220px;
  transform-style:preserve-3d;
  transition:transform .55s ease;
  cursor:pointer;
}
.flashcard-flip.flipped{ transform:rotateY(180deg); }
.flashcard-face{
  position:absolute; top:0; left:0; right:0; bottom:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:12px;
  padding:24px 20px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
  min-height:220px;
}
.flashcard-front{
  background:linear-gradient(135deg, #fff 0%, #f1f5f9 100%);
  color:#1e293b;
  border:2px solid rgba(59,130,246,.3);
}
.flashcard-back{
  background:linear-gradient(135deg, #1e3a5f 0%, #1e293b 100%);
  color:var(--text);
  border:2px solid var(--accent);
  transform:rotateY(180deg);
}
.fc-question{ font-size:1rem; font-weight:700; line-height:1.5; color:#1e293b; }
.fc-hint{ font-size:.75rem; color:#64748b; margin-top:12px; }
.fc-answer-label{
  font-size:.7rem; font-weight:700; letter-spacing:1px;
  color:var(--green); text-transform:uppercase; margin-bottom:10px;
}
.fc-answer{ font-size:.92rem; line-height:1.6; white-space:pre-line; }
.fc-source{ font-size:.72rem; color:var(--muted); margin-top:12px; font-style:italic; }
.fc-counter{ text-align:center; font-size:.8rem; color:var(--muted); margin-bottom:8px; }

/* ── Quiz ── */
.quiz-context{
  background:rgba(255,255,255,.04); border-radius:8px;
  padding:14px; margin-bottom:12px;
  border-left:3px solid var(--warn);
}
.quiz-context .label{ font-size:.7rem; color:var(--warn); font-weight:700; text-transform:uppercase; margin-bottom:6px; }
.quiz-question-text{ font-weight:700; color:var(--warn); margin:10px 0 12px; font-size:.95rem; }
.choice-btn{
  display:block; width:100%; text-align:left;
  padding:12px 16px; margin-bottom:8px;
  background:rgba(255,255,255,.04); border:1px solid var(--border);
  border-radius:8px; color:var(--text); cursor:pointer;
  font-size:.9rem; transition:all .15s; line-height:1.4;
}
.choice-btn:hover:not(:disabled){ background:rgba(255,255,255,.09); border-color:var(--accent); }
.choice-btn:disabled{ cursor:default; }
.choice-btn.correct{ background:rgba(34,197,94,.15); border-color:var(--green); color:var(--green); }
.choice-btn.incorrect{ background:rgba(239,68,68,.12); border-color:var(--red); color:var(--red); }
.choice-btn.neutral{ opacity:.45; }
.feedback-box{
  border-radius:10px; padding:14px 16px; margin-top:10px;
  font-size:.88rem; line-height:1.5;
}
.feedback-box.ok{ background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.3); }
.feedback-box.ko{ background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); }
.feedback-title{ font-weight:700; margin-bottom:6px; }

/* ── Dojo ── */
.dojo-context{
  background:rgba(255,255,255,.04); border-radius:8px;
  padding:14px; margin-bottom:12px;
  border-left:3px solid var(--accent);
}
.dojo-context .label{ font-size:.7rem; color:var(--accent); font-weight:700; text-transform:uppercase; margin-bottom:6px; }
.impact-badge{
  display:inline-block; margin-left:8px; padding:1px 8px;
  border-radius:10px; font-size:.75rem; font-weight:700;
}
.impact-plus{ background:rgba(34,197,94,.2); color:var(--green); }
.impact-part{ background:rgba(245,158,11,.2); color:var(--warn); }
.impact-neg{ background:rgba(239,68,68,.2); color:var(--red); }

/* ── Report ── */
.report-card{
  background:linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
  border:1px solid var(--accent); border-radius:14px;
  padding:24px; text-align:center; margin-bottom:16px;
}
.report-emoji{ font-size:3rem; margin-bottom:12px; }
.report-title{ font-size:1.4rem; font-weight:800; color:var(--accent); margin-bottom:4px; }
.report-sub{ color:var(--muted); font-size:.88rem; margin-bottom:20px; }
.stats-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.stat-box{
  background:rgba(255,255,255,.05); border:1px solid var(--border);
  border-radius:10px; padding:12px 8px; text-align:center;
}
.stat-val{ font-size:1.4rem; font-weight:800; color:var(--accent); }
.stat-label{ font-size:.72rem; color:var(--muted); margin-top:2px; }
.mastery-badge{
  display:inline-block; padding:6px 18px; border-radius:20px;
  font-weight:700; font-size:.88rem; margin-bottom:16px;

.mastery-expert{ background:rgba(249,115,22,.2); color:#f97316; border:1px solid #f97316; }
.mastery-confirmed{ background:rgba(34,197,94,.2); color:var(--green); border:1px solid var(--green); }
.mastery-learning{ background:rgba(100,116,139,.2); color:var(--muted); border:1px solid var(--muted); }
.cert-banner{
  background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.35);
  border-radius:10px; padding:12px; margin-bottom:14px;
  font-size:.88rem; color:var(--green);

/* ── Boutons ── */
.btn{
  padding:11px 20px; border-radius:8px; border:none;
  font-weight:700; cursor:pointer; font-size:.9rem;
  transition:all .15s;
}
.btn-primary{ background:var(--accent); color:#fff; }
.btn-secondary{ background:rgba(255,255,255,.08); color:var(--text); }
.btn-green{ background:var(--green); color:#000; }
.btn:active{ opacity:.8; transform:scale(.98); }
.btn-group{ display:flex; gap:10px; flex-wrap:wrap; }
.btn-group .btn{ flex:1; min-width:120px; }

/* ── Menu ── */
.menu-mission{
  background:rgba(255,255,255,.04); border-radius:10px;
  padding:14px; margin-bottom:16px;
  border-left:3px solid var(--accent); font-size:.9rem; line-height:1.5;
}
</style>
</head>

const MODULE_ID = "JURIDIQUE_03";
const TOTAL_XP  = 450;

// ── Communication hub ──────────────────────────────────────
function getHubPlayer(){
  return localStorage.getItem('pvs_current_player')
      || localStorage.getItem('pvs_phare_player')
      || '';
}

function certifyAndBridge(player, xp){
  try {
    // 1. Écrire le certificat de complétion (lu par l'index PIXHARe au focus)
    var certKey = 'CERT_PHARE_' + MODULE_ID;
    if(!localStorage.getItem(certKey)){
      localStorage.setItem(certKey, JSON.stringify({
        v:1, d:new Date().toISOString(), m:MODULE_ID, f:true
      }));
    }
    // 2. Pousser un event dans pvs_bridge_events (lu par le superhub)
    var evts = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
    evts.push({
      id:     'PIXHARE-' + MODULE_ID + '-' + Date.now(),
      type:   'PIXHARE_PROGRESS',
      player:  player,
      module:  MODULE_ID,
      xp:      xp,
      d:       new Date().toISOString()
    });
    if(evts.length > 500) evts.splice(0, evts.length - 500);
    localStorage.setItem('pvs_bridge_events', JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage', {key:'pvs_bridge_events'}));
  } catch(err){}
}

// ── Composant Header ───────────────────────────────────────
function Header({ xp }){
  const player = getHubPlayer();
  return e('div', null,
    e('div', { className:'header' },
      e('div', { className:'header-icon' }, '⚖️'),
      e('div', { className:'header-info' },
        e('div', { className:'header-title' }, MODULE_DATA.titre),
        e('div', { className:'header-sub' }, MODULE_DATA.sous_titre)
      ),
      e('div', { className:'header-xp' }, xp + ' XP')
    ),
    e('div', { className:'player-info' },
      player
        ? e('span', { className:'player-connected' }, '✅ ' + player)
        : e('span', { className:'player-disconnected' },
            '⚠️ Non connecté — reviens via le hub PIXHARe'
          )
    )
  );
}

// ── Composant Progression ──────────────────────────────────
function Progress({ level, xp }){
  const pct = Math.min(100, Math.round(xp / TOTAL_XP * 100));
  return e('div', { className:'progress-section' },
    e('div', { className:'progress-levels' },
      [1,2,3].map(l =>
        e('div', {
          key: l,
          className: 'level-pill' + (l < level ? ' done' : l === level ? ' active' : '')
        }, ['📚 Théorie','🔍 Analyse','⚔️ Dojo'][l-1])
      )
    ),
    e('div', { className:'progress-bar' },
      e('div', { className:'progress-fill', style:{ width: pct + '%' } })
    )
  );
}

// ── Composant Flashcard ────────────────────────────────────
function Flashcard({ card, isLast, onNext, onComplete }){
  const [flipped, setFlipped] = useState(false);

  return e('div', { className:'card' },
    e('div', { className:'fc-counter' }, card.recto ? '👆 Clique la carte pour voir la réponse' : ''),
    e('div', {
      className:'flashcard-scene',
      onClick: () => setFlipped(!flipped)
    },
      e('div', { className:'flashcard-flip' + (flipped ? ' flipped' : '') },
        e('div', { className:'flashcard-face flashcard-front' },
          e('div', { className:'fc-question' }, card.recto),
          e('div', { className:'fc-hint' }, '👆 Clique pour retourner')
        ),
        e('div', { className:'flashcard-face flashcard-back' },
          e('div', { className:'fc-answer-label' }, '✓ Réponse'),
          e('div', { className:'fc-answer' }, card.verso),
          e('div', { className:'fc-source' }, '📖 ' + card.source)
        )
      )
    ),
    flipped && e('div', { style:{ textAlign:'center', marginTop:'8px' } },
      isLast
        ? e('button', { className:'btn btn-green', onClick: onComplete }, '✓ Niveau 1 validé →')
        : e('button', { className:'btn btn-primary', onClick: () => { setFlipped(false); onNext(); } },
            'Carte suivante →'
          )
    )
  );
}

// ── Composant Quiz ─────────────────────────────────────────
function QuizQuestion({ question, onAnswer }){
  const [answered, setAnswered] = useState(false);
  const [chosen, setChosen] = useState(null);
  const [fb, setFb] = useState(null);

  const handleChoice = (choice, idx) => {
    if(answered) return;
    setAnswered(true); setChosen(idx);
    setFb({ correct: choice.correct, text: choice.feedback });
  };

  return e('div', { className:'card' },
    e('div', { className:'quiz-context' },
      e('div', { className:'label' }, '📋 Situation'),
      e('p', null, question.texte),
      question.question && e('p', { className:'quiz-question-text' }, '❓ ' + question.question)
    ),
    question.choix.map((choice, idx) => {
      let cls = 'choice-btn';
      if(answered){
        if(idx === chosen) cls += choice.correct ? ' correct' : ' incorrect';
        else cls += ' neutral';
      }
      return e('button', {
        key: idx, className: cls,
        onClick: () => handleChoice(choice, idx),
        disabled: answered
      }, choice.txt);
    }),
    fb && e('div', { className:'feedback-box ' + (fb.correct ? 'ok' : 'ko') },
      e('div', { className:'feedback-title' }, fb.correct ? '✓ Correct !' : "✗ Erreur d'analyse"),
      e('p', null, fb.text),
      e('button', { className:'btn btn-primary', style:{ marginTop:'10px' }, onClick: () => onAnswer(fb.correct) },
        'Continuer →'
      )
    )
  );
}

// ── Composant Dojo ─────────────────────────────────────────
function DojoScenario({ scenario, onAnswer }){
  const [answered, setAnswered] = useState(false);
  const [chosen, setChosen] = useState(null);

  const handleChoice = choice => {
    if(answered) return;
    setAnswered(true); setChosen(choice);
  };

  const impactBadge = impact => {
    const cls = impact >= 80 ? 'impact-plus' : impact > 0 ? 'impact-part' : 'impact-neg';
    return e('span', { className:'impact-badge ' + cls }, (impact > 0 ? '+' : '') + impact + ' pts');
  };

  return e('div', { className:'card' },
    e('div', { className:'dojo-context' },
      e('div', { className:'label' }, '🎬 Scénario'),
      e('p', null, scenario.contexte),
      e('div', { className:'quiz-question-text' }, '❓ ' + scenario.question)
    ),
    scenario.choix.map((choice, idx) => {
      let cls = 'choice-btn';
      if(answered){
        if(choice === chosen) cls += choice.level === 'optimal' ? ' correct' : choice.level === 'error' ? ' incorrect' : ' neutral';
        else cls += ' neutral';
      }
      return e('button', {
        key: idx, className: cls,
        onClick: () => handleChoice(choice),
        disabled: answered
      },
        choice.txt,
        answered && impactBadge(choice.impact)
      );
    }),
    chosen && e('div', {
      className:'feedback-box ' + (chosen.level === 'optimal' ? 'ok' : chosen.level === 'error' ? 'ko' : 'ok')
    },
      e('div', { className:'feedback-title' },
        chosen.level === 'optimal' ? '🏆 Décision optimale !'
        : chosen.level === 'error' ? '⚠️ Décision risquée'
        : '👍 Bonne piste'
      ),
      e('p', null, chosen.feedback),
      e('button', {
        className:'btn btn-primary', style:{ marginTop:'10px' },
        onClick: () => onAnswer(chosen.impact)
      }, 'Continuer →')
    )
  );
}

// ── Composant Report (SANS code base64) ────────────────────
function Report({ progress, onRestart }){
  const total = progress.quizScore + progress.dojoScore;
  const mastery = total >= 500 ? {label:'EXPERT', cls:'mastery-expert'}
    : total >= 300 ? {label:'CONFIRMÉ', cls:'mastery-confirmed'}
    : {label:'EN FORMATION', cls:'mastery-learning'};

  return e('div', null,
    e('div', { className:'report-card' },
      e('div', { className:'report-emoji' }, '🏅'),
      e('div', { className:'report-title' }, 'Mission accomplie !'),
      e('div', { className:'report-sub' }, MODULE_DATA.titre),
      e('div', { className:'mastery-badge ' + mastery.cls }, mastery.label),
      e('div', { className:'stats-grid' },
        e('div', { className:'stat-box' },
          e('div', { className:'stat-val' }, progress.xp),
          e('div', { className:'stat-label' }, 'XP Total')
        ),
        e('div', { className:'stat-box' },
          e('div', { className:'stat-val' }, progress.quizScore),
          e('div', { className:'stat-label' }, 'Score Quiz')
        ),
        e('div', { className:'stat-box' },
          e('div', { className:'stat-val' }, progress.dojoScore),
          e('div', { className:'stat-label' }, 'Score Dojo')
        ),
        e('div', { className:'stat-box' },
          e('div', { className:'stat-val' }, progress.quizScore + progress.dojoScore),
          e('div', { className:'stat-label' }, 'Score Total')
        )
      ),
      e('div', { className:'cert-banner' },
        '✅ Certificat enregistré — le hub PIXHARe a été mis à jour'
      )
    ),
    e('div', { className:'btn-group' },
      e('button', {
        className:'btn btn-green',
        onClick: () => window.history.back()
      }, '← Retour au Hub PIXHARe'),
      e('button', {
        className:'btn btn-secondary',
        onClick: onRestart
      }, '🔄 Recommencer')
    )
  );
}

// ── App Principal ──────────────────────────────────────────
function App(){
  const [mode, setMode]       = useState('menu');
  const [level, setLevel]     = useState(1);
  const [cardIdx, setCardIdx] = useState(0);
  const [qIdx, setQIdx]       = useState(0);
  const [sIdx, setSIdx]       = useState(0);
  const [xp, setXp]           = useState(0);
  const [quizScore, setQS]    = useState(0);
  const [dojoScore, setDS]    = useState(0);
  const [certified, setCert]  = useState(false);

  const player = getHubPlayer();

  const resetProgress = () => {
    setLevel(1); setCardIdx(0); setQIdx(0); setSIdx(0);
    setXp(0); setQS(0); setDS(0);
    setMode('game');
  };

  // Certifier à l'entrée en mode report
  useEffect(() => {
    if(mode === 'report' && !certified){
      setCert(true);
      certifyAndBridge(player, xp);
    }
  }, [mode]);

  const progress = { xp, quizScore, dojoScore };

  // ── MENU ──
  if(mode === 'menu'){
    const alreadyCert = !!localStorage.getItem('CERT_PHARE_' + MODULE_ID);
    return e('div', { className:'app-container' },
      e(Header, { xp: 0 }),
      e('div', { className:'card menu-mission' },
        e('strong', null, '🎯 Mission : '),
        MODULE_DATA.description
      ),
      alreadyCert && e('div', { className:'cert-banner', style:{ marginBottom:'14px' } },
        "🏅 Module déjà complété — tu peux le refaire pour t'entraîner"
      ),
      e('div', { className:'btn-group' },
        e('button', { className:'btn btn-primary', onClick: () => setMode('game') },
          '▶️ Commencer la mission'
        ),
        e('button', { className:'btn btn-secondary', onClick: () => window.history.back() },
          '← Hub PIXHARe'
        )
      ),
      e('div', { style:{ textAlign:'center', marginTop:'20px', opacity:0.5, fontSize:'.78rem' } },
        MODULE_DATA.id + ' v' + MODULE_DATA.version
      )
    );
  }

  // ── GAME ──
  if(mode === 'game'){
    // Niveau 1 : flashcards
    if(level === 1){
      const cards = MODULE_DATA.niveau1.cartes;
      const card  = cards[cardIdx];
      return e('div', { className:'app-container' },
        e(Header, { xp }),
        e(Progress, { level, xp }),
        e('div', { className:'section-title', style:{ padding:'0 4px 4px' } },
          `Carte ${cardIdx+1} / ${cards.length}`
        ),
        e(Flashcard, {
          key: cardIdx,
          card,
          isLast: cardIdx === cards.length - 1,
          onNext: () => setCardIdx(cardIdx + 1),
          onComplete: () => {
            setXp(xp + MODULE_DATA.niveau1.xp_reward);
            setLevel(2); setCardIdx(0);
          }
        })
      );
    }

    // Niveau 2 : quiz
    if(level === 2){
      const qs = MODULE_DATA.niveau2.questions;
      const handleQuizAnswer = correct => {
        if(correct) setQS(qs => qs + 25);
        if(qIdx < qs.length - 1) setQIdx(qIdx + 1);
        else { setXp(xp + MODULE_DATA.niveau2.xp_reward); setLevel(3); setQIdx(0); }
      };
      return e('div', { className:'app-container' },
        e(Header, { xp }),
        e(Progress, { level, xp }),
        e('div', { className:'section-title', style:{ padding:'0 4px 4px' } },
          `Question ${qIdx+1} / ${qs.length}`
        ),
        e(QuizQuestion, { key: qIdx, question: qs[qIdx], onAnswer: handleQuizAnswer })
      );
    }

    // Niveau 3 : dojo
    if(level === 3){
      const ss = MODULE_DATA.niveau3.scenarios;
      const handleDojoAnswer = impact => {
        setDS(ds => ds + Math.max(0, impact));
        if(sIdx < ss.length - 1) setSIdx(sIdx + 1);
        else { setXp(xp + MODULE_DATA.niveau3.xp_reward); setMode('report'); }
      };
      return e('div', { className:'app-container' },
        e(Header, { xp }),
        e(Progress, { level, xp }),
        e('div', { className:'section-title', style:{ padding:'0 4px 4px' } },
          `Scénario ${sIdx+1} / ${ss.length}`
        ),
        e(DojoScenario, { key: sIdx, scenario: ss[sIdx], onAnswer: handleDojoAnswer })
      );
    }
  }

  // ── REPORT ──
  if(mode === 'report'){
    return e('div', { className:'app-container' },
      e(Header, { xp }),
      e(Report, { progress, onRestart: resetProgress })
    );
  }

  return e('div', { className:'app-container' }, 'Chargement...');
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
