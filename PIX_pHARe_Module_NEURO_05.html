<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX-pHARe | Module NEURO 05 - S'auto-réguler [CERTIFICATION]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');
        
        :root {
            --neuro-primary: #8b5cf6;
            --neuro-accent: #ec4899;
            --neuro-success: #10b981;
            --neuro-mind: #06b6d4;
            --neuro-deep: #6d28d9;
            --void-dark: #0a0a14;
            --deep-dark: #050508;
            --panel-bg: rgba(10, 10, 20, 0.95);
            --text-primary: #fffbf0;
            --text-secondary: #a0a0b0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--void-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .leader-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 50% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 70%, rgba(236, 72, 153, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(6, 182, 212, 0.12) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: neuroGlow 8s ease-in-out infinite;
        }
        
        @keyframes neuroGlow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        
        .stars-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, rgba(139, 92, 246, 0.8), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(236, 72, 153, 0.6), transparent),
                radial-gradient(2px 2px at 70% 20%, rgba(6, 182, 212, 0.6), transparent),
                radial-gradient(1px 1px at 90% 50%, rgba(139, 92, 246, 0.5), transparent),
                radial-gradient(1px 1px at 10% 90%, rgba(16, 185, 129, 0.5), transparent);
            background-size: 200px 200px;
            animation: starsTwinkle 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes starsTwinkle {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header { text-align: center; padding: 40px 20px; }
        
        .pillar-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.8));
            animation: brainPulse 3s ease-in-out infinite;
        }
        
        @keyframes brainPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.8)); }
            50% { transform: scale(1.1) rotate(5deg); filter: drop-shadow(0 0 35px rgba(139, 92, 246, 1)); }
        }
        
        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--neuro-primary), var(--neuro-accent), var(--neuro-success), var(--neuro-mind));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            animation: gradientShift 4s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: var(--neuro-accent);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .module-badge {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 30px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(236, 72, 153, 0.3));
            border: 2px solid var(--neuro-primary);
            border-radius: 0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--neuro-primary);
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
        }
        
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .progress-node {
            width: 55px;
            height: 55px;
            border: 3px solid var(--text-secondary);
            background: var(--deep-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-secondary);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            transition: all 0.4s ease;
        }
        
        .progress-node.active {
            border-color: var(--neuro-primary);
            color: var(--neuro-primary);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.6);
            animation: nodePulse 2s infinite;
        }
        
        .progress-node.completed {
            border-color: var(--neuro-success);
            background: rgba(16, 185, 129, 0.2);
            color: var(--neuro-success);
        }
        
        @keyframes nodePulse {
            0%, 100% { box-shadow: 0 0 15px rgba(139, 92, 246, 0.6); }
            50% { box-shadow: 0 0 30px rgba(139, 92, 246, 0.9); }
        }
        
        .xp-display {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .xp-box {
            background: var(--panel-bg);
            border: 1px solid var(--neuro-primary);
            padding: 12px 20px;
            text-align: center;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
        }
        
        .xp-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;

            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--neuro-primary);
            margin-top: 5px;

            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;

        .panel-header {

            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);

        .panel-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.6));

        .panel-title {

            cursor: not-allowed;

            perspective: 1000px;
            margin: 30px 0;
        }

            min-height: 320px;

            border: 2px solid var(--neuro-primary);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
        }
        
        .flashcard-front {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(6, 182, 212, 0.15));
        }
        
        .flashcard-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.15), rgba(16, 185, 129, 0.15));
        }
        
        .flashcard-question {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--neuro-primary);
            margin-bottom: 15px;
        }
        
        .flashcard-hint {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--neuro-accent);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .flashcard-answer {
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: center;
            color: var(--text-primary);
        }
        
        .flashcard-answer strong {
            color: var(--neuro-accent);
        }
        
        .flashcard-nav {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 12px 25px;
            background: transparent;
            border: 2px solid var(--neuro-primary);
            color: var(--neuro-primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: var(--neuro-primary);
            color: var(--void-dark);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .quiz-question {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--neuro-primary);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(139, 92, 246, 0.05);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quiz-option:hover {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--neuro-primary);
            transform: translateX(5px);
        }
        
        .quiz-option.selected {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--neuro-primary);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        
        .quiz-option.correct {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--neuro-success);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
        
        .quiz-option.incorrect {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }
        
        .option-marker {
            width: 35px;
            height: 35px;
            background: var(--neuro-primary);
            color: var(--void-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }
        
        .option-text {
            flex: 1;
            font-size: 1rem;
            line-height: 1.5;
        }
        
        .feedback-box {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(6, 182, 212, 0.15));
            border: 2px solid var(--neuro-success);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.3);
        }
        
        .feedback-box.incorrect-feedback {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(236, 72, 153, 0.15));
            border-color: #ef4444;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.3);
        }
        
        .feedback-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--neuro-success);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .incorrect-feedback .feedback-title {
            color: #ef4444;
        }
        
        .scenario-context {
            background: rgba(139, 92, 246, 0.1);
            border-left: 4px solid var(--neuro-primary);
            padding: 15px 20px;
            margin-bottom: 20px;
            font-style: italic;
            color: var(--text-secondary);
        }
        
        .scenario-intro {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 25px;
        }
        
        .choices {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .choice-btn {
            padding: 18px 25px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(236, 72, 153, 0.1));
            border: 2px solid rgba(139, 92, 246, 0.4);
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            line-height: 1.5;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            border-color: var(--neuro-primary);
            transform: translateX(8px);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.3);
        }
        
        .choice-result {
            background: rgba(6, 182, 212, 0.1);
            border: 2px solid var(--neuro-mind);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .choice-result p {
            line-height: 1.7;
            margin-bottom: 15px;
        }
        
        .impact-score {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        
        .impact-item {
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .impact-item.positive {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid var(--neuro-success);
            color: var(--neuro-success);
        }
        
        .impact-item.negative {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        
        .completion-screen {
            text-align: center;
            padding: 40px 20px;
        }
        
        .completion-icon {
            font-size: 5rem;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.8));
            animation: completionFloat 3s ease-in-out infinite;
        }
        
        @keyframes completionFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .completion-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neuro-primary), var(--neuro-accent), var(--neuro-success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .completion-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        
        .mastery-badge {
            display: inline-block;
            padding: 15px 40px;
            margin: 25px 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;

            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 8px;

        .mastery-expert {

            color: var(--text-primary);

        .mastery-confirmed {

        .mastery-training {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(236, 72, 153, 0.3));

            padding: 20px;

        }
        
        .stat-value {
            font-family: 'Orbitron', sans-serif;

            font-weight: 900;
            color: var(--neuro-primary);

        .stat-label {
            font-family: 'Share Tech Mono', monospace;

            color: var(--text-secondary);

        .save-code-box {

        .save-code-label {

            background: linear-gradient(135deg, var(--neuro-accent), var(--neuro-primary));
            border: none;
            color: var(--text-primary);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(236, 72, 153, 0.5);

</head>
<body>
    <div class="leader-bg"></div>
    <div class="stars-overlay"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const { useState } = React;
        const e = React.createElement;

        const MODULE_ID = "NEURO_05";
        const MODULE_TITLE = "S'auto-réguler";
        const MODULE_VERSION = "1.0";
        const PREREQUISITE_MODULE = "NEURO_04";
        const PILLAR_ID = "NUM";

        const flashcardsData = [
            {
                question: "Qu'est-ce que la régulation émotionnelle ?",
                hint: "[ Clique pour révéler ]",
                answer: "C'est la capacité de <strong>moduler l'intensité, la durée et l'expression de ses émotions</strong>. Pas de les supprimer, mais de les gérer pour qu'elles restent <strong>utiles</strong> sans devenir <strong>envahissantes</strong>."
            },
            {

        function getMasteryLevel(score) {
            if (score >= 450) return { level: "Maître de la Régulation", class: "mastery-expert" };

        function App() {
            const [gameState, setGameState] = useState("intro");
            const [playerData, setPlayerData] = useState({
                name: localStorage.getItem('pvs_current_player') || 'Anonyme',
                class: "",
                level: 1,
                score: 0,
                xp: 0,
                quizScore: 0,
                scenarioScore: 0,
                flashcardsViewed: 0,
                finished: false
            });

            const [currentFlashcard, setCurrentFlashcard] = useState(0);
            const [flashcardFlipped, setFlashcardFlipped] = useState(false);

            const [currentQuiz, setCurrentQuiz] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showQuizFeedback, setShowQuizFeedback] = useState(false);

            const [currentScenario, setCurrentScenario] = useState(0);
            const [scenarioChoice, setScenarioChoice] = useState(null);
            const [showScenarioResult, setShowScenarioResult] = useState(false);

            function startGame() {
                if (playerData.name.trim()) {
                    setGameState("flashcards");
                }
            }

            function nextFlashcard() {
                if (currentFlashcard < flashcardsData.length - 1) {
                    setCurrentFlashcard(prev => prev + 1);
                    setFlashcardFlipped(false);
                    setPlayerData(prev => ({
                        ...prev,
                        flashcardsViewed: Math.max(prev.flashcardsViewed, currentFlashcard + 2),
                        xp: prev.xp + 15
                    }));
                } else {
                    setGameState("quiz");
                    setPlayerData(prev => ({
                        ...prev,
                        level: 2,
                        flashcardsViewed: flashcardsData.length,
                        xp: prev.xp + 50
                    }));
                }
            }

            function prevFlashcard() {
                if (currentFlashcard > 0) {
                    setCurrentFlashcard(prev => prev - 1);
                    setFlashcardFlipped(false);
                }
            }

            function selectQuizAnswer(index) {
                if (showQuizFeedback) return;
                setSelectedAnswer(index);
            }

            function validateQuizAnswer() {
                setShowQuizFeedback(true);
                const isCorrect = selectedAnswer === quizData[currentQuiz].correct;
                if (isCorrect) {
                    setPlayerData(prev => ({
                        ...prev,
                        score: prev.score + 30,
                        quizScore: prev.quizScore + 30,
                        xp: prev.xp + 30
                    }));
                }
            }

            function nextQuizQuestion() {
                if (currentQuiz < quizData.length - 1) {
                    setCurrentQuiz(prev => prev + 1);
                    setSelectedAnswer(null);
                    setShowQuizFeedback(false);
                } else {
                    setGameState("scenarios");
                    setPlayerData(prev => ({
                        ...prev,
                        level: 3,
                        xp: prev.xp + 60
                    }));
                }
            }

            function makeScenarioChoice(index) {
                setScenarioChoice(index);
                setShowScenarioResult(true);

                const choice = scenarioData[currentScenario].choices[index];
                const values = Object.values(choice.impact);
                const totalChange = Math.max(0, values.reduce((a, b) => a + b, 0));

                setPlayerData(prev => ({
                    ...prev,
                    score: prev.score + totalChange,
                    scenarioScore: prev.scenarioScore + totalChange,
                    xp: prev.xp + 25
                }));
            }

            function nextScenario() {
                if (currentScenario < scenarioData.length - 1) {
                    setCurrentScenario(prev => prev + 1);
                    setScenarioChoice(null);
                    setShowScenarioResult(false);
                } else {
                    completeModule();
                }
            }

            function completeModule() {
                setPlayerData(prev => ({
                    ...prev,
                    finished: true,
                    xp: prev.xp + 100
                }));
                setGameState("complete");
            }

            function generateSaveCode() {
                const saveData = {
                    v: 1,
                    d: new Date().toISOString(),
                    m: MODULE_ID,
                    mv: MODULE_VERSION,
                    n: playerData.name,
                    c: playerData.class,
                    l: 3,
                    s: playerData.score,
                    x: playerData.xp,
                    q: playerData.quizScore,
                    sc: playerData.scenarioScore,
                    f: true
                };
                return encodeSaveCode(saveData);
            }

            function copyCode() {
                const code = generateSaveCode();
                navigator.clipboard.writeText(code).then(() => {
                    alert("Code copié dans le presse-papier !");

                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.scenarioScore),
                                e("div", { className: "stat-label" }, "Score Scénarios")
                            )
                        ),
                        e("div", { className: "save-code-box" },
                            e("div", { className: "save-code-label" }, "📋 Code de Validation (à remettre au CPE) :"),
                            e("div", { className: "save-code" }, saveCode),
                            e("button", {
                                className: "copy-btn",
                                onClick: copyCode
                            }, "Copier le Code")
                        ),
                        e("div", { className: "content-panel", style: { marginTop: "30px", textAlign: "left" } },
                            e("div", { className: "panel-header" },
                                e("div", { className: "panel-icon" }, "✨"),
                                e("div", { className: "panel-title" }, "Ce Que Tu As Acquis")
                            ),
                            e("div", { className: "panel-body" },
                                e("p", null,
                                    "Tu sais maintenant que tes émotions ne te contrôlent pas : c'est ", e("strong", null, "ton cerveau préfrontal"), " qui peut moduler ton ", e("strong", null, "système limbique"), "."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    "La respiration, le recadrage cognitif, la métacognition : ce ne sont pas des théories abstraites. Ce sont des ", e("strong", null, "outils validés par les neurosciences"), " que tu peux utiliser chaque jour."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    "Tu as complété les 5 modules du Pilier Neurosciences. Tu comprends l'empathie, les émotions, la douleur sociale, et l'autorégulation. Tu es désormais ", e("strong", { style: { color: "var(--neuro-accent)" } }, "un·e ambassadeur·rice pHARe certifié·e"), "."
                                )
                            )
                        )
                    )
                );
            }

            switch (gameState) {
                case "intro": return renderIntro();
                case "flashcards": return renderFlashcards();
                case "quiz": return renderQuiz();
                case "scenarios": return renderScenarios();
                case "complete": return renderComplete();
                default: return renderIntro();
            }
        }

        ReactDOM.createRoot(document.getElementById("root")).render(e(App));
    </script>
</body>
</html>
