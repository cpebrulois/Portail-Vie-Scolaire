<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LA FORGE | AED_REV04 \u2014 Sciences & Culture G : rep\u00e8res essentiels</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0c0f14;--acc:#10b981;--acc-d:#047857;--text:#dce4f0;--muted:#6b7a94;--border:#1e2736;--card:#151921;--gold:#e2a84b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(16,185,129,.06) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);padding:32px 36px;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.4);position:relative;overflow:hidden}
.card::before{content:'LA FORGE';position:absolute;top:-18px;right:-8px;font-family:'DM Serif Display';font-size:3.5rem;opacity:.03;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'DM Serif Display',serif;color:var(--acc);text-align:center;margin-bottom:12px}
h1{font-size:1.45rem}h2{font-size:1.15rem}
p{line-height:1.8;margin-bottom:14px;color:var(--text);font-size:.92rem}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7;font-size:.88rem}
.tag{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(226,168,75,.08);border:1px solid rgba(226,168,75,.25);padding:4px 12px;border-radius:20px;font-size:.68rem;color:var(--gold);font-family:'JetBrains Mono',monospace}
.comp-earn{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:3px 10px;border-radius:12px;font-size:.62rem;color:var(--acc);font-family:'JetBrains Mono',monospace;margin:2px}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn{background:var(--acc);color:#fff;border:none;padding:12px 26px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:6px;font-size:.82rem;font-family:'IBM Plex Sans',sans-serif}
.btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.progress{height:2px;background:rgba(255,255,255,.05);margin-bottom:22px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s}
.step-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.2s;border-radius:6px;font-size:.86rem;line-height:1.6;font-family:'IBM Plex Sans',sans-serif}
.opt:hover{background:rgba(255,255,255,.05);border-color:var(--acc)}
.opt-label{font-weight:700;color:var(--acc);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.summary-box{background:rgba(255,255,255,.02);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.8}
.summary-box p{margin-bottom:8px;font-size:.84rem;color:#a0b4cc}
.insight-box{background:rgba(226,168,75,.04);border:1px solid rgba(226,168,75,.15);padding:14px 16px;border-radius:6px;margin:12px 0;font-size:.82rem;line-height:1.7;color:#d4c4a0}
.insight-box strong{color:var(--gold)}
.seal{text-align:center;font-size:2.6rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:4px;font-size:.68rem;font-weight:600;transition:.2s;margin-bottom:16px;font-family:'IBM Plex Sans',sans-serif}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scenario-ctx{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;border-radius:6px;margin-bottom:14px;font-size:.86rem;line-height:1.7}
.scenario-ctx strong{color:var(--acc)}
.fb-box{background:rgba(255,255,255,.03);border-left:3px solid var(--acc);padding:14px 16px;margin:14px 0;font-size:.84rem;line-height:1.7;border-radius:0 6px 6px 0}
.fb-box.good{border-left-color:#10b981;background:rgba(16,185,129,.04)}
.fb-box.warn{border-left-color:#f97316;background:rgba(249,115,22,.04)}
</style></head>
<body><div id="root"></div>
<script>
var e = React.createElement;
var MODULE_ID = 'AED_REV04';
var CERT_KEY  = 'CERT_AED_AED_REV04';
var BACK_URL  = 'index_PIX_AED.html';

var SCENARIOS = [
  {
    ctx: "Nora (6\\u00e8me) r\\u00e9vise son cours d\\u2019histoire. Elle vous demande : \\u00abC\\u2019est quoi la diff\\u00e9rence entre la R\\u00e9volution fran\\u00e7aise et la R\\u00e9publique ?\\u00bb",
    q: "Comment expliquez-vous simplement ?",
    options: [
      {
        label: "Explication claire + chronologie",
        text: "\\u00abLa R\\u00e9volution (1789), c\\u2019est le moment o\\u00f9 les Fran\\u00e7ais ont renvers\\u00e9 le syst\\u00e8me du roi qui d\\u00e9cidait tout seul. La R\\u00e9publique, c\\u2019est le syst\\u00e8me qu\\u2019on a construit apr\\u00e8s : le peuple choisit ses repr\\u00e9sentants. La R\\u00e9volution est un \\u00e9v\\u00e9nement, la R\\u00e9publique est un syst\\u00e8me. On est aujourd\\u2019hui dans la 5\\u00e8me R\\u00e9publique, depuis 1958.\\u00bb",
        score: 3,
        fb: "Distinguer \\u00e9v\\u00e9nement (R\\u00e9volution) et syst\\u00e8me (R\\u00e9publique) est la cl\\u00e9 de compr\\u00e9hension. Ajouter \\u00ab5\\u00e8me R\\u00e9publique, 1958\\u00bb ancre dans le pr\\u00e9sent. Simple, clair, transmissible.",
        good: true
      },
      {
        label: "Trop d\\u00e9taill\\u00e9",
        text: "\\u00abAlors en fait, il y a eu les \\u00c9tats G\\u00e9n\\u00e9raux, puis le Serment du Jeu de Paume, puis la prise de la Bastille, puis la Terreur...\\u00bb",
        score: 1,
        fb: "Le d\\u00e9tail noie la compr\\u00e9hension. Nora a besoin de la structure (\\u00e9v\\u00e9nement vs syst\\u00e8me), pas de la chronologie compl\\u00e8te. En aide aux devoirs, la simplification juste vaut mieux que l\\u2019exhaustivit\\u00e9 confuse.",
        good: false
      },
      {
        label: "Esquiver",
        text: "\\u00abRelis ton cours, c\\u2019est marqu\\u00e9 dedans.\\u00bb",
        score: 0,
        fb: "Elle a d\\u00e9j\\u00e0 lu son cours et n\\u2019a pas compris. Renvoyer au cours sans reformuler, c\\u2019est refuser l\\u2019aide. L\\u2019AED qui reformule simplement ce que le cours dit de mani\\u00e8re compliqu\\u00e9e est irremplacable.",
        good: false
      },
    ]
  },
  {
    ctx: "Romain (5\\u00e8me) pr\\u00e9pare un expos\\u00e9 sur le changement climatique. Il vous demande : \\u00abC\\u2019est quoi l\\u2019effet de serre en vrai ? C\\u2019est bien ou c\\u2019est mal ?\\u00bb",
    q: "Comment expliquez-vous ?",
    options: [
      {
        label: "Explication par analogie",
        text: "\\u00abL\\u2019effet de serre naturel, c\\u2019est comme une couverture autour de la Terre : des gaz dans l\\u2019atmosph\\u00e8re retiennent une partie de la chaleur du soleil. Sans \\u00e7a, il ferait -18\\u00b0C. Donc c\\u2019est vital. Le probl\\u00e8me, c\\u2019est qu\\u2019on rajoute trop de gaz (CO2, m\\u00e9thane) avec l\\u2019industrie et les transports. La couverture devient trop \\u00e9paisse, la temp\\u00e9rature monte. C\\u2019est le r\\u00e9chauffement climatique.\\u00bb",
        score: 3,
        fb: "L\\u2019analogie de la couverture est simple et juste. Distinguer \\u00abeffet de serre naturel (vital)\\u00bb et \\u00abeffet de serre renforc\\u00e9 (probl\\u00e8me)\\u00bb \\u00e9vite la confusion fr\\u00e9quente \\u00abeffet de serre = mal\\u00bb. La nuance \\u00abc\\u2019est le d\\u00e9s\\u00e9quilibre le probl\\u00e8me\\u00bb est scientifiquement pr\\u00e9cise et p\\u00e9dagogiquement forte.",
        good: true
      },
      {
        label: "Simplification excessive",
        text: "\\u00abC\\u2019est la pollution qui r\\u00e9chauffe la plan\\u00e8te.\\u00bb",
        score: 1,
        fb: "Pas faux mais trop vague. \\u00abPollution\\u00bb m\\u00e9lange tout (plastiques, gaz, chimie...). L\\u2019explication doit sp\\u00e9cifier : les gaz \\u00e0 effet de serre (CO2, m\\u00e9thane) qui modifient l\\u2019\\u00e9quilibre thermique. La pr\\u00e9cision n\\u2019est pas du p\\u00e9dantisme \\u2014 c\\u2019est de la science.",
        good: false
      },
      {
        label: "Renvoi",
        text: "\\u00abRegarde sur Internet, y\\u2019a plein de vid\\u00e9os.\\u00bb",
        score: 0,
        fb: "Internet sans filtre, c\\u2019est aussi du climatoscepticisme, du complotisme et des vid\\u00e9os trompeuses. L\\u2019AED qui peut donner une explication claire et juste est un filtre de qualit\\u00e9 irremplacable.",
        good: false
      },
    ]
  },
  {
    ctx: "Yasmine (4\\u00e8me) r\\u00e9vise l\\u2019EMC et vous demande : \\u00abLes 3 pouvoirs, c\\u2019est quoi d\\u00e9j\\u00e0 ? Et pourquoi c\\u2019est important qu\\u2019ils soient s\\u00e9par\\u00e9s ?\\u00bb",
    q: "Comment r\\u00e9pondez-vous ?",
    options: [
      {
        label: "Explication concr\\u00e8te",
        text: "\\u00abL\\u00e9gislatif : qui fait les lois (Assembl\\u00e9e nationale, S\\u00e9nat). Ex\\u00e9cutif : qui applique les lois (Pr\\u00e9sident, gouvernement). Judiciaire : qui juge si les lois sont respect\\u00e9es (tribunaux). S\\u2019ils sont s\\u00e9par\\u00e9s, c\\u2019est pour qu\\u2019aucun ne devienne tout-puissant. Imagine un monde o\\u00f9 celui qui fait les lois est aussi celui qui juge \\u2014 il ne peut jamais avoir tort. C\\u2019est la dictature.\\u00bb",
        score: 3,
        fb: "Trois d\\u00e9finitions courtes + un exemple concret du risque de concentration. L\\u2019argument \\u00abcelui qui fait les lois ET qui juge ne peut jamais avoir tort\\u00bb rend la s\\u00e9paration des pouvoirs viscéralement compr\\u00e9hensible \\u2014 pas juste th\\u00e9orique.",
        good: true
      },
      {
        label: "Liste s\\u00e8che",
        text: "\\u00abL\\u00e9gislatif, ex\\u00e9cutif, judiciaire. C\\u2019est dans ton cours.\\u00bb",
        score: 0,
        fb: "Yasmine conna\\u00eet les noms \\u2014 elle ne comprend pas le sens. L\\u2019aide aux devoirs qui ne reformule pas est inutile.",
        good: false
      },
      {
        label: "Flou",
        text: "\\u00abC\\u2019est pour \\u00e9viter que le pouvoir soit concentr\\u00e9. C\\u2019est Montesquieu qui a invent\\u00e9 \\u00e7a.\\u00bb",
        score: 1,
        fb: "La r\\u00e9f\\u00e9rence \\u00e0 Montesquieu est correcte mais sans exemple concret, \\u00ab\\u00e9viter la concentration\\u00bb reste abstrait. L\\u2019exemple du \\u00abfaiseur de lois qui se juge lui-m\\u00eame\\u00bb ancre le concept.",
        good: false
      },
    ]
  },
];

var SYNTHESIS = [
  {icon:"\u{1F3DB}", t:"R\\u00e9volution vs R\\u00e9publique :", v:"\\u00c9v\\u00e9nement (1789) vs syst\\u00e8me (\\u00e9lection des repr\\u00e9sentants). On est dans la 5\\u00e8me, depuis 1958."},
  {icon:"\u{1F30D}", t:"Effet de serre :", v:"Naturel = vital (couverture). Renforc\\u00e9 = probl\\u00e8me (couverture trop \\u00e9paisse). C\\u2019est le d\\u00e9s\\u00e9quilibre qui est dangereux."},
  {icon:"\u2696\uFE0F", t:"S\\u00e9paration des pouvoirs :", v:"L\\u00e9gislatif / Ex\\u00e9cutif / Judiciaire. Celui qui fait les lois ne peut pas \\u00eatre celui qui juge \\u2014 sinon c\\u2019est la dictature."},
  {icon:"\u{1F4A1}", t:"Vulgariser :", v:"L\\u2019analogie et l\\u2019exemple concret valent plus que la d\\u00e9finition. L\\u2019AED qui reformule simplement est irremplacable."},
];


function getPlayer(){return localStorage.getItem('pvs_current_player')||'anonyme';}
function awardXP(){
  try{
    var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'AED-'+MODULE_ID+'-'+Date.now(),type:'AED_PROGRESS',player:getPlayer(),
      module:MODULE_ID,cpTotal:0,label:'LA FORGE : Sciences & Culture G : rep\\u00e8res essentiels',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  var _s=React.useState,_step=_s('intro'),step=_step[0],setStep=_step[1];
  var _si=_s(0),sIdx=_si[0],setSIdx=_si[1];
  var _sc=_s(0),score=_sc[0],setScore=_sc[1];
  var _fb=_s(null),feedback=_fb[0],setFeedback=_fb[1];

  var finish=function(){
    var cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();setStep('complete');
  };
  var goBack=function(){window.location.href=BACK_URL;};
  var PlayerChip=function(){return e('div',{className:'player-chip'},'\u{1F3AE} ',getPlayer());};
  var handleChoice=function(opt){setScore(score+opt.score);setFeedback(opt);};
  var nextScenario=function(){setFeedback(null);if(sIdx<SCENARIOS.length-1){setSIdx(sIdx+1);}else{setStep('synthesis');}};

  var renderIntro=function(){return e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'\u2190 La Forge'),PlayerChip()),
    e('div',{className:'tag'},'BONUS R\u00e9visions \u2014 Culture G \u00d71.5 \u00B7 Module 1/5'),
    e('h1',null,"Sciences & Culture G : rep\\u00e8res essentiels"),
    e('p',{className:'quote'},'"'+"La culture g\\u00e9n\\u00e9rale, c\\u2019est ce qui reste quand on a tout oubli\\u00e9."+'" \u2014 \\u00c9douard Herriot'),
    e('p',null,"Un \\u00e9l\\u00e8ve vous demande : \\u00abC\\u2019est quoi le r\\u00e9chauffement climatique en vrai ?\\u00bb \\u00abLa R\\u00e9volution fran\\u00e7aise c\\u2019est quand ?\\u00bb \\u00abPourquoi on dit que la Terre tourne autour du Soleil ?\\u00bb Si vous ne pouvez pas r\\u00e9pondre clairement, l\\u2019aide aux devoirs tourne court."),
    e('p',null,"Ce module passe en revue les rep\\u00e8res incontournables du coll\\u00e8ge \\u00e0 travers des situations d\\u2019aide concr\\u00e8tes : grands rep\\u00e8res historiques, bases scientifiques, culture citoyenne. Le minimum syndical pour ne pas \\u00eatre sec face \\u00e0 une question de 6\\u00e8me."),
    e('div',{className:'insight-box'},e('strong',null,'\u{1F4DA} R\u00e9f\u00e9rences : '),"Programmes histoire-g\\u00e9o-EMC cycle 3-4 \\u2014 Sciences de la vie et de la Terre \\u2014 Physique-chimie coll\\u00e8ge"),
    e('div',{style:{textAlign:'center',margin:'12px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +60 XP'),
      e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+P\u00e9dagogie'),e('div',{className:'comp-earn'},'+Culture'),
      null),
    e('button',{className:'btn',onClick:function(){setStep('scenario');}},'Entrer dans le sc\u00e9nario')
  );};

  var renderScenario=function(){
    var sc=SCENARIOS[sIdx];var pct=15+Math.round(((sIdx+(feedback?1:0))/(SCENARIOS.length))*70);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Sc\u00e9nario '+(sIdx+1)+' / '+SCENARIOS.length),
      e('div',{className:'scenario-ctx'},e('strong',null,'\u{1F4CD} Contexte : '),sc.ctx),
      e('h2',null,sc.q),
      !feedback?
        sc.options.map(function(opt,i){return e('button',{key:i,className:'opt',onClick:function(){handleChoice(opt);}},
          e('div',{className:'opt-label'},opt.label),opt.text);})
        :e('div',null,
          e('div',{className:'fb-box '+(feedback.good?'good':'warn')},
            e('strong',null,feedback.good?'\u2705 Posture adapt\u00e9e':'\u26A0\uFE0F Point d\u2019am\u00e9lioration'),
            e('p',{style:{marginTop:'8px',marginBottom:0}},feedback.fb)),
          e('button',{className:'btn',onClick:nextScenario},sIdx<SCENARIOS.length-1?'Sc\u00e9nario suivant \u2192':'Synth\u00e8se \u2192'))
    );
  };

  var renderSynthesis=function(){
    var mx=SCENARIOS.length*3,pc=Math.round((score/mx)*100);
    var v=pc>=80?"Comp\u00e9tence solide.":pc>=50?"Des r\u00e9flexes \u00e0 affiner.":"\u00c0 retravailler.";
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'90%'}})),
      e('div',{className:'step-tag'},'Synth\u00e8se'),e('h2',null,"Ce qu\u2019il faut retenir"),
      e('div',{className:'insight-box'},e('strong',null,'\u{1F3AF} Score : '),score+'/'+mx+' ('+pc+'%) \u2014 '+v),
      e('div',{className:'summary-box'},SYNTHESIS.map(function(s,i){
        return e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v);})),
      e('button',{className:'btn',onClick:finish},'Valider ce module \u2192')
    );
  };

  var renderComplete=function(){return e('div',{className:'card'},
    e('div',{className:'seal'},'\u{1F3DB}'),
    e('h1',null,"Module valid\u00e9 !"),
    e('p',{style:{textAlign:'center'}},"Comp\u00e9tences acquises \u2014 bravo."),
    e('div',{style:{textAlign:'center',margin:'10px 0'}},
      e('div',{className:'xp-badge'},'\u26A1 +60 XP'),e('span',{style:{margin:'0 6px'}}),
      e('div',{className:'comp-earn'},'+1 P\u00e9dagogie'),e('div',{className:'comp-earn'},'+1 Culture'),
      null),
    e('button',{className:'btn',onClick:goBack},'\u2190 Retour \u00e0 La Forge')
  );};

  switch(step){
    case 'intro':return renderIntro();case 'scenario':return renderScenario();
    case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();
    default:return renderIntro();
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
