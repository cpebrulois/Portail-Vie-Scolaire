<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nouveautes du Super-Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#07101e;
  --bg2:#13274a;
  --card:#ffffff10;
  --line:#ffffff22;
  --cyan:#63d9ff;
  --gold:#ffd66b;
  --text:#f5f8ff;
  --muted:#aac1df;
  --ok:#8dffb7;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Rajdhani,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left,#1bc7ff22,transparent 30%),
    radial-gradient(circle at bottom right,#ffd66b22,transparent 32%),
    linear-gradient(145deg,var(--bg1),var(--bg2));
  min-height:100vh;
}
.wrap{max-width:980px;margin:auto;padding:22px 18px 28px}
.hero{
  padding:18px;
  border:1px solid #ffffff26;
  border-radius:22px;
  background:linear-gradient(145deg,#0e1b33cc,#13213bcc);
  box-shadow:0 16px 40px #00000035;
}
.kicker{
  display:inline-block;
  padding:5px 11px;
  border-radius:999px;
  background:linear-gradient(135deg,var(--cyan),var(--gold));
  color:#05111d;
  font-weight:800;
  letter-spacing:.4px;
}
h1{
  margin:12px 0 8px;
  font-family:Orbitron,monospace;
  font-size:clamp(1.6rem,4vw,2.4rem);
  line-height:1.1;
}
.heroSub{color:var(--muted);font-size:1.02rem;max-width:720px}
.heroMeta{
  margin-top:14px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.chip{
  padding:5px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#ffffff0d;
  color:var(--muted);
  font-size:.88rem;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
  margin-top:16px;
}
.card{
  padding:16px;
  border-radius:18px;
  border:1px solid var(--line);
  background:var(--card);
  box-shadow:0 10px 24px #00000020;
}
.cardTop{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}
.tag{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  background:#ffffff14;
  border:1px solid var(--line);
  color:var(--gold);
  font-size:.8rem;
  font-weight:700;
}
.icon{
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:14px;
  background:linear-gradient(135deg,#0fc7ff33,#ffd66b22);
  border:1px solid var(--line);
  font-size:1.2rem;
}
h2{
  margin:0 0 6px;
  font-family:Orbitron,monospace;
  font-size:1rem;
  color:var(--cyan);
}
p{margin:0;color:var(--muted);line-height:1.45}
.list{
  margin:18px 0 0;
  padding:0;
  list-style:none;
  display:grid;
  gap:10px;
}
.list li{
  padding:12px 14px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#ffffff0a;
}
.list strong{color:var(--text)}
.sectionTitle{
  margin:24px 0 10px;
  font-family:Orbitron,monospace;
  color:var(--gold);
  font-size:1rem;
}
.footerNote{
  margin-top:22px;
  padding:14px 16px;
  border-radius:16px;
  border:1px solid #8dffb74d;
  background:linear-gradient(145deg,#0c221a,#10271f);
  color:#dafce7;
}
.footerNote code{
  padding:2px 6px;
  border-radius:8px;
  background:#ffffff14;
}
@media (max-width:640px){
  .wrap{padding:16px 12px 22px}
  .hero,.card{border-radius:16px}
}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="kicker">NOUVEAUTES</div>
    <h1 id="releaseTitle">Mise a jour du Super-Hub</h1>
    <p class="heroSub" id="releaseIntro"></p>
    <div class="heroMeta" id="heroMeta"></div>
  </section>

  <div class="grid" id="newsCards"></div>

  <h2 class="sectionTitle">A retenir</h2>
  <ul class="list" id="newsChecklist"></ul>

  <div class="footerNote">
    Pour mettre a jour cette page, edite les blocs <code>NEWS_RELEASE</code>, <code>NEWS_CARDS</code> et <code>NEWS_CHECKLIST</code> dans ce fichier.
    Pour que la fenetre se reouvre automatiquement pour les joueurs, pense aussi a changer <code>NEWS_HUB_VERSION</code> dans <code>index.html</code>.
  </div>
</div>

<script>
// ------------------------------------------------------------
// ZONE A EDITER
// 1) Mets a jour NEWS_RELEASE quand une nouvelle version sort.
// 2) Ajoute / retire des cartes dans NEWS_CARDS.
// 3) Mets a jour NEWS_CHECKLIST.
// ------------------------------------------------------------

const NEWS_RELEASE = {
  title: 'Mise a jour du 11 mars 2026',
  intro: "Le portail vient d'etre enrichi. Voici les derniers ajouts visibles lors de ta prochaine connexion.",
  meta: [
    'Progression bonus reactivee',
    'Videos recompenses debloquables',
    'Jeu bonus connecte au hub',
    'Correctifs de connexion adultes'
  ]
};

const NEWS_CARDS = [
  {
    tag: 'Bonus',
    icon: 'XP',
    title: 'Bonus de progression remis en service',
    text: "Des recompenses reviennent dans l'index quand certains paliers d'XP sont atteints."
  },
  {
    tag: 'Video',
    icon: 'MV',
    title: 'Videos de recompense automatiques',
    text: 'A 500, 1000, 1500 et 2000 XP, une video speciale peut se lancer automatiquement.'
  },
  {
    tag: 'Jeu secret',
    icon: 'CJ',
    title: 'Chevaliers de la Justice debloque a 500 XP',
    text: "Le jeu bonus s'ouvre depuis le portail et la puissance du heros suit ta progression."
  },
  {
    tag: 'Correctif',
    icon: 'OK',
    title: 'Connexion adultes fiabilisee',
    text: "Les codes joueurs adultes sont a nouveau reconnus proprement par le referentiel du hub."
  }
];

const NEWS_CHECKLIST = [
  "Passe par le panneau bonus du portail pour revoir une video deja debloquee.",
  "A 500 XP, le bouton d'acces a Chevaliers de la Justice apparait dans l'index.",
  "Si tu ne vois pas les nouveautes tout de suite, force un rechargement du navigateur.",
  "Les futures annonces seront ajoutees ici, dans cette meme fenetre."
];

function renderNewsHub(){
  const title = document.getElementById('releaseTitle');
  const intro = document.getElementById('releaseIntro');
  const heroMeta = document.getElementById('heroMeta');
  const cards = document.getElementById('newsCards');
  const checklist = document.getElementById('newsChecklist');

  title.textContent = NEWS_RELEASE.title;
  intro.textContent = NEWS_RELEASE.intro;

  heroMeta.innerHTML = '';
  NEWS_RELEASE.meta.forEach(function(item){
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = item;
    heroMeta.appendChild(chip);
  });

  cards.innerHTML = '';
  NEWS_CARDS.forEach(function(item){
    const card = document.createElement('article');
    card.className = 'card';
    card.innerHTML =
      '<div class="cardTop">' +
        '<div>' +
          '<span class="tag">' + item.tag + '</span>' +
          '<h2>' + item.title + '</h2>' +
        '</div>' +
        '<div class="icon">' + item.icon + '</div>' +
      '</div>' +
      '<p>' + item.text + '</p>';
    cards.appendChild(card);
  });

  checklist.innerHTML = '';
  NEWS_CHECKLIST.forEach(function(item){
    const li = document.createElement('li');
    li.innerHTML = '<strong>A noter :</strong> ' + item;
    checklist.appendChild(li);
  });
}

document.addEventListener('DOMContentLoaded', renderNewsHub);
</script>
<script src="tts_accessibility.js" data-pvs-tts="1"></script>
</body>
</html>
