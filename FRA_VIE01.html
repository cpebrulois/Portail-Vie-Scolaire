<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FRATERNITÉ | FRA_VIE01 — La laïcité : principe, histoire, enjeux</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;600;700&family=Share+Tech+Mono&display=swap');
:root{--bg:#0a0804;--acc:#06b6d4;--acc-d:#0891b2;--text:#fdf6e8;--muted:#9d8060;--border:#2a1a08}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:32px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% 0%,rgba(6,182,212,0.09) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:rgba(10,8,4,0.93);border:2px solid var(--acc);padding:36px 40px;border-radius:6px;box-shadow:0 0 50px rgba(0,0,0,0.7);backdrop-filter:blur(10px);position:relative;overflow:hidden}
.card::before{content:'FRATERNITÉ';position:absolute;top:-20px;right:-10px;font-family:'Playfair Display';font-size:4.5rem;opacity:0.04;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'Playfair Display',serif;color:var(--acc);text-align:center;margin-bottom:14px}
h1{font-size:1.55rem}h2{font-size:1.2rem}
p{line-height:1.75;margin-bottom:12px;color:#e8d8c0}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7}
.tag{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'Share Tech Mono',monospace;margin-bottom:12px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.25);padding:4px 12px;border-radius:20px;font-size:0.7rem;color:#ffd700;font-family:'Share Tech Mono',monospace}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:0.68rem;color:var(--muted);font-family:'Share Tech Mono',monospace}
.btn{background:var(--acc);color:#000;border:none;padding:13px 28px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:4px;font-family:'Montserrat',sans-serif}
.btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.progress{height:3px;background:rgba(255,255,255,0.07);margin-bottom:24px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s ease}
.step-tag{font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.22s;border-radius:4px;font-size:0.88rem;line-height:1.5;font-family:'Montserrat',sans-serif}
.opt:hover{background:rgba(255,255,255,0.09);border-color:var(--acc)}
.summary-box{background:rgba(255,255,255,0.03);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.75}
.summary-box p{margin-bottom:8px;font-size:0.85rem;color:#c8b89a}
.token-box{background:#000;color:var(--acc);font-family:'Share Tech Mono',monospace;padding:16px;border:1px dashed var(--acc);word-break:break-all;margin:18px 0;font-size:0.8rem;border-radius:3px;cursor:text;user-select:all;line-height:1.6}
.token-note{font-size:0.72rem;color:var(--muted);line-height:1.65;margin-top:4px}
.seal{text-align:center;font-size:2.8rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:3px;font-size:0.7rem;font-family:'Montserrat',sans-serif;font-weight:600;transition:.2s;margin-bottom:18px}
.nav-back:hover{background:rgba(255,255,255,0.09);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.timeline-row{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}
.t-chip{background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.3);color:#a0f0ff;padding:6px 10px;border-radius:4px;font-size:0.75rem;font-family:'Share Tech Mono',monospace}
</style></head>
<body><div id="root"></div>
<script>
const e = React.createElement;
const MODULE_ID = 'FRA_VIE01';
const CERT_KEY  = 'CERT_FRATERNITE_VIE1';
const BACK_URL  = 'index_PIX_FRATERNITE.html';
const CERT_KEYS = ["CERT_FRATERNITE_SOL1","CERT_FRATERNITE_SOL2","CERT_FRATERNITE_SOL3","CERT_FRATERNITE_SOL4","CERT_FRATERNITE_DIS1","CERT_FRATERNITE_DIS2","CERT_FRATERNITE_DIS3","CERT_FRATERNITE_DIS4","CERT_FRATERNITE_VIE1","CERT_FRATERNITE_VIE2","CERT_FRATERNITE_VIE3","CERT_FRATERNITE_VIE4"];

const TIMELINE = ["1789 : Liberté de conscience (DDHC)","1905 : Loi de séparation Église/État","1946 : 'La France est une République laïque' (Constitution)","1989 : Aff. foulard — débat scolaire","2004 : Loi signes religieux ostensibles à l'école"];

const QUESTIONS = [
  {
    q: "La loi de 1905 sur la séparation des Églises et de l'État établit principalement...",
    a: ["L'interdiction de toute religion en France", "La neutralité de l'État envers les religions (ni financement ni reconnaissance) et la liberté de conscience garantie", "L'obligation pour les citoyens de déclarer leur religion", "L'interdiction du port de signes religieux dans l'espace public"],
    c: 1,
    wrong: "La loi de 1905 repose sur deux piliers : l'État ne reconnaît, ne salarie ni ne subventionne aucun culte (neutralité de la puissance publique), ET garantit le libre exercice des cultes (liberté de conscience). Elle ne supprime pas la religion — elle lui donne sa juste place hors de l'État."
  },
  {
    q: "Dans une école publique, la loi de 2004 interdit aux élèves le port...",
    a: ["De tout bijou ayant une signification religieuse", "De signes ou tenues par lesquels les élèves manifestent ostensiblement une appartenance religieuse", "De tout vêtement courant associé culturellement à une religion", "Des signes religieux discrets comme une croix fine ou une étoile de David"],
    c: 1,
    wrong: "La loi de 2004 (article L141-5-1 du Code de l'éducation) vise les signes 'ostensibles' — c'est-à-dire qui manifestent visiblement une appartenance religieuse. Elle ne vise pas les signes discrets (petite croix, étoile de David fine). La distinction est entre manifestation visible et signe discret."
  },
  {
    q: "La laïcité s'applique à l'école publique différemment selon qu'on est...",
    a: ["Élève ou adulte — les règles sont strictement identiques", "Élève ou agent public (enseignant, CPE...) : les agents ont des obligations de neutralité plus strictes (pas de signe religieux), les élèves ont droit à la liberté de conscience avec les limites de la loi 2004", "Élève ou adulte — les adultes peuvent tout", "Parent d'élève ou élève — les parents sont soumis aux mêmes règles que les élèves"],
    c: 1,
    wrong: "La distinction est fondamentale : les agents du service public sont tenus à une neutralité stricte (pas de signe religieux quelle qu'en soit la taille). Les élèves, eux, gardent leur liberté de conscience — mais la loi de 2004 interdit les signes ostensibles. Les parents d'élèves, eux, ne sont pas soumis aux mêmes règles que les agents."
  }
];

const SCENARIO = {
  title: "Le débat en classe",
  p: "En heure de vie de classe, un élève dit : 'La laïcité c'est fait pour embêter les musulmans, puisque c'est surtout eux qu'on cible.' Comment répondre de façon juste et constructive ?",
  options: [
    {
      text: "Je reconnais que cette impression est compréhensible — certaines applications ont pu créer des inégalités réelles. Mais la laïcité elle-même s'applique à toutes les religions : elle a aussi interdit le financement des cultes catholique, juif, protestant. L'enjeu est de distinguer le principe (universel) de ses applications (qui peuvent être questionnées). Cette distinction est saine et démocratique.",
      ok: true,
      fb: ""
    },
    {
      text: "Je dis que la laïcité s'applique à tout le monde de façon égale, donc il a tort.",
      ok: false,
      fb: "Cette réponse est trop rapide. L'élève soulève une vraie question sur les effets pratiques de la laïcité. Reconnaître que certaines applications ont pu être inégalement vécues, tout en défendant le principe universel, est plus honnête et plus efficace pédagogiquement."
    },
    {
      text: "Je change de sujet pour éviter les tensions.",
      ok: false,
      fb: "Éviter le sujet ne résout rien — il refait surface, souvent de façon plus tendue. La classe est précisément l'espace pour débattre de façon étayée. Cadrer le débat (principe vs applications) est une compétence du délégué·e."
    }
  ]
};

const SYNTHESIS = [
  {icon:"🏛️", t:"1905 :", v:"Ni reconnaissance ni financement des cultes par l'État + liberté de conscience garantie. Pas une loi contre la religion — une loi qui la protège de l'État."},
  {icon:"🏫", t:"À l'école :", v:"Agents = neutralité stricte. Élèves = liberté de conscience + interdiction des signes ostensibles (loi 2004). Deux régimes distincts."},
  {icon:"⚖️", t:"Principe vs applications :", v:"La laïcité est universelle dans son principe. Ses applications peuvent être questionnées. Distinguer les deux est une pensée citoyenne mature."},
  {icon:"🗣️", t:"Débat sain :", v:"La laïcité est vivante — elle se discute. Savoir tenir ce débat sans dogmatisme ni rejet, c'est l'exercer vraiment."}
];

function getPlayer(){return localStorage.getItem('pvs_current_player')||'anonyme';}
function countCerts(){let n=0;CERT_KEYS.forEach(k=>{try{if(localStorage.getItem(k))n++;}catch(ex){}});return n;}
function awardXP(){
  try{
    const raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'FRA-'+MODULE_ID+'-'+Date.now(),type:'FRATERNITE_PROGRESS',player:getPlayer(),module:MODULE_ID,cpTotal:countCerts(),label:'FRATERNITÉ : La laïcité — principe, histoire, enjeux',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  const [step,setStep]=React.useState('intro');
  const [qIdx,setQIdx]=React.useState(0);
  const [token,setToken]=React.useState('');
  const finish=()=>{const cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};localStorage.setItem(CERT_KEY,JSON.stringify(cert));awardXP();setToken(btoa(unescape(encodeURIComponent(JSON.stringify(cert)))));setStep('complete');};
  const goBack=()=>{window.location.href=BACK_URL;};
  const PlayerChip=()=>e('div',{className:'player-chip'},'🎮 ',getPlayer());

  const renderIntro=()=>e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'← Fraternité'),PlayerChip()),
    e('div',{className:'tag'},'Vivre-ensemble · Module 1/4'),
    e('h1',null,"La laïcité : principe, histoire, enjeux"),
    e('p',{className:'quote'},"« La laïcité n'est pas une opinion parmi d'autres, c'est la liberté d'en avoir une. » — Henri Pena-Ruiz"),
    e('p',null,"La laïcité est souvent mal comprise — tantôt réduite à une hostilité envers la religion, tantôt invoquée de façon sélective. En réalité, c'est un principe de neutralité de l'État qui garantit la liberté de conscience de tous. Elle a une histoire, un texte de loi précis (1905), et des enjeux vifs dans l'école d'aujourd'hui."),
    e('p',null,"Comprendre la laïcité avec précision — distinguer le principe universel de ses applications débattables — est une compétence citoyenne fondamentale."),
    e('div',{className:'timeline-row'},TIMELINE.map((t,i)=>e('div',{key:i,className:'t-chip'},t))),
    e('div',{style:{textAlign:'center'}},e('div',{className:'xp-badge'},'⚡ +50 XP à la clé')),
    e('button',{className:'btn',onClick:()=>setStep('quiz')},"Comprendre la laïcité")
  );

  const renderQuiz=()=>{const q=QUESTIONS[qIdx];const pct=25+Math.round((qIdx/QUESTIONS.length)*30);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Question '+(qIdx+1)+' / '+QUESTIONS.length),
      e('h2',null,q.q),
      q.a.map((opt,i)=>e('button',{key:i,className:'opt',onClick:()=>{if(i===q.c){if(qIdx<QUESTIONS.length-1)setQIdx(qIdx+1);else setStep('scenario');}else alert(q.wrong||'La laïcité a une définition juridique précise. Réessaie.');}},opt))
    );
  };

  const renderScenario=()=>e('div',{className:'card'},
    e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'70%'}})),
    e('div',{className:'step-tag'},'Mise en situation'),
    e('h2',null,SCENARIO.title),e('p',null,SCENARIO.p),
    SCENARIO.options.map((opt,i)=>e('button',{key:i,className:'opt',onClick:()=>{if(opt.ok)setStep('synthesis');else alert(opt.fb);}},opt.text))
  );

  const renderSynthesis=()=>e('div',{className:'card'},
    e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'88%'}})),
    e('div',{className:'step-tag'},'Synthèse'),
    e('h2',null,"Ce qu'il faut retenir"),
    e('div',{className:'summary-box'},SYNTHESIS.map((s,i)=>e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v))),
    e('button',{className:'btn',onClick:finish},'Valider ce module →')
  );

  const renderComplete=()=>e('div',{className:'card'},
    e('div',{className:'seal'},'🏛️'),
    e('h1',null,"La laïcité maîtrisée !"),
    e('p',{style:{textAlign:'center'}},"Module validé — comprendre la laïcité, c'est pouvoir en débattre vraiment."),
    e('div',{style:{textAlign:'center',margin:'8px 0'}},e('div',{className:'xp-badge'},'⚡ +50 XP envoyés au Portail')),
    e('p',{style:{textAlign:'center',color:'var(--muted)',fontSize:'.8rem',marginTop:'10px'}},'Copie le jeton ci-dessous et colle-le dans le Hub Fraternité si demandé.'),
    e('div',{className:'token-box'},token),
    e('p',{className:'token-note'},'📋 Sélectionne tout le code (clic) — Ctrl+C / Cmd+C.'),
    e('button',{className:'btn',onClick:goBack},'← Retour au Hub Fraternité')
  );

  switch(step){case 'intro':return renderIntro();case 'quiz':return renderQuiz();case 'scenario':return renderScenario();case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();default:return renderIntro();}
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
