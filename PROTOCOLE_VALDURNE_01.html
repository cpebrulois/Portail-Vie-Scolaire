<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocole Valdurne — Le Village de Bournac</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080b;--bg2:#0d0f14;--panel:#131720;--panel2:#1a1f2e;
  --gold:#c8a84b;--gold-l:#e2c87a;--gold-d:#8a6d28;--gold-dim:rgba(200,168,75,.15);
  --text:#d6d0c4;--text-m:#8a8478;--text-d:#454038;
  --kern:#7c3aed;--kern-l:#a78bfa;--kern-bg:rgba(124,58,237,.08);
  --rena:#0d9488;--rena-l:#2dd4bf;--rena-bg:rgba(13,148,136,.08);
  --lyam:#b45309;--lyam-l:#f59e0b;--lyam-bg:rgba(180,83,9,.08);
  --green:#166534;--green-l:#4ade80;
  --red:#991b1b;--red-l:#f87171;
  --border:rgba(200,168,75,.12);--border-l:rgba(200,168,75,.28);
  --chrono-ok:#4ade80;--chrono-warn:#f59e0b;--chrono-crit:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Crimson Text',Georgia,serif;background:var(--bg);color:var(--text);user-select:none;}

/* ─── LAYOUT PRINCIPAL ─── */
#game{width:100vw;height:100vh;position:relative;display:flex;flex-direction:column;}
#top-bar{flex-shrink:0;height:48px;background:rgba(7,8,11,.95);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 20px;backdrop-filter:blur(8px);z-index:100;}
.tb-phase{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--text-d);}
.tb-phase.active{color:var(--gold);}
.tb-sep{width:1px;height:20px;background:var(--border);}
.tb-player{font-family:'Cinzel',serif;font-size:.7rem;color:var(--text-m);margin-left:auto;}
.tb-xp{font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--gold-l);}

#main-area{flex:1;display:flex;overflow:hidden;}

/* ─── PANEL LATÉRAL PERSONNAGES (Lyam phase) ─── */
#char-panel{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;padding:12px 8px;display:none;flex-direction:column;gap:8px;}
#char-panel.visible{display:flex;}

.char-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.char-card.char-kern{border-color:rgba(124,58,237,.3);}
.char-card.char-rena{border-color:rgba(13,148,136,.3);}
.char-card.char-ewen{border-color:rgba(239,68,68,.25);}
.char-card.char-mira{border-color:rgba(245,158,11,.25);}
.char-card.char-tomas{border-color:rgba(59,130,246,.25);}
.char-card.char-aldric{border-color:rgba(200,168,75,.3);}

.cc-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cc-portrait{width:36px;height:36px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;overflow:hidden;}
.cc-portrait img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.cc-name{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-m);}
.cc-status{font-size:.72rem;font-style:italic;color:var(--text-d);margin-top:1px;line-height:1.3;}

.gauge-row{margin-bottom:4px;}
.gauge-label{font-size:.62rem;color:var(--text-d);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;display:flex;justify-content:space-between;}
.gauge-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.gauge-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.gauge-confiance .gauge-fill{background:var(--green-l);}
.gauge-tension .gauge-fill{background:var(--red-l);}
.gauge-ouverture .gauge-fill{background:var(--gold-l);}
.gauge-peur .gauge-fill{background:#818cf8;}
.gauge-colere .gauge-fill{background:#f87171;}
.gauge-ecoute .gauge-fill{background:#34d399;}
.gauge-fierte .gauge-fill{background:#fb923c;}
.gauge-verite .gauge-fill{background:#38bdf8;}
.gauge-mefiancejauge .gauge-fill{background:#c084fc;}

.cc-aldric-btn{width:100%;padding:6px;background:var(--gold-dim);border:1px solid var(--gold-d);
  color:var(--gold);font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;
  border-radius:6px;cursor:pointer;transition:.2s;margin-top:6px;}
.cc-aldric-btn:hover:not(:disabled){background:rgba(200,168,75,.25);}
.cc-aldric-btn:disabled{opacity:.35;cursor:not-allowed;}

/* ─── ZONE CENTRALE ─── */
#scene-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* ─── IMAGE DE SCÈNE ─── */
#scene-img{width:100%;height:220px;flex-shrink:0;position:relative;overflow:hidden;background:var(--panel);}
#scene-img img{width:100%;height:100%;object-fit:cover;transition:opacity .5s;}
#scene-img .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:4rem;
  background:linear-gradient(180deg,#0d1020 0%,var(--bg) 100%);}
#scene-img .overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,var(--bg) 100%);}
#scene-img .phase-badge{position:absolute;top:14px;left:14px;padding:4px 12px;border-radius:20px;
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;backdrop-filter:blur(8px);}
.badge-kern{background:rgba(124,58,237,.7);color:#e9d5ff;border:1px solid rgba(167,139,250,.4);}
.badge-rena{background:rgba(13,148,136,.7);color:#ccfbf1;border:1px solid rgba(45,212,191,.4);}
.badge-lyam{background:rgba(180,83,9,.7);color:#fef3c7;border:1px solid rgba(245,158,11,.4);}
.badge-intro{background:rgba(200,168,75,.3);color:#fde68a;border:1px solid rgba(200,168,75,.5);}

/* ─── NARRATION AUDIO ─── */
#narr-bar{flex-shrink:0;background:rgba(13,15,20,.9);border-bottom:1px solid var(--border);
  padding:6px 16px;display:flex;align-items:center;gap:10px;}
.narr-btn{background:none;border:1px solid var(--border-l);color:var(--gold);
  width:26px;height:26px;border-radius:50%;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:.8rem;transition:.2s;flex-shrink:0;}
.narr-btn:hover{background:var(--gold);color:#000;}
.narr-vol{-webkit-appearance:none;width:70px;height:3px;background:rgba(255,255,255,.1);
  border-radius:2px;outline:none;cursor:pointer;}
.narr-vol::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--gold);}
.narr-info{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.5px;color:var(--text-d);flex:1;}

/* ─── CHRONO ─── */
#chrono-wrap{flex-shrink:0;padding:4px 16px;display:none;}
#chrono-wrap.visible{display:block;}
#chrono-bar-bg{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
#chrono-bar-fill{height:100%;border-radius:3px;transition:width .25s linear,background .5s;}
#chrono-label{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--text-m);
  text-align:right;margin-top:2px;}

/* ─── CONTENU SCROLLABLE ─── */
#content{flex:1;overflow-y:auto;padding:16px 20px 24px;}
#content::-webkit-scrollbar{width:4px;}
#content::-webkit-scrollbar-thumb{background:rgba(200,168,75,.2);border-radius:2px;}

.scene-title{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--gold-l);margin-bottom:6px;}
.scene-sub{font-size:.75rem;font-family:'Cinzel',serif;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-d);margin-bottom:14px;}
.scene-text{font-size:1.05rem;line-height:1.85;color:var(--text);margin-bottom:18px;}
.scene-text p{margin-bottom:12px;}
.scene-text em{color:var(--gold-l);font-style:italic;}
.scene-text strong{color:#e8dfc8;}

/* ─── DIALOGUE PERSONNAGE ─── */
.dialogue-box{border-radius:10px;padding:12px 16px;margin-bottom:14px;}
.dialogue-box.kern{background:var(--kern-bg);border:1px solid rgba(124,58,237,.25);}
.dialogue-box.rena{background:var(--rena-bg);border:1px solid rgba(13,148,136,.25);}
.dialogue-box.lyam{background:var(--lyam-bg);border:1px solid rgba(180,83,9,.25);}
.dialogue-box.aldric{background:var(--gold-dim);border:1px solid var(--border-l);}
.dialogue-box.ado{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);}
.db-speaker{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.db-speaker.kern{color:var(--kern-l);}
.db-speaker.rena{color:var(--rena-l);}
.db-speaker.lyam{color:var(--lyam-l);}
.db-speaker.aldric{color:var(--gold-l);}
.db-speaker.ewen{color:#c084fc;}
.db-speaker.mira{color:#fbbf24;}
.db-speaker.tomas{color:#60a5fa;}
.db-text{font-style:italic;font-size:1rem;line-height:1.7;}

/* ─── INDICES (Phase Kern) ─── */
.clue-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.clue-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;cursor:pointer;transition:.25s;position:relative;}
.clue-card:hover{border-color:var(--kern-l);background:var(--kern-bg);}
.clue-card.selected{border-color:var(--kern-l);background:var(--kern-bg);}
.clue-card.selected::after{content:'✓';position:absolute;top:8px;right:10px;
  color:var(--kern-l);font-size:.9rem;}
.clue-card.wrong{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.05);}
.clue-card.correct{border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.05);}
.clue-icon{font-size:1.4rem;margin-bottom:6px;}
.clue-text{font-size:.88rem;line-height:1.5;color:var(--text-m);}

/* ─── TIMELINE DRAG (Phase Kern scène C) ─── */
.timeline-area{margin-bottom:18px;}
.timeline-label{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-d);margin-bottom:10px;}
.timeline-slots{display:flex;flex-direction:column;gap:6px;}
.tl-slot{background:var(--panel);border:1px dashed rgba(124,58,237,.3);border-radius:6px;
  padding:8px 12px;min-height:36px;display:flex;align-items:center;gap:8px;transition:.2s;}
.tl-slot.filled{border-style:solid;border-color:rgba(124,58,237,.4);background:var(--kern-bg);}
.tl-slot.correct{border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.05);}
.tl-slot.wrong{border-color:rgba(239,68,68,.4);}
.tl-num{font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--kern-l);flex-shrink:0;}
.tl-content{font-size:.88rem;color:var(--text-m);font-style:italic;}
.tl-pool{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.tl-chip{background:var(--panel2);border:1px solid rgba(124,58,237,.3);border-radius:20px;
  padding:5px 12px;font-size:.82rem;color:var(--kern-l);cursor:pointer;transition:.2s;}
.tl-chip:hover{background:var(--kern-bg);border-color:var(--kern-l);}
.tl-chip.used{opacity:.3;pointer-events:none;}

/* ─── RESSOURCES RÉNA ─── */
.resource-bar{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.rb-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-d);flex-shrink:0;}
.rb-units{display:flex;gap:3px;flex:1;}
.rb-unit{width:12px;height:20px;border-radius:2px;background:rgba(13,148,136,.4);transition:.3s;}
.rb-unit.spent{background:rgba(255,255,255,.06);}
.rb-count{font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--rena-l);flex-shrink:0;}

/* ─── CHOIX / OPTIONS ─── */
.prompt-label{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--gold);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.choices{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.choice-btn{background:var(--panel);border:1px solid var(--panel2);border-radius:8px;
  padding:14px 16px;text-align:left;cursor:pointer;transition:.25s;color:var(--text);
  font-family:'Crimson Text',serif;font-size:.98rem;line-height:1.5;position:relative;overflow:hidden;}
.choice-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--gold-d);transition:.25s;}
.choice-btn:hover{border-color:var(--gold);transform:translateX(4px);}
.choice-btn:hover::before{background:var(--gold);}
.choice-btn.phase-kern::before{background:var(--kern);}
.choice-btn.phase-kern:hover{border-color:var(--kern-l);}
.choice-btn.phase-rena::before{background:var(--rena);}
.choice-btn.phase-rena:hover{border-color:var(--rena-l);}
.choice-btn.phase-lyam::before{background:var(--lyam);}
.choice-btn.phase-lyam:hover{border-color:var(--lyam-l);}
.choice-btn .cb-cost{font-size:.72rem;color:var(--text-d);margin-top:3px;font-family:'Cinzel',serif;}
.choice-btn .cb-badge{font-size:.65rem;font-family:'Cinzel',serif;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--gold-d);display:block;margin-bottom:3px;}
.choice-btn .cb-title{font-weight:600;color:var(--gold-l);display:block;margin-bottom:2px;}
.choice-btn .cb-sub{color:var(--text-m);font-size:.88rem;}
.choice-btn.locked{opacity:.4;cursor:not-allowed;transform:none !important;}
.choice-btn.locked::after{content:'🔒';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:.9rem;}

/* ─── ÉCRANS SPÉCIAUX ─── */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px 32px;min-height:100%;animation:fadeIn .5s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.screen-sigil{font-size:4rem;margin-bottom:20px;filter:drop-shadow(0 0 20px currentColor);}
.screen-pre{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:4px;text-transform:uppercase;
  color:var(--gold-d);margin-bottom:10px;}
.screen-title{font-family:'IM Fell English',serif;font-size:2.2rem;color:var(--gold-l);
  line-height:1.2;margin-bottom:10px;}
.screen-sub{font-family:'IM Fell English',serif;font-style:italic;color:var(--text-m);
  font-size:1.05rem;margin-bottom:24px;max-width:480px;}
.screen-sep{width:180px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-d),transparent);
  margin:0 auto 24px;}
.screen-body{max-width:520px;font-size:1rem;line-height:1.85;color:var(--text-m);margin-bottom:28px;}
.screen-body p{margin-bottom:12px;}
.screen-body em{color:var(--gold-l);font-style:italic;}

.score-chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;}
.score-chip{padding:6px 16px;border-radius:20px;font-family:'Cinzel',serif;font-size:.72rem;
  letter-spacing:1px;text-transform:uppercase;}
.chip-kern{background:var(--kern-bg);border:1px solid rgba(124,58,237,.35);color:var(--kern-l);}
.chip-rena{background:var(--rena-bg);border:1px solid rgba(13,148,136,.35);color:var(--rena-l);}
.chip-lyam{background:var(--lyam-bg);border:1px solid rgba(180,83,9,.35);color:var(--lyam-l);}

.xp-badge{display:inline-flex;align-items:center;gap:8px;background:var(--gold-dim);
  border:1px solid var(--border-l);padding:8px 20px;border-radius:30px;
  font-family:'Cinzel',serif;font-size:.88rem;color:var(--gold);margin-bottom:20px;}

.btn-primary{background:var(--gold-d);color:#f5ead0;border:none;padding:13px 36px;
  font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;border-radius:6px;transition:.25s;box-shadow:0 4px 20px rgba(200,168,75,.2);}
.btn-primary:hover{background:var(--gold);color:#000;transform:translateY(-2px);}
.btn-secondary{background:none;border:1px solid rgba(255,255,255,.1);color:var(--text-m);
  padding:10px 22px;font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;border-radius:6px;transition:.2s;margin-top:8px;}
.btn-secondary:hover{border-color:rgba(255,255,255,.25);color:var(--text);}

/* ─── ÉCRAN DE TRANSITION ─── */
.transition-screen{position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px;}
.ts-icon{font-size:3rem;margin-bottom:20px;opacity:0;animation:tsIn .6s ease .2s forwards;}
.ts-title{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--gold-l);opacity:0;
  animation:tsIn .6s ease .4s forwards;margin-bottom:12px;}
.ts-sub{color:var(--text-m);font-size:.95rem;opacity:0;animation:tsIn .6s ease .6s forwards;
  line-height:1.7;max-width:480px;margin-bottom:24px;}
.ts-score-row{display:flex;gap:12px;opacity:0;animation:tsIn .6s ease .8s forwards;}
@keyframes tsIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ─── RÉSULTATS PHASE ─── */
.result-banner{background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:14px 18px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px;}
.rb-icon{font-size:1.6rem;flex-shrink:0;}
.rb-title{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--gold-l);margin-bottom:4px;}
.rb-desc{font-size:.9rem;color:var(--text-m);line-height:1.5;}

/* ─── PROGRESS BOTTOM ─── */
#bottom-bar{flex-shrink:0;height:32px;background:rgba(7,8,11,.95);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 16px;}
#prog-fill{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
#prog-inner{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold-d),var(--gold-l));
  transition:width .5s ease;}
#prog-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:2px;color:var(--text-d);text-transform:uppercase;}

/* ─── AMBIANCE AUDIO ─── */
#amb-wrap{display:flex;align-items:center;gap:8px;}
.amb-btn{background:none;border:1px solid var(--border);color:var(--gold);
  width:26px;height:26px;border-radius:50%;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:.75rem;transition:.2s;}
.amb-btn:hover{background:var(--gold-dim);}
.amb-vol-s{-webkit-appearance:none;width:60px;height:2px;background:rgba(255,255,255,.08);
  border-radius:1px;outline:none;cursor:pointer;}
.amb-vol-s::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;border-radius:50%;background:var(--gold);}

/* ─── MOBILE ─── */
@media(max-width:640px){
  #char-panel{width:180px;}
  .clue-grid{grid-template-columns:1fr;}
  #scene-img{height:160px;}
}
</style>
</head>
<body>
<div id="game">
  <!-- TOP BAR -->
  <div id="top-bar">
    <span class="tb-phase" id="tp-kern">① Kern</span>
    <div class="tb-sep"></div>
    <span class="tb-phase" id="tp-rena">② Réna</span>
    <div class="tb-sep"></div>
    <span class="tb-phase" id="tp-lyam">③ Lyam</span>
    <div class="tb-sep"></div>
    <div id="amb-wrap">
      <button class="amb-btn" id="ambBtn">♪</button>
      <input class="amb-vol-s" type="range" id="ambVol" min="0" max="100" value="30">
    </div>
    <span class="tb-player" id="tbPlayer"></span>
    <span class="tb-xp" id="tbXp"></span>
  </div>

  <div id="main-area">
    <!-- PANEL PERSONNAGES -->
    <div id="char-panel">
      <!-- Kern -->
      <div class="char-card char-kern">
        <div class="cc-header">
          <div class="cc-portrait"><img src="portrait_kern.jpg" alt="" onerror="this.parentNode.textContent='🔮'"></div>
          <div><div class="cc-name">Kern</div><div class="cc-status" id="st-kern">Observateur</div></div>
        </div>
        <div class="gauge-row gauge-confiance">
          <div class="gauge-label"><span>Confiance</span><span id="gv-kern-conf">50</span></div>
          <div class="gauge-bar"><div class="gauge-fill" id="g-kern-conf" style="width:50%"></div></div>
        </div>
      </div>
      <!-- Réna -->
      <div class="char-card char-rena">
        <div class="cc-header">
          <div class="cc-portrait"><img src="portrait_rena.jpg" alt="" onerror="this.parentNode.textContent='⚡'"></div>

function playNarr(file) {

// ══════════════════════════════════════════════════════════════
// CHRONO
// ══════════════════════════════════════════════════════════════
function startChrono(sec, onExpire) {
  G.chronoSec = sec;
  document.getElementById('chrono-wrap').classList.add('visible');
  if(G.chronoTimer) clearInterval(G.chronoTimer);
  updateChronoDisplay(sec, sec);
  G.chronoTimer = setInterval(function(){
    G.chronoSec--;
    updateChronoDisplay(G.chronoSec, sec);
    if(G.chronoSec <= 0) {
      clearInterval(G.chronoTimer);
      document.getElementById('chrono-wrap').classList.remove('visible');
      if(onExpire) onExpire();
    }
  }, 1000);
}

function stopChrono(){
  if(G.chronoTimer) clearInterval(G.chronoTimer);
  document.getElementById('chrono-wrap').classList.remove('visible');
}

function updateChronoDisplay(cur, max){
  var pct = Math.max(0, cur/max*100);
  var fill = document.getElementById('chrono-bar-fill');
  fill.style.width = pct+'%';
  if(pct > 50) fill.style.background = 'var(--chrono-ok)';
  else if(pct > 20) fill.style.background = 'var(--chrono-warn)';
  else fill.style.background = 'var(--chrono-crit)';
  document.getElementById('chrono-label').textContent = cur + 's';
}

function e(tag, attrs, content){
  var el = document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){ el.setAttribute(k,attrs[k]); });
  if(typeof content === 'string') el.innerHTML = content;
  return el;
}

function html(str){ document.getElementById('content').innerHTML = str; }

  val = Math.max(0, Math.min(100, val));
  var el = document.getElementById('g-'+charId+'-'+gaugeKey);

  if(el) el.style.width = val+'%';

  G.gauges[charId] = G.gauges[charId] || {};
  G.gauges[charId][gaugeKey] = val;
}

function updateRenaCapital(units){
  G.renaCapital = Math.max(0, units);
  var wrap = document.getElementById('rb-units');
  if(!wrap) return;
  for(var i=0;i<20;i++){
    var u = wrap.children[i];
    if(u) u.classList.toggle('spent', i >= G.renaCapital);
  }
  var cnt = document.getElementById('rb-count');
  if(cnt) cnt.textContent = G.renaCapital;
}

    +'<div class="ts-score-row">'+opts.scores+'</div>';
  document.getElementById('game').appendChild(ts);
  setTimeout(function(){
    ts.remove();
    if(callback) callback();
  }, opts.delay || 4000);
}

var kernSceneIdx = 0;
var kernClueSelections = {};

function startKern(){
  G.phase = 'kern';
  G.kernScore = 0;
  G.kernClues = [];
  kernSceneIdx = 0;
  kernClueSelections = {};
  setTopBar('kern');
  showCharPanel(false);
  setAmbiance('kern');
  renderKernScene();
}

function renderKernScene(){
  var sc = KERN_SCENES[kernSceneIdx];
  setScene(sc.img, sc.fallback, 'badge-kern', '① Kern — L\'Enquêteur');
  setNarrFile(sc.narr);
  stopChrono();
  setProgress('Kern — Scène '+(kernSceneIdx+1)+'/3', 10 + kernSceneIdx*12);

  if(sc.isTimeline){
    renderKernTimeline(sc);
    return;
  }

  var cluesHtml = '<div class="clue-grid">';
  sc.clues.forEach(function(cl){
    cluesHtml += '<div class="clue-card" id="cl-'+cl.id+'" onclick="selectClue(\''+cl.id+'\',\''+sc.id+'\')">'
      +'<div class="clue-icon">'+cl.icon+'</div>'
      +'<div class="clue-text">'+cl.text+'</div></div>';
  });
  cluesHtml += '</div>';

  html('<div class="scene-title">'+sc.title+'</div>'
    +'<div class="scene-sub">'+sc.sub+'</div>'
    +'<div class="scene-text">'+sc.text+'</div>'
    +'<div class="prompt-label">'+sc.prompt+'</div>'
    +cluesHtml
    +'<button class="btn-primary" id="kern-validate" onclick="validateKernScene()" style="display:none">Valider mes observations →</button>');
}

function selectClue(clueId, sceneId){
  var el = document.getElementById('cl-'+clueId);
  if(!el) return;
  el.classList.toggle('selected');
  if(!kernClueSelections[sceneId]) kernClueSelections[sceneId] = [];
  var arr = kernClueSelections[sceneId];
  var idx = arr.indexOf(clueId);
  if(idx >= 0) arr.splice(idx,1); else arr.push(clueId);
  var any = Object.values(kernClueSelections).some(function(a){ return a.length>0; });
  var btn = document.getElementById('kern-validate');
  var scSelected = kernClueSelections[sceneId]||[];
  if(btn) btn.style.display = scSelected.length > 0 ? 'block' : 'none';
}

function validateKernScene(){
  var sc = KERN_SCENES[kernSceneIdx];
  var selected = kernClueSelections[sc.id] || [];
  var score = 0;
  sc.clues.forEach(function(cl){
    var el = document.getElementById('cl-'+cl.id);
    if(!el) return;
    var isSelected = selected.indexOf(cl.id) >= 0;
    if(cl.correct && isSelected){ el.classList.add('correct'); score++; G.kernClues.push(cl.id); }
    else if(!cl.correct && isSelected){ el.classList.add('wrong'); }
    else if(cl.correct && !isSelected){ el.classList.add('correct'); }
    el.style.pointerEvents = 'none';
  });
  G.kernScore += Math.min(score, 1); // max 1 point par scène correcte
  var btn = document.getElementById('kern-validate');
  if(btn){ btn.textContent = 'Scène suivante →'; btn.onclick = nextKernScene; }
}

function nextKernScene(){
  kernSceneIdx++;
  if(kernSceneIdx >= KERN_SCENES.length){ endKern(); return; }
  renderKernScene();
}

// ─── TIMELINE ───
var tlOrder = [];

function renderKernTimeline(sc){
  var slots = '';
  for(var i=0;i<sc.events.length;i++){
    slots += '<div class="tl-slot" id="tls-'+i+'" data-slot="'+i+'">'
      +'<span class="tl-num">'+(i+1)+'.</span><span class="tl-content" id="tlc-'+i+'">—</span></div>';
  }
  var pool = '';
  sc.events.forEach(function(ev){
    pool += '<div class="tl-chip" id="tlchip-'+ev.id+'" onclick="placeEvent(\''+ev.id+'\')">'+ev.text.substring(0,50)+'…</div>';
  });
  tlOrder = new Array(sc.events.length).fill(null);
  html('<div class="scene-title">'+sc.title+'</div>'
    +'<div class="scene-sub">'+sc.sub+'</div>'
    +'<div class="scene-text">'+sc.text+'</div>'
    +'<div class="prompt-label">'+sc.prompt+'</div>'
    +'<div class="timeline-area">'
    +'<div class="timeline-label">Ordre chronologique</div>'
    +'<div class="timeline-slots">'+slots+'</div>'
    +'<div class="timeline-label" style="margin-top:14px">Événements à placer</div>'
    +'<div class="tl-pool" id="tl-pool">'+pool+'</div>'
    +'</div>'
    +'<button class="btn-primary" id="tl-validate" onclick="validateTimeline()" style="display:none">Valider la chronologie →</button>');
}

var tlNextSlot = 0;
function placeEvent(evId){
  if(tlNextSlot >= KERN_SCENES[2].events.length) return;
  var chip = document.getElementById('tlchip-'+evId);
  if(chip && chip.classList.contains('used')) return;
  var sc = KERN_SCENES[2];
  var ev = sc.events.find(function(e){ return e.id===evId; });
  if(!ev) return;
  var slot = document.getElementById('tlc-'+tlNextSlot);
  var slotWrap = document.getElementById('tls-'+tlNextSlot);
  if(slot){ slot.textContent = ev.text; slotWrap.classList.add('filled'); }
  tlOrder[tlNextSlot] = evId;
  if(chip){ chip.classList.add('used'); }
  tlNextSlot++;
  if(tlNextSlot >= sc.events.length){
    var vb = document.getElementById('tl-validate');
    if(vb) vb.style.display = 'block';
  }
}

function validateTimeline(){
  var sc = KERN_SCENES[2];
  var correct = 0;
  tlOrder.forEach(function(evId, i){
    var slotWrap = document.getElementById('tls-'+i);
    if(!slotWrap) return;
    if(evId === sc.correctOrder[i]){ slotWrap.classList.add('correct'); correct++; }
    else { slotWrap.classList.remove('filled'); }
  });
  if(correct >= 4) G.kernScore++;
  var btn = document.getElementById('tl-validate');
  if(btn){ btn.textContent = correct>=4 ? 'Excellent ! Continuer →' : 'Continuer →'; btn.onclick = endKern; }
}

function endKern(){
  var finalScore = Math.min(G.kernScore, 3);
  G.kernScore = finalScore;
  var labels = ['Peu d\'informations','Un fil directeur','Enquête solide','Enquête complète'];
  showTransition({
    icon: '🔮',
    title: 'Kern a terminé',
    sub: labels[finalScore]+' — Réna prend le relais avec '+(finalScore)+' indice'+(finalScore>1?'s':'')+' clé'+(finalScore>1?'s':'')+' transmis.',
    scores: '<span class="score-chip chip-kern">Kern : '+finalScore+'/3 indices</span>',
    delay: 3500
  }, startRena);
}

  renaDIdx++;
  setTimeout(renderRenaDecision, 300);

function checkCNV(){
  return G.gauges.ewen.ouverture >= 45 && G.gauges.mira.ecoute >= 45 && G.gauges.tomas.verite >= 35;

function gaugeChange(char, key, delta){
  var current = G.gauges[char][key] || 50;
  updateGauge(char, key.substring(0,3), current + delta);
  // Mise à jour interne
  G.gauges[char][key] = Math.max(0, Math.min(100, current + delta));
}

  setTopBar('lyam');
  showCharPanel(true);
  setAmbiance('lyam');

  updateGauge('ewen','ouv', G.gauges.ewen.ouverture);
  updateGauge('ewen','mef', G.gauges.ewen.mefiance);
  updateGauge('mira','col', G.gauges.mira.certitude);
  updateGauge('mira','eco', G.gauges.mira.ecoute);
  updateGauge('tomas','fie', G.gauges.tomas.fierte);
  updateGauge('tomas','ver', G.gauges.tomas.verite);
  updateGauge('kern','conf', G.gauges.kern.confiance);
  updateGauge('rena','luc', G.gauges.rena.lucidite);
  renderLyamStep();
}

function renderLyamStep(){
  var scenes = getLyamScenes();
  if(lyamStep >= scenes.length){ endLyam(1); return; }
  var sc = scenes[lyamStep];
  setScene(sc.img, sc.fallback, 'badge-lyam', '③ Lyam — Le Négociateur');
  setNarrFile(sc.narr);
  setProgress('Lyam — '+sc.sub, 60 + lyamStep*8);

  if(sc.isCrisis) setAmbiance('crise');

  var choicesHtml = '<div class="choices">';
  sc.choices.forEach(function(ch){
    var isLocked = ch.locked;
    choicesHtml += '<button class="choice-btn phase-lyam'+(isLocked?' locked':'')+'" '
      +(isLocked?'disabled':('onclick="chooseLyam(\''+ch.id+'\')"'))+'>'
      +'<span class="cb-title">'+ch.title+'</span>'
      +'<span class="cb-sub">'+ch.sub+'</span>'
      +(ch.fin?'':'')
      +'</button>';
  });
  choicesHtml += '</div>';

  html('<div class="scene-title">'+sc.title+'</div>'
    +'<div class="scene-sub">'+sc.sub+'</div>'
    +'<div class="scene-text">'+sc.text+'</div>'
    +'<div class="prompt-label">'+sc.prompt+'</div>'
    +choicesHtml);

  startChrono(sc.chrono, function(){
    // Timeout — choix neutre par défaut
    var defaultChoice = sc.choices.find(function(c){ return !c.locked; });
    if(defaultChoice){ chooseLyam(defaultChoice.id, true); }
  });
}

function chooseLyam(choiceId, isTimeout){
  stopChrono();
  var scenes = getLyamScenes();
  var sc = scenes[lyamStep];
  var ch = sc.choices.find(function(c){ return c.id===choiceId; });
  if(!ch) return;

  G.lyamChoices.push({step:lyamStep, choice:choiceId, timeout:!!isTimeout});

  if(ch.effect) ch.effect();

  // Si c'est la décision finale
  if(sc.isFinal && ch.fin){ endLyam(ch.fin); return; }

  lyamStep++;
  setAmbiance('lyam');
  setTimeout(renderLyamStep, 400);
}

function consultAldric(){
  if(G.aldricLeft <= 0) return;
  G.aldricLeft--;
  document.getElementById('aldricCount').textContent = G.aldricLeft;
  if(G.aldricLeft <= 0) document.getElementById('aldricBtn').disabled = true;

  // Message socratique selon la situation
  var msgs = [
    'Le Maître dit : <em>« Qui sait quelque chose ici — et qui a peur de le dire ? »</em>',
    'Le Maître dit : <em>« Dans chaque accusation, cherche d\'abord celui qui n\'est pas dans la pièce. »</em>'
  ];
  var msg = msgs[G.aldricLeft] || msgs[0];

  var box = document.createElement('div');
  box.className = 'dialogue-box aldric';
  box.style.cssText = 'position:fixed;bottom:50px;left:50%;transform:translateX(-50%);max-width:420px;z-index:200;animation:fadeIn .4s ease;';
  box.innerHTML = '<span class="db-speaker aldric">Maître Aldric</span><span class="db-text">'+msg+'</span>';
  document.body.appendChild(box);

  // Débloquer potentiellement un indice
  if(G.kernScore < 2) G.kernScore = Math.min(G.kernScore+1, 2);

  setTimeout(function(){ box.remove(); }, 5000);
}

function showFin(fin){
  stopChrono(); stopNarr();
  showCharPanel(false);
  setTopBar(null);
  setAmbiance('fin');
  G.plays++;

  var fd = FIN_DATA[fin] || FIN_DATA[1];
  setScene(fd.img, fd.icon, 'badge-intro', 'Protocole Valdurne');
  setNarrFile(fd.narr);
  setProgress('Fin — '+fd.badge, 100);

  // Calcul XP dégressif
  var xp = 0;
  var prevBest = G.bestFin;
  if(G.plays === 1){ xp = 150; }
  else if(fin > prevBest){ xp = 75; }
  else if(G.plays === 2){ xp = 30; }
  else { xp = 15; }
  if(fin > G.bestFin) G.bestFin = fin;

  // Sauvegarder
  try {
    localStorage.setItem('CERT_PROTOCOLE_VALDURNE_01', JSON.stringify({
      v:1, d:new Date().toISOString(), plays:G.plays, bestFin:G.bestFin,
      lastFin:fin, f:true, xp:xp
    }));
    if(xp > 0){
      var evts = JSON.parse(localStorage.getItem('pvs_bridge_events')||'[]');
      evts.push({
        id:'PROTOCOLE-VALDURNE-'+Date.now(),
        type:'PIXHARE_PROGRESS',
        player:G.player,
        module:'PROTOCOLE_VALDURNE_01',
        certKey:'CERT_PROTOCOLE_VALDURNE_01',
        jdrXp:xp,
        fin:fin,
        d:new Date().toISOString()
      });
      if(evts.length>500) evts.splice(0,evts.length-500);
      localStorage.setItem('pvs_bridge_events', JSON.stringify(evts));
      window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
    }
  } catch(e){}

  document.getElementById('tbXp').textContent = xp > 0 ? '+'+xp+' XP' : '';

  var replayNote = '';
  if(G.plays === 1) replayNote = '<p style="font-size:.82rem;color:var(--text-d);margin-top:8px">Tu peux rejouer — les XP sont dégressifs (75 → 30 → 15 XP). Chaque partie améliore la précision.</p>';
  else if(G.plays < 4) replayNote = '<p style="font-size:.82rem;color:var(--text-d);margin-top:8px">Partie '+(G.plays)+' · Meilleure fin atteinte : '+FIN_DATA[G.bestFin].badge+'</p>';

  html('<div class="screen active">'
    +'<div class="screen-sigil" style="color:'+fd.color+'">'+fd.icon+'</div>'
    +'<div class="screen-pre">Protocole Valdurne — Village de Bournac</div>'
    +'<div class="screen-title">'+fd.title+'</div>'
    +'<div class="screen-sub">'+fd.sub+'</div>'
    +'<div class="screen-sep"></div>'
    +'<div class="screen-body">'+fd.text+'</div>'
    +'<div class="score-chips">'
    +'<span class="score-chip chip-kern">Kern : '+G.kernScore+'/3</span>'
    +'<span class="score-chip chip-rena">Réna : '+G.renaState+'</span>'
    +'<span class="score-chip chip-lyam">'+fd.badge+'</span>'
    +'</div>'
    +(xp>0 ? '<div class="xp-badge">⭐ +'+xp+' XP'+(G.plays>1?' · partie '+G.plays:'')+'</div>' : '<div class="xp-badge" style="opacity:.4">XP déjà maximal pour cette fin</div>')
    +replayNote
    +'<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:8px">'
    +'<button class="btn-primary" onclick="restartGame()">↺ Rejouer</button>'
    +'<button class="btn-secondary" onclick="returnHub()">← Retour au Hub pHARe</button>'
    +'</div>'
    +'</div>');
}

function restartGame(){
  stopChrono(); stopNarr();
  G.phase='intro'; G.step=0;
  G.kernScore=0; G.renaCapital=20; G.renaState='favorable';
  G.aldricLeft=2; G.lyamChoices=[]; G.kernClues=[]; G.renaDecisions=[];
  G.gauges={ ewen:{mefiance:80,ouverture:20}, mira:{certitude:70,ecoute:30}, tomas:{fierte:85,verite:15}, kern:{confiance:50}, rena:{lucidite:60} };
  G.currentFin=0;
  kernSceneIdx=0; kernClueSelections={}; renaDIdx=0; lyamStep=0; tlOrder=[]; tlNextSlot=0;
  document.getElementById('aldricCount').textContent='2';
  document.getElementById('aldricBtn').disabled=false;
  document.getElementById('tbXp').textContent='';
  startIntro();
}

function returnHub(){ window.location.href = 'index_PIXHARe.html'; }

// ══════════════════════════════════════════════════════════════

startIntro();
</script>
