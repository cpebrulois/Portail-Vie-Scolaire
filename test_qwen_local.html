<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Test Qwen local</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 850px; margin: 40px auto; line-height: 1.5; }
    textarea { width: 100%; height: 90px; }
    button { padding: 10px 16px; margin-top: 8px; }
    pre { white-space: pre-wrap; background: #111; color: #eee; padding: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Test Qwen local dans le navigateur</h1>

  <p id="status">Chargement non lancé.</p>

  <button id="loadBtn">Charger le modèle</button>

  <h2>Prompt</h2>
  <textarea id="prompt">Tu es Hélène, mentor d'orientation. Réponds en français très court. Question : je ne sais pas quoi faire plus tard.</textarea>
  <br>
  <button id="askBtn" disabled>Demander</button>

  <h2>Réponse</h2>
  <pre id="output"></pre>

  <script type="module">
    import { Wllama } from "https://cdn.jsdelivr.net/npm/@wllama/wllama/esm/index.js";

    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");
    const loadBtn = document.getElementById("loadBtn");
    const askBtn = document.getElementById("askBtn");
    const promptEl = document.getElementById("prompt");

    let wllama = null;

    const CONFIG_PATHS = {
      "single-thread/wllama.wasm": "https://cdn.jsdelivr.net/npm/@wllama/wllama/esm/single-thread/wllama.wasm"
    };

    const MODEL_URL =
  "https://huggingface.co/unsloth/Qwen3.5-0.8B-GGUF/resolve/main/Qwen3.5-0.8B-Q4_K_M.gguf";

    function setStatus(text) {
      statusEl.textContent = text;
      console.log(text);
    }

    loadBtn.onclick = async () => {
      try {
        loadBtn.disabled = true;
        setStatus("Initialisation de wllama...");

        wllama = new Wllama(CONFIG_PATHS);

        setStatus("Téléchargement et chargement du modèle local...");

        await wllama.loadModelFromUrl(MODEL_URL, {
          n_ctx: 1024,
          n_threads: 1,
          useCache: true,
          progressCallback: (progress) => {
            console.log("progress", progress);
          }
        });

        setStatus("Modèle chargé. Tu peux poser une question.");
        askBtn.disabled = false;
      } catch (err) {
        console.error(err);
        setStatus("Erreur au chargement : " + err.message);
      }
    };

    askBtn.onclick = async () => {
      try {
        askBtn.disabled = true;
        outputEl.textContent = "";

        const prompt = promptEl.value.trim();

        setStatus("Génération en cours...");

        const result = await wllama.createCompletion(prompt, {
          nPredict: 160,
          sampling: {
            temp: 0.2,
            top_k: 40,
            top_p: 0.9,
            penalty_repeat: 1.1
          }
        });

        outputEl.textContent = result;
        setStatus("Réponse terminée.");
      } catch (err) {
        console.error(err);
        setStatus("Erreur génération : " + err.message);
      } finally {
        askBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
