        .action-btn{display:inline-block;background:var(--accent-gradient);color:white;border:none;padding:12px 33px;font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1.7px;transition:all 0.25s;border-radius:24px;margin-top:8px}.action-btn:hover{transform:scale(1.07);box-shadow:0 0 15px #22c55e44}.action-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .completion-screen{text-align:center;padding:46px 17px 38px}.completion-icon{font-size:5rem;margin-bottom:19px;animation:veaPulse 2.1s ease-in-out infinite}@keyframes veaPulse{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.12) rotate(3deg)}}.completion-title{font-family:'Orbitron',sans-serif;font-size:2.1rem;font-weight:900;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:13px}

<body><div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState } = React; const e = React.createElement;
const MODULE_ID = "VEA_02"; const BACK_URL = "index_PIXHARe.html";

const flashcardsData = [
    { question: "Les émotions sont-elles bonnes ou mauvaises ?", hint: "[ Clique pour découvrir ]", answer: "Ni l'une ni l'autre. Les émotions sont des <b>signaux</b>. La colère signale une injustice. La peur signale un danger. La tristesse signale une perte. Elles informent — pas plus, pas moins.", source: "Psychologie des émotions" },
    { question: "Que se passe-t-il si on bloque ses émotions ?", hint: "[ Clique pour découvrir ]", answer: "Elles ne disparaissent pas — elles reviennent plus fort, souvent à un mauvais moment. Bloquer ses émotions épuise l'énergie et peut créer du stress physique (tension, maux de tête).", source: "Neurosciences affectives" },
    { question: "C'est quoi la régulation émotionnelle ?", hint: "[ Clique pour découvrir ]", answer: "C'est la capacité à reconnaître une émotion, la nommer, et décider comment y répondre — sans en être submergé(e). Pas supprimer : <b>accueillir et choisir</b>.", source: "Gross, 2002" },
    { question: "Pourquoi nommer une émotion aide-t-il ?", hint: "[ Clique pour découvrir ]", answer: "Quand on met un mot sur une émotion ('je suis anxieux'), l'activité de l'amygdale (le 'centre d'alarme' du cerveau) diminue. Le langage régule le cerveau.", source: "Lieberman et al., Neuroimaging" },
    { question: "Peut-on ressentir deux émotions opposées en même temps ?", hint: "[ Clique pour découvrir ]", answer: "Oui. On peut être triste ET soulagé. Stressé ET excité. Les émotions mélangées sont normales — elles reflètent la complexité des situations.", source: "Psychologie du développement" },
];

const quizData = [
    { question: "Théo ressent une grande colère. Il bloque tout et ne dit rien. Qu'est-ce qui risque d'arriver ?", options: ["L'émotion va disparaître", "L'émotion va revenir plus fort, souvent à un mauvais moment"], correct: 1, feedback: "Exact. Bloquer ne résout pas — ça repousse. La régulation, c'est autre chose : accueillir l'émotion, la nommer, puis choisir comment agir." },
    { question: "Leïla dit : 'Je peux pas contrôler mes émotions — c'est plus fort que moi.' Est-ce vrai ?", options: ["Oui, les émotions sont incontrôlables", "Non, la régulation émotionnelle s'apprend"], correct: 1, feedback: "La régulation émotionnelle est une compétence qui se développe. Elle ne signifie pas 'ne rien ressentir' — elle signifie 'savoir quoi faire de ce qu'on ressent'." },
];

const scenarioData = {
    context: "Tu viens d'apprendre une mauvaise nouvelle : tu n'es pas sélectionné(e) pour le projet auquel tu tenais. Tu ressens de la déception et une pointe de colère.",
    intro: "Comment gères-tu ça ?",
    choices: [
        { text: "Je prends un moment, je nomme ce que je ressens ('je suis déçu(e) et un peu en colère'), je comprends pourquoi, et je décide quoi faire ensuite.", result: "✅ Nommer l'émotion, c'est déjà la réguler. Tu t'accordes le droit d'être déçu(e) sans laisser la colère prendre le dessus. C'est de l'intelligence émotionnelle.", positive: true },
        { text: "Je me dis que c'est pas grave et que je dois pas être triste pour des trucs comme ça.", result: "⚠️ Minimiser sa déception peut fonctionner à court terme, mais elle reviendra. S'accorder le droit de ressentir, puis choisir, est plus durable que de se forcer à 'aller bien'.", positive: false },
    ]
};

function getPlayer(){try{var u=new URLSearchParams(window.location.search),p=u.get('player');if(p&&p.length>2){localStorage.setItem('pvs_current_player',p);return p;}}catch(ex){}return localStorage.getItem('pvs_current_player')||'';}
function awardXP(){try{var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];evts.push({id:'VEA-'+MODULE_ID+'-'+Date.now(),type:'PHARE_PROGRESS',player:getPlayer(),module:MODULE_ID,label:'PIX pHARe : Mes émotions, mes alliées',d:new Date().toISOString()});if(evts.length>700)evts.splice(0,evts.length-700);localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));var done=JSON.parse(localStorage.getItem('pvs_phare_done')||'{}');done[MODULE_ID]=true;localStorage.setItem('pvs_phare_done',JSON.stringify(done));}catch(ex){}}

function App(){
    const [gs,setGs]=useState("intro");const [pn,setPn]=useState(getPlayer());const [cf,setCf]=useState(0);const [ff,setFf]=useState(false);const [cq,setCq]=useState(0);const [sa,setSa]=useState(null);const [sqf,setSqf]=useState(false);const [qs,setQs]=useState(0);const [sc,setSc]=useState(null);const [xp,setXp]=useState(0);
    function goBack(){window.location.href=BACK_URL+(pn?'?player='+encodeURIComponent(pn):'');}
    function nextFC(){if(cf<flashcardsData.length-1){setCf(c=>c+1);setFf(false);setXp(x=>x+10);}else{setGs("quiz");setXp(x=>x+20);}}
    function prevFC(){if(cf>0){setCf(c=>c-1);setFf(false);}}
    function validateQ(){setSqf(true);if(sa===quizData[cq].correct){setQs(s=>s+1);setXp(x=>x+15);}}
    function nextQ(){if(cq<quizData.length-1){setCq(q=>q+1);setSa(null);setSqf(false);}else{setGs("scenario");}}
    function chooseS(i){setSc(i);if(scenarioData.choices[i].positive)setXp(x=>x+20);}
    function finish(){awardXP();setGs("complete");}

    if(gs==="intro")return e('div',{className:'app-container'},
        e('div',{className:'header'},e('div',{className:'pillar-icon'},'💚'),e('h1',{className:'glitch-title'},'MES ÉMOTIONS, MES ALLIÉES'),e('div',{className:'subtitle'},'VEA 02 · Vivre Ensemble Actif'),e('div',{className:'module-badge'},'💚 MODULE 2/6 · 100 XP')),
        e('div',{className:'xp-display'},e('div',{className:'xp-box'},e('div',{className:'xp-value'},'100'),e('div',{className:'xp-label'},'XP disponibles'))),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'💚'),e('div',{className:'panel-title'},'Gestion des émotions')),
        e('div',{className:'panel-body intro-screen'},
            e('p',{style:{lineHeight:1.7,marginBottom:16}},"Tes émotions ne sont pas tes ennemies. Elles sont des signaux. La colère dit qu'il y a une injustice. La peur dit qu'il y a un danger. La tristesse dit qu'il y a une perte. Les comprendre, c'est mieux choisir comment agir."),
            e('p',{style:{lineHeight:1.7,marginBottom:16,color:'#4a6b5a'}},"Ce module explore comment reconnaître, nommer et réguler ses émotions — sans les supprimer ni s'y noyer."),
            e('div',{className:'name-input-group'},e('input',{className:'name-input',type:'text',placeholder:'Ton prénom ou identifiant...',value:pn,onChange:ev=>setPn(ev.target.value)}),e('button',{className:'action-btn',onClick:()=>{if(pn.trim())setGs("flashcards");},disabled:!pn.trim()},'Commencer →')))));

    if(gs==="flashcards"){const card=flashcardsData[cf];return e('div',{className:'app-container'},
        e('div',{className:'header'},e('h1',{className:'glitch-title',style:{fontSize:'1.6rem'}},'FLASHCARDS'),e('div',{className:'subtitle'},cf+1+' / '+flashcardsData.length)),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'🃏'),e('div',{className:'panel-title'},'Comprendre mes émotions')),
        e('div',{className:'panel-body'},
            e('div',{className:'flashcard-container'},e('div',{className:'flashcard'+(ff?' flipped':''),onClick:()=>setFf(f=>!f)},
                e('div',{className:'flashcard-face flashcard-front'},e('div',{className:'flashcard-question'},card.question),e('div',{className:'flashcard-hint'},card.hint)),
                e('div',{className:'flashcard-face flashcard-back'},e('div',{className:'flashcard-answer',dangerouslySetInnerHTML:{__html:card.answer}}),e('div',{className:'flashcard-source'},'— '+card.source)))),
            e('div',{className:'flashcard-nav'},e('button',{className:'nav-btn',onClick:prevFC,disabled:cf===0},'← Préc.'),e('button',{className:'nav-btn',onClick:nextFC},cf<flashcardsData.length-1?'Suiv. →':'Quiz →')))));}

    if(gs==="quiz"){const q=quizData[cq];return e('div',{className:'app-container'},
        e('div',{className:'header'},e('h1',{className:'glitch-title',style:{fontSize:'1.6rem'}},'QUIZ'),e('div',{className:'subtitle'},'Question '+(cq+1)+' / '+quizData.length)),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'❓'),e('div',{className:'panel-title'},'Vérifie ta compréhension')),
        e('div',{className:'panel-body'},e('div',{className:'quiz-question'},q.question),
            e('div',{className:'quiz-options'},q.options.map((opt,i)=>e('div',{key:i,className:'quiz-option'+(sqf?(i===q.correct?' correct':(i===sa?' incorrect':'')):(i===sa?' selected':'')),onClick:()=>{if(!sqf)setSa(i);}},e('div',{className:'option-marker'},String.fromCharCode(65+i)),e('div',{className:'option-text'},opt)))),
            sqf?e('div',{className:'feedback-box'+(sa===q.correct?'':' incorrect-feedback')},e('div',{className:'feedback-title'},sa===q.correct?'✅ Correct !':'❌ Pas tout à fait...'),e('p',null,q.feedback),e('button',{className:'action-btn',style:{marginTop:12},onClick:nextQ},cq<quizData.length-1?'Question suivante →':'Scénario →')):e('button',{className:'action-btn',disabled:sa===null,onClick:validateQ},'Valider'))));}

    if(gs==="scenario")return e('div',{className:'app-container'},
        e('div',{className:'header'},e('h1',{className:'glitch-title',style:{fontSize:'1.6rem'}},'SCÉNARIO'),e('div',{className:'subtitle'},'Comment réagis-tu ?')),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'🎭'),e('div',{className:'panel-title'},'Mise en situation')),
        e('div',{className:'panel-body'},e('div',{className:'scenario-context'},'📍 '+scenarioData.context),e('div',{className:'scenario-intro'},scenarioData.intro),
            sc===null?scenarioData.choices.map((c,i)=>e('button',{key:i,className:'choice-btn',onClick:()=>chooseS(i)},c.text)):e('div',null,e('div',{className:'choice-result'},scenarioData.choices[sc].result),e('button',{className:'action-btn',style:{marginTop:16},onClick:finish},'Terminer le module →')))));

    return e('div',{className:'app-container'},e('div',{className:'completion-screen'},
        e('div',{className:'completion-icon'},'💚'),e('div',{className:'completion-title'},'MODULE COMPLÉTÉ !'),
        e('p',{style:{lineHeight:1.7,marginBottom:20,color:'#4a6b5a'}},"Tes émotions sont des alliées. Apprendre à les nommer et les réguler, c'est une force — pas une faiblesse."),
        e('div',{className:'stats-grid'},e('div',{className:'stat-card'},e('div',{className:'stat-value'},xp),e('div',{className:'stat-label'},'XP gagnés')),e('div',{className:'stat-card'},e('div',{className:'stat-value'},qs+'/'+quizData.length),e('div',{className:'stat-label'},'Quiz')),e('div',{className:'stat-card'},e('div',{className:'stat-value'},'2/6'),e('div',{className:'stat-label'},'Modules VEA'))),
        e('button',{className:'action-btn',onClick:goBack},'← Retour au hub')));
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
