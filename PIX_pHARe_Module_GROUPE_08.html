<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIX-pHARe | GROUPE 08 · Pouvoir & Obéissance</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #a855f7;
  --primary-dim: rgba(168,85,247,.15);
  --primary-glow: rgba(168,85,247,.4);
  --bg: #0a0a12;
  --bg2: #111120;
  --panel: #181828;
  --panel2: #1e1e32;
  --text: #e8e0f0;
  --text-m: #9080a8;
  --text-d: #504060;
  --gold: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --border: rgba(168,85,247,.22);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 20% 0%,rgba(168,85,247,.12) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 100%,rgba(168,85,247,.06) 0%,transparent 50%)}
#root{max-width:820px;margin:0 auto;padding:0 0 60px 0}

.mod-header{padding:28px 24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:16px}
.mod-icon{font-size:2.8rem;filter:drop-shadow(0 0 12px var(--primary-glow));flex-shrink:0}
.mod-meta{flex:1}
.mod-pilier{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--primary);margin-bottom:4px}
.mod-title{font-family:'Orbitron',sans-serif;font-size:1.35rem;color:#fff;margin-bottom:4px}
.mod-sub{font-size:.88rem;color:var(--text-m);line-height:1.5}
.mod-ref{font-size:.72rem;color:var(--text-d);font-style:italic;margin-top:4px}
.xp-chip{background:var(--primary-dim);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:.75rem;color:var(--primary);font-family:'Orbitron',sans-serif;white-space:nowrap}

.prog-bar{height:3px;background:rgba(255,255,255,.06)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),#c084fc);transition:width .5s ease}

.level-nav{display:flex;border-bottom:1px solid var(--border)}
.lnav-btn{flex:1;padding:10px 8px;text-align:center;font-size:.68rem;font-family:'Orbitron',sans-serif;letter-spacing:1px;text-transform:uppercase;color:var(--text-d);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;background:none;border-top:none;border-left:none;border-right:none}
.lnav-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.lnav-btn.done{color:var(--green)}
.lnav-btn:disabled{opacity:.35;cursor:not-allowed}

.screen{padding:24px 20px}

.section-title{font-family:'Orbitron',sans-serif;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.flashcard-wrap{perspective:1000px;cursor:pointer;margin-bottom:14px}
.flashcard-inner{position:relative;min-height:160px;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.flashcard-wrap.flipped .flashcard-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;min-height:160px;backface-visibility:hidden;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:22px;display:flex;flex-direction:column;justify-content:center}
.fc-back{transform:rotateY(180deg);background:var(--panel2)}
.fc-q{font-size:1rem;font-weight:600;color:#fff;text-align:center;line-height:1.5}
.fc-hint{font-size:.78rem;color:var(--text-d);text-align:center;margin-top:10px;font-style:italic}
.fc-ans{font-size:.92rem;color:var(--text-m);line-height:1.7}
.fc-src{font-size:.72rem;color:var(--primary);margin-top:10px;text-align:right;font-style:italic}

.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:6px}
.btn{padding:10px 22px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.72rem;letter-spacing:1px;cursor:pointer;transition:.2s;border:none}
.btn-pri{background:var(--primary);color:#fff}
.btn-pri:hover{background:#9333ea}
.btn-pri:disabled{opacity:.4;cursor:not-allowed}
.btn-sec{background:transparent;border:1px solid var(--border);color:var(--text-m)}
.btn-sec:hover{border-color:var(--primary);color:var(--primary)}

.quiz-q{font-size:1rem;font-weight:600;color:#fff;line-height:1.55;margin-bottom:16px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-radius:8px;border:1px solid var(--border);margin-bottom:9px;cursor:pointer;transition:.2s;background:var(--panel)}
.opt:hover{border-color:var(--primary);background:var(--panel2)}
.opt.selected{border-color:var(--primary);background:var(--primary-dim)}
.opt.correct{border-color:var(--green);background:rgba(16,185,129,.12)}
.opt.wrong{border-color:var(--red);background:rgba(239,68,68,.1)}
.opt-letter{font-family:'Orbitron',sans-serif;font-size:.7rem;color:var(--primary);min-width:20px;padding-top:2px}
.opt-text{font-size:.9rem;color:var(--text);line-height:1.4}
.feedback{padding:14px 16px;border-radius:8px;margin-top:12px;font-size:.9rem;line-height:1.5}
.feedback.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.feedback.ko{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5}

.scenario-ctx{background:var(--panel);border-left:3px solid var(--primary);padding:14px 16px;border-radius:0 8px 8px 0;margin-bottom:16px;font-size:.9rem;color:var(--text-m);line-height:1.6}
.scenario-q{font-weight:600;color:#fff;margin-bottom:14px;font-size:.95rem}
.choice-btn{display:block;width:100%;text-align:left;padding:13px 16px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:.9rem;cursor:pointer;transition:.2s;margin-bottom:9px;font-family:'Exo 2',sans-serif;line-height:1.4}
.choice-btn:hover{border-color:var(--primary);background:var(--primary-dim)}
.result-box{padding:16px;border-radius:8px;font-size:.9rem;line-height:1.6;margin-bottom:14px}
.result-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.result-ko{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.impact-tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.75rem;font-family:'Orbitron',sans-serif;margin-top:8px}
.impact-pos{background:rgba(16,185,129,.15);color:var(--green)}
.impact-neg{background:rgba(239,68,68,.1);color:var(--red)}

.xp-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.xp-pill{background:var(--panel);border:1px solid var(--border);padding:8px 18px;border-radius:8px;text-align:center}
.xp-pill-label{font-size:.65rem;color:var(--text-d);font-family:'Orbitron',sans-serif;letter-spacing:1px;text-transform:uppercase}
.xp-pill-val{font-family:'Orbitron',sans-serif;font-size:1.2rem;color:var(--primary)}

.completion{padding:32px 20px;text-align:center}
.completion-icon{font-size:3rem;margin-bottom:12px;filter:drop-shadow(0 0 18px var(--primary-glow))}
.completion-title{font-family:'Orbitron',sans-serif;font-size:1.6rem;color:#fff;margin-bottom:8px}
.completion-sub{color:var(--text-m);font-size:.9rem;margin-bottom:24px;line-height:1.5}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:20px 0}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.stat-val{font-family:'Orbitron',sans-serif;font-size:1.4rem;color:var(--primary)}
.stat-lbl{font-size:.72rem;color:var(--text-d);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.mastery-badge{display:inline-block;padding:8px 22px;border-radius:20px;font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:700;margin:16px 0;border:2px solid}
.mastery-expert{color:#f59e0b;border-color:#f59e0b;box-shadow:0 0 10px rgba(245,158,11,.3)}
.mastery-confirmed{color:var(--primary);border-color:var(--primary)}
.mastery-training{color:var(--green);border-color:var(--green)}
.bridge-note{font-size:.8rem;color:var(--text-d);padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:6px;margin:14px 0;line-height:1.5}

.intro-hero{padding:32px 20px 24px;text-align:center}
.intro-title{font-family:'Orbitron',sans-serif;font-size:1.5rem;color:#fff;margin-bottom:8px}
.intro-ref{font-size:.8rem;color:var(--primary);font-style:italic;margin-bottom:18px}
.intro-body{font-size:.93rem;color:var(--text-m);line-height:1.7;max-width:560px;margin:0 auto 22px auto}
.intro-connected{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border:1px solid rgba(16,185,129,.35);border-radius:20px;color:var(--green);font-size:.8rem;margin-bottom:22px}

@media(max-width:560px){.mod-title{font-size:1.05rem}.completion-title{font-size:1.2rem}.stats-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState } = React;
const e = React.createElement;

const MODULE_ID    = "GROUPE_08";
const MODULE_XP    = 200;
const MODULE_TITLE = "Pouvoir & Obéissance";
const MODULE_REF   = "Milgram, 1963 · Zimbardo, 1971 · Psychologie sociale";

const flashcardsData = [
  {
    question: "Que démontre l'expérience de Milgram (1963) ?",
    hint: "[ Cliquer pour révéler ]",
    answer: "<b>65 % des participants</b> ont continué d'administrer des chocs électriques apparents jusqu'au niveau maximal, simplement parce qu'une figure d'autorité le leur ordonnait. La pression de l'obéissance peut surpasser le jugement moral individuel.",
    source: "Milgram, Obedience to Authority, 1963"
  },
  {
    question: "Qu'est-ce que l'état agentique selon Milgram ?",
    hint: "[ Cliquer pour révéler ]",
    answer: "Un état mental dans lequel l'individu <b>se perçoit comme l'instrument</b> d'une autorité légitime. Dans cet état, la personne transfère sa responsabilité morale à celui qui donne les ordres, même si les actes causent du tort.",
    source: "Milgram, 1974"
  },
  {
    question: "Que révèle l'expérience de Stanford (Zimbardo, 1971) ?",
    hint: "[ Cliquer pour révéler ]",
    answer: "Des étudiants tirés au sort comme 'gardiens' ont développé des <b>comportements abusifs en moins de 6 jours</b>. La structure de rôle (pouvoir vs. soumis) suffit à déclencher des comportements inhumains, indépendamment du caractère individuel.",
    source: "Zimbardo, Stanford Prison Experiment, 1971"
  },
  {
    question: "Qu'est-ce que la désobéissance légitime ?",
    hint: "[ Cliquer pour révéler ]",
    answer: "La capacité à <b>refuser d'obéir</b> à une autorité qui demande d'agir contre l'éthique ou les droits fondamentaux. C'est une compétence civique. Dans l'expérience de Milgram, ceux qui désobéissaient avaient souvent entendu un autre participant le faire avant eux.",
    source: "Milgram (variants) · Éducation civique"
  },
  {
    question: "Comment distinguer autorité légitime et autorité abusive ?",
    hint: "[ Cliquer pour révéler ]",
    answer: "Une autorité est <b>légitime</b> quand elle respecte les droits fondamentaux et agit dans l'intérêt commun. Elle devient <b>abusive</b> quand elle exige des actes qui nuisent à autrui. L'obéissance à une autorité abusive n'est pas une excuse — c'est une responsabilité.",
    source: "Droit pénal · Éthique de la responsabilité"
  }
];

const quizData = [
  {
    question: "Dans l'expérience de Milgram (1963), quel pourcentage de participants a continué jusqu'au niveau maximal de choc ?",
    options: ["20 %", "35 %", "65 %", "90 %"],
    correct: 2,
    feedback: "Exact. 65 % ont obéi jusqu'au bout. Ce résultat a bouleversé la psychologie sociale : ce ne sont pas des personnalités exceptionnellement malveillantes, mais des individus ordinaires placés sous autorité."
  },
  {
    question: "Qu'est-ce que l'état agentique décrit par Milgram ?",
    options: [
      "L'état d'un chef qui donne des ordres",
      "L'état d'un individu qui se vit comme instrument d'une autorité",
      "La résistance à l'autorité illégitime",
      "L'état de conscience morale accrue"
    ],
    correct: 1,
    feedback: "Exact. Dans l'état agentique, l'individu cède sa conscience morale à l'autorité et se perçoit comme simple exécutant, non comme responsable."
  },
  {
    question: "Quel facteur a le plus augmenté la désobéissance dans les variantes de l'expérience Milgram ?",
    options: [
      "Recevoir une rémunération plus élevée",
      "Entendre un autre participant refuser d'obéir",
      "Être placé dans une autre pièce",
      "Connaître personnellement la 'victime'"
    ],
    correct: 1,
    feedback: "Exact. Quand les participants voyaient ou entendaient un pair désobéir, leur propre taux de désobéissance montait fortement. Un seul acte de résistance visible libère les autres."
  }
];

const scenarioData = {
  title: "L'ordre injuste",
  context: "Un groupe dominant dans ta classe te demande d'ignorer et d'isoler un élève 'pour le bien du groupe', selon les mots du leader. Tout le monde semble suivre.",
  question: "Quelle est ta réaction ?",
  choices: [
    {
      text: "Le leader a l'air sûr de lui et tout le monde le suit, donc ça doit être logique.",
      result: "C'est l'état agentique : tu transfères ta responsabilité morale au leader. La popularité ou l'assurance d'une personne ne confère pas à ses ordres une légitimité éthique. Exclure quelqu'un cause un tort réel.",
      ok: false,
      delta: 0
    },
    {
      text: "Isoler quelqu'un lui cause du tort. Je refuse de participer, discrètement ou en nommant le problème.",
      result: "C'est la désobéissance légitime. Ton refus visible peut déclencher celui d'autres. Tu ne t'es pas soumis à une autorité qui demandait de nuire — c'est une compétence morale et civique fondamentale.",
      ok: true,
      delta: 120
    }
  ]
};

function getMastery(score) {
  if (score >= 140) return { label: "Expert", cls: "mastery-expert" };
  if (score >= 80)  return { label: "Confirmé", cls: "mastery-confirmed" };
  return { label: "En formation", cls: "mastery-training" };
}

function saveBridge() {
  try {
    var _pl = localStorage.getItem('pvs_current_player') || localStorage.getItem('pvs_phare_player') || new URLSearchParams(window.location.search).get('player') || '';
    localStorage.setItem('CERT_PHARE_GROUPE_08', JSON.stringify({ v:1, d:new Date().toISOString(), m:'GROUPE_08', f:true }));
    var _pvb = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
    _pvb.push({ id:'PIXHARE-GROUPE_08-'+Date.now(), type:'PIXHARE_PROGRESS', player:_pl, module:'GROUPE_08', xp:200, d:new Date().toISOString() });
    if (_pvb.length > 500) _pvb.splice(0, _pvb.length - 500);
    localStorage.setItem('pvs_bridge_events', JSON.stringify(_pvb));
    window.dispatchEvent(new StorageEvent('storage', { key:'pvs_bridge_events' }));
  } catch(_e) {}
}

function App() {
  const [phase, setPhase]       = useState("intro");
  const [fcIdx, setFcIdx]       = useState(0);
  const [fcFlip, setFcFlip]     = useState(false);
  const [qIdx, setQIdx]         = useState(0);
  const [sel, setSel]           = useState(null);
  const [showFB, setShowFB]     = useState(false);
  const [scDone, setScDone]     = useState(false);
  const [scChoice, setScChoice] = useState(null);
  const [xp, setXp]             = useState(0);
  const [score, setScore]       = useState(0);
  const [qScore, setQScore]     = useState(0);
  const [scScore, setScScore]   = useState(0);

  const progress = { intro:0, flashcards:25, quiz:55, scenario:80, complete:100 }[phase] || 0;

  function startModule() { setPhase("flashcards"); }
  function flipCard() { setFcFlip(f => !f); }
  function nextCard() {
    if (fcIdx < flashcardsData.length-1) { setFcIdx(i=>i+1); setFcFlip(false); setXp(v=>v+10); }
    else { setXp(v=>v+40); setPhase("quiz"); }
  }
  function prevCard() { if (fcIdx>0) { setFcIdx(i=>i-1); setFcFlip(false); } }
  function pickAnswer(idx) { if (!showFB) setSel(idx); }
  function validateQuiz() {
    setShowFB(true);
    if (sel===quizData[qIdx].correct) { setScore(v=>v+30); setQScore(v=>v+30); setXp(v=>v+20); }
  }
  function nextQuestion() {
    setShowFB(false); setSel(null);
    if (qIdx<quizData.length-1) { setQIdx(i=>i+1); }
    else { setXp(v=>v+20); setPhase("scenario"); }
  }
  function pickChoice(idx) {
    if (scDone) return;
    setScChoice(idx); setScDone(true);
    if (scenarioData.choices[idx].ok) { setScore(v=>v+scenarioData.choices[idx].delta); setScScore(scenarioData.choices[idx].delta); }
    setXp(v=>v+25);
  }
  function finishModule() { saveBridge(); setXp(v=>v+40); setPhase("complete"); }

  function Header() {
    return e("div", { className:"mod-header" },
      e("div", { className:"mod-icon" }, "⚡"),
      e("div", { className:"mod-meta" },
        e("div", { className:"mod-pilier" }, "PIX-pHARe · Pilier Groupe"),
        e("div", { className:"mod-title" }, MODULE_TITLE),
        e("div", { className:"mod-sub" }, "Obéissance, autorité et résistance légitime"),
        e("div", { className:"mod-ref" }, MODULE_REF)
      ),
      e("div", { className:"xp-chip" }, MODULE_XP + " XP")
    );
  }

  function XpRow() {
    return e("div", { className:"xp-row" },
      e("div", { className:"xp-pill" }, e("div",{className:"xp-pill-label"},"XP"), e("div",{className:"xp-pill-val"},xp)),
      e("div", { className:"xp-pill" }, e("div",{className:"xp-pill-label"},"Score"), e("div",{className:"xp-pill-val"},score))
    );
  }

  if (phase === "intro") return e("div", null,
    e(Header),
    e("div",{className:"prog-bar"},e("div",{className:"prog-fill",style:{width:"0%"}})),
    e("div",{className:"intro-hero"},
      e("div",{style:{fontSize:"2.8rem",marginBottom:"12px",filter:"drop-shadow(0 0 14px rgba(168,85,247,.5))"}}, "⚡"),
      e("div",{className:"intro-title"}, MODULE_TITLE),
      e("div",{className:"intro-ref"}, MODULE_REF),
      e("div",{className:"intro-body"},
        "En 1963, Stanley Milgram a prouvé que des individus ordinaires pouvaient causer des souffrances graves simplement parce qu'une autorité le leur demandait. Comprendre ce mécanisme, c'est apprendre à identifier — et à refuser — les ordres injustes."
      ),
      e("div",{className:"intro-connected"}, "🔗 Connecté via Portail Vie Scolaire"),
      e("br"),
      e("button",{className:"btn btn-pri",onClick:startModule}, "[ COMMENCER ]")
    )
  );

  if (phase === "flashcards") {
    const card = flashcardsData[fcIdx];
    return e("div", null,
      e(Header),
      e("div",{className:"prog-bar"},e("div",{className:"prog-fill",style:{width:"25%"}})),
      e("div",{className:"level-nav"},
        e("button",{className:"lnav-btn active"},"1 · Théorie"),
        e("button",{className:"lnav-btn",disabled:true},"2 · Analyse"),
        e("button",{className:"lnav-btn",disabled:true},"3 · Dojo")
      ),
      e("div",{className:"screen"},
        e(XpRow),
        e("div",{className:"section-title"},"Concept "+(fcIdx+1)+"/"+flashcardsData.length),
        e("div",{className:"flashcard-wrap"+(fcFlip?" flipped":""),onClick:flipCard},
          e("div",{className:"flashcard-inner"},
            e("div",{className:"fc-face"}, e("div",{className:"fc-q"},card.question), e("div",{className:"fc-hint"},card.hint)),
            e("div",{className:"fc-face fc-back"},
              e("div",{className:"fc-ans",dangerouslySetInnerHTML:{__html:card.answer}}),
              e("div",{className:"fc-src"},card.source)
            )
          )
        ),
        e("div",{className:"nav-row"},
          e("button",{className:"btn btn-sec",onClick:prevCard,disabled:fcIdx===0},"◄ PRÉC"),
          e("button",{className:"btn btn-pri",onClick:nextCard}, fcIdx<flashcardsData.length-1?"SUIV ►":"NIVEAU 2 ►")
        )
      )
    );
  }

  if (phase === "quiz") {
    const q = quizData[qIdx];
    return e("div", null,
      e(Header),
      e("div",{className:"prog-bar"},e("div",{className:"prog-fill",style:{width:"55%"}})),
      e("div",{className:"level-nav"},
        e("button",{className:"lnav-btn done"},"1 · Théorie ✓"),
        e("button",{className:"lnav-btn active"},"2 · Analyse"),
        e("button",{className:"lnav-btn",disabled:true},"3 · Dojo")
      ),
      e("div",{className:"screen"},
        e(XpRow),
        e("div",{className:"section-title"},"Question "+(qIdx+1)+"/"+quizData.length),
        e("div",{className:"quiz-q"},q.question),
        e("div",null, q.options.map((opt,idx)=>{
          let cls="opt";
          if(showFB){ if(idx===q.correct)cls+=" correct"; else if(idx===sel)cls+=" wrong"; }
          else if(idx===sel) cls+=" selected";
          return e("div",{key:idx,className:cls,onClick:()=>pickAnswer(idx)},
            e("div",{className:"opt-letter"},String.fromCharCode(65+idx)),
            e("div",{className:"opt-text"},opt)
          );
        })),
        showFB&&e("div",{className:"feedback "+(sel===q.correct?"ok":"ko")},
          (sel===q.correct?"✔ ":"✘ ")+q.feedback
        ),
        !showFB
          ? e("button",{className:"btn btn-pri",disabled:sel===null,onClick:validateQuiz,style:{marginTop:"12px"}},"VALIDER")
          : e("button",{className:"btn btn-pri",onClick:nextQuestion,style:{marginTop:"12px"}},
              qIdx<quizData.length-1?"SUIVANT ►":"NIVEAU 3 ►"
            )
      )
    );
  }

  if (phase === "scenario") {
    return e("div", null,
      e(Header),
      e("div",{className:"prog-bar"},e("div",{className:"prog-fill",style:{width:"80%"}})),
      e("div",{className:"level-nav"},
        e("button",{className:"lnav-btn done"},"1 · Théorie ✓"),
        e("button",{className:"lnav-btn done"},"2 · Analyse ✓"),
        e("button",{className:"lnav-btn active"},"3 · Dojo")
      ),
      e("div",{className:"screen"},
        e(XpRow),
        e("div",{className:"section-title"},scenarioData.title),
        e("div",{className:"scenario-ctx"},scenarioData.context),
        e("div",{className:"scenario-q"},scenarioData.question),
        !scDone
          ? scenarioData.choices.map((ch,idx)=>
              e("button",{key:idx,className:"choice-btn",onClick:()=>pickChoice(idx)},ch.text)
            )
          : e("div",null,
              e("div",{className:"result-box "+(scenarioData.choices[scChoice].ok?"result-ok":"result-ko")},
                scenarioData.choices[scChoice].result
              ),
              e("div",null,
                scenarioData.choices[scChoice].ok
                  ? e("span",{className:"impact-tag impact-pos"},"+"+scenarioData.choices[scChoice].delta+" pts")
                  : e("span",{className:"impact-tag impact-neg"},"Obéissance aveugle")
              ),
              e("button",{className:"btn btn-pri",style:{marginTop:"18px"},onClick:finishModule},"VOIR MON RÉSULTAT ►")
            )
      )
    );
  }

  if (phase === "complete") {
    const m = getMastery(score);
    return e("div", null,
      e(Header),
      e("div",{className:"prog-bar"},e("div",{className:"prog-fill",style:{width:"100%"}})),
      e("div",{className:"completion"},
        e("div",{className:"completion-icon"},"🏅"),
        e("div",{className:"completion-title"},"MODULE TERMINÉ !"),
        e("div",{className:"completion-sub"},"Pouvoir & Obéissance — Groupe 08"),
        e("div",{className:"stats-grid"},
          e("div",{className:"stat-card"},e("div",{className:"stat-val"},xp),e("div",{className:"stat-lbl"},"XP Total")),
          e("div",{className:"stat-card"},e("div",{className:"stat-val"},score),e("div",{className:"stat-lbl"},"Score")),
          e("div",{className:"stat-card"},e("div",{className:"stat-val"},qScore),e("div",{className:"stat-lbl"},"Quiz")),
          e("div",{className:"stat-card"},e("div",{className:"stat-val"},scScore),e("div",{className:"stat-lbl"},"Dojo"))
        ),
        e("div",{className:"mastery-badge "+m.cls},m.label),
        e("div",{className:"bridge-note"},"✔ Validation enregistrée et remontée vers le super-hub PIXHARe."),
        e("button",{className:"btn btn-sec",style:{marginTop:"10px"},onClick:()=>window.location.reload()},"↻ RECOMMENCER")
      )
    );
  }

  return e("div",null,"...");
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
