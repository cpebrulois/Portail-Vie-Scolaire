<script>
const MODULE_ID='M3_01',MODULE_XP=130,LS_KEY='ave6e_progress',NEXT_FILE='p3_m02_droits.html',NEXT_NAME='Mes droits et mes devoirs';

const REGLES=[
  {bg:'linear-gradient(135deg,#F5F3FF,#EDE9FE)',border:'#C4B5FD',ico:'📜',theme:'Le règlement intérieur — c\'est quoi ?',

   q:'Est-il en règle selon le RI du collège Château Rance ?',
   opts:['Oui, mode vibreur = silencieux, donc acceptable','Non — le RI exige que le téléphone soit éteint ET rangé dans le sac','Oui s\'il ne l\'utilise pas','Oui s\'il ne le montre pas'],ok:1,xp:25,
   fb:'Le RI est explicite : "Les modes avion, vibreur et silencieux ne sont pas acceptés." Le téléphone doit être ÉTEINT et dans le sac. En cas de manquement, il peut être confisqué et restitué aux parents sur rendez-vous.'},
  {ctx:'Le conseil d\'administration du collège Château Rance a voté le RI le 7 avril 2025.',
   q:'Qui siège dans ce conseil d\'administration ?',
   opts:['Uniquement le principal et les professeurs','Uniquement les parents d\'élèves','Des représentants des élèves, parents, profs, personnels et de la collectivité','Uniquement les adultes de l\'établissement'],ok:2,xp:20,
   fb:'Le CA réunit élèves délégués, parents élus, représentants des profs, personnels non enseignants, direction et représentants du département. Le RI est donc une règle co-construite — pas imposée unilatéralement.'}
];

const SCENARIOS=[
  {titre:'La sortie entre deux cours',
   ctx:'Mercredi matin, entre son cours de maths à 10h et son cours de français à 11h, Luca a une heure de permanence. Son copain Enzo lui dit : "Viens, on sort acheter des trucs à la boulangerie, on revient avant 11h." Luca hésite.',
   q:'Que devrait faire Luca ?',
   choix:[
    {t:'Sortir avec Enzo — une heure c\'est court, les surveillants ne verront rien.',r:'En sortant par le portail, le surveillant repère les deux élèves et signale l\'absence non autorisée. Le CPE appelle les familles. Luca et Enzo écopent d\'un avertissement et d\'une retenue.',ico:'⚠️',ton:'neg',tip:'Quitter l\'établissement sans autorisation est une "faute grave" selon le RI, qui engage la responsabilité de la famille. L\'entrée/sortie est surveillée.',impact:-10,lbl:'-10 XP'},
    {t:'Refuser et rester en permanence — ils peuvent grignoter un goûter du sac.',r:'Luca et Enzo font un peu de révision, mangent quelques biscuits. À 11h, ils sont en cours comme prévu. Personne n\'est convoqué.',ico:'✅',ton:'pos',tip:'La permanence est faite pour ça : espace calme entre deux cours. Les AED peuvent aider sur les devoirs.',impact:40,lbl:'+40 XP'},
    {t:'Aller au CDI pendant l\'heure de permanence.',r:'Luca profite du CDI pour avancer un exposé. Il y trouve un livre qui l\'intéresse. À 11h, les deux se retrouvent en cours.',ico:'✅',ton:'pos',tip:'Le CDI est ouvert aux élèves sans cours pour faire des recherches ou lire. Une bonne alternative à la permanence classique.',impact:40,lbl:'+40 XP'}
   ]},
  {titre:'La photo sans consentement',
   ctx:'Pendant la récré du matin, Yasmine sort son téléphone et prend une photo de son groupe d\'amies. L\'une d\'elles, Jade, dit clairement "je veux pas être sur la photo". Yasmine la prend quand même et la publie sur sa story Instagram.',
   q:'Combien de règles Yasmine a-t-elle enfreintes, et lesquelles ?',
   choix:[
    {t:'Une seule : elle a utilisé son téléphone en récré.',r:'C\'est une faute, mais incomplet. Il y a aussi le droit à l\'image de Jade qui a été violé — elle a refusé explicitement. Une règle identifiée sur deux.',ico:'😐',ton:'neu',tip:'Usage du téléphone ET publication sans consentement sont deux infractions distinctes. Le RI les mentionne séparément.',impact:10,lbl:'+10 XP'},
    {t:'Deux règles : usage du téléphone + publication d\'une photo sans le consentement de Jade.',r:'Exactement. 1) Téléphone éteint et rangé (RI). 2) Publier une photo de quelqu\'un sans son accord est un délit pénal (droit à l\'image, Code Pénal). Yasmine risque une convocation au CPE ET une plainte des parents de Jade.',ico:'✅',ton:'pos',tip:'Le RI rappelle explicitement que la diffusion de photos sans autorisation est "constitutive d\'un délit réprimé par la loi". Une story à 24h peut être capturée en 10 secondes.',impact:40,lbl:'+40 XP'},
    {t:'Aucune — c\'est la récré, le téléphone est autorisé à ce moment.',r:'Faux. Le téléphone doit être éteint et rangé dans le sac PENDANT TOUT LE TEMPS dans l\'établissement — récréations comprises. Il n\'y a pas d\'exception "récré".',ico:'❌',ton:'neg',tip:'Le RI ne prévoit aucune fenêtre d\'utilisation libre. L\'exception n\'existe que dans le cadre d\'une activité pédagogique avec autorisation explicite d\'un adulte.',impact:-5,lbl:'-5 XP'}
   ]}
];

let state={phase:'intro',cardIdx:0,quizIdx:0,selected:null,showFb:false,scenIdx:0,choiceIdx:null,showRes:false,xp:0,quizScore:0,scenScore:0};

function getP(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}')}catch(e){return{}}}
function markDone(){const p=getP();if(!Array.isArray(p.modules_done))p.modules_done=[];if(!p.modules_done.includes(MODULE_ID)){p.modules_done.push(MODULE_ID);p.xp_total=(p.xp_total||0)+state.xp;p.last_update=new Date().toISOString();localStorage.setItem(LS_KEY,JSON.stringify(p));window.dispatchEvent(new StorageEvent('storage',{key:LS_KEY}))}}
function mastery(xp){if(xp>=180)return{lbl:'🏆 Citoyen(ne) du collège !',cls:'m-champ'};if(xp>=110)return{lbl:'🎓 Bon(ne) connaisseur(se)',cls:'m-col'};return{lbl:'🗺️ En apprentissage',cls:'m-exp'}}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function render(){document.getElementById('root').innerHTML='';build()}

function prog(active){const steps=[{l:'Règles'},{l:'Quiz'},{l:'Scènes'},{l:'Bilan'}],order=['cardIdx','quiz','scenarios','fin'],ai=order.indexOf(active);const d=document.createElement('div');d.className='prog-track';steps.forEach((s,i)=>{const st=document.createElement('div');st.className='prog-step'+(i<ai?' s-done':i===ai?' s-active':'');st.innerHTML=`<div class="prog-dot">${i<ai?'✓':i+1}</div><div class="prog-lbl">${s.l}</div>`;d.appendChild(st)});return d}
function xpbar(extra=[]){const d=document.createElement('div');d.className='xp-strip';d.innerHTML=`<div class="xp-pill hl"><span>⭐</span>${state.xp} XP</div>`;extra.forEach(e=>{d.innerHTML+=`<div class="xp-pill"><span>${e.i}</span>${e.v}</div>`});return d}
function mkCard(ico,cls,title,sub){const d=document.createElement('div');d.className='card';d.innerHTML=`<div class="card-head"><div class="card-ico ${cls}">${ico}</div><div class="card-head-text"><div class="title">${title}</div>${sub?`<div class="sub">${sub}</div>`:''}</div></div>`;const b=document.createElement('div');b.className='card-body';d.appendChild(b);return{d,b}}

function build(){const r=document.getElementById('root');const ph=state.phase;if(ph==='intro')bIntro(r);else if(ph==='cardIdx')bCards(r);else if(ph==='quiz')bQuiz(r);else if(ph==='scenarios')bScenes(r);else bFin(r)}

function bIntro(r){const{d,b}=mkCard('📜','ci-v','Module 1 — Les règles, pourquoi elles existent','~20 minutes');b.innerHTML=`<div class="intro-hero"><span class="float-emoji">📜</span><h2 class="intro-title">Comprendre le sens des règles</h2><p class="intro-text">Le collège a un <strong>règlement intérieur</strong> voté en avril 2025. Ce n'est pas une liste d'interdits arbitraires — c'est un contrat de vie commune pour que tout le monde puisse apprendre et vivre ensemble. Tu vas comprendre le <strong>pourquoi</strong> de chaque règle.</p><div class="obj-list"><div class="obj-item"><span class="obj-ico">📋</span>Les principales règles de vie au collège Château Rance</div><div class="obj-item"><span class="obj-ico">🧠</span>Pourquoi chaque règle existe — le sens profond</div><div class="obj-item"><span class="obj-ico">🎭</span>Situations réelles pour tester ta compréhension</div></div></div>`;const br=document.createElement('div');br.className='btn-row';const btn=document.createElement('button');btn.className='btn btn-v';btn.textContent='🚀 C\'est parti !';btn.onclick=()=>{state.phase='cardIdx';render()};br.appendChild(btn);b.appendChild(br);r.appendChild(d)}

function bCards(r){
  r.appendChild(prog('cardIdx'));r.appendChild(xpbar([{i:'📋',v:`${state.cardIdx+1}/${REGLES.length}`}]));
  const data=REGLES[state.cardIdx];const{d,b}=mkCard(data.ico,'ci-v','Niveau 1 — Les règles','Règle + pourquoi elle existe');
  const rc=document.createElement('div');rc.className='regle-card';rc.style.cssText=`background:${data.bg};border-color:${data.border}`;
  rc.innerHTML=`<div class="regle-header" style="background:${data.bg}">${data.ico} ${data.theme}</div><div class="regle-body"><div class="regle-what"><div class="regle-what-lbl">📌 La règle</div><div class="regle-txt">${data.quoi}</div></div><div class="regle-why"><div class="regle-why-lbl">💡 Pourquoi cette règle ?</div><div class="regle-txt">${data.pourquoi}</div></div><span class="ri-tag">📜 RI : ${data.ri}</span></div>`;
  b.appendChild(rc);const nav=document.createElement('div');nav.className='fn-nav';
  const prev=document.createElement('button');prev.className='btn btn-ghost';prev.textContent='← Préc';prev.disabled=state.cardIdx===0;prev.onclick=()=>{state.cardIdx--;render()};
  const ctr=document.createElement('div');ctr.className='fn-counter';ctr.textContent=`${state.cardIdx+1} / ${REGLES.length}`;
  const next=document.createElement('button');next.className='btn btn-v';next.textContent=state.cardIdx<REGLES.length-1?'Suivant →':'Quiz →';
  next.onclick=()=>{if(state.cardIdx<REGLES.length-1){state.cardIdx++;render()}else{state.xp+=50;toast('⭐ +50 XP — Niveau 1 terminé !');state.phase='quiz';render()}};
  nav.append(prev,ctr,next);b.appendChild(nav);r.appendChild(d)
}

function bQuiz(r){
  r.appendChild(prog('quiz'));r.appendChild(xpbar([{i:'❓',v:`${state.quizIdx+1}/${QUIZ.length}`},{i:'🏅',v:state.quizScore}]));
  const q=QUIZ[state.quizIdx];const{d,b}=mkCard('🧩','ci-s','Niveau 2 — Quiz','Lis bien la situation avant de répondre');
  if(q.ctx)b.innerHTML=`<div class="quiz-ctx">📌 ${q.ctx}</div>`;
  const qd=document.createElement('div');qd.className='quiz-q';qd.textContent=q.q;b.appendChild(qd);
  const ol=document.createElement('div');ol.className='opts';
  q.opts.forEach((o,i)=>{const btn=document.createElement('button');let c='opt';if(state.showFb){if(i===q.ok)c+=' ok';else if(i===state.selected)c+=' ko';}else if(i===state.selected)c+=' sel';btn.className=c;btn.disabled=state.showFb;btn.innerHTML=`<span class="opt-let">${String.fromCharCode(65+i)}</span>${o}`;btn.onclick=()=>{if(!state.showFb){state.selected=i;render()}};ol.appendChild(btn)});
  b.appendChild(ol);
  if(state.showFb){const ok=state.selected===q.ok;const fb=document.createElement('div');fb.className=`fb ${ok?'ok':'ko'}`;fb.innerHTML=`<div class="fb-title">${ok?'✅ Bonne réponse ! +'+q.xp+' XP':'❌ Pas tout à fait…'}</div><div class="fb-text">${q.fb}</div>`;b.appendChild(fb)}
  const br=document.createElement('div');br.className='btn-row';
  if(!state.showFb){const v=document.createElement('button');v.className='btn btn-s';v.textContent='Valider';v.disabled=state.selected===null;v.onclick=()=>{if(state.selected===q.ok){state.xp+=q.xp;state.quizScore+=q.xp;toast(`⭐ +${q.xp} XP`)}state.showFb=true;render()};br.appendChild(v)}
  else{const n=document.createElement('button');n.className='btn btn-v';n.textContent=state.quizIdx<QUIZ.length-1?'Question suivante →':'Mise en scène →';n.onclick=()=>{state.selected=null;state.showFb=false;if(state.quizIdx<QUIZ.length-1){state.quizIdx++;render()}else{state.xp+=20;toast('🎭 Niveau 3 débloqué !');state.phase='scenarios';render()}};br.appendChild(n)}
  b.appendChild(br);r.appendChild(d)
}

function bScenes(r){
  r.appendChild(prog('scenarios'));r.appendChild(xpbar([{i:'🎭',v:`Scène ${state.scenIdx+1}/${SCENARIOS.length}`},{i:'🏅',v:state.scenScore}]));
  const sc=SCENARIOS[state.scenIdx];const{d,b}=mkCard('🎭','ci-v',`Niveau 3 — ${sc.titre}`,'Que ferais-tu dans cette situation ?');
  b.innerHTML=`<div class="sc-ctx"><div class="sc-ctx-lbl">📖 La situation</div><div class="sc-story">${sc.ctx}</div></div>`;
  const sq=document.createElement('div');sq.className='sc-q';sq.textContent=sc.q;b.appendChild(sq);
  if(!state.showRes){
    const ch=document.createElement('div');ch.className='choices';
    sc.choix.forEach((c,i)=>{const btn=document.createElement('button');btn.className='choice';btn.innerHTML=`<span class="ch-arr">→</span>${c.t}`;btn.onclick=()=>{state.choiceIdx=i;state.showRes=true;render()};ch.appendChild(btn)});
    b.appendChild(ch);
  }else{
    const ch=sc.choix[state.choiceIdx];const res=document.createElement('div');res.className=`res-box ${ch.ton}`;
    res.innerHTML=`<span class="res-emoji">${ch.ico}</span><div class="res-title">${ch.r}</div><div class="res-tip">💡 ${ch.tip}</div><div class="impact ${ch.ton==='pos'?'pos':ch.ton==='neg'?'neg':'neu'}">${ch.lbl}</div>`;
    b.appendChild(res);
    const br=document.createElement('div');br.className='btn-row';const n=document.createElement('button');n.className='btn btn-g';n.textContent=state.scenIdx<SCENARIOS.length-1?'Scène suivante →':'🏁 Voir mon bilan !';
    n.onclick=()=>{state.xp+=Math.max(0,sc.choix[state.choiceIdx].impact);state.scenScore+=Math.max(0,sc.choix[state.choiceIdx].impact);state.choiceIdx=null;state.showRes=false;if(state.scenIdx<SCENARIOS.length-1){state.scenIdx++;render()}else{markDone();state.phase='fin';render()}};
    br.appendChild(n);b.appendChild(br);
  }
  r.appendChild(d)
}

function bFin(r){
  const m=mastery(state.xp);const{d,b}=mkCard('🏁','ci-g','Module terminé !','M3_01 · Pilier 3 — La vie en collectivité');
  b.innerHTML=`<div class="completion"><span class="trophy">🤝</span><h2 class="comp-title">Bravo !</h2><p class="comp-sub">Tu comprends maintenant le sens des règles du collège — pas juste leur liste.</p><div class="mastery ${m.cls}">${m.lbl}</div><div class="stats-row"><div class="stat-tile"><div class="stat-v">${state.xp}</div><div class="stat-l">XP Total</div></div><div class="stat-tile"><div class="stat-v">${state.quizScore}</div><div class="stat-l">Quiz</div></div><div class="stat-tile"><div class="stat-v">${state.scenScore}</div><div class="stat-l">Scènes</div></div></div><div class="unlock-banner"><div class="unlock-ico">🔓</div><div class="unlock-text"><strong>Module suivant débloqué !</strong>${NEXT_NAME} — tes droits ET tes devoirs d'élève.</div></div><div class="next-hint">💡 À retenir : les règles ne sont pas là pour contraindre — elles sont là pour <strong>protéger tout le monde</strong>, y compris toi.</div></div>`;
  const br=document.createElement('div');br.className='btn-row';
  const hub=document.createElement('button');hub.className='btn btn-v';hub.textContent='← Retour au Hub';hub.onclick=()=>location.href='index.html';
  const nxt=document.createElement('button');nxt.className='btn btn-g';nxt.textContent='Module suivant →';nxt.onclick=()=>location.href=NEXT_FILE;
  const rel=document.createElement('button');rel.className='btn btn-ghost';rel.textContent='↺ Recommencer';rel.onclick=()=>{state={phase:'intro',cardIdx:0,quizIdx:0,selected:null,showFb:false,scenIdx:0,choiceIdx:null,showRes:false,xp:0,quizScore:0,scenScore:0};render()};
  br.append(hub,nxt,rel);b.appendChild(br);r.appendChild(d)
}

render();
</script>
</body>
</html>
