                e('div',{style:{textAlign:'center',marginTop:22}},e('button',{className:'action-btn',onClick:finish},'Terminer le parcours 🏅'))))));}

    if(gs==="complete"){return e('div',{className:'app-container'},
        e('div',{className:'content-panel'},e('div',{className:'panel-body completion-screen'},
            e('div',{className:'completion-icon'},'🌱'),
            e('div',{className:'completion-title'},'PILIER COMPLÉTÉ !'),
            e('p',{style:{fontSize:'1.1rem',lineHeight:1.7,color:'#4a6b5a',marginBottom:20}},pn ? 'Bravo '+pn+' !' : 'Bravo !'+' Tu as parcouru les 6 modules du pilier Vivre Ensemble Actif. Tu as les outils pour agir — pas seulement pour toi, mais pour ceux qui t\'entourent.'),
            e('div',{className:'pillar-badge'},
                e('div',{className:'pillar-badge-icon'},'🏅'),
                e('div',{className:'pillar-badge-title'},'Ambassadeur · Vivre Ensemble Actif'),
                e('div',{className:'pillar-badge-sub'},'Pilier VEA · 6/6 modules · PIX pHARe')
            ),
            e('div',{className:'stats-grid'},
                e('div',{className:'stat-card'},e('div',{className:'stat-value'},'175'),e('div',{className:'stat-label'},'XP gagnés')),
                e('div',{className:'stat-card'},e('div',{className:'stat-value'},'6/6'),e('div',{className:'stat-label'},'Modules VEA')),
                e('div',{className:'stat-card'},e('div',{className:'stat-value'},'CPS'),e('div',{className:'stat-label'},'OMS 1993'))
            ),
            e('div',{style:{textAlign:'center',marginTop:28}},e('button',{className:'action-btn',onClick:()=>window.location.href=BACK_URL+(pn?'?player='+encodeURIComponent(pn):'')},`← Retour à PIX-pHARe`)))));}

    return null;
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
</script>
