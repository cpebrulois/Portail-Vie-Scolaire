<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX-pHARe | Le Protocole pHARe</title>
    <style>
        :root {
            --primary: #e67e22;
            --accent: #c0392b;
            --success: #27ae60;
            --warning: #f1c40f;
            --dark: #1a1510;
            --darker: #0f0a05;
            --card: #2c2015;
            --light: #f5e6d3;
            --gold: #ffd700;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #2a1a0a 100%);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .app-container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(230,126,34,0.2), 0 0 0 1px rgba(230,126,34,0.1);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }
        .app-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #e67e22, #c0392b, #f1c40f);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 {
            font-size: 2.2em;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(230,126,34,0.3);
        }
        .header .subtitle { color: var(--warning); font-size: 1.1em; }
        .header .level-badge {
            background: linear-gradient(135deg, var(--primary), #d35400);
            color: #fff;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }
        .progress-container { background: var(--darker); border-radius: 10px; padding: 15px 20px; margin-bottom: 25px; }
        .progress-bar-outer { background: rgba(255,255,255,0.1); border-radius: 10px; height: 12px; overflow: hidden; margin-top: 10px; }
        .progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 10px; transition: width 0.5s ease; }
        .progress-stats { display: flex; justify-content: space-between; font-size: 0.9em; }
        .xp-badge { background: var(--gold); color: #000; padding: 3px 12px; border-radius: 15px; font-weight: bold; }
        .btn {
            background: linear-gradient(135deg, var(--primary), #d35400);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(230,126,34,0.4); }
        .btn-secondary { background: linear-gradient(135deg, #555, #444); }
        .btn-success { background: linear-gradient(135deg, var(--success), #1e8449); }
        .btn-warning { background: linear-gradient(135deg, var(--warning), #d4ac0d); color: #000; }
        .btn-block { width: 100%; justify-content: center; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .card { background: linear-gradient(145deg, #3a2a1a, #2c2015); color: var(--light); padding: 30px; border-radius: 15px; margin: 20px 0; border: 1px solid rgba(230,126,34,0.2); }
        .flashcard-container { perspective: 1000px; margin: 25px 0; }
        .flashcard {
            background: linear-gradient(145deg, #f5e6d3, #e8d5c0);
            color: var(--dark);
            padding: 40px 30px;
            border-radius: 15px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: transform 0.6s, box-shadow 0.3s;
            transform-style: preserve-3d;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            position: relative;
        }
        .flashcard:hover { box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard .front, .flashcard .back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; }
        .flashcard .back { transform: rotateY(180deg); }
        .flashcard .question { font-size: 1.3em; font-weight: 600; line-height: 1.5; color: var(--dark); }
        .flashcard .answer { font-size: 1.1em; line-height: 1.6; color: var(--dark); }
        .flashcard .answer-label { color: var(--primary); font-weight: bold; font-size: 0.9em; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .flashcard .source { margin-top: 20px; padding-top: 15px; border-top: 1px solid #ccc; font-size: 0.85em; color: #666; font-style: italic; }
        .flashcard .tap-hint { position: absolute; bottom: 15px; font-size: 0.8em; color: #888; }
        .card-counter { text-align: center; margin-bottom: 15px; font-size: 0.95em; opacity: 0.8; }
        .quiz-question { background: var(--darker); padding: 25px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--primary); }
        .quiz-question .label { color: var(--primary); font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .quiz-choices { display: flex; flex-direction: column; gap: 12px; }
        .quiz-choice {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            color: var(--light);
            padding: 18px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 1rem;
        }
        .quiz-choice:hover { background: rgba(230,126,34,0.15); border-color: var(--primary); transform: translateX(5px); }
        .quiz-choice.correct { background: rgba(39,174,96,0.3); border-color: var(--success); }
        .quiz-choice.incorrect { background: rgba(192,57,43,0.3); border-color: var(--accent); }
        .quiz-choice.disabled { pointer-events: none; opacity: 0.6; }
        .feedback { padding: 20px; border-radius: 12px; margin-top: 20px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .feedback.correct { background: rgba(39,174,96,0.2); border: 1px solid var(--success); }
        .feedback.incorrect { background: rgba(192,57,43,0.2); border: 1px solid var(--accent); }
        .feedback .title { font-weight: bold; font-size: 1.1em; margin-bottom: 10px; }
        .feedback.correct .title { color: var(--success); }
        .feedback.incorrect .title { color: var(--accent); }
        .dojo-scenario { background: linear-gradient(135deg, var(--darker), #1a0a00); padding: 25px; border-radius: 12px; border: 1px solid rgba(230,126,34,0.3); margin-bottom: 20px; }
        .dojo-scenario .context-label { color: var(--primary); font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .dojo-scenario .context { font-size: 1.05em; line-height: 1.7; margin-bottom: 20px; }
        .dojo-scenario .question { background: rgba(241,196,15,0.1); padding: 15px; border-radius: 8px; border-left: 3px solid var(--warning); }
        .impact-badge { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 0.8em; font-weight: bold; margin-left: 10px; }
        .impact-positive { background: var(--success); color: #fff; }
        .impact-negative { background: var(--accent); color: #fff; }
        .impact-neutral { background: var(--warning); color: #000; }
        .save-code-section { background: var(--darker); border: 2px dashed var(--primary); border-radius: 12px; padding: 25px; margin: 25px 0; }
        .save-code-box { background: #000; color: var(--primary); font-family: 'Courier New', monospace; padding: 20px; border-radius: 8px; word-break: break-all; font-size: 0.85em; line-height: 1.5; user-select: all; margin: 15px 0; max-height: 120px; overflow-y: auto; }
        .save-instructions { background: rgba(230,126,34,0.1); border: 1px solid var(--primary); padding: 15px; border-radius: 8px; margin-top: 20px; }
        .save-instructions h4 { color: var(--primary); margin-bottom: 10px; }
        .save-instructions ul { margin-left: 20px; line-height: 1.8; }
        .report { background: linear-gradient(145deg, #f5e6d3, #e8d5c0); color: var(--dark); border-radius: 15px; overflow: hidden; }
        .report-header { background: linear-gradient(135deg, var(--primary), #d35400); color: white; padding: 30px; text-align: center; }
        .report-header h2 { font-size: 1.8em; margin-bottom: 5px; }
        .report-body { padding: 30px; }
        .report-stat { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #ccc; }
        .report-stat:last-child { border-bottom: none; }
        .report-stat .label { color: #666; }
        .report-stat .value { font-weight: bold; color: var(--dark); }
        .mastery-badge { display: inline-block; padding: 8px 20px; border-radius: 25px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .mastery-expert { background: linear-gradient(135deg, var(--gold), #d4ac0d); color: #000; }
        .mastery-confirmed { background: linear-gradient(135deg, var(--primary), #d35400); color: #fff; }
        .mastery-learning { background: linear-gradient(135deg, #3498db, #2980b9); color: #fff; }
        .unlock-section { background: linear-gradient(135deg, #2a1a0a, var(--darker)); border: 2px solid var(--warning); border-radius: 15px; padding: 30px; text-align: center; margin: 20px 0; }
        .unlock-section h3 { color: var(--warning); margin-bottom: 15px; }
        .unlock-section input { width: 100%; padding: 15px; border: 2px solid #444; border-radius: 8px; background: var(--darker); color: var(--primary); font-family: 'Courier New', monospace; font-size: 0.9em; margin: 15px 0; }
        .unlock-section input:focus { outline: none; border-color: var(--primary); }
        .error-msg { color: var(--accent); font-weight: bold; margin-top: 10px; }
        .level-indicator { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .level-dot { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2em; background: var(--darker); border: 3px solid #444; transition: all 0.3s; }
        .level-dot.active { border-color: var(--primary); box-shadow: 0 0 20px rgba(230,126,34,0.5); }
        .level-dot.completed { background: var(--success); border-color: var(--success); }
        @media (max-width: 600px) { body { padding: 10px; } .app-container { padding: 20px; } .header h1 { font-size: 1.6em; } .flashcard { padding: 25px 20px; min-height: 250px; } .btn { padding: 12px 20px; font-size: 0.9rem; } }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script>
        const MODULE_DATA = {
            id: "JURIDIQUE_04",
            version: "1.0.0",
            titre: "LE PROTOCOLE pHARe",
            sous_titre: "Pilier 4 : Procédures Institutionnelles",
            description: "Maîtriser les protocoles officiels : signalement Article 40, programme pHARe, méthode de la préoccupation partagée (MPP).",
            auteur: "Programme pHARe",
            prerequis: "JURIDIQUE_03",
            niveau_difficulte: 4,
            
            niveau1: {
                titre: "L'Architecture Institutionnelle",
                type: "flashcards",
                xp_reward: 125,
                cartes: [
                    {
                        recto: "Qu'est-ce que l'ARTICLE 40 du Code de Procédure Pénale ?",
                        verso: "Obligation pour tout fonctionnaire ayant connaissance d'un CRIME ou DÉLIT d'en informer le Procureur de la République SANS DÉLAI.\n\nLe signalement doit contenir :\n• Identité des auteurs présumés\n• Identité des témoins\n• Récit détaillé des faits",
                        source: "Code de Procédure Pénale - Art. 40"
                    },
                    {
                        recto: "Que risque un agent qui NE signale PAS un délit dont il a connaissance ?",
                        verso: "• Sanctions DISCIPLINAIRES (blâme, suspension...)\n• Engagement de sa responsabilité personnelle\n\nLe défaut de signalement est une FAUTE PROFESSIONNELLE caractérisée.\n\nL'agent ne peut pas \"protéger\" l'élève en ne signalant pas.",
                        source: "Article 40 CPP & Statut Fonction Publique"
                    },
                    {
                        recto: "Quels sont les 5 PILIERS du programme pHARe ?",
                        verso: "1. ÉDUQUER : Former les élèves à la prévention\n\n2. FORMER : Qualifier les adultes référents\n\n3. INTERVENIR : Protocoles de prise en charge\n\n4. ASSOCIER : Impliquer les parents\n\n5. MOBILISER : Rôle des élèves ambassadeurs",
                        source: "Programme pHARe - Ministère EN"
                    },
                    {
                        recto: "Qu'est-ce que la MÉTHODE DE LA PRÉOCCUPATION PARTAGÉE (MPP) ?",
                        verso: "Méthode d'intervention NON-BLÂMANTE où l'adulte exprime sa préoccupation pour la victime aux auteurs, SANS les accuser directement.\n\nObjectif : Responsabiliser l'auteur en le rendant acteur de la solution, pas objet de la sanction.\n\nPAS adapté aux cas graves → procédure disciplinaire directe.",
                        source: "Méthode Pikas - pHARe"
                    },
                    {
                        recto: "À quel moment de l'année doit être réalisée la DÉTECTION systématique selon pHARe ?",
                        verso: "Questionnaires d'auto-évaluation ANONYMES dès le mois de NOVEMBRE.\n\nObjectif : Repérer les situations invisibles avant qu'elles ne dégénèrent.\n\nRappel : Les victimes parlent rarement spontanément (honte, peur des représailles).",
                        source: "Calendrier pHARe"
                    },
                    {
                        recto: "Quelles SANCTIONS DISCIPLINAIRES peuvent être prononcées pour harcèlement dans le second degré ?",
                        verso: "Échelle progressive :\n• Avertissement\n• Blâme\n• Mesure de responsabilisation\n• Exclusion temporaire (max 8 jours)\n• Exclusion définitive (conseil de discipline)\n\nDepuis 2022 : Engagement OBLIGATOIRE de procédures disciplinaires.",
                        source: "Circulaire pHARe 2023"
                    }
                ]
            },
            
            niveau2: {
                titre: "Protocole en Action",
                type: "quiz",
                xp_reward: 175,
                questions: [
                    {
                        texte: "Un élève te confie être harcelé depuis 2 mois. Il te demande de ne rien dire aux adultes car il a peur que \"ça empire\".",
                        question: "Quelle est ta position en tant qu'ambassadeur pHARe ?",
                        choix: [
                            { txt: "Je respecte sa demande de confidentialité pour ne pas le trahir", correct: false, feedback: "ERREUR ! Le silence = complicité passive + mise en danger. Ta loyauté envers lui passe par la PROTECTION, pas par le silence. Les adultes sont formés pour agir discrètement." },
                            { txt: "Je l'accompagne pour signaler, en lui expliquant que c'est pour sa protection", correct: true, feedback: "PARFAIT ! Tu ne le \"trahis\" pas, tu le PROTÈGES. Explique-lui que les adultes référents sont formés, que l'anonymat sera préservé au maximum, et que NE RIEN FAIRE = laisser la situation empirer." },
                            { txt: "J'attends de voir si ça s'aggrave avant d'agir", correct: false, feedback: "DANGEREUX ! 2 mois de harcèlement = situation déjà grave. Attendre = accumuler les dégâts psychologiques. Le temps joue CONTRE la victime." }
                        ]
                    },
                    {
                        texte: "Un professeur te dit qu'il a vu des insultes sur le casier d'un élève mais qu'il \"ne veut pas se mêler de ça\" car \"ça va se calmer tout seul\".",
                        question: "Que lui rappelles-tu poliment ?",
                        choix: [
                            { txt: "Qu'il a raison, les adultes ne doivent pas trop intervenir entre élèves", correct: false, feedback: "FAUX ! Les adultes ont une OBLIGATION de vigilance et de signalement. L'article 40 CPP impose de signaler tout délit constaté." },
                            { txt: "Qu'en tant que fonctionnaire, il a une obligation légale de signalement (Art. 40)", correct: true, feedback: "EXACT ! Article 40 CPP : tout fonctionnaire DOIT signaler. Le défaut de signalement engage sa responsabilité disciplinaire. \"Ne pas se mêler\" n'est pas une option légale." },
                            { txt: "Que c'est le rôle du CPE, pas le sien", correct: false, feedback: "FAUX ! TOUS les personnels sont concernés par l'obligation de signalement. Le CPE coordonne, mais chacun a son rôle. Témoin = responsable de signaler." }
                        ]
                    },
                    {
                        texte: "Tu constates qu'un groupe de 3 élèves isole systématiquement un camarade depuis 1 semaine. Aucune violence physique, juste de l'exclusion.",
                        question: "Selon le protocole pHARe, quelle méthode d'intervention est la plus adaptée en PREMIÈRE intention ?",
                        choix: [
                            { txt: "Conseil de discipline immédiat pour les 3 auteurs", correct: false, feedback: "DISPROPORTIONNÉ en première intention. Le conseil de discipline est réservé aux cas graves ou aux récidives. Ici, la MPP peut suffire à régler la situation." },
                            { txt: "Méthode de la Préoccupation Partagée (MPP)", correct: true, feedback: "ADAPTÉ ! Pas de violence physique, situation récente : la MPP permet de responsabiliser les auteurs en les rendant acteurs de la solution. Si échec → escalade vers le disciplinaire." },
                            { txt: "Ne rien faire car il n'y a pas de violence physique", correct: false, feedback: "GRAVE ERREUR ! L'exclusion sociale EST du harcèlement psychologique. La loi ne distingue pas physique/psychologique. L'impact sur la victime peut être tout aussi destructeur." }
                        ]
                    },
                    {
                        texte: "Lors d'un entretien MPP avec un auteur présumé, celui-ci nie en bloc : \"C'est pas moi, j'ai rien fait.\"",
                        question: "Quelle est la bonne posture selon la méthode ?",
                        choix: [
                            { txt: "Insister avec des preuves jusqu'à ce qu'il avoue", correct: false, feedback: "Ce n'est PAS l'approche MPP. La méthode évite la confrontation accusatoire. Insister sur les preuves = transformer l'entretien en interrogatoire, ce qui ferme le dialogue." },
                            { txt: "Recentrer sur la préoccupation : \"Untel ne va pas bien. Que pourrais-tu faire pour améliorer les choses ?\"", correct: true, feedback: "EXACTEMENT ! La MPP ne cherche pas l'aveu mais l'engagement. \"Je suis préoccupé pour X. Toi qui le connais, que proposes-tu ?\" L'auteur devient acteur de la solution, pas accusé." },
                            { txt: "Abandonner la MPP et passer directement à la sanction", correct: false, feedback: "Prématuré ! Le déni initial est fréquent. La force de la MPP est de contourner les défenses. Si après plusieurs entretiens le déni persiste → on escalade." }
                        ]
                    }
                ]
            },
            
            niveau3: {
                titre: "Cellule de Crise",
                type: "dojo",
                xp_reward: 225,
                scenarios: [
                    {
                        contexte: "Situation grave : une vidéo humiliante d'un élève circule massivement sur les réseaux. L'élève est effondré, les parents appellent la direction, la presse locale a été alertée.",
                        question: "En tant que membre de l'équipe pHARe, quelle est la PRIORITÉ ABSOLUE ?",
                        choix: [
                            { txt: "Identifier et sanctionner les auteurs immédiatement", correct: false, feedback: "Important mais PAS prioritaire. L'urgence n'est pas la sanction. L'urgence est la PROTECTION DE LA VICTIME. La sanction viendra, mais elle peut attendre quelques heures." },
                            { txt: "Contacter la presse pour limiter la couverture médiatique", correct: false, feedback: "Mauvaise priorité. La communication est secondaire. Le focus doit être sur la victime et sa famille, pas sur l'image de l'établissement." },
                            { txt: "Sécuriser la victime : extraction de classe, soutien psychologique, contact famille", correct: true, feedback: "EXACT ! PRIORITÉ 1 = Victime. Extraction du lieu de souffrance, écoute, présence adulte, contact parents. Tout le reste (enquête, sanction, communication) vient APRÈS." }
                        ]
                    },
                    {
                        contexte: "Un parent vient te voir furieux. Son fils a été identifié comme harceleur. Il menace de porter plainte contre l'établissement pour \"diffamation\" et \"acharnement\".",
                        question: "Comment gères-tu cette situation ?",
                        choix: [
                            { txt: "Reculer sur les mesures prises pour calmer le parent", correct: false, feedback: "CATASTROPHIQUE ! Reculer sous la pression = abandonner la victime + message d'impunité aux auteurs. Les protocoles doivent être appliqués équitablement." },
                            { txt: "Rester factuel, rappeler le cadre légal et proposer un rendez-vous formel", correct: true, feedback: "PARFAIT ! 1) Accueillir la colère sans l'alimenter 2) Rappeler les faits objectivement 3) Expliquer le cadre légal (obligation de l'école) 4) Proposer un RDV avec le chef d'établissement pour dialogue constructif." },
                            { txt: "Renvoyer vers le chef d'établissement sans rien dire", correct: false, feedback: "Évitement ! Tu peux amorcer le dialogue avec calme et factualité. Botter en touche sans rien dire peut aggraver la frustration du parent." }
                        ]
                    },
                    {
                        contexte: "Suite à un signalement, tu apprends que l'auteur principal est lui-même victime de violences familiales. La situation est complexe.",
                        question: "Comment cette information impacte-t-elle le traitement du cas ?",
                        choix: [
                            { txt: "Ça excuse son comportement, on annule les sanctions", correct: false, feedback: "NON ! Comprendre n'est pas excuser. La victime de l'élève mérite protection QUOI QU'IL ARRIVE. Mais cette info oriente l'ACCOMPAGNEMENT de l'auteur." },
                            { txt: "On maintient la protection de la victime ET on signale la situation familiale", correct: true, feedback: "EXACT ! Double signalement : 1) Protection de la victime de harcèlement maintenue 2) Information préoccupante pour l'auteur (cellule de recueil). Un enfant maltraité qui reproduit la violence a besoin d'AIDE, pas juste de sanction." },
                            { txt: "C'est le travail des services sociaux, pas de l'école", correct: false, feedback: "ERREUR ! L'école est partie prenante de la protection de l'enfance. Le signalement d'information préoccupante EST une obligation scolaire. On ne compartimente pas." }
                        ]
                    }
                ]
            }
        };


        const e = React.createElement;
        const { useState } = React;

        function Header({ showProgress, xp }) {
            return e('div', { className: 'header' },
                e('div', { className: 'level-badge' }, `NIVEAU ${MODULE_DATA.niveau_difficulte}`),
                e('h1', null, MODULE_DATA.titre),
                e('div', { className: 'subtitle' }, MODULE_DATA.sous_titre),
                showProgress && e('div', { style: { marginTop: '10px' } }, e('span', { className: 'xp-badge' }, `⚡ ${xp} XP`))
            );
        }

        function ProgressBar({ currentLevel, xp }) {
            const percent = Math.min(100, (currentLevel / 3) * 100);
            return e('div', { className: 'progress-container' }, e('div', { className: 'progress-stats' }, e('span', null, `Niveau ${currentLevel}/3`), e('span', { className: 'xp-badge' }, `${xp} XP`)), e('div', { className: 'progress-bar-outer' }, e('div', { className: 'progress-bar-inner', style: { width: `${percent}%` } })));
        }

        function LevelIndicator({ current }) {
            const levels = ['📋', '⚙️', '🚨'];
            return e('div', { className: 'level-indicator' }, levels.map((emoji, i) => e('div', { key: i, className: `level-dot ${i + 1 === current ? 'active' : ''} ${i + 1 < current ? 'completed' : ''}` }, i + 1 < current ? '✓' : emoji)));
        }

        function Flashcard({ card, onNext, isLast, onComplete }) {
            const [flipped, setFlipped] = useState(false);
            return e('div', { className: 'flashcard-container' },
                e('div', { className: `flashcard ${flipped ? 'flipped' : ''}`, onClick: () => setFlipped(!flipped) },
                    e('div', { className: 'front' }, e('div', { className: 'question', style: { whiteSpace: 'pre-line' } }, card.recto), e('div', { className: 'tap-hint' }, '👆 Clique pour retourner')),
                    e('div', { className: 'back' }, e('div', { className: 'answer-label' }, '✓ Réponse'), e('div', { className: 'answer', style: { whiteSpace: 'pre-line' } }, card.verso), e('div', { className: 'source' }, `📖 ${card.source}`))
                ),
                e('div', { className: 'text-center', style: { marginTop: '20px' } }, flipped && (isLast ? e('button', { className: 'btn btn-success', onClick: onComplete }, '✓ VALIDER') : e('button', { className: 'btn', onClick: () => { onNext(); setFlipped(false); } }, 'SUIVANT →')))
            );
        }

        function QuizQuestion({ question, onAnswer }) {
            const [answered, setAnswered] = useState(false);
            const [selectedIdx, setSelectedIdx] = useState(null);
            const [feedback, setFeedback] = useState(null);
            const handleChoice = (choice, idx) => { if (answered) return; setAnswered(true); setSelectedIdx(idx); setFeedback({ correct: choice.correct, text: choice.feedback }); };
            return e('div', null,
                e('div', { className: 'quiz-question' }, e('div', { className: 'label' }, '📋 CAS PRATIQUE'), e('p', { style: { marginBottom: '15px', lineHeight: '1.6' } }, question.texte), question.question && e('p', { style: { fontWeight: 'bold', color: '#e67e22' } }, `❓ ${question.question}`)),
                e('div', { className: 'quiz-choices' }, question.choix.map((choice, idx) => e('button', { key: idx, className: `quiz-choice ${answered ? (idx === selectedIdx ? (choice.correct ? 'correct' : 'incorrect') : 'disabled') : ''}`, onClick: () => handleChoice(choice, idx), disabled: answered }, choice.txt))),
                feedback && e('div', { className: `feedback ${feedback.correct ? 'correct' : 'incorrect'}` }, e('div', { className: 'title' }, feedback.correct ? '✓ PROTOCOLE RESPECTÉ !' : '✗ ERREUR DE PROTOCOLE'), e('p', null, feedback.text), e('button', { className: 'btn', style: { marginTop: '20px' }, onClick: () => onAnswer(feedback.correct) }, 'CONTINUER →'))
            );
        }

        function DojoScenario({ scenario, onAnswer }) {
            const [answered, setAnswered] = useState(false);
            const [selectedChoice, setSelectedChoice] = useState(null);
            const handleChoice = (choice) => { if (answered) return; setAnswered(true); setSelectedChoice(choice); };
            const getImpactClass = (impact) => impact >= 80 ? 'impact-positive' : impact > 0 ? 'impact-neutral' : 'impact-negative';
            const getImpactLabel = (impact) => impact >= 0 ? `+${impact}` : `${impact}`;
            return e('div', null,
                e('div', { className: 'dojo-scenario' }, e('div', { className: 'context-label' }, '🚨 CELLULE DE CRISE'), e('p', { className: 'context' }, scenario.contexte), e('div', { className: 'question' }, e('strong', null, '❓ ', scenario.question))),
                e('div', { className: 'quiz-choices' }, scenario.choix.map((choice, idx) => e('button', { key: idx, className: `quiz-choice ${answered ? (choice === selectedChoice ? (choice.correct ? 'correct' : 'incorrect') : 'disabled') : ''}`, onClick: () => handleChoice(choice), disabled: answered }, choice.txt, answered && e('span', { className: `impact-badge ${getImpactClass(choice.impact || (choice.correct ? 100 : -20))}` }, getImpactLabel(choice.impact || (choice.correct ? 100 : -20)))))),
                selectedChoice && e('div', { className: `feedback ${selectedChoice.correct ? 'correct' : 'incorrect'}` }, e('div', { className: 'title' }, selectedChoice.correct ? '🏆 GESTION DE CRISE RÉUSSIE !' : '⚠️ FAILLE DANS LE PROTOCOLE'), e('p', null, selectedChoice.feedback), e('button', { className: 'btn', style: { marginTop: '20px' }, onClick: () => onAnswer(selectedChoice.correct ? 100 : Math.max(0, selectedChoice.impact || 0)) }, 'CONTINUER →'))
            );
        }

        function Report({ progress, onRestart, onMenu }) {
            
            const getMasteryLevel = () => { const total = progress.quizScore + progress.dojoScore; if (total >= 500) return { label: 'EXPERT', class: 'mastery-expert' }; if (total >= 300) return { label: 'CONFIRMÉ', class: 'mastery-confirmed' }; return { label: 'EN FORMATION', class: 'mastery-learning' }; };
            const mastery = getMasteryLevel();
            return e('div', null,
                e('div', { className: 'report' },
                    e('div', { className: 'report-header' }, e('span', { style: { fontSize: '3em', display: 'block', marginBottom: '15px' } }, '📋'), e('h2', null, 'MODULE 4 COMPLÉTÉ'), e('p', null, MODULE_DATA.titre)),
                    e('div', { className: 'report-body' },
                        e('div', { className: 'report-stat' }, e('span', { className: 'label' }, 'Agent'), e('span', { className: 'value' }, progress.nom || 'Anonyme')),
                        progress.classe && e('div', { className: 'report-stat' }, e('span', { className: 'label' }, 'Classe'), e('span', { className: 'value' }, progress.classe)),
                        e('div', { className: 'report-stat' }, e('span', { className: 'label' }, 'XP Total'), e('span', { className: 'value' }, `${progress.xp} XP`)),
                        e('div', { className: 'report-stat' }, e('span', { className: 'label' }, 'Score Protocoles'), e('span', { className: 'value' }, `${progress.quizScore} pts`)),
                        e('div', { className: 'report-stat' }, e('span', { className: 'label' }, 'Score Crises'), e('span', { className: 'value' }, `${progress.dojoScore} pts`)),
                        e('div', { className: 'report-stat' }, e('span', { className: 'label' }, 'Maîtrise'), e('span', { className: `mastery-badge ${mastery.class}` }, mastery.label))
                    )
                ),
                e('div', { className: 'save-code-section' },
                    e('h3', { style: { color: '#4ade80', marginBottom: '15px' } }, '✅ Validation automatique'),
                    e('p', { style: { opacity: 0.85 } }, 'La progression de ce module est enregistrée automatiquement dans l\\'index PIXHARe et remontée au super-hub.')
                ),
                e('div', { className: 'btn-group' }, e('button', { className: 'btn btn-secondary', onClick: onMenu }, '🏠 MENU'), e('button', { className: 'btn btn-warning', onClick: onRestart }, '🔄 RECOMMENCER'))
            );
        }

        function App() {
            const [mode, setMode] = useState('menu');
            const unlocked = !MODULE_DATA.prerequis || !!localStorage.getItem('CERT_PHARE_' + MODULE_DATA.prerequis);
            const [currentLevel, setCurrentLevel] = useState(1);
            const [cardIdx, setCardIdx] = useState(0);
            const [questionIdx, setQuestionIdx] = useState(0);
            const [scenarioIdx, setScenarioIdx] = useState(0);
            const [xp, setXp] = useState(0);
            const [quizScore, setQuizScore] = useState(0);
            const [dojoScore, setDojoScore] = useState(0);
            const [nom, setNom] = useState(getHubPlayer() || 'Agent');
            const [classe, setClasse] = useState('');


            const resetProgress = () => { setCurrentLevel(1); setCardIdx(0); setQuestionIdx(0); setScenarioIdx(0); setXp(0); setQuizScore(0); setDojoScore(0); };
            const progress = { nom, classe, currentLevel, xp, quizScore, dojoScore, score: quizScore + dojoScore, finished: mode === 'report' };
            const returnToHub = () => {
                const player = localStorage.getItem('pvs_current_player') || localStorage.getItem('pvs_phare_player') || new URLSearchParams(window.location.search).get('player') || '';
                const hub = 'index_PIXHARe.html';
                window.location.href = player ? `${hub}?player=${encodeURIComponent(player)}` : hub;
            };

            if (mode === 'menu') {
                return e('div', { className: 'app-container' },
                    e(Header, { showProgress: false }),
                    e('div', { className: 'card' }, e('strong', null, '🎯 MISSION : '), MODULE_DATA.description),
                    !unlocked ? e('div', { className: 'unlock-section' },
                        e('h3', null, '🔒 MODULE VERROUILLÉ'),
                        e('p', null, `Le déverrouillage est automatique. Termine d'abord "${MODULE_DATA.prerequis}" depuis l'index PIXHARe.`),
                        e('button', { className: 'btn btn-secondary btn-block', onClick: returnToHub }, '← RETOUR À L\\'INDEX')
                    ) : e('div', { className: 'btn-group' },
                        e('div', { style: { textAlign: 'center', color: '#27ae60', marginBottom: '10px' } }, `✓ Bienvenue ${nom} !`),
                        e('button', { className: 'btn btn-block', onClick: () => setMode('game') }, '▶️ COMMENCER')
                    ),
                    e('div', { style: { marginTop: '30px', textAlign: 'center', opacity: 0.5, fontSize: '0.85em' } }, `Module ${MODULE_DATA.id} v${MODULE_DATA.version}`)
                );
            }

            if (mode === 'game') {
                if (currentLevel === 1) {
                    const cards = MODULE_DATA.niveau1.cartes;
                    return e('div', { className: 'app-container' }, e(Header, { showProgress: true, xp }), e(ProgressBar, { currentLevel, xp }), e(LevelIndicator, { current: currentLevel }), e('h2', { style: { textAlign: 'center' } }, '📋 NIVEAU 1 : RÉGLEMENTATION'), e('div', { className: 'card-counter' }, `Carte ${cardIdx + 1} / ${cards.length}`), e(Flashcard, { key: cardIdx, card: cards[cardIdx], isLast: cardIdx === cards.length - 1, onNext: () => setCardIdx(cardIdx + 1), onComplete: () => { setXp(xp + MODULE_DATA.niveau1.xp_reward); setCurrentLevel(2); setCardIdx(0); } }));
                }
                if (currentLevel === 2) {
                    const questions = MODULE_DATA.niveau2.questions;
                    const handleQuizAnswer = (correct) => { if (correct) setQuizScore(quizScore + 40); if (questionIdx < questions.length - 1) setQuestionIdx(questionIdx + 1); else { setXp(xp + MODULE_DATA.niveau2.xp_reward); setCurrentLevel(3); setQuestionIdx(0); } };
                    return e('div', { className: 'app-container' }, e(Header, { showProgress: true, xp }), e(ProgressBar, { currentLevel, xp }), e(LevelIndicator, { current: currentLevel }), e('h2', { style: { textAlign: 'center' } }, '⚙️ NIVEAU 2 : APPLICATION'), e('div', { className: 'card-counter' }, `Cas ${questionIdx + 1} / ${questions.length}`), e(QuizQuestion, { key: questionIdx, question: questions[questionIdx], onAnswer: handleQuizAnswer }));
                }
                if (currentLevel === 3) {
                    const scenarios = MODULE_DATA.niveau3.scenarios;
                    const handleDojoAnswer = (impact) => { setDojoScore(dojoScore + impact); if (scenarioIdx < scenarios.length - 1) setScenarioIdx(scenarioIdx + 1); else { setXp(xp + MODULE_DATA.niveau3.xp_reward); setMode('report');
                            // ── Certification automatique ──
                            try {
                                var _pl = localStorage.getItem('pvs_current_player')
                                       || localStorage.getItem('pvs_phare_player')
                                       || new URLSearchParams(window.location.search).get('player') || '';
                                localStorage.setItem('CERT_PHARE_JURIDIQUE_04',
                                    JSON.stringify({v:1,d:new Date().toISOString(),m:'JURIDIQUE_04',f:true}));
                                var _pvb = JSON.parse(localStorage.getItem('pvs_bridge_events')||'[]');
                                _pvb.push({id:'PIXHARE-JURIDIQUE_04-'+Date.now(),
                                    type:'PIXHARE_PROGRESS',player:_pl,module:'JURIDIQUE_04',
                                    xp:100,d:new Date().toISOString()});
                                if(_pvb.length>500) _pvb.splice(0,_pvb.length-500);
                                localStorage.setItem('pvs_bridge_events',JSON.stringify(_pvb));
                                window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
                            } catch(_e) {} } };
                    return e('div', { className: 'app-container' }, e(Header, { showProgress: true, xp }), e(ProgressBar, { currentLevel, xp }), e(LevelIndicator, { current: currentLevel }), e('h2', { style: { textAlign: 'center' } }, '🚨 NIVEAU 3 : GESTION DE CRISE'), e('div', { className: 'card-counter' }, `Crise ${scenarioIdx + 1} / ${scenarios.length}`), e(DojoScenario, { key: scenarioIdx, scenario: scenarios[scenarioIdx], onAnswer: handleDojoAnswer }));
                }
            }

            if (mode === 'report') {
                return e('div', { className: 'app-container' }, e(Report, { progress: { ...progress, xp }, onRestart: () => { resetProgress(); setMode('game'); }, onMenu: () => { resetProgress(); setMode('menu'); } }));
            }
            return e('div', { className: 'app-container' }, 'Chargement...');
        }

        ReactDOM.createRoot(document.getElementById('root')).render(e(App));
    
        // === SUPERHUB BRIDGE ===
        function getHubPlayer() {
            try {
                var code = localStorage.getItem('pvs_current_player') || '';
                if (code && code !== 'VISITEUR' && code !== 'ADMIN') return code;
            } catch(e) {}
            return null;
        }
        function sendBridgeEvent(moduleId, score, xp) {
            try {
                var ev = {
                    type: 'MODULE_COMPLETE',
                    moduleId: moduleId,
                    score: score,
                    xp: xp,
                    playerCode: getHubPlayer(),
                    ts: Date.now()
                };
                localStorage.setItem('pvs_bridge_event', JSON.stringify(ev));
                window.dispatchEvent(new Event('pvs_bridge'));
                // ── Bridge PIXHARe hub (pvs_bridge_events array) ──
                var _b = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
                _b.push({ id: 'PIXHARE-' + moduleId + '-' + Date.now(),
                           type: 'PIXHARE_PROGRESS', player: getHubPlayer() || '',
                           module: moduleId, score: score, xp: xp,
                           d: new Date().toISOString() });
                localStorage.setItem('pvs_bridge_events', JSON.stringify(_b));
                window.dispatchEvent(new StorageEvent('storage', { key: 'pvs_bridge_events' }));
            } catch(e) {}
        }
        // === FIN SUPERHUB BRIDGE ===
</script>
</body>
</html>
