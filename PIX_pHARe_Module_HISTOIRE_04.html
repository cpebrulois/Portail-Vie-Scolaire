<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX-pHARe | Module HISTOIRE 04 - Les Dispositifs Modernes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');
        
        :root {
            --history-bronze: #cd7f32;
            --history-amber: #d4a574;
            --history-sepia: #b08968;
            --history-parchment: #e8d5b5;
            --history-ink: #2c1810;
            --void-dark: #0a0a0a;
            --deep-dark: #050505;
            --panel-bg: rgba(44, 24, 16, 0.95);
            --text-primary: #f5ede4;
            --text-secondary: #a89984;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--void-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .history-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 50% 20%, rgba(205, 127, 50, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 70%, rgba(176, 137, 104, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(212, 165, 116, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: historyGlow 8s ease-in-out infinite;
        }
        
        @keyframes historyGlow {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.9; }
        }
        
        .stars-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(1px 1px at 20% 30%, rgba(205, 127, 50, 0.6), transparent),
                radial-gradient(1px 1px at 60% 70%, rgba(212, 165, 116, 0.5), transparent),
                radial-gradient(1px 1px at 80% 10%, rgba(176, 137, 104, 0.4), transparent);
            background-size: 200px 200px;
            animation: starsFloat 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes starsFloat {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header { text-align: center; padding: 40px 20px; }
        
        .pillar-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(205, 127, 50, 0.7));
            animation: bookPulse 3s ease-in-out infinite;
        }
        
        @keyframes bookPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(205, 127, 50, 0.7)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 30px rgba(205, 127, 50, 0.9)); }
        }
        
        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--history-bronze), var(--history-amber), var(--history-sepia));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            animation: gradientShift 4s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: var(--history-amber);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .module-badge {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 30px;
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.3), rgba(212, 165, 116, 0.3));
            border: 2px solid var(--history-bronze);
            border-radius: 0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--history-bronze);
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
        }
        
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .progress-node {
            width: 55px;
            height: 55px;
            border: 3px solid var(--text-secondary);
            background: var(--deep-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-secondary);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            transition: all 0.4s ease;
        }
        
        .progress-node.active {
            border-color: var(--history-bronze);
            color: var(--history-bronze);
            box-shadow: 0 0 25px rgba(205, 127, 50, 0.6);
            animation: nodePulse 2s infinite;
        }
        
        .progress-node.completed {
            border-color: var(--history-amber);
            background: rgba(212, 165, 116, 0.2);
            color: var(--history-amber);
        }
        
        @keyframes nodePulse {
            0%, 100% { box-shadow: 0 0 15px rgba(205, 127, 50, 0.6); }
            50% { box-shadow: 0 0 30px rgba(205, 127, 50, 0.9); }
        }
        
        .xp-display {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .xp-box {
            background: var(--panel-bg);
            border: 1px solid var(--history-bronze);
            padding: 12px 20px;
            text-align: center;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
        }
        
        .xp-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .xp-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--history-bronze);
            margin-top: 5px;
        }
        
        .content-panel {
            background: var(--panel-bg);
            border: 1px solid var(--history-bronze);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(205, 127, 50, 0.15);
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(205, 127, 50, 0.3);
        }
        
        .panel-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 10px rgba(205, 127, 50, 0.6));
        }
        
        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--history-bronze);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .panel-body {
            color: var(--text-primary);
            line-height: 1.7;
        }
        
        .intro-screen p {
            margin-bottom: 15px;
            font-size: 1.05rem;
        }
        
        .name-input-group {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .input-wrapper label {
            display: block;
            margin-bottom: 8px;
            color: var(--history-bronze);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 12px 15px;
            background: var(--deep-dark);
            border: 1px solid var(--history-bronze);
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--history-amber);
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.3);
        }
        
        .action-btn {
            background: linear-gradient(135deg, var(--history-bronze), var(--history-sepia));
            color: var(--text-primary);
            border: none;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(205, 127, 50, 0.3);
        }
        
        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(205, 127, 50, 0.5);
        }
        
        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .flashcard-container {
            perspective: 1000px;
            margin: 30px 0;
        }
        
        .flashcard {
            width: 100%;
            min-height: 320px;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        
        .flashcard-face {
            width: 100%;
            min-height: 320px;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 35px;
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.1), rgba(212, 165, 116, 0.1));
            border: 2px solid var(--history-bronze);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(205, 127, 50, 0.2);
        }
        
        .flashcard-front {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.15), rgba(176, 137, 104, 0.15));
        }
        
        .flashcard-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.15), rgba(232, 213, 181, 0.15));
        }
        
        .flashcard-question {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--history-bronze);
            margin-bottom: 15px;
        }
        
        .flashcard-hint {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--history-amber);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .flashcard-answer {
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: center;
            color: var(--text-primary);
        }
        
        .flashcard-answer strong {
            color: var(--history-amber);
        }
        
        .flashcard-nav {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 12px 25px;
            background: transparent;
            border: 2px solid var(--history-bronze);
            color: var(--history-bronze);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: var(--history-bronze);
            color: var(--void-dark);
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.5);
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .quiz-question {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--history-bronze);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(205, 127, 50, 0.05);
            border: 2px solid rgba(205, 127, 50, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quiz-option:hover {
            background: rgba(205, 127, 50, 0.15);
            border-color: var(--history-bronze);
            transform: translateX(5px);
        }
        
        .quiz-option.selected {
            background: rgba(205, 127, 50, 0.2);
            border-color: var(--history-bronze);
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.3);
        }
        
        .quiz-option.correct {
            background: rgba(212, 165, 116, 0.2);
            border-color: var(--history-amber);
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.4);
        }
        
        .quiz-option.incorrect {
            background: rgba(176, 137, 104, 0.2);
            border-color: var(--history-sepia);
            box-shadow: 0 0 20px rgba(176, 137, 104, 0.4);
        }
        
        .option-marker {
            width: 35px;
            height: 35px;
            background: var(--history-bronze);
            color: var(--void-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }
        
        .option-text {
            flex: 1;
            font-size: 1rem;
            line-height: 1.5;
        }
        
        .feedback-box {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.15), rgba(232, 213, 181, 0.15));
            border: 2px solid var(--history-amber);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 0 25px rgba(212, 165, 116, 0.3);
        }
        
        .feedback-box.incorrect-feedback {
            background: linear-gradient(135deg, rgba(176, 137, 104, 0.15), rgba(205, 127, 50, 0.15));
            border-color: var(--history-sepia);
            box-shadow: 0 0 25px rgba(176, 137, 104, 0.3);
        }
        
        .feedback-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--history-amber);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .incorrect-feedback .feedback-title {
            color: var(--history-sepia);
        }
        
        .scenario-context {
            background: rgba(205, 127, 50, 0.1);
            border-left: 4px solid var(--history-bronze);
            padding: 15px 20px;
            margin-bottom: 20px;
            font-style: italic;
            color: var(--text-secondary);
        }
        
        .scenario-intro {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 25px;
        }
        
        .choices {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .choice-btn {
            padding: 18px 25px;
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.1), rgba(212, 165, 116, 0.1));
            border: 2px solid rgba(205, 127, 50, 0.4);
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            line-height: 1.5;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.2), rgba(212, 165, 116, 0.2));
            border-color: var(--history-bronze);
            transform: translateX(8px);
            box-shadow: 0 0 25px rgba(205, 127, 50, 0.3);
        }
        
        .choice-result {
            background: rgba(176, 137, 104, 0.1);
            border: 2px solid var(--history-sepia);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .choice-result p {
            line-height: 1.7;
            margin-bottom: 15px;
        }
        
        .impact-score {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        
        .impact-item {
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .impact-item.positive {
            background: rgba(212, 165, 116, 0.2);
            border: 1px solid var(--history-amber);
            color: var(--history-amber);
        }
        
        .impact-item.negative {
            background: rgba(176, 137, 104, 0.2);
            border: 1px solid var(--history-sepia);
            color: var(--history-sepia);
        }
        

        .save-code-box {
            background: rgba(0,0,0,0.6);
            border: 2px solid var(--history-bronze);
            border-radius: 8px;
            padding: 20px;
            margin: 28px 0 10px 0;
            text-align: center;
        }
        .save-code-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .save-code {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.78rem;
            color: var(--history-amber);
            word-break: break-all;
            line-height: 1.5;
            margin-bottom: 14px;
        }
        .copy-btn {
            padding: 10px 24px;
            background: var(--history-bronze);
            color: var(--history-ink);
            border: none;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: var(--history-amber); }
        .completion-screen {
            text-align: center;
            padding: 40px 20px;
        }
        
        .completion-icon {
            font-size: 5rem;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 30px rgba(205, 127, 50, 0.8));
            animation: completionFloat 3s ease-in-out infinite;
        }
        
        @keyframes completionFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .completion-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--history-bronze), var(--history-amber));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .completion-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: var(--panel-bg);
            border: 2px solid var(--history-bronze);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--history-bronze);
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="history-bg"></div>
    <div class="stars-overlay"></div>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const { useState } = React;
        const e = React.createElement;

        const MODULE_ID = "HISTOIRE_04";
        const MODULE_TITLE = "Les Dispositifs Modernes";
        const MODULE_VERSION = "2.0";

        const flashcardsData = [
            {
                question: "Qu'est-ce que le programme pHARe (2019) ?",
                hint: "[ Clique pour révéler ]",
                answer: "<strong>Programme de lutte contre le Harcèlement À l'école par la Recherche et l'Éducation</strong>. Il généralise à tous les établissements : formation des équipes, protocole de prise en charge, ambassadeurs élèves, climat scolaire. C'est l'aboutissement de 50 ans de recherche appliquée."
            },
            {
                question: "Qu'est-ce que le 3018 ?",
                hint: "[ Clique pour révéler ]",
                answer: "Numéro national gratuit (et appli) contre harcèlement scolaire et cyberharcèlement. <strong>Anonyme, confidentiel, disponible 7j/7</strong>. Permet signalement, conseil psychologique, démarches juridiques. Il relie victimes, familles, et institutions (police, justice, éducation)."
            },
            {
                question: "Pourquoi les ambassadeurs pHARe sont-ils essentiels ?",
                hint: "[ Clique pour révéler ]",
                answer: "Parce qu'ils appliquent l'insight d'Heinemann (1969) : <strong>le harcèlement est un phénomène de groupe</strong>. Former des élèves à l'empathie et à l'intervention crée une culture anti-harcèlement collective, pas juste une réponse punitive adulte."
            },
            {
                question: "Quelle est la limite des dispositifs actuels ?",
                hint: "[ Clique pour révéler ]",
                answer: "Ils restent <strong>sous-utilisés par manque de formation généralisée</strong>. Beaucoup d'élèves ne connaissent pas le 3018. Tous les profs ne sont pas formés au protocole. La théorie existe (pHARe), mais l'application systémique prend du temps."
            }
        ];

        const quizData = [
            {
                question: "En quoi pHARe (2019) diffère-t-il des anciennes approches anti-harcèlement ?",
                options: [
                    "Il crée des punitions plus sévères",
                    "Il généralise une approche systémique : formation obligatoire, protocole national, ambassadeurs élèves, climat scolaire",
                    "Il donne plus de budget aux collèges",
                    "Il interdit les réseaux sociaux"
                ],
                correct: 1,
                feedback: "Exact. Avant pHARe, les actions étaient locales, volontaires, hétérogènes. pHARe impose un CADRE NATIONAL basé sur 50 ans de recherche : tout établissement doit former son équipe, désigner des ambassadeurs, appliquer le protocole."
            },
            {
                question: "Le 3018 est anonyme et confidentiel. Pourquoi est-ce crucial pour les victimes ?",
                options: [
                    "Parce que c'est plus moderne",
                    "Parce que beaucoup de victimes ont peur des représailles ou de ne pas être crues. L'anonymat protège et encourage la parole",
                    "Parce que c'est moins cher",
                    "Parce que c'est obligatoire par la loi"
                ],
                correct: 1,
                feedback: "Parfait. Les recherches montrent que les victimes se taisent par peur (représailles des agresseurs, jugement des pairs, incrédulité des adultes). L'anonymat du 3018 brise ce silence en garantissant sécurité et écoute professionnelle."
            },
            {
                question: "Les ambassadeurs pHARe appliquent quelle idée historique ?",
                options: [
                    "Celle d'Olweus (1970) : les 3 critères",
                    "Celle d'Heinemann (1969) : le harcèlement est une dynamique de groupe, donc la solution doit impliquer le groupe (pairs)",
                    "Celle de Dickens : raconter des histoires",
                    "Celle de la loi de 2019 : punir les harceleurs"
                ],
                correct: 1,
                feedback: "Exactement. Heinemann a montré que le 'mobbing' est collectif. Former des élèves à intervenir, c'est transformer les TÉMOINS PASSIFS en ACTEURS PROTECTEURS. Seule une norme collective anti-harcèlement (portée par les pairs) peut changer la culture scolaire."
            },
            {
                question: "Pourquoi dit-on que pHARe et le 3018 sont 'sous-utilisés' malgré leur qualité ?",
                options: [
                    "Parce que les gens sont paresseux",
                    "Parce que changer une culture institutionnelle prend du temps : formation massive des adultes + sensibilisation de tous les élèves nécessaire",
                    "Parce qu'ils sont trop compliqués",
                    "Parce qu'ils coûtent trop cher"
                ],
                correct: 1,
                feedback: "Parfait. Passer d'un système réactif (punir après) à un système préventif (climat scolaire, empathie collective) demande une TRANSFORMATION CULTURELLE profonde. Ça ne se décrète pas, ça se construit par formation continue et engagement collectif."
            }
        ];

        const scenarioData = [
            {
                title: "Le 3018 Ignoré",
                context: "Un élève de 5ème est harcelé depuis 2 mois. Il ne sait pas que le 3018 existe. Ses parents non plus. Il souffre en silence.",
                intro: "Que révèle cette situation sur l'écart entre théorie (dispositifs existants) et pratique (connaissance réelle) ?",
                choices: [
                    {
                        text: "C'est de sa faute, il aurait dû chercher de l'aide",
                        result: "Non. On ne peut pas reprocher à une victime traumatisée de ne pas connaître un dispositif récent (2018). C'est une DÉFAILLANCE SYSTÉMIQUE de communication. Si le 3018 existe mais que personne ne le sait, il est inutile.",
                        impact: { lucidite: -30, compassion: -25 }
                    },
                    {
                        text: "Cela montre qu'avoir de bons outils (3018, pHARe) ne suffit pas. Il faut une CAMPAGNE DE COMMUNICATION massive : affichage permanent, formation dès la 6ème, rappels réguliers",
                        result: "Parfait. Tu comprends que la qualité technique d'un dispositif est inutile sans diffusion massive. L'histoire enseigne : nommer (1969), légiférer (1990), créer des outils (2018)... et MAINTENANT, il faut DIFFUSER à 100% des élèves et familles.",
                        impact: { lucidite: +40, compassion: +35 }
                    },
                    {
                        text: "Je ne sais pas, c'est compliqué",
                        result: "C'est effectivement un problème complexe de diffusion institutionnelle. Mais l'enjeu est simple : un outil inconnu est un outil inexistant pour ceux qui en ont besoin.",
                        impact: { lucidite: +5, compassion: +5 }
                    }
                ]
            },
            {
                title: "L'Ambassadeur Seul",
                context: "Tu es ambassadeur pHARe. Tu vois du harcèlement. Tu interviens seul. Les autres élèves ne réagissent pas, certains ricanent.",
                intro: "Que manque-t-il pour que le système fonctionne ?",
                choices: [
                    {
                        text: "Rien, j'ai fait mon travail d'ambassadeur",
                        result: "Insuffisant. Un ambassadeur isolé ne peut pas changer une CULTURE DE GROUPE. Heinemann (1969) l'a montré : le mobbing est collectif. Sans transformation de la norme collective (tous les élèves formés à l'empathie), l'ambassadeur se bat seul.",
                        impact: { efficacite: -20, systeme: -25 }
                    },
                    {
                        text: "Il manque une FORMATION MASSIVE de TOUS les élèves (pas juste les ambassadeurs). Si tout le collège comprend le harcèlement, les témoins deviennent protecteurs, et les ricanements deviennent condamnations",
                        result: "Exactement. pHARe prévoit des ambassadeurs, mais pour changer la culture, il faut former TOUTE la classe, TOUS les niveaux. Un ambassadeur + 25 élèves indifférents = échec. 3 ambassadeurs + 23 élèves sensibilisés = transformation.",
                        impact: { efficacite: +40, systeme: +40 }
                    },
                    {
                        text: "Je démissionne, c'est trop dur",
                        result: "Abandon. Pourtant, tu as identifié le problème : l'isolement. La solution n'est pas de fuir, mais de demander plus de formation collective pour que tu ne sois plus seul.",
                        impact: { efficacite: -15, systeme: -10 }
                    }
                ]
            }
        ];

        

        function App() {
            const [gameState, setGameState] = useState("intro");
            const [playerData, setPlayerData] = useState({
                name: localStorage.getItem('pvs_current_player') || 'Anonyme',
                class: "",
                xp: 0,
                score: 0,
                quizScore: 0,
                scenarioScore: 0
            });

            const [currentFlashcard, setCurrentFlashcard] = useState(0);
            const [flashcardFlipped, setFlashcardFlipped] = useState(false);

            const [currentQuiz, setCurrentQuiz] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showQuizFeedback, setShowQuizFeedback] = useState(false);

            const [currentScenario, setCurrentScenario] = useState(0);
            const [scenarioChoice, setScenarioChoice] = useState(null);
            const [showScenarioResult, setShowScenarioResult] = useState(false);

            function startGame() {
                if (playerData.name.trim()) {
                    setGameState("flashcards");
                }


            }

            function nextFlashcard() {
                if (currentFlashcard < flashcardsData.length - 1) {
                    setCurrentFlashcard(prev => prev + 1);
                    setFlashcardFlipped(false);
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 10 }));
                } else {
                    setGameState("quiz");
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 40 }));
                }
            }

            function prevFlashcard() {
                if (currentFlashcard > 0) {
                    setCurrentFlashcard(prev => prev - 1);
                    setFlashcardFlipped(false);
                }
            }

            function selectQuizAnswer(index) {
                if (showQuizFeedback) return;
                setSelectedAnswer(index);
            }

            function validateQuizAnswer() {
                setShowQuizFeedback(true);
                const isCorrect = selectedAnswer === quizData[currentQuiz].correct;
                if (isCorrect) {
                    setPlayerData(prev => ({
                        ...prev,
                        score: prev.score + 25,
                        quizScore: prev.quizScore + 25,
                        xp: prev.xp + 25
                    }));
                }
            }

            function nextQuizQuestion() {
                if (currentQuiz < quizData.length - 1) {
                    setCurrentQuiz(prev => prev + 1);
                    setSelectedAnswer(null);
                    setShowQuizFeedback(false);
                } else {
                    setGameState("scenarios");
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 50 }));
                }
            }

            function makeScenarioChoice(index) {
                setScenarioChoice(index);
                setShowScenarioResult(true);

                const choice = scenarioData[currentScenario].choices[index];
                const values = Object.values(choice.impact);
                const totalChange = Math.max(0, values.reduce((a, b) => a + b, 0));

                setPlayerData(prev => ({
                    ...prev,
                    score: prev.score + totalChange,
                    scenarioScore: prev.scenarioScore + totalChange,
                    xp: prev.xp + 20
                }));
            }

            function nextScenario() {
                if (currentScenario < scenarioData.length - 1) {
                    setCurrentScenario(prev => prev + 1);
                    setScenarioChoice(null);
                    setShowScenarioResult(false);
                } else {

                    // ── Remontée XP vers Superhub PVS ──
                    try {
                        var _pvs = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
                        _pvs.push({
                            id: 'PIXHARE-' + MODULE_ID + '-' + Date.now(),
                            type: 'PIXHARE_PROGRESS',
                            player: playerData.name,
                            module: MODULE_ID,
                            score: playerData.score,
                            xp: playerData.xp,
                            d: new Date().toISOString()
                        });
                        localStorage.setItem('CERT_PHARE_HISTOIRE_04',JSON.stringify({v:1,d:new Date().toISOString(),m:'HISTOIRE_04',f:true}));
                    localStorage.setItem('pvs_bridge_events', JSON.stringify(_pvs));
                        window.dispatchEvent(new StorageEvent('storage', { key: 'pvs_bridge_events' }));
                    } catch (_e) { /* silencieux */ }
                    // ── Fin bridge ──
                    setGameState("complete");
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 75 }));
                }
            }

            function renderIntro() {
                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, "PIX-pHARe"),
                        e("div", { className: "subtitle" }, "Pilier Histoire Sociétale"),
                        e("div", { className: "module-badge" }, "MODULE 04")
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "🛡️"),
                            e("div", { className: "panel-title" }, MODULE_TITLE)
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "intro-screen" },
                                e("p", null,
                                    "2018-2019 : la France crée ", e("strong", { style: { color: "var(--history-amber)" } }, "pHARe"), 
                                    " et le ", e("strong", { style: { color: "var(--history-bronze)" } }, "3018"), 
                                    ". Après 50 ans de recherche, 30 ans de législation, voici les outils concrets."
                                ),
                                e("p", null,
                                    "Programme national de prévention, numéro d'aide anonyme, ambassadeurs élèves : ces dispositifs appliquent ", 
                                    e("strong", null, "tout ce que tu as appris"), " depuis le module 1."
                                ),
                                e("p", null,
                                    "Mais pourquoi, malgré leur qualité, restent-ils ", e("strong", null, "sous-utilisés"), " ? Tu vas comprendre l'écart entre théorie et pratique."
                                )
                            ),
                            e("div", { style: { textAlign: "center", marginTop: "20px" } },
                                e("div", { style: { padding: "10px 16px", background: "rgba(205,127,50,0.12)", border: "1px solid var(--history-bronze)", borderRadius: "6px", marginBottom: "16px", fontSize: "0.9rem", color: "var(--history-amber)" } },
                                    "🔗 Connecté via Portail Vie Scolaire"
                                ),
                                e("button", { className: "action-btn", onClick: startGame }, "[ COMMENCER ]")
                            )
                        )
                    )
                );
            }

            function renderFlashcards() {
                const card = flashcardsData[currentFlashcard];

                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, MODULE_TITLE),
                        e("div", { className: "subtitle" }, "Niveau 1 : Outils Concrets")
                    ),
                    e("div", { className: "progress-bar" },
                        e("div", { className: "progress-node active" }, "1"),
                        e("div", { className: "progress-node" }, "2"),
                        e("div", { className: "progress-node" }, "3")
                    ),
                    e("div", { className: "xp-display" },
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "XP"),
                            e("div", { className: "xp-value" }, playerData.xp)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Carte"),
                            e("div", { className: "xp-value" }, `${currentFlashcard + 1}/${flashcardsData.length}`)
                        )
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "📚"),
                            e("div", { className: "panel-title" }, "pHARe & 3018")
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "flashcard-container" },
                                e("div", {
                                    className: `flashcard ${flashcardFlipped ? "flipped" : ""}`,
                                    onClick: () => setFlashcardFlipped(!flashcardFlipped)
                                },
                                    e("div", { className: "flashcard-face flashcard-front" },
                                        e("div", { className: "flashcard-question" }, card.question),
                                        e("div", { className: "flashcard-hint" }, card.hint)
                                    ),
                                    e("div", { className: "flashcard-face flashcard-back" },
                                        e("div", {
                                            className: "flashcard-answer",
                                            dangerouslySetInnerHTML: { __html: card.answer }
                                        })
                                    )
                                )
                            ),
                            e("div", { className: "flashcard-nav" },
                                e("button", {
                                    className: "nav-btn",
                                    onClick: prevFlashcard,
                                    disabled: currentFlashcard === 0
                                }, "◄ PRÉC"),
                                e("button", {
                                    className: "nav-btn",
                                    onClick: nextFlashcard
                                }, currentFlashcard < flashcardsData.length - 1 ? "SUIV ►" : "NIVEAU 2 ►")
                            )
                        )
                    )
                );
            }

            function renderQuiz() {
                const question = quizData[currentQuiz];

                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, MODULE_TITLE),
                        e("div", { className: "subtitle" }, "Niveau 2 : Compréhension Systémique")
                    ),
                    e("div", { className: "progress-bar" },
                        e("div", { className: "progress-node completed" }, "✓"),
                        e("div", { className: "progress-node active" }, "2"),
                        e("div", { className: "progress-node" }, "3")
                    ),
                    e("div", { className: "xp-display" },
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "XP"),
                            e("div", { className: "xp-value" }, playerData.xp)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Score Quiz"),
                            e("div", { className: "xp-value" }, playerData.quizScore)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Question"),
                            e("div", { className: "xp-value" }, `${currentQuiz + 1}/${quizData.length}`)
                        )
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "🔍"),
                            e("div", { className: "panel-title" }, "Analyse Dispositifs")
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "quiz-question" }, question.question),
                            e("div", { className: "quiz-options" },
                                question.options.map((opt, idx) => {
                                    let optClass = "quiz-option";
                                    if (showQuizFeedback) {
                                        if (idx === question.correct) optClass += " correct";
                                        else if (idx === selectedAnswer) optClass += " incorrect";
                                    } else if (idx === selectedAnswer) {
                                        optClass += " selected";
                                    }

                                    return e("div", {
                                        key: idx,
                                        className: optClass,
                                        onClick: () => selectQuizAnswer(idx)
                                    },
                                        e("div", { className: "option-marker" }, String.fromCharCode(65 + idx)),
                                        e("div", { className: "option-text" }, opt)
                                    );
                                })
                            ),
                            showQuizFeedback && e("div", {
                                className: `feedback-box ${selectedAnswer !== question.correct ? "incorrect-feedback" : ""}`
                            },
                                e("div", { className: "feedback-title" },
                                    selectedAnswer === question.correct ? "✓ EXACT" : "✗ PAS TOUT À FAIT"
                                ),
                                e("p", null, question.feedback)
                            ),
                            e("div", { style: { textAlign: "center", marginTop: "25px" } },
                                !showQuizFeedback ?
                                    e("button", {
                                        className: "action-btn",
                                        onClick: validateQuizAnswer,
                                        disabled: selectedAnswer === null
                                    }, "[ VALIDER ]") :
                                    e("button", {
                                        className: "action-btn",
                                        onClick: nextQuizQuestion
                                    }, currentQuiz < quizData.length - 1 ? "[ SUIVANT ]" : "[ NIVEAU 3 ]")
                            )
                        )
                    )
                );
            }

            function renderScenarios() {
                const scenario = scenarioData[currentScenario];

                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, MODULE_TITLE),
                        e("div", { className: "subtitle" }, "Niveau 3 : Défis Pratiques")
                    ),
                    e("div", { className: "progress-bar" },
                        e("div", { className: "progress-node completed" }, "✓"),
                        e("div", { className: "progress-node completed" }, "✓"),
                        e("div", { className: "progress-node active" }, "3")
                    ),
                    e("div", { className: "xp-display" },
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "XP Total"),
                            e("div", { className: "xp-value" }, playerData.xp)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Score"),
                            e("div", { className: "xp-value" }, playerData.score)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Scénario"),
                            e("div", { className: "xp-value" }, `${currentScenario + 1}/${scenarioData.length}`)
                        )
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "⚖️"),
                            e("div", { className: "panel-title" }, scenario.title)
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "scenario-context" }, scenario.context),
                            e("div", { className: "scenario-intro" }, scenario.intro),
                            !showScenarioResult ?
                                e("div", { className: "choices" },
                                    scenario.choices.map((choice, idx) =>
                                        e("button", {
                                            key: idx,
                                            className: "choice-btn",
                                            onClick: () => makeScenarioChoice(idx)
                                        }, choice.text)
                                    )
                                ) :
                                e("div", { className: "choice-result" },
                                    e("p", { style: { marginBottom: "15px" } }, scenario.choices[scenarioChoice].result),
                                    e("div", { className: "impact-score" },
                                        Object.entries(scenario.choices[scenarioChoice].impact).map(([key, val]) =>
                                            e("div", {
                                                key: key,
                                                className: `impact-item ${val > 0 ? "positive" : "negative"}`
                                            }, `${key}: ${val > 0 ? "+" : ""}${val}`)
                                        )
                                    ),
                                    e("div", { style: { textAlign: "center", marginTop: "25px" } },
                                        e("button", {
                                            className: "action-btn",
                                            onClick: nextScenario
                                        }, currentScenario < scenarioData.length - 1 ? "[ SUIVANT ]" : "[ TERMINER ]")
                                    )
                                )
                        )
                    )
                );
            }

            function renderComplete() {
                return e("div", { className: "app-container" },
                    e("div", { className: "completion-screen" },
                        e("div", { className: "completion-icon" }, "✅"),
                        e("h1", { className: "completion-title" }, "MODULE COMPLÉTÉ"),
                        e("p", { className: "completion-subtitle" },
                            `Bravo ${playerData.name} ! Tu connais maintenant les outils modernes.`
                        ),
                        e("div", { className: "stats-grid" },
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.score),
                                e("div", { className: "stat-label" }, "Score Total")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.xp),
                                e("div", { className: "stat-label" }, "XP Gagnés")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.quizScore),
                                e("div", { className: "stat-label" }, "Score Quiz")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.scenarioScore),
                                e("div", { className: "stat-label" }, "Score Scénarios")
                            )
                        ),
                        e("div", { className: "content-panel", style: { marginTop: "30px", textAlign: "left" } },
                            e("div", { className: "panel-header" },
                                e("div", { className: "panel-icon" }, "💡"),
                                e("div", { className: "panel-title" }, "Ce Que Tu As Appris")
                            ),
                            e("div", { className: "panel-body" },
                                e("p", null,
                                    "pHARe et le 3018 appliquent 50 ans de recherche : ", 
                                    e("strong", null, "prévention systémique, protocole national, aide anonyme"), "."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    "Mais avoir de bons outils ne suffit pas. Il faut ", 
                                    e("strong", null, "diffusion massive, formation continue, transformation culturelle"),
                                    ". C'est le défi actuel."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    "Prochain module (CERTIFICATION) : tu vas ", 
                                    e("strong", { style: { color: "var(--history-amber)" } }, "synthétiser tout ton parcours"), 
                                    " et appliquer les leçons de l'histoire aux situations complexes d'aujourd'hui."
                                )
                            )
                        )
                    )
                );
            }

            switch (gameState) {
                case "intro": return renderIntro();
                case "flashcards": return renderFlashcards();
                case "quiz": return renderQuiz();
                case "scenarios": return renderScenarios();
                case "complete": return renderComplete();
                default: return renderIntro();
            }
        }

        ReactDOM.createRoot(document.getElementById("root")).render(e(App));
    </script>
</body>
</html>
