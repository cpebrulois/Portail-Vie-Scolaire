<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Aventure 6e — Prendre des notes efficacement</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--p4:#FB7185;--p4d:#E11D48;--p4bg:#FFF1F2;--p4p:#FFE4E6;--sun:#FFD93D;--sun2:#F59E0B;--gre:#34D399;--gre2:#059669;--ink:#0F172A;--ink2:#334155;--ink3:#64748B;--ink4:#CBD5E1;--wh:#FFFFFF;--rs:10px;--rm:18px;--rl:28px;--sh:0 6px 24px rgba(15,23,42,.12);--ft:'Baloo 2',cursive;--fb:'Nunito',sans-serif;--fm:'Space Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--p4bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 35% at 8% 5%,rgba(251,113,133,.15) 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 92% 15%,rgba(255,217,61,.15) 0%,transparent 65%)}
.app{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:0 16px 64px}
.topnav{display:flex;align-items:center;gap:12px;padding:14px 0 0}
.back{display:inline-flex;align-items:center;gap:6px;background:var(--wh);border:2px solid var(--ink4);border-radius:50px;padding:7px 16px;font-family:var(--ft);font-size:.88rem;font-weight:700;color:var(--ink2);cursor:pointer;text-decoration:none;transition:all .15s}
.back:hover{border-color:var(--p4);color:var(--p4d)}
.crumb{font-size:.8rem;font-weight:700;color:var(--ink3)}
.mhd{text-align:center;padding:28px 20px 20px}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--p4bg);border:2px solid var(--p4);border-radius:50px;padding:6px 18px;font-family:var(--ft);font-size:.85rem;font-weight:800;color:var(--p4d);margin-bottom:14px}
.mtitle{font-family:var(--ft);font-size:clamp(1.8rem,5vw,2.6rem);font-weight:900;line-height:1.15;margin-bottom:8px}
.msub{font-size:1rem;color:var(--ink3);font-weight:600}
.pt{display:flex;align-items:center;padding:0 4px;margin:18px 0 12px}
.ps{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.ps::after{content:'';position:absolute;top:18px;left:calc(50% + 18px);width:calc(100% - 36px);height:3px;background:var(--ink4);z-index:0}
.ps:last-child::after{display:none}
.ps.dn::after{background:var(--gre)}
.pd{width:36px;height:36px;border-radius:50%;border:3px solid var(--ink4);background:var(--wh);display:flex;align-items:center;justify-content:center;font-family:var(--ft);font-weight:800;font-size:.9rem;color:var(--ink3);z-index:1;position:relative;transition:all .3s}
.ps.dn .pd{background:var(--gre);border-color:var(--gre);color:#fff}
.ps.ac .pd{background:var(--sun);border-color:var(--sun2);color:var(--ink);box-shadow:0 0 0 5px rgba(245,158,11,.25);animation:pp 2s infinite}
@keyframes pp{0%,100%{box-shadow:0 0 0 5px rgba(245,158,11,.25)}50%{box-shadow:0 0 0 9px rgba(245,158,11,.1)}}
.pl{font-size:.7rem;font-weight:700;color:var(--ink3);margin-top:5px;text-align:center}
.ps.ac .pl{color:var(--sun2)}.ps.dn .pl{color:var(--gre2)}
.xps{display:flex;gap:10px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
.xpp{display:flex;align-items:center;gap:6px;background:var(--wh);border:2px solid var(--ink4);border-radius:50px;padding:6px 16px;font-family:var(--fm);font-size:.83rem;font-weight:700}
.xpp.hl{border-color:var(--p4);background:var(--p4p);color:var(--p4d)}
.card{background:rgba(255,255,255,.94);border-radius:var(--rl);box-shadow:var(--sh);border:1.5px solid rgba(255,255,255,.9);padding:22px;margin-bottom:14px;animation:fu .35s both}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.qctx{background:rgba(251,113,133,.07);border:1.5px solid rgba(251,113,133,.2);border-radius:var(--rs);padding:9px 14px;margin-bottom:12px;font-size:.9rem;font-weight:600;color:var(--ink2);font-style:italic}
.qtxt{font-family:var(--ft);font-size:1.1rem;font-weight:800;margin-bottom:14px;line-height:1.35}
.qopts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.qopt{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.8);border:2px solid var(--ink4);border-radius:var(--rs);padding:11px 14px;cursor:pointer;font-size:.93rem;font-weight:600;text-align:left;transition:all .15s;font-family:var(--fb)}
.qopt:hover:not(:disabled){border-color:var(--p4);background:var(--p4p)}
.qopt.sel{border-color:var(--p4d);background:var(--p4p)}
.qopt.ok{border-color:var(--gre);background:#DCFCE7;color:var(--gre2)}
.qopt.ko{border-color:#EF4444;background:#FEE2E2;color:#B91C1C}
.qopt:disabled{cursor:default}
.qlbl{width:28px;height:28px;border-radius:7px;background:var(--ink4);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.8rem;font-weight:700;flex-shrink:0;transition:all .15s}
.qopt.sel .qlbl{background:var(--p4d);color:#fff}
.qopt.ok .qlbl{background:var(--gre);color:#fff}
.qopt.ko .qlbl{background:#EF4444;color:#fff}
.qfb{border-radius:var(--rs);padding:12px 14px;margin-bottom:12px;border:2px solid}
.qfb.ok{background:#DCFCE7;border-color:var(--gre)}
.qfb.ko{background:#FEE2E2;border-color:#EF4444}
.qfbt{font-family:var(--ft);font-weight:800;margin-bottom:4px}
.qfbb{font-size:.87rem;line-height:1.5;color:var(--ink2)}
.scctx{background:var(--p4p);border:1.5px solid rgba(251,113,133,.3);border-radius:var(--rm);padding:14px;font-size:.93rem;line-height:1.65;color:var(--ink2);margin-bottom:14px}
.scq{font-family:var(--ft);font-size:1.1rem;font-weight:800;margin-bottom:14px}
.scch{display:flex;flex-direction:column;gap:8px}
.scb{background:var(--wh);border:2px solid var(--ink4);border-radius:var(--rm);padding:12px 16px;text-align:left;cursor:pointer;font-size:.92rem;font-weight:600;transition:all .15s;font-family:var(--fb)}
.scb:hover:not(:disabled){border-color:var(--p4);background:var(--p4p)}
.scr{border-radius:var(--rm);padding:14px;margin-bottom:12px;border:2px solid}
.scr.pos{background:#DCFCE7;border-color:var(--gre)}
.scr.neg{background:#FEE2E2;border-color:#EF4444}
.scr.neu{background:#FFF7ED;border-color:#FCD34D}
.scrt{font-family:var(--ft);font-weight:800;font-size:1rem;margin-bottom:5px}
.scrb{font-size:.9rem;line-height:1.55;color:var(--ink2)}
.sctip{background:rgba(255,255,255,.7);border:1.5px solid rgba(251,113,133,.2);border-radius:var(--rs);padding:8px 12px;margin-top:9px;font-size:.85rem;font-weight:700;color:var(--p4d)}
.scxp{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:.83rem;font-weight:700;border-radius:50px;padding:5px 14px;margin-top:8px}
.scxp.pos{background:#DCFCE7;color:var(--gre2);border:1.5px solid var(--gre)}
.scxp.neg{background:#FEE2E2;color:#B91C1C;border:1.5px solid #EF4444}
.scxp.neu{background:#FFF7ED;color:#92400E;border:1.5px solid #FCD34D}
.bdg{display:inline-flex;align-items:center;gap:10px;border-radius:var(--rm);padding:14px 22px;font-family:var(--ft);font-size:1.1rem;font-weight:800}
.bdg.bronze{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border:2px solid #F59E0B;color:#92400E}
.bdg.silver{background:linear-gradient(135deg,#F1F5F9,#E2E8F0);border:2px solid #94A3B8;color:#475569}
.bdg.gold{background:linear-gradient(135deg,#FFF7ED,#FBBF24);border:2px solid #F59E0B;color:#78350F}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.btn{font-family:var(--ft);font-size:.95rem;font-weight:800;border:none;border-radius:50px;padding:11px 26px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.btnp{background:linear-gradient(135deg,var(--p4),var(--p4d));color:#fff;box-shadow:0 4px 14px rgba(225,29,72,.3)}
.btnp:hover{transform:translateY(-2px)}
.btns{background:var(--wh);border:2px solid var(--ink4);color:var(--ink2)}
.btns:hover{border-color:var(--p4);color:var(--p4d)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;padding:10px 22px;border-radius:50px;font-family:var(--fm);font-size:.85rem;font-weight:700;opacity:0;transition:all .35s;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast"></div>
<div class="app">
<nav class="topnav"><a href="index.html" class="back">← Accueil</a><span class="crumb">📚 Pilier 4 · Module 3/3</span></nav>
<header class="mhd"><div class="chip">📚 Les matières de 6e</div><h1 class="mtitle">Prendre des notes<br>efficacement</h1><p class="msub">Capturer l'essentiel — sans recopier mot à mot</p></header>
<div id="prog"></div><div id="xpb"></div><div id="root"></div>
</div>
<script>
const MID='M4_03',LS='ave6e_progress';
const CONS=[
{num:'01',i:'✂️',bg:'#EFF6FF',bd:'#93C5FD',ht:'#1E40AF',
ti:'Abréger intelligemment',
desc:'Ton prof parle 3 fois plus vite que tu n\'écris. Solution : un système d\'abréviations personnel que TU comprends. Pas besoin que ce soit standard — l\'essentiel c\'est que tu puisses le relire le soir.',
ex:'pcq = parce que / dc = donc / → = entraîne / ≠ = différent / + = plus / bcp = beaucoup / ex: = exemple / déf: = définition / ⚠️ = important. Invente les tiennes !',
tip:'Ton cerveau retient les symboles et abréviations que TU as créés mieux que des codes appris par cœur. Personnalise ton système.'},
{num:'02',i:'📋',bg:'#F0FDF4',bd:'#6EE7B7',ht:'#065F46',
ti:'Structurer visuellement',
desc:'Un cours bien structuré sur la page se retrouve facilement. Titre en haut. Date. Parties numérotées. Retrait pour les sous-points. Ton cahier doit permettre de repérer l\'essentiel en 30 secondes.',
ex:'TITRE DU COURS — 15/09\n1. Idée principale\n  → détail\n  → exemple\n2. Deuxième idée\n  ⚠️ point important\nConclu : ce que je retiens',
tip:'Le futur toi qui révisera te remerciera d\'avoir structuré. Un cahier illisible, c\'est du travail perdu à l\'avance.'},
{num:'03',i:'🔑',bg:'#FFF7ED',bd:'#FCD34D',ht:'#92400E',
ti:'Mots-clés, pas phrases',
desc:'En cours, tu n\'as pas le temps de tout recopier. Et c\'est bien : noter les mots-clés oblige ton cerveau à identifier l\'essentiel en temps réel. C\'est déjà du travail de compréhension.',
ex:'Au lieu de : "La photosynthèse est le processus par lequel les plantes transforment la lumière solaire en énergie chimique"\nÉcris : "photosynth → lumière → énergie chimique (plantes)"',
tip:'Si tu passes plus de temps à écrire qu\'à écouter et comprendre, tes notes ne servent à rien. L\'écoute active passe avant la copie.'},
{num:'04',i:'🎨',bg:'#F5F3FF',bd:'#C4B5FD',ht:'#7C3AED',
ti:'Surligner avec système',
desc:'Un cahier multicolore sans logique ne sert à rien. Un code couleur cohérent, si. Exemples : jaune = définitions importantes / vert = exemples / rose = à mémoriser absolument / bleu = dates ou noms propres.',
ex:'Code à 3 couleurs max (sinon ça devient du coloriage). Décide une fois pour toutes au début de l\'année et tiens-t\'y.',
tip:'Le surlignage après le cours est une étape de relecture active — pas une décoration. Tu dois décider ce qui mérite d\'être surligné.'},
{num:'05',i:'❓',bg:'#FFF1F2',bd:'#FDA4AF',ht:'#B91C1C',
ti:'La zone de questions',
desc:'Réserve une marge ou une zone en bas de page pour tes questions pendant le cours. Quand tu ne comprends pas quelque chose, note "?" avec le mot mystérieux au lieu de décrocher.',
ex:'Marge gauche ou bas de page : "? cellule eucaryote ≠ procaryote" ou "? pourquoi -273°C ?" — à clarifier après le cours ou en début de cours suivant.',
tip:'Poser ses questions en classe, c\'est bien. Mais si tu n\'oses pas sur le moment, la zone de questions garantit que tu ne perds pas le fil.'},
{num:'06',i:'🔄',bg:'#F0FDF4',bd:'#6EE7B7',ht:'#065F46',
ti:'Compléter après le cours',
desc:'Tes notes en classe sont souvent incomplètes — c\'est normal. Prends 5 à 10 minutes le soir même pour relire, compléter les trous, ajouter ce que tu as compris mais pas eu le temps d\'écrire.',
ex:'Le soir : relis tes notes. En rouge ou autre couleur : ajoute les éléments manquants de ta mémoire immédiate. C\'est la première révision espacée — J+0.',
tip:'5 minutes de complétion le soir valent plus que 30 minutes de relecture 2 semaines plus tard. La mémoire est encore fraîche.'}
];
const QUIZ=[
{ctx:'Emma note tout ce que dit le prof en phrases complètes. À la fin du cours, elle a 4 pages. Le prof a continué depuis longtemps quand elle n\'a pas encore fini sa phrase.',
q:'Quel est le problème de la méthode d\'Emma ?',
opts:['Elle n\'écrit pas assez vite — il faut s\'entraîner','Elle passe plus de temps à écrire qu\'à écouter et comprendre','Ses cahiers sont trop petits','Elle devrait utiliser un ordinateur'],
ok:1,xp:25,fb:'Quand tu passes plus de temps à écrire qu\'à écouter, tes notes deviennent une transcription aveugle — sans compréhension. Mots-clés + écoute active = bien plus efficace que copie intégrale.'},
{ctx:'Tom a un code couleur différent pour chaque matière et surligne au moins la moitié de chaque page.',
q:'Quelle est la meilleure utilisation du surlignage ?',
opts:['Surligner le plus possible pour ne rien rater','Un code couleur cohérent à 3 couleurs max avec une logique claire','Surligner uniquement à la maison jamais en classe','Ne jamais surligner, ça distrait'],
ok:1,xp:20,fb:'Un code couleur cohérent transforme le surlignage en outil de révision actif. Trop surligner, c\'est ne rien surligner — si tout est coloré, rien n\'est mis en valeur.'},
{ctx:'Léa ne comprend pas un terme en SVT mais le prof continue. Elle décroche et perd le fil du cours.',
q:'Que devrait faire Léa dans cette situation ?',
opts:['Lever la main immédiatement pour interrompre le prof','Laisser tomber — ce terme n\'est probablement pas important','Noter "?" avec le terme dans une zone de questions, puis clarifier après','Demander à son voisin à voix basse'],
ok:2,xp:20,fb:'La zone de questions permet de maintenir le fil du cours sans décrocher. Tu notes le point flou, tu continues à suivre, et tu clarifies dès que possible — après le cours ou en début de cours suivant.'},
{ctx:'Hugo relit ses notes 3 semaines après le cours pour réviser. Il ne comprend presque rien à ce qu\'il a écrit.',
q:'Quand aurait-il dû compléter ses notes pour éviter ce problème ?',
opts:['Jamais — si on ne comprend pas ses notes, il faut repartir du manuel','Le soir même du cours, pendant que la mémoire est encore fraîche','Le week-end suivant le cours','Une semaine après le cours'],
ok:1,xp:20,fb:'5 à 10 minutes de complétion le soir même sont une première révision espacée (J+0). La mémoire est encore fraîche, les trous se comblent facilement. Attendre 3 semaines, c\'est partir de zéro.'}
];
const SC=[
{ti:'Le cahier catastrophe',ctx:'C\'est la fin du premier trimestre. Mélanie n\'a jamais vraiment "fait" ses cahiers — elle note des bouts de phrases, des mots isolés, des dessins sans légende. Elle ne retrouve rien quand elle révise.',q:'Quelle stratégie lui permettra de récupérer le trimestre ?',
ch:[
{t:'Tout recopier en beau du début — ça prendra le week-end.',r:'Mélanie passe son week-end à recopier. Les cahiers sont propres mais identiques. Elle n\'a rien appris de plus — elle a juste recopié. Et elle a perdu un week-end.',ton:'neg',ico:'⚠️',tip:'Recopier n\'est pas apprendre. Un cahier bien présenté mais mal structuré reste un cahier mal structuré.',xp:-5,lbl:'-5 XP'},
{t:'Restructurer chaque cours avec titres, mots-clés encadrés et questions dans la marge — 15 min par cours.',r:'Mélanie reprend ses cours un par un. Elle identifie les titres, encadre les mots-clés, note ses questions. En une heure, 3 cours sont restructurés. Ce travail est sa première vraie révision.',ton:'pos',ico:'✅',tip:'Restructurer ses notes, c\'est une révision active déguisée. En triant l\'essentiel, ton cerveau travaille vraiment.',xp:40,lbl:'+40 XP'},
{t:'Demander le cahier d\'un camarade et photocopier tout.',r:'Mélanie a les belles notes de son amie. Mais ce sont les notes de son amie — avec sa logique, ses abréviations, ses choix. Difficile à assimiler. Et elle n\'a toujours pas appris à noter.',ton:'neu',ico:'🙂',tip:'Les notes d\'un autre peuvent dépanner ponctuellement, mais ne remplacent pas ta propre structuration. Comprendre les notes de quelqu\'un d\'autre prend presque autant de temps que de refaire les siennes.',xp:10,lbl:'+10 XP'}
]},
{ti:'La prise de notes en SVT',ctx:'Pendant le cours de SVT, le prof parle vite. Lucas essaie de tout noter mais est toujours en retard. Il note la fin d\'une idée quand le prof est déjà à l\'idée suivante.',q:'Quelle adaptation lui permettra de mieux s\'en sortir ?',
ch:[
{t:'Écrire plus vite — s\'entraîner à la vitesse d\'écriture.',r:'Lucas s\'entraîne à écrire vite. Il écrit plus vite mais toujours en phrases complètes. Il est toujours en retard. Et ses notes sont illisibles car écrites trop rapidement.',ton:'neg',ico:'⚠️',tip:'La solution n\'est pas d\'écrire plus vite mais d\'écrire moins — et mieux. Mots-clés + abréviations = liberté.',xp:-5,lbl:'-5 XP'},
{t:'Passer aux mots-clés et abréviations personnelles plutôt que des phrases.',r:'Lucas crée son système : dcq=donc que, → pour "entraîne", ⚠️ pour "important". En 3 jours, il est en avance sur le prof. Il peut écouter, comprendre ET noter en même temps.',ton:'pos',ico:'✅',tip:'Les abréviations personnelles libèrent ton attention. Tu peux simultanément écouter, comprendre et noter — au lieu de choisir entre les trois.',xp:40,lbl:'+40 XP'},
{t:'Enregistrer le cours sur son téléphone et noter plus tard.',r:'Le prof voit le téléphone et rappelle la règle : pas de téléphone en classe sans autorisation explicite. Lucas repart sans notes ET sans enregistrement.',ton:'neg',ico:'⚠️',tip:'L\'utilisation du téléphone en classe est soumise à l\'autorisation de l\'établissement. En cas de doute, ne pas sortir le téléphone.',xp:-10,lbl:'-10 XP'}
]}
];
let S={ph:'intro',ci:0,qi:0,qS:null,qF:false,si:0,sc:null,sr:false,xp:0};
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function gP(){try{return JSON.parse(localStorage.getItem(LS)||'{}')}catch{return{}}}
function save(){const p=gP();if(!Array.isArray(p.modules_done))p.modules_done=[];if(!p.modules_done.includes(MID)){p.modules_done.push(MID);p.xp_total=(p.xp_total||0)+S.xp;localStorage.setItem(LS,JSON.stringify(p));}}
const PHS=[{l:'Intro'},{l:'Conseils'},{l:'Quiz'},{l:'Scénarios'},{l:'Bilan'}];
const PI={intro:0,cards:1,quiz:2,sc:3,fin:4};
function mk(c){const d=document.createElement('div');d.className=c;return d}
function btn(l,c,fn){const b=document.createElement('button');b.className='btn '+c;b.innerHTML=l;if(fn)b.onclick=fn;return b}
function prog(){const d=$('prog');d.innerHTML='';const t=mk('pt');const pi=PI[S.ph]||0;
PHS.forEach((p,i)=>{const s=mk('ps '+(i<pi?'dn':i===pi?'ac':''));s.innerHTML='<div class="pd">'+(i<pi?'✓':i+1)+'</div><div class="pl">'+p.l+'</div>';t.appendChild(s)});d.appendChild(t)}
function xpbar(items){const d=$('xpb');d.innerHTML='';const w=mk('xps');items.forEach(x=>{const p=mk('xpp'+(x.h?' hl':''));p.innerHTML='<span>'+x.i+'</span>'+x.v;w.appendChild(p)});d.appendChild(w)}
function render(){prog();const r=$('root');r.innerHTML='';
if(S.ph==='intro'){xpbar([{i:'⭐',v:S.xp+' XP'}]);intro(r)}
if(S.ph==='cards'){xpbar([{i:'✏️',v:(S.ci+1)+'/'+CONS.length},{i:'⭐',v:S.xp+' XP',h:1}]);cards(r)}
if(S.ph==='quiz'){xpbar([{i:'❓',v:(S.qi+1)+'/'+QUIZ.length},{i:'⭐',v:S.xp+' XP',h:1}]);quiz(r)}
if(S.ph==='sc'){xpbar([{i:'🎯',v:(S.si+1)+'/'+SC.length},{i:'⭐',v:S.xp+' XP',h:1}]);scene(r)}
if(S.ph==='fin'){xpbar([{i:'⭐',v:S.xp+' XP',h:1}]);fin(r)}}
function intro(r){const c=mk('card');
c.innerHTML='<div style="font-size:3.5rem;text-align:center;margin-bottom:10px">✏️</div>'+
'<div style="font-family:var(--ft);font-size:1.5rem;font-weight:900;text-align:center;margin-bottom:10px">Tes notes, ton cerveau</div>'+
'<div style="font-size:.97rem;line-height:1.7;color:var(--ink2);margin-bottom:16px">En CM2, le prof écrivait souvent au tableau et tu avais le temps de copier. En 6e, les profs parlent et toi tu notes. C\'est une compétence nouvelle — et ça s\'apprend.<br><br>Ce module te donne 6 stratégies concrètes pour que tes cahiers deviennent de <strong>vrais outils de révision</strong> — et pas des archives illisibles.</div>'+
'<div style="background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border:2px solid #FCD34D;border-radius:var(--rm);padding:12px 16px;margin-bottom:14px;font-size:.9rem;font-weight:700;color:#92400E">⚠️ Erreur classique : recopier mot à mot tout ce que dit le prof. Résultat : tu écoutes mal, tu comprends peu, et tes notes sont impossibles à réviser.</div>';
const row=mk('row');row.appendChild(btn('Découvrir les 6 conseils ➜','btnp',()=>{S.ph='cards';S.xp+=10;render()}));c.appendChild(row);r.appendChild(c)}
function cards(r){const d=CONS[S.ci];const c=mk('card');
c.innerHTML='<div style="background:'+d.bg+';border:2px solid '+d.bd+';border-radius:var(--rm);padding:16px 18px;margin-bottom:10px">'+
'<div style="font-family:var(--fm);font-size:.75rem;font-weight:700;letter-spacing:1px;color:'+d.ht+';margin-bottom:6px">CONSEIL '+d.num+' '+d.i+'</div>'+
'<div style="font-family:var(--ft);font-size:1.1rem;font-weight:800;color:var(--ink);margin-bottom:8px">'+d.ti+'</div>'+
'<div style="font-size:.92rem;font-weight:600;color:var(--ink2);line-height:1.6;margin-bottom:10px">'+d.desc+'</div>'+
'<div style="background:rgba(255,255,255,.7);border:1.5px solid rgba(255,255,255,.9);border-radius:var(--rs);padding:9px 12px;font-size:.87rem;font-weight:700;color:var(--ink2)">'+
'<div style="font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:'+d.ht+';margin-bottom:4px">Exemple concret</div>'+
'<div style="white-space:pre-line">'+d.ex+'</div></div></div>'+
'<div style="background:rgba(255,255,255,.6);border:1.5px solid var(--ink4);border-radius:var(--rs);padding:8px 12px;font-size:.87rem;font-weight:700;color:var(--p4d)">💡 '+d.tip+'</div>';
r.appendChild(c);
const nav=document.createElement('div');nav.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-top:4px';
const bk=btn('← Préc.','btns',()=>{if(S.ci>0){S.ci--;render()}});if(S.ci===0)bk.disabled=true;
const cnt=document.createElement('span');cnt.style.cssText='font-family:var(--fm);font-size:.85rem;font-weight:700;color:var(--ink3)';cnt.textContent=(S.ci+1)+' / '+CONS.length;
const isL=S.ci===CONS.length-1;
const nx=btn(isL?'Passer au quiz ➜':'Suivant ➜',isL?'btnp':'btns',()=>{if(!isL){S.ci++;S.xp+=7;render()}else{S.ph='quiz';S.xp+=35;render()}});
nav.appendChild(bk);nav.appendChild(cnt);nav.appendChild(nx);r.appendChild(nav)}
function quiz(r){const d=QUIZ[S.qi];const c=mk('card');
if(d.ctx){const cx=mk('qctx');cx.textContent=d.ctx;c.appendChild(cx)}
const qt=mk('qtxt');qt.textContent=d.q;c.appendChild(qt);
const ol=mk('qopts');const val=btn('Valider','btnp',null);val.disabled=true;
d.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='qopt';
b.innerHTML='<span class="qlbl">'+String.fromCharCode(65+i)+'</span><span>'+o+'</span>';
if(S.qF){b.disabled=true;if(i===d.ok)b.classList.add('ok');else if(i===S.qS)b.classList.add('ko')}
else{if(i===S.qS)b.classList.add('sel');b.onclick=()=>{S.qS=i;val.disabled=false;render()}}
ol.appendChild(b)});c.appendChild(ol);
if(S.qF){const fb=mk('qfb '+(S.qS===d.ok?'ok':'ko'));
fb.innerHTML='<div class="qfbt">'+(S.qS===d.ok?'✅ Bonne réponse !':'❌ Pas tout à fait…')+'</div><div class="qfbb">'+d.fb+'</div>';
c.appendChild(fb);const row=mk('row');const isL=S.qi===QUIZ.length-1;
row.appendChild(btn(isL?'Passer aux scénarios ➜':'Question suivante ➜','btnp',()=>{if(isL){S.ph='sc';S.xp+=20;render()}else{S.qi++;S.qS=null;S.qF=false;render()}}));c.appendChild(row)
}else{val.onclick=()=>{if(S.qS===null){toast('Choisis une réponse !');return}S.qF=true;if(S.qS===d.ok)S.xp+=d.xp;render()};
if(S.qS!==null)val.disabled=false;const row=mk('row');row.appendChild(val);c.appendChild(row)}
r.appendChild(c)}
function scene(r){const d=SC[S.si];const c=mk('card');
const ti=document.createElement('div');ti.style.cssText='font-family:var(--ft);font-size:1.1rem;font-weight:900;color:var(--p4d);margin-bottom:8px';ti.textContent='🎯 '+d.ti;c.appendChild(ti);
const cx=mk('scctx');cx.innerHTML=d.ctx;c.appendChild(cx);
const q=mk('scq');q.textContent=d.q;c.appendChild(q);
if(!S.sr){const ch=mk('scch');d.ch.forEach((x,i)=>{const b=document.createElement('button');b.className='scb';b.textContent=x.t;b.onclick=()=>{S.sc=i;S.sr=true;if(x.xp>0)S.xp+=x.xp;render()};ch.appendChild(b)});c.appendChild(ch)
}else{const x=d.ch[S.sc];const res=mk('scr '+x.ton);
res.innerHTML='<div class="scrt">'+x.ico+' Ce qui se passe…</div><div class="scrb">'+x.r+'</div><div class="sctip">💡 '+x.tip+'</div><div class="scxp '+x.ton+'">'+x.ico+' '+x.lbl+'</div>';
c.appendChild(res);const row=mk('row');const isL=S.si===SC.length-1;
row.appendChild(btn(isL?'Voir mon bilan ➜':'Scénario suivant ➜','btnp',()=>{if(isL){S.ph='fin';save();render()}else{S.si++;S.sc=null;S.sr=false;render()}}));c.appendChild(row)}
r.appendChild(c)}
function fin(r){save();let bd,bc;
if(S.xp>=115){bd='🥇 Maître des notes !';bc='gold'}else if(S.xp>=75){bd='🥈 Bonne méthode';bc='silver'}else{bd='🥉 À perfectionner';bc='bronze'}
const c=mk('card');
c.innerHTML='<div style="text-align:center;padding:10px 0 20px">'+
'<div style="font-size:3rem;margin-bottom:12px">✏️</div>'+
'<div style="font-family:var(--ft);font-size:1.5rem;font-weight:900;margin-bottom:8px">Pilier 4 terminé !</div>'+
'<div class="bdg '+bc+'" style="margin:0 auto 16px;display:inline-flex">'+bd+'</div>'+
'<div style="font-family:var(--fm);font-size:1.4rem;font-weight:700;color:var(--p4d);margin-bottom:18px">⭐ '+S.xp+' XP gagnés</div>'+
'<div style="font-size:.95rem;line-height:1.7;color:var(--ink2);max-width:480px;margin:0 auto 22px">Tu connais maintenant les 10 matières, les méthodes de mémorisation, et comment prendre des notes efficacement. <strong>Tu es prêt·e pour la rentrée.</strong></div></div>'+
'<div style="background:linear-gradient(135deg,var(--p4p),#FFF1F2);border:2px solid var(--p4);border-radius:var(--rm);padding:16px;margin-bottom:14px;text-align:center">'+
'<div style="font-size:2rem;margin-bottom:8px">🎉</div>'+
'<div style="font-family:var(--ft);font-weight:900;font-size:1.1rem;color:var(--p4d);margin-bottom:6px">Pilier 4 complet !</div>'+
'<div style="font-size:.9rem;color:var(--ink2)">Tu as exploré les 3 modules du Pilier Matières. Retourne à l\'accueil pour continuer l\'aventure.</div></div>';
const row=mk('row');row.appendChild(btn('🏠 Retour accueil','btnp',()=>location.href='index.html'));c.appendChild(row);r.appendChild(c)}
render();
</script>
</body>
</html>
