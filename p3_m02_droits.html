<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Aventure 6e — Mes droits et mes devoirs</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#EAF6FF;--sun:#FFD93D;--sun-deep:#F59E0B;
  --grass:#34D399;--grass-deep:#059669;
  --violet:#A78BFA;--violet-deep:#7C3AED;--violet-bg:#F5F3FF;--violet-pale:#EDE9FE;
  --coral:#FB7185;--coral-deep:#E11D48;
  --water:#38BDF8;--water-deep:#0284C7;
  --ink:#0F172A;--ink-mid:#334155;--ink-light:#64748B;--ink-faint:#CBD5E1;
  --white:#FFFFFF;
  --p3-color:#A78BFA;--p3-deep:#7C3AED;--p3-bg:#F5F3FF;
  --radius-sm:10px;--radius-md:18px;--radius-lg:28px;
  --shadow-sm:0 2px 8px rgba(15,23,42,.08);--shadow-md:0 6px 24px rgba(15,23,42,.12);
  --font-title:'Baloo 2',cursive;--font-body:'Nunito',sans-serif;--font-mono:'Space Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--violet-bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 35% at 8% 5%,rgba(167,139,250,.18) 0%,transparent 65%),
             radial-gradient(ellipse 50% 40% at 92% 15%,rgba(255,217,61,.15) 0%,transparent 65%),
             radial-gradient(ellipse 55% 55% at 50% 108%,rgba(52,211,153,.12) 0%,transparent 65%)}
.app{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:0 16px 64px}
.topnav{display:flex;align-items:center;gap:12px;padding:14px 0 0}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--white);border:2px solid var(--ink-faint);border-radius:50px;padding:7px 16px;font-family:var(--font-title);font-size:.88rem;font-weight:700;color:var(--ink-mid);cursor:pointer;text-decoration:none;transition:all .15s}
.back-btn:hover{border-color:var(--p3-color);color:var(--p3-deep)}
.module-crumb{font-size:.8rem;font-weight:700;color:var(--ink-light)}
.mod-header{text-align:center;padding:28px 20px 20px}
.pilier-chip{display:inline-flex;align-items:center;gap:7px;background:var(--p3-bg);border:2px solid var(--p3-color);border-radius:50px;padding:6px 18px;font-family:var(--font-title);font-size:.85rem;font-weight:800;color:var(--p3-deep);margin-bottom:14px}
.mod-title{font-family:var(--font-title);font-size:clamp(1.8rem,5vw,2.6rem);font-weight:900;color:var(--ink);line-height:1.15;margin-bottom:8px}
.mod-sub{font-size:1rem;color:var(--ink-light);font-weight:600}
.prog-track{display:flex;align-items:center;padding:0 4px;margin:18px 0 12px}
.prog-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.prog-step::after{content:'';position:absolute;top:18px;left:calc(50% + 18px);width:calc(100% - 36px);height:3px;background:var(--ink-faint);z-index:0}
.prog-step:last-child::after{display:none}
.prog-step.s-done::after{background:var(--grass)}
.prog-dot{width:36px;height:36px;border-radius:50%;border:3px solid var(--ink-faint);background:var(--white);display:flex;align-items:center;justify-content:center;font-family:var(--font-title);font-weight:800;font-size:.9rem;color:var(--ink-light);z-index:1;position:relative;transition:all .3s}
.prog-step.s-done .prog-dot{background:var(--grass);border-color:var(--grass);color:white}
.prog-step.s-active .prog-dot{background:var(--sun);border-color:var(--sun-deep);color:var(--ink);box-shadow:0 0 0 5px rgba(245,158,11,.25);animation:pdot 2s infinite}
@keyframes pdot{0%,100%{box-shadow:0 0 0 5px rgba(245,158,11,.25)}50%{box-shadow:0 0 0 9px rgba(245,158,11,.1)}}
.prog-lbl{font-size:.7rem;font-weight:700;color:var(--ink-light);margin-top:5px;text-align:center}
.prog-step.s-active .prog-lbl{color:var(--sun-deep)}
.prog-step.s-done   .prog-lbl{color:var(--grass-deep)}
.xp-strip{display:flex;gap:10px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
.xp-pill{display:flex;align-items:center;gap:6px;background:var(--white);border:2px solid var(--ink-faint);border-radius:50px;padding:6px 16px;font-family:var(--font-mono);font-size:.83rem;font-weight:700;color:var(--ink);box-shadow:var(--shadow-sm)}
.xp-pill.hl{border-color:var(--p3-color);background:var(--violet-pale);color:var(--p3-deep)}
.fn-card{background:rgba(255,255,255,.94);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);border:1.5px solid rgba(255,255,255,.9);padding:22px 22px 20px;margin-bottom:14px;animation:fu .35s both}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.fn-card-title{font-family:var(--font-title);font-size:1.1rem;font-weight:800;color:var(--ink);margin-bottom:10px}
.fn-counter{font-family:var(--font-mono);font-size:.85rem;font-weight:700;color:var(--ink-light)}
/* CARTE DROITS/DEVOIRS */
.dd-card{border-radius:var(--radius-lg);box-shadow:var(--shadow-md);border-left:5px solid;padding:20px 22px;margin-bottom:14px;animation:fu .35s both}
.dd-tag{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.dd-title{font-family:var(--font-title);font-size:1.05rem;font-weight:800;color:var(--ink);margin-bottom:10px}
.dd-body{font-size:.93rem;line-height:1.7;color:var(--ink-mid)}
.dd-body strong{color:inherit}
.dd-note{border-radius:var(--radius-sm);padding:9px 13px;margin-top:11px;font-size:.87rem;font-weight:700}
/* Balance droits/devoirs visuelle */
.balance-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:520px){.balance-grid{grid-template-columns:1fr}}
.bal-col{border-radius:var(--radius-md);padding:14px;border:2px solid}
.bal-col.droits{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-color:#93C5FD}
.bal-col.devoirs{background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border-color:#FCD34D}
.bal-head{font-family:var(--font-title);font-size:.95rem;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.bal-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.bal-list li{font-size:.85rem;font-weight:600;color:var(--ink-mid);padding-left:18px;position:relative}
.bal-list li::before{content:'→';position:absolute;left:0;color:var(--ink-faint);font-weight:700}
/* RI quote */
.ri-q{background:rgba(167,139,250,.08);border-left:3px solid var(--p3-color);border-radius:0 8px 8px 0;padding:8px 12px;margin:10px 0;font-size:.87rem;font-style:italic;color:var(--ink-mid);font-weight:600}
/* Quiz */
.q-ctx{background:rgba(167,139,250,.08);border:1.5px solid rgba(167,139,250,.2);border-radius:var(--radius-sm);padding:9px 14px;margin-bottom:12px;font-size:.9rem;font-weight:600;color:var(--ink-mid);font-style:italic}
.q-text{font-family:var(--font-title);font-size:1.1rem;font-weight:800;color:var(--ink);margin-bottom:14px;line-height:1.35}
.q-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.q-opt{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.8);border:2px solid var(--ink-faint);border-radius:var(--radius-sm);padding:11px 14px;cursor:pointer;font-size:.93rem;font-weight:600;color:var(--ink);text-align:left;transition:all .15s;font-family:var(--font-body)}
.q-opt:hover:not(:disabled){border-color:var(--p3-color);background:var(--violet-pale)}
.q-opt.sel{border-color:var(--p3-deep);background:var(--violet-pale)}
.q-opt.ok{border-color:var(--grass);background:#DCFCE7;color:var(--grass-deep)}
.q-opt.ko{border-color:#EF4444;background:#FEE2E2;color:#B91C1C}
.q-opt:disabled{cursor:default}
.q-lbl{width:28px;height:28px;border-radius:7px;background:var(--ink-faint);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.8rem;font-weight:700;flex-shrink:0;transition:all .15s}
.q-opt.sel .q-lbl{background:var(--p3-deep);color:#fff}
.q-opt.ok  .q-lbl{background:var(--grass);color:#fff}
.q-opt.ko  .q-lbl{background:#EF4444;color:#fff}
.q-fb{border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px;border:2px solid}
.q-fb.ok{background:#DCFCE7;border-color:var(--grass)}
.q-fb.ko{background:#FEE2E2;border-color:#EF4444}
.q-fb-title{font-family:var(--font-title);font-weight:800;margin-bottom:4px;font-size:.95rem}
.q-fb-body{font-size:.87rem;line-height:1.5}
/* Scénarios */
.sc-ctx{background:var(--violet-pale);border:1.5px solid rgba(167,139,250,.3);border-radius:var(--radius-md);padding:14px;font-size:.93rem;line-height:1.65;color:var(--ink-mid);margin-bottom:14px}
.sc-q{font-family:var(--font-title);font-size:1.1rem;font-weight:800;color:var(--ink);margin-bottom:14px}
.sc-choix{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.sc-btn{background:var(--white);border:2px solid var(--ink-faint);border-radius:var(--radius-md);padding:12px 16px;text-align:left;cursor:pointer;font-size:.92rem;font-weight:600;color:var(--ink);transition:all .15s;font-family:var(--font-body)}
.sc-btn:hover:not(:disabled){border-color:var(--p3-color);background:var(--violet-pale)}
.sc-btn.chosen{border-color:var(--p3-deep);background:var(--violet-pale)}
.sc-res{border-radius:var(--radius-md);padding:14px;margin-bottom:12px;border:2px solid}
.sc-res.pos{background:#DCFCE7;border-color:var(--grass)}
.sc-res.neg{background:#FEE2E2;border-color:#EF4444}
.sc-res.neu{background:#FFF7ED;border-color:var(--sun-deep)}
.sc-res-title{font-family:var(--font-title);font-size:1rem;font-weight:800;margin-bottom:6px}
.sc-res-body{font-size:.88rem;line-height:1.55;margin-bottom:8px}
.sc-tip{font-size:.83rem;font-weight:700;color:var(--p3-deep);background:var(--violet-pale);border-radius:6px;padding:6px 10px}
.sc-tip::before{content:'💡 '}
/* Fin */
.fin-card{text-align:center;padding:16px 20px 20px}
.fin-ico{font-size:3.5rem;margin-bottom:10px}
.fin-title{font-family:var(--font-title);font-size:1.5rem;font-weight:900;color:var(--ink);margin-bottom:6px}
.fin-sub{font-size:.95rem;color:var(--ink-light);font-weight:600;margin-bottom:20px}
.fin-xp{font-family:var(--font-mono);font-size:2rem;font-weight:700;color:var(--p3-deep);margin-bottom:6px}
.fin-badge{display:inline-flex;align-items:center;background:var(--violet-pale);border:2px solid var(--p3-color);border-radius:50px;padding:7px 18px;font-family:var(--font-title);font-size:.88rem;font-weight:800;color:var(--p3-deep);margin-bottom:18px}
/* Boutons */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:50px;padding:12px 26px;font-family:var(--font-title);font-size:.97rem;font-weight:800;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.14);transition:all .15s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 rgba(0,0,0,.14)}
.btn:active{transform:translateY(0);box-shadow:0 2px 0 rgba(0,0,0,.14)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-p3{background:var(--p3-deep);color:#fff}
.btn-sun{background:var(--sun-deep);color:#fff}
.btn-ghost{background:var(--white);color:var(--ink-mid);border:2px solid var(--ink-faint);box-shadow:none}
.btn-ghost:hover{border-color:var(--ink);transform:none}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--ink);color:#fff;padding:11px 26px;border-radius:50px;font-family:var(--font-title);font-weight:700;font-size:.92rem;box-shadow:0 16px 48px rgba(15,23,42,.2);z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:520px){.app{padding:0 12px 48px}.mod-title{font-size:1.8rem}}
</style>
</head>
<body>
<div class="app">
<nav class="topnav">
  <a class="back-btn" href="index_ACCEUIL6e.html">← Hub principal</a>

</nav>
<header class="mod-header">
  <div class="pilier-chip">🤝 La vie en collectivité</div>
  <h1 class="mod-title">Mes droits<br>et mes devoirs</h1>
  <p class="mod-sub">Élève, citoyen, membre d'une communauté</p>
</header>
<div id="prog"></div>
<div id="xpbar"></div>
<div id="root"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const MODULE_ID = 'M3_02';
const MODULE_XP = 130;
const LS_KEY    = 'ave6e_progress';
const NEXT_FILE = 'p3_m03_phare.html';
const NEXT_NAME = 'Quand ça se passe mal — pHARe';

/* ════════════════════════════════════════════════
   NIVEAU 1 — BALANCE DROITS / DEVOIRS
   8 cartes : 4 thèmes, chacune montre les 2 faces
════════════════════════════════════════════════ */
const CARTES = [
  {
    theme:'⚖️ La grande balance', emoji:'⚖️',
    titre:'Droits ET devoirs : les deux font la paire',
    bg:'linear-gradient(135deg,#F5F3FF,#EDE9FE)', border:'#A78BFA',
    corps:`Le collège te garantit des <strong>droits</strong> : apprendre, être respecté(e), t'exprimer, être soigné(e), être écouté(e).\nMais ces droits n'existent que parce que tout le monde respecte ses <strong>devoirs</strong> en parallèle.\nC'est comme une balançoire : si un côté est vide, l'autre tombe.`,
    note:'Un droit sans devoir correspondant, ça n\'existe pas longtemps. Si personne ne respecte ses devoirs, les droits de tout le monde s\'effondrent.',
    ri:'Des droits et des obligations s\'appliquent à chaque membre de la communauté éducative.',
    droits:['Recevoir un enseignement de qualité','Être respecté dans sa personne et ses convictions','S\'exprimer via les délégués'],
    devoirs:['Assister à tous les cours (assiduité)','Respecter les autres et les adultes','Participer activement aux activités']
  },
  {
    theme:'📚 L\'assiduité', emoji:'📚',
    titre:'Droit d\'apprendre → Devoir d\'être là',
    bg:'linear-gradient(135deg,#EFF6FF,#DBEAFE)', border:'#93C5FD',
    corps:`Tu as le <strong>droit</strong> de recevoir un enseignement complet et de qualité. En contrepartie, tu as le <strong>devoir</strong> d'être présent(e) à tous les cours inscrits à ton emploi du temps — sans exception.\nMême les options choisies deviennent obligatoires pour un, deux ou trois ans. Seul le chef d'établissement peut en décider autrement, après entretien avec la famille et le prof.`,
    note:'Un enseignant peut exiger que tu passes un contrôle manqué, même si ton absence était justifiée. Ce n\'est pas une punition — c\'est l\'équité pour tous.',
    ri:'Tous les cours inscrits à l\'emploi du temps sont obligatoires et soumis à un contrôle strict des présences.',
    droits:['Avoir un emploi du temps clair et respecté','Être informé de toute modification d\'EDT','Accéder à la permanence et au CDI si pas cours'],
    devoirs:['Être présent à tous les cours sans exception','Justifier chaque absence auprès du BVS','Rattraper les contrôles manqués si demandé']
  },
  {
    theme:'🗣️ L\'expression', emoji:'🗣️',
    titre:'Droit de parole → Devoir de respect',
    bg:'linear-gradient(135deg,#F0FDF4,#DCFCE7)', border:'#6EE7B7',
    corps:`Tu as le <strong>droit</strong> de t'exprimer collectivement via tes <strong>délégués de classe</strong>, de participer aux clubs et associations, de proposer des initiatives au foyer des élèves.\nMais ce droit s'exerce dans le <strong>respect des règles</strong> : pas d'atteinte à l'enseignement, pas de propos diffamatoires ou injurieux, pas d'affichage sans visa du chef d'établissement.`,
    note:'La liberté d\'expression au collège n\'est pas illimitée. Elle s\'arrête là où commence le droit des autres à ne pas être blessés ou insultés.',
    ri:'Les élèves disposent du droit d\'expression collective et de réunion par l\'intermédiaire de leurs délégués. Ces droits s\'exercent dans le respect des principes de neutralité et de respect d\'autrui.',
    droits:['Élire et être élu délégué de classe','Proposer des initiatives via le foyer des élèves','Participer aux clubs et associations'],
    devoirs:['Respecter les décisions prises collectivement','Ne jamais diffamer ni insulter dans ses prises de parole','Passer par les voies officielles (délégués, CPE)']
  },
  {
    theme:'👕 La tenue et l\'attitude', emoji:'👕',
    titre:'Droit d\'identité → Devoir de décence',
    bg:'linear-gradient(135deg,#FFF7ED,#FEF3C7)', border:'#FCD34D',
    corps:`Tu as le <strong>droit</strong> d'exprimer ta personnalité à travers ta façon de t'habiller. Mais le collège impose une <strong>tenue correcte, propre, décente et adaptée</strong> aux enseignements.\nInterdit : dissimuler son visage, porter des signes religieux ostentatoires (laïcité), les couvre-chefs à l'intérieur des bâtiments.\nObligatoire : une tenue de rechange pour l'EPS.`,
    note:'La laïcité n\'est pas une attaque contre une religion. C\'est la règle qui permet à des élèves de toutes croyances de coexister sur un pied d\'égalité dans un espace commun.',
    ri:'Conformément au principe de laïcité, le port de signes ou de tenues par lesquels les élèves manifestent ostensiblement une appartenance religieuse est interdit.',
    droits:['Exprimer sa personnalité dans sa tenue','Ne pas subir de discrimination liée à son apparence','Être traité(e) de façon égale quelle que soit son origine'],
    devoirs:['Porter une tenue décente et adaptée aux cours','Ôter casquette, bonnet, capuche à l\'entrée des bâtiments','Respecter la neutralité religieuse dans l\'espace scolaire']
  },
  {
    theme:'🔒 La santé et la sécurité', emoji:'🔒',
    titre:'Droit d\'être protégé(e) → Devoir de signaler',
    bg:'linear-gradient(135deg,#FFF1F2,#FFE4E6)', border:'#FDA4AF',
    corps:`Tu as le <strong>droit</strong> d'être soigné(e) et protégé(e) : l'infirmière, la psychologue scolaire, l'assistante sociale et le CPE sont là pour ça. En cas d'accident, sur le trajet ou dans l'établissement, l'équipe prend en charge.\nMais ce droit implique un <strong>devoir de signaler</strong> : tout accident, même bénin, doit être signalé. Les médicaments doivent être déposés à l'infirmerie avec ordonnance.`,
    note:'Signaler un problème de santé ou un incident, ce n\'est pas faire des histoires. C\'est permettre aux adultes de faire leur travail de protection.',
    ri:'L\'élève malade ou blessé se présentera à l\'infirmière lors de ses présences ou au BVS. Tout accident survenu sur le trajet sera signalé par la victime ou un témoin à l\'administration.',
    droits:['Voir l\'infirmière, la psychologue ou l\'assistante sociale','Bénéficier d\'un suivi en cas de maladie chronique','Accéder au fonds social si la famille en a besoin'],
    devoirs:['Signaler tout accident, même sur le trajet','Déposer les médicaments à l\'infirmerie avec ordonnance','Respecter les délais d\'éviction en cas de maladie contagieuse']
  },
  {
    theme:'⚡ Punitions et sanctions', emoji:'⚖️',
    titre:'Comprendre la différence : punition vs sanction',
    bg:'linear-gradient(135deg,#F5F3FF,#F0F0FF)', border:'#C4B5FD',
    corps:`Une <strong>punition scolaire</strong> (excuses, observation, travail supplémentaire, retenue, TIG) répond à un manquement ordinaire. N'importe quel adulte peut la prononcer.\nUne <strong>sanction disciplinaire</strong> (avertissement, blâme, exclusion temporaire ou définitive) répond à un manquement grave ou répété. Seul le chef d'établissement ou le conseil de discipline peut la prononcer.\nLes retenues ont lieu lundi, mardi, jeudi, vendredi de 16h50 à 17h50.`,
    note:'Une faute commise EN DEHORS du collège peut quand même être sanctionnée si elle est liée à ta qualité d\'élève — un message injurieux à un prof, du harcèlement en ligne, une bagarre sur le trajet.',
    ri:'Une faute peut reposer sur des faits commis hors de l\'établissement scolaire s\'ils ne sont pas dissociables de la qualité de l\'élève.',
    droits:['Être informé(e) des raisons de toute sanction','Bénéficier d\'un dialogue avant toute procédure disciplinaire','Avoir ses parents informés de toute punition'],
    devoirs:['Assister aux retenues prononcées','Respecter les décisions du chef d\'établissement','Se comporter en élève même hors de l\'établissement']
  }
];

/* ════════════════════════════════════════════════
   NIVEAU 2 — QUIZ
════════════════════════════════════════════════ */
const QUIZ = [
  {
    ctx:'Youssef a choisi l\'option latin en début d\'année, mais en décembre il décide que c\'est trop difficile et veut arrêter.',
    q:'Peut-il simplement ne plus aller en cours de latin ?',
    opts:['Oui, les options sont facultatives','Non — une option choisie est obligatoire ; seul le chef d\'établissement peut l\'interrompre après un processus précis','Oui s\'il a une note suffisante','Oui avec accord de ses parents par mail'],
    ok:1, xp:25,
    fb:'Une option devient obligatoire dès qu\'elle est choisie, pour 1 à 3 ans. La seule façon de sortir est : entretien avec le prof → courrier de la famille → entretien avec le chef d\'établissement. Arrêter sans procédure = absence injustifiée.'
  },
  {
    ctx:'En cours de SVT, la prof demande d\'utiliser les ordinateurs du CDI. Une élève commence à regarder YouTube.',
    q:'A-t-elle le droit d\'utiliser l\'ordinateur pour YouTube pendant ce cours ?',
    opts:['Oui — c\'est son temps libre','Non — les ordinateurs du CDI nécessitent une explication du travail ; les élèves avec travail numérique ont la priorité, pas les autres','Oui si la prof ne la voit pas','Oui si elle a fini son travail'],
    ok:1, xp:25,
    fb:'Au CDI, les élèves doivent "obligatoirement demander l\'autorisation et expliquer en quoi consiste le travail nécessitant un ordinateur". YouTube n\'est pas un usage autorisé dans ce cadre. Et les élèves ayant du travail numérique de cours ont la priorité absolue.'
  },
  {
    ctx:'Julien, élève de 6e, reçoit une retenue pour oubli de matériel répété. La retenue est fixée au jeudi à 16h50.',
    q:'Si Julien n\'honore pas cette retenue sans explication, que se passe-t-il le lendemain matin ?',
    opts:['Rien — les retenues ne sont pas obligatoires','Il ne sera pas accepté en cours tant que ses parents n\'auront pas expliqué son absence','Il reçoit une deuxième retenue automatiquement','Le CPE l\'appelle en cours de journée'],
    ok:1, xp:30,
    fb:'Le RI est très précis sur ce point : "Tout élève absent à sa retenue ne sera pas accepté en cours le matin suivant, tant que ses parents n\'auront pas expliqué les motifs de son absence." La retenue est une sanction officielle — elle s\'honore.'
  },
  {
    ctx:'Noémie, déléguée de classe, veut afficher un message dans le couloir pour prévenir d\'une pétition.',
    q:'Que doit-elle faire avant d\'afficher ce document ?',
    opts:['Rien — les délégués ont le droit d\'afficher ce qu\'ils veulent','Le faire valider et viser par le chef d\'établissement','Juste demander à son prof principal','Le soumettre au vote de la classe'],
    ok:1, xp:25,
    fb:'Le RI précise : "Les documents affichés doivent avoir été visés par le chef d\'établissement." Ce n\'est pas une censure — c\'est une règle qui garantit que les affichages sont conformes aux valeurs de l\'établissement et ne portent pas atteinte à qui que ce soit.'
  }
];

/* ════════════════════════════════════════════════
   NIVEAU 3 — SCÉNARIOS
════════════════════════════════════════════════ */
const SCENARIOS = [
  {
    titre:'Le délégué en action',
    ctx:'Clara vient d\'être élue déléguée de classe. Plusieurs camarades lui demandent d\'aller dire au CPE que "tous les élèves veulent que la récré dure 30 minutes au lieu de 15". Elle est enthousiaste et décide de convoquer ses camarades dans la cour pendant la pause pour organiser une "manifestation".',
    q:'Clara est-elle dans son droit ? Que devrait-elle faire à la place ?',
    choix:[
      { t:'Organiser la manifestation — c\'est son rôle de défendre les élèves.',
        r:'La "manifestation" perturbe la récré et l\'organisation du collège. Le CPE intervient. Clara reçoit un rappel à l\'ordre et ses droits de délégation sont rappelés à l\'ensemble de la classe.',
        ton:'neg', ico:'⚠️',
        tip:'Organiser une réunion sans l\'accord de l\'administration est hors cadre. Les droits d\'expression des élèves s\'exercent "dans le respect des principes de neutralité et de respect d\'autrui" et ne peuvent pas "porter atteinte aux activités d\'enseignement".',
        impact:-5, lbl:'-5 XP'},
      { t:'Demander au CPE un rendez-vous pour transmettre la demande officiellement au nom de la classe.',
        r:'Le CPE accueille Clara. Elle explique la demande. Il répond que les horaires sont fixés par l\'établissement pour des raisons organisationnelles — mais il prend note et fera remonter la remarque au conseil de classe. Clara a joué son rôle correctement.',
        ton:'pos', ico:'✅',
        tip:'Le rôle du délégué est de transmettre, pas de décider. Le canal officiel (CPE, conseil de classe, conseil d\'établissement) est le seul cadre légitime pour défendre les intérêts des élèves.',
        impact:40, lbl:'+40 XP'},
      { t:'Écrire une pétition et la faire circuler en cours.',
        r:'La pétition circule pendant un cours de maths. Le prof confisque le papier et convoque Clara. Elle explique son intention — le prof comprend, mais lui rappelle que pendant son cours n\'est pas le bon moment.',
        ton:'neu', ico:'😐',
        tip:'L\'intention est bonne, mais le moment et le canal ne le sont pas. Une pétition peut être valide, mais elle doit circuler en dehors des cours et être ensuite soumise aux voies officielles.',
        impact:10, lbl:'+10 XP'}
    ]
  },
  {
    titre:'Le médicament dans le sac',
    ctx:'Amir souffre de migraines. Sa maman lui a mis des comprimés dans son sac "au cas où". En plein cours d\'histoire il se sent mal, sort les comprimés et les prend discrètement. Son voisin le voit et lui dit : "T\'as le droit de faire ça ?"',
    q:'Son voisin a-t-il raison de s\'interroger ?',
    choix:[
      { t:'Non — c\'est son médicament, sa santé, ça ne regarde que lui.',
        r:'Si Amir fait une réaction allergique, personne au collège n\'est au courant de sa prise de médicament. Le personnel soignant, intervenant en urgence, ne sait pas quoi chercher. Sa maman a bien fait attention mais sans passer par la bonne procédure.',
        ton:'neg', ico:'⚠️',
        tip:'Même des médicaments "courants" peuvent interagir avec d\'autres ou provoquer des effets imprévus. L\'infirmière doit être informée pour assurer la sécurité de chaque élève.',
        impact:0, lbl:'±0 XP'},
      { t:'Oui — les médicaments doivent être déposés à l\'infirmerie avec une ordonnance ; c\'est la procédure prévue.',
        r:'Son voisin a raison. Amir aurait dû déposer ses comprimés à l\'infirmerie en début d\'année avec une ordonnance et l\'accord de sa maman. En cas de migraine, il se rend à l\'infirmerie et l\'infirmière lui donne son médicament.',
        ton:'pos', ico:'✅',
        tip:'Ce n\'est pas bureaucratique — c\'est une protection. L\'infirmière peut surveiller la prise, adapter si besoin, et intervenir en connaissance de cause en cas d\'urgence.',
        impact:40, lbl:'+40 XP'},
      { t:'C\'est une zone grise — mieux vaut ne rien dire.',
        r:'Ne rien dire ne protège personne. Si Amir a régulièrement ce problème, la bonne solution reste de régulariser la situation auprès de l\'infirmerie — et son voisin peut gentiment le lui signaler.',
        ton:'neu', ico:'😐',
        tip:'Signaler quelque chose pour protéger quelqu\'un, ce n\'est pas trahir. C\'est le principe même du témoignage positif que le programme pHARe essaie de promouvoir.',
        impact:10, lbl:'+10 XP'}
    ]
  }
];

/* ════════════════════════════════════════════════
   MOTEUR
════════════════════════════════════════════════ */
let S={phase:'intro',cardIdx:0,quizIdx:0,qSel:null,qFb:false,scIdx:0,scChoice:null,scRes:false,xp:0};
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function getP(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}')}catch(e){return{}}}
function finish(){
  const p=getP();
  if(!Array.isArray(p.modules_done))p.modules_done=[];
  if(!p.modules_done.includes(MODULE_ID)){
    p.modules_done.push(MODULE_ID);
    p.xp_total=(p.xp_total||0)+S.xp;
    localStorage.setItem(LS_KEY,JSON.stringify(p));
    window.dispatchEvent(new StorageEvent('storage',{key:LS_KEY}));
  }
}
const PHASES=[{lbl:'Intro'},{lbl:'Droits/Devoirs'},{lbl:'Quiz'},{lbl:'Scénarios'},{lbl:'Bilan'}];
const phaseIdx={intro:0,cards:1,quiz:2,scenarios:3,fin:4};
function buildProg(){
  const d=$('prog');d.innerHTML='';
  const t=document.createElement('div');t.className='prog-track';
  const pi=phaseIdx[S.phase]||0;
  PHASES.forEach((ph,i)=>{
    const s=document.createElement('div');
    s.className='prog-step '+(i<pi?'s-done':i===pi?'s-active':'');
    s.innerHTML=`<div class="prog-dot">${i<pi?'✓':i+1}</div><div class="prog-lbl">${ph.lbl}</div>`;
    t.appendChild(s);
  });
  d.appendChild(t);
}
function buildXPBar(items){
  const d=$('xpbar');d.innerHTML='';
  const s=document.createElement('div');s.className='xp-strip';
  items.forEach(it=>{const p=document.createElement('div');p.className='xp-pill'+(it.hl?' hl':'');p.innerHTML=`<span>${it.ico}</span>${it.val}`;s.appendChild(p)});
  d.appendChild(s);
}
function render(){
  buildProg();
  const r=$('root');r.innerHTML='';
  if(S.phase==='intro')    {buildXPBar([{ico:'⭐',val:S.xp+' XP'}]);buildIntro(r)}
  if(S.phase==='cards')    {buildXPBar([{ico:'⚖️',val:`${S.cardIdx+1}/${CARTES.length}`},{ico:'⭐',val:S.xp+' XP',hl:true}]);buildCards(r)}
  if(S.phase==='quiz')     {buildXPBar([{ico:'❓',val:`${S.quizIdx+1}/${QUIZ.length}`},{ico:'⭐',val:S.xp+' XP',hl:true}]);buildQuiz(r)}
  if(S.phase==='scenarios'){buildXPBar([{ico:'🎭',val:`${S.scIdx+1}/${SCENARIOS.length}`},{ico:'⭐',val:S.xp+' XP',hl:true}]);buildScenario(r)}
  if(S.phase==='fin')      {buildXPBar([{ico:'⭐',val:S.xp+' XP',hl:true}]);buildFin(r)}
}
function mkCard(){const d=document.createElement('div');d.className='fn-card';return d}
function mkRow(){const d=document.createElement('div');d.className='btn-row';return d}
function mkBtn(l,cls,fn){const b=document.createElement('button');b.className='btn '+cls;b.innerHTML=l;if(fn)b.onclick=fn;return b}

function buildIntro(r){
  const c=mkCard();
  c.innerHTML=`
    <div style="font-size:3.5rem;text-align:center;margin-bottom:10px">⚖️</div>
    <div style="font-family:var(--font-title);font-size:1.5rem;font-weight:900;color:var(--ink);text-align:center;margin-bottom:10px">Droits et devoirs — les deux faces d'une même pièce</div>
    <div style="font-size:.97rem;line-height:1.7;color:var(--ink-mid);margin-bottom:18px">
      Au collège, tu n'es pas qu'un élève passif qui obéit à des règles.
      Tu es un <strong>membre à part entière d'une communauté</strong>, avec des droits réels — et des devoirs qui vont avec.<br><br>
      Ce module te montre les deux faces, thème par thème, pour que tu arrives au collège en sachant ce à quoi tu peux prétendre et ce qu'on attend de toi.
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px">
      <div style="display:flex;align-items:flex-start;gap:10px;background:var(--violet-pale);border:1.5px solid rgba(167,139,250,.3);border-radius:var(--radius-md);padding:10px 14px;font-size:.9rem;font-weight:700;color:var(--p3-deep)"><span style="font-size:1.2rem">⚖️</span>Explorer 6 thèmes droits/devoirs tirés du RI</div>
      <div style="display:flex;align-items:flex-start;gap:10px;background:var(--violet-pale);border:1.5px solid rgba(167,139,250,.3);border-radius:var(--radius-md);padding:10px 14px;font-size:.9rem;font-weight:700;color:var(--p3-deep)"><span style="font-size:1.2rem">🧠</span>Tester tes connaissances avec des questions concrètes</div>
      <div style="display:flex;align-items:flex-start;gap:10px;background:var(--violet-pale);border:1.5px solid rgba(167,139,250,.3);border-radius:var(--radius-md);padding:10px 14px;font-size:.9rem;font-weight:700;color:var(--p3-deep)"><span style="font-size:1.2rem">🎭</span>Prendre des décisions dans des situations réelles</div>
    </div>`;
  const br=mkRow();br.appendChild(mkBtn('C\'est parti →','btn-p3',()=>{S.phase='cards';render()}));
  c.appendChild(br);r.appendChild(c);
}

function buildCards(r){
  const data=CARTES[S.cardIdx];
  // Carte principale
  const c=document.createElement('div');
  c.className='dd-card';
  c.style.cssText=`background:${data.bg};border-left-color:${data.border}`;
  c.innerHTML=`
    <div class="dd-tag" style="color:var(--p3-deep)">${data.theme}</div>
    <div class="dd-title">${data.titre}</div>
    <div class="dd-body">${data.corps.replace(/\n/g,'<br>')}</div>
    ${data.ri?`<div class="ri-q">${data.ri}</div>`:''}
    <div class="dd-note" style="background:rgba(255,255,255,.6);border:1.5px solid rgba(167,139,250,.2);color:var(--p3-deep)">💡 ${data.note}</div>`;
  r.appendChild(c);
  // Balance visuelle
  const bal=document.createElement('div');
  bal.className='balance-grid';
  bal.innerHTML=`
    <div class="bal-col droits">
      <div class="bal-head">🟢 Tes droits</div>
      <ul class="bal-list">${data.droits.map(d=>`<li>${d}</li>`).join('')}</ul>
    </div>
    <div class="bal-col devoirs">
      <div class="bal-head">🟡 Tes devoirs</div>
      <ul class="bal-list">${data.devoirs.map(d=>`<li>${d}</li>`).join('')}</ul>
    </div>`;
  r.appendChild(bal);
  // Navigation
  const nav=mkCard();
  const row=mkRow();
  const prev=mkBtn('← Préc','btn-ghost',()=>{S.cardIdx--;render()});
  prev.disabled=S.cardIdx===0;
  const ctr=document.createElement('span');ctr.className='fn-counter';ctr.textContent=`${S.cardIdx+1} / ${CARTES.length}`;
  const isLast=S.cardIdx===CARTES.length-1;
  const next=mkBtn(isLast?'Quiz →':'Suivant →','btn-p3',()=>{
    if(isLast){S.xp+=50;toast('⭐ +50 XP — Droits et devoirs explorés !');S.phase='quiz';S.cardIdx=0;}
    else S.cardIdx++;
    render();
  });
  row.append(prev,ctr,next);nav.appendChild(row);r.appendChild(nav);
}

function buildQuiz(r){
  const q=QUIZ[S.quizIdx];
  const c=mkCard();
  if(q.ctx)c.innerHTML+=`<div class="q-ctx">📌 ${q.ctx}</div>`;
  c.innerHTML+=`<div class="q-text">${q.q}</div>`;
  const ol=document.createElement('div');ol.className='q-opts';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    let cl='q-opt';
    if(S.qFb){if(i===q.ok)cl+=' ok';else if(i===S.qSel)cl+=' ko';}
    else if(i===S.qSel)cl+=' sel';
    b.className=cl;b.disabled=S.qFb;
    b.innerHTML=`<span class="q-lbl">${String.fromCharCode(65+i)}</span>${o}`;
    b.onclick=()=>{if(!S.qFb){S.qSel=i;render()}};
    ol.appendChild(b);
  });
  c.appendChild(ol);
  if(S.qFb){
    const ok=S.qSel===q.ok;
    const fb=document.createElement('div');fb.className='q-fb '+(ok?'ok':'ko');
    fb.innerHTML=`<div class="q-fb-title">${ok?'✅ Exact ! +'+q.xp+' XP':'❌ Pas tout à fait…'}</div><div class="q-fb-body">${q.fb}</div>`;
    c.appendChild(fb);
  }
  const br=mkRow();
  if(!S.qFb){
    const v=mkBtn('Valider','btn-sun',()=>{
      if(S.qSel===q.ok){S.xp+=q.xp;toast('⭐ +'+q.xp+' XP')}
      S.qFb=true;render();
    });v.disabled=S.qSel===null;br.appendChild(v);
  }else{
    br.appendChild(mkBtn(S.quizIdx<QUIZ.length-1?'Question suivante →':'Scénarios →','btn-p3',()=>{
      S.qFb=false;S.qSel=null;
      if(S.quizIdx<QUIZ.length-1)S.quizIdx++;
      else{S.xp+=30;toast('⭐ +30 XP — Quiz terminé !');S.phase='scenarios';}
      render();
    }));
  }
  c.appendChild(br);r.appendChild(c);
}

function buildScenario(r){
  const sc=SCENARIOS[S.scIdx];
  const c=mkCard();
  c.innerHTML+=`<div class="fn-card-title">🎭 ${sc.titre}</div>
    <div class="sc-ctx">${sc.ctx}</div>
    <div class="sc-q">${sc.q}</div>`;
  const bl=document.createElement('div');bl.className='sc-choix';
  sc.choix.forEach((ch,i)=>{
    const b=document.createElement('button');
    b.className='sc-btn'+(S.scChoice===i?' chosen':'');
    b.disabled=S.scRes;b.textContent=ch.t;
    b.onclick=()=>{S.scChoice=i;render()};
    bl.appendChild(b);
  });
  c.appendChild(bl);
  if(S.scRes&&S.scChoice!==null){
    const ch=sc.choix[S.scChoice];
    const res=document.createElement('div');res.className='sc-res '+ch.ton;
    res.innerHTML=`<div class="sc-res-title">${ch.ico} ${ch.lbl}</div>
      <div class="sc-res-body">${ch.r}</div>
      <div class="sc-tip">${ch.tip}</div>`;
    c.appendChild(res);
  }
  const br=mkRow();
  if(!S.scRes){
    const v=mkBtn('Voir la conséquence','btn-sun',()=>{
      if(S.scChoice===null)return;
      const ch=sc.choix[S.scChoice];
      const gain=Math.max(0,ch.impact);
      if(gain>0){S.xp+=gain;toast('⭐ +'+gain+' XP')}
      S.scRes=true;render();
    });v.disabled=S.scChoice===null;br.appendChild(v);
  }else{
    br.appendChild(mkBtn(S.scIdx<SCENARIOS.length-1?'Scénario suivant →':'Bilan →','btn-p3',()=>{
      S.scChoice=null;S.scRes=false;
      if(S.scIdx<SCENARIOS.length-1)S.scIdx++;
      else{finish();S.phase='fin';}
      render();
    }));
  }
  c.appendChild(br);r.appendChild(c);
}

function buildFin(r){
  const c=mkCard();
  let badge='🥉 En route !';
  if(S.xp>=100)badge='🥇 Citoyen averti !';
  else if(S.xp>=70)badge='🥈 Bonne compréhension';
  c.innerHTML=`<div class="fin-card">
    <div class="fin-ico">⚖️</div>
    <div class="fin-title">Module terminé !</div>
    <div class="fin-sub">Tu connais maintenant tes droits ET tes devoirs d'élève au collège Château Rance.</div>
    <div class="fin-xp">⭐ ${S.xp} XP</div>
    <div class="fin-badge">${badge}</div>
    <p style="font-size:.9rem;color:var(--ink-light);font-weight:600;margin-bottom:4px">
      Le prochain module traite d'un sujet sérieux : que faire quand ça se passe mal entre élèves ?
      Le programme pHARe du collège t'apportera des réponses concrètes.
    </p>
  </div>`;
  const br=mkRow();
  br.appendChild(mkBtn('Module suivant : '+NEXT_NAME+' →','btn-p3',()=>location.href=NEXT_FILE));
  br.appendChild(mkBtn('← Hub principal','btn-ghost',()=>location.href='index_ACCEUIL6e.html'));
  c.appendChild(br);r.appendChild(c);
}

render();
</script>
