<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FRATERNITÉ | FRA_VIE04 — Fraternité en actes : construire ensemble</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;600;700&family=Share+Tech+Mono&display=swap');
:root{--bg:#0a0804;--acc:#06b6d4;--acc-d:#0891b2;--text:#fdf6e8;--muted:#9d8060;--border:#2a1a08;--gold:#ffd700}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:32px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% 0%,rgba(6,182,212,0.12) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:rgba(10,8,4,0.93);border:2px solid var(--acc);padding:36px 40px;border-radius:6px;box-shadow:0 0 50px rgba(0,0,0,0.7);backdrop-filter:blur(10px);position:relative;overflow:hidden}
.card::before{content:'FRATERNITÉ';position:absolute;top:-20px;right:-10px;font-family:'Playfair Display';font-size:4.5rem;opacity:0.04;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
.card.gold{border-color:var(--gold);box-shadow:0 0 80px rgba(255,215,0,0.18)}
h1,h2{font-family:'Playfair Display',serif;color:var(--acc);text-align:center;margin-bottom:14px}
h1{font-size:1.55rem}h2{font-size:1.2rem}
.gold h1{color:var(--gold)}
p{line-height:1.75;margin-bottom:12px;color:#e8d8c0}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7}
.tag{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'Share Tech Mono',monospace;margin-bottom:12px;text-align:center}
.cert-tag{font-size:0.65rem;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;font-family:'Share Tech Mono',monospace;margin-bottom:8px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.4);padding:4px 12px;border-radius:20px;font-size:0.7rem;color:#ffd700;font-family:'Share Tech Mono',monospace}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:0.68rem;color:var(--muted);font-family:'Share Tech Mono',monospace}
.btn{background:var(--acc);color:#000;border:none;padding:13px 28px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:4px;font-family:'Montserrat',sans-serif}
.btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.btn.gold-btn{background:linear-gradient(135deg,#b8860b,var(--gold));color:#000}
.progress{height:3px;background:rgba(255,255,255,0.07);margin-bottom:24px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s ease}
.step-tag{font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.22s;border-radius:4px;font-size:0.88rem;line-height:1.5;font-family:'Montserrat',sans-serif}
.opt:hover{background:rgba(255,255,255,0.09);border-color:var(--acc)}
.summary-box{background:rgba(255,255,255,0.03);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.75}
.summary-box p{margin-bottom:8px;font-size:0.85rem;color:#c8b89a}
.seal{text-align:center;font-size:3.5rem;margin:18px 0}
.nav-back{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:3px;font-size:0.7rem;font-family:'Montserrat',sans-serif;font-weight:600;transition:.2s;margin-bottom:18px}
.nav-back:hover{background:rgba(255,255,255,0.09);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.pillar-recap{background:rgba(6,182,212,0.06);border:1px solid rgba(6,182,212,0.25);padding:16px;border-radius:4px;margin:14px 0;font-size:0.83rem;line-height:1.7;color:#a0f0ff}
.master-badge{background:linear-gradient(135deg,rgba(255,215,0,0.08),rgba(6,182,212,0.08));border:1px solid rgba(255,215,0,0.3);padding:14px 20px;border-radius:4px;margin:16px 0;text-align:center;font-family:'Share Tech Mono',monospace;font-size:0.78rem;color:#ffd700;letter-spacing:0.5px}
</style></head>
<body><div id="root"></div>
<script>
const e = React.createElement;
const MODULE_ID = 'FRA_VIE04';
const CERT_KEY  = 'CERT_FRATERNITE_VIE4';
const BACK_URL  = 'index_PIX_FRATERNITE.html';
const CERT_KEYS = ["CERT_FRATERNITE_SOL1","CERT_FRATERNITE_SOL2","CERT_FRATERNITE_SOL3","CERT_FRATERNITE_SOL4","CERT_FRATERNITE_DIS1","CERT_FRATERNITE_DIS2","CERT_FRATERNITE_DIS3","CERT_FRATERNITE_DIS4","CERT_FRATERNITE_VIE1","CERT_FRATERNITE_VIE2","CERT_FRATERNITE_VIE3","CERT_FRATERNITE_VIE4"];

const QUESTIONS = [
  {
    q: "La 'réciprocité généralisée' (Putnam) dans une communauté signifie...",
    a: ["Je fais un service parce que je me souviens d'en avoir reçu un de cette personne", "Je fais un service maintenant sans attendre de retour immédiat, avec la confiance diffuse que le groupe sera là quand j'en aurai besoin", "Je négocie les services rendus pour qu'ils soient équilibrés", "Je réserve mon aide aux personnes qui partagent mes valeurs"],
    c: 1,
    wrong: "La réciprocité généralisée est une des fondations du capital social : on aide sans comptabiliser, avec la confiance que 'ça reviendra d'une façon ou d'une autre'. C'est l'opposé du troc (donnant-donnant immédiat). Elle crée des réseaux de confiance robustes et des communautés résilientes."
  },
  {
    q: "Des études sur les 'expériences de service communautaire' à l'école montrent que leur impact sur les valeurs civiques est maximal quand...",
    a: ["Elles sont obligatoires et longues", "Elles sont volontaires, avec un temps de réflexion structuré sur ce qui a été vécu (Service-Learning)", "Elles sont courtes et ponctuelles pour ne pas épuiser les élèves", "Elles sont imposées comme mesure éducative après un comportement problématique"],
    c: 1,
    wrong: "Le Service-Learning (apprentissage par le service) associe action communautaire ET réflexion structurée. Des études (Billig, 2000) montrent que c'est la combinaison des deux qui produit des effets durables sur les valeurs civiques — pas l'action seule. Sans réflexion, l'expérience reste une anecdote."
  },
  {
    q: "La 'fraternité' dans la devise républicaine française se distingue de la solidarité et de l'égalité parce qu'elle...",
    a: ["Désigne uniquement le lien fraternel au sein de la famille", "Représente la dimension affective et volontaire du lien social — ce qui ne peut pas être imposé par la loi mais seulement choisi", "Est une valeur purement symbolique sans implications pratiques", "Remplace la solidarité quand les institutions sont défaillantes"],
    c: 1,
    wrong: "Liberté et Égalité peuvent être imposées par la loi. La Fraternité, elle, ne le peut pas — c'est le pari que les citoyens libres et égaux choisiront librement de se lier. C'est pourquoi elle est à la fois la plus difficile et la plus précieuse des trois : elle est toujours un acte, jamais un état."
  }
];

const SCENARIO = {
  title: "Le projet Fraternité",
  p: "Ta classe veut lancer un projet concret de fraternité dans le collège. Parmi ces propositions, laquelle a le plus de chances de créer un impact durable sur le vivre-ensemble ?",
  options: [
    {
      text: "Un 'journal des gestes fraternels' partagé et une heure mensuelle où la classe réfléchit collectivement à ce qui s'est passé — ce qui a marché, ce qui n'a pas marché, pourquoi. Le geste seul s'oublie ; la réflexion collective en fait une culture.",
      ok: true,
      fb: ""
    },
    {
      text: "Une journée événement avec des ateliers fraternité, puis on continue normalement.",
      ok: false,
      fb: "Les événements ponctuels ont un impact immédiat mais faible sur la durée. Sans suivi et réflexion régulière, ils restent des expériences isolées. La cohésion se construit dans la répétition et dans la réflexion sur ce qu'on fait."
    },
    {
      text: "Un système de points où les gestes de fraternité sont récompensés.",
      ok: false,
      fb: "La motivation extrinsèque (récompense) tend à supplanter la motivation intrinsèque (valeur). Des études (Deci & Ryan) montrent que récompenser ce qui était fait librement peut en réduire la fréquence une fois la récompense retirée. La fraternité ne se gamifie pas sans se dénaturer."
    }
  ]
};

const SYNTHESIS = [
  {icon:"🔄", t:"Réciprocité généralisée :", v:"Aider sans comptabiliser, avec confiance diffuse. L'inverse du troc. Fondation du capital social résilient."},
  {icon:"💭", t:"Service-Learning :", v:"Geste + réflexion = impact durable. Sans réflexion structurée, l'expérience reste une anecdote."},
  {icon:"🤲", t:"Fraternité = acte choisi :", v:"Ce que la loi ne peut pas imposer. Toujours un choix, jamais un état. La plus fragile et la plus précieuse des trois valeurs républicaines."},
  {icon:"🌱", t:"Cultiver, pas décréter :", v:"La fraternité se construit dans la répétition, la réflexion collective et les petits gestes quotidiens — pas dans les grands événements."}
];

function getPlayer(){return localStorage.getItem('pvs_current_player')||'anonyme';}
function countCerts(){let n=0;CERT_KEYS.forEach(k=>{try{if(localStorage.getItem(k))n++;}catch(ex){}});return n;}
function checkMaster(){return CERT_KEYS.every(k=>{try{return !!localStorage.getItem(k);}catch(ex){return false;}});}
function awardXP(){
  try{
    const raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];
    evts.push({id:'FRA-'+MODULE_ID+'-'+Date.now(),type:'FRATERNITE_PROGRESS',player:getPlayer(),module:MODULE_ID,cpTotal:countCerts(),label:'FRATERNITÉ : Fraternité en actes — construire ensemble',d:new Date().toISOString()});
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  const [step,setStep]=React.useState('intro');
  const [qIdx,setQIdx]=React.useState(0);
  const [isMaster,setIsMaster]=React.useState(false);
  const finish=()=>{
    const cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();
    setIsMaster(checkMaster());
    setStep('complete');
  };
  const goBack=()=>{window.location.href=BACK_URL;};
  const PlayerChip=()=>e('div',{className:'player-chip'},'🎮 ',getPlayer());

  const renderIntro=()=>e('div',{className:'card'},
    e('div',{className:'top-row'},e('button',{className:'nav-back',onClick:goBack},'← Fraternité'),PlayerChip()),
    e('div',{className:'cert-tag'},'⭐ MODULE CERTIFICAT — Vivre-ensemble · 4/4'),
    e('h1',null,"Fraternité en actes : construire ensemble"),
    e('p',{className:'quote'},"« Agis de telle sorte que tu traites l'humanité, aussi bien dans ta personne que dans la personne de tout autre, toujours en même temps comme une fin, et jamais simplement comme un moyen. » — Kant"),
    e('p',null,"On arrive au bout du parcours Fraternité. Ce module de synthèse pose la question centrale : comment passer des valeurs aux actes ? Comment construire concrètement, dans une classe, un collège, une communauté, ce que la devise républicaine appelle Fraternité ?"),
    e('div',{className:'pillar-recap'},
      e('strong',null,"Récapitulatif des 3 piliers :\n"),
      e('br',null),
      "🟠 Solidarité : reconnaître l'interdépendance, agir sans attendre la réciprocité immédiate.",e('br',null),
      "🟣 Discriminations : nommer les injustices, documenter, intervenir en allié·e.",e('br',null),
      "🔵 Vivre-ensemble : comprendre la laïcité, valoriser la diversité, construire du capital social."
    ),
    e('div',{style:{textAlign:'center'}},e('div',{className:'xp-badge'},'⭐ +75 XP CERTIFICAT')),
    e('button',{className:'btn',onClick:()=>setStep('quiz')},"Construire ensemble")
  );

  const renderQuiz=()=>{const q=QUESTIONS[qIdx];const pct=25+Math.round((qIdx/QUESTIONS.length)*30);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Question '+(qIdx+1)+' / '+QUESTIONS.length),
      e('h2',null,q.q),
      q.a.map((opt,i)=>e('button',{key:i,className:'opt',onClick:()=>{if(i===q.c){if(qIdx<QUESTIONS.length-1)setQIdx(qIdx+1);else setStep('scenario');}else alert(q.wrong||'La fraternité a ses conditions. Réessaie.');}},opt))
    );
  };

  const renderScenario=()=>e('div',{className:'card'},
    e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'70%'}})),
    e('div',{className:'step-tag'},'Mise en situation — Projet de classe'),
    e('h2',null,SCENARIO.title),e('p',null,SCENARIO.p),
    SCENARIO.options.map((opt,i)=>e('button',{key:i,className:'opt',onClick:()=>{if(opt.ok)setStep('synthesis');else alert(opt.fb);}},opt.text))
  );

  const renderSynthesis=()=>e('div',{className:'card'},
    e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'88%'}})),
    e('div',{className:'step-tag'},'Synthèse finale'),
    e('h2',null,"Ce qu'il faut retenir"),
    e('div',{className:'summary-box'},SYNTHESIS.map((s,i)=>e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v))),
    e('button',{className:'btn gold-btn',onClick:finish},'🏆 Obtenir le Certificat Vivre-ensemble →')
  );

  const renderComplete=()=>e('div',{className:'card gold'},
    e('div',{className:'seal'},'🏆'),
    e('div',{className:'cert-tag'},'CERTIFICAT PILIER VIVRE-ENSEMBLE'),
    e('h1',null,"Bâtisseur·e de Fraternité !"),
    e('p',{style:{textAlign:'center',fontSize:'0.9rem'}},"Pilier Vivre-ensemble complété — la Fraternité n'est pas un état, c'est toujours un acte choisi."),
    e('div',{style:{textAlign:'center',margin:'8px 0'}},e('div',{className:'xp-badge'},'⭐ +75 XP CERTIFICAT envoyés au Portail')),
    isMaster && e('div',{className:'master-badge'},
      '🌟 FRATERNITÉ MAÎTRISÉE 🌟',e('br',null),
      'Tous les 12 modules complétés — 650 XP débloqués.',e('br',null),
      'Solidarité · Discriminations · Vivre-ensemble'
    ),
    e('button',{className:'btn gold-btn',onClick:goBack},'← Retour au Hub Fraternité')
  );

  switch(step){case 'intro':return renderIntro();case 'quiz':return renderQuiz();case 'scenario':return renderScenario();case 'synthesis':return renderSynthesis();case 'complete':return renderComplete();default:return renderIntro();}
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
