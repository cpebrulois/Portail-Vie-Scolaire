<body><div id="root"></div>

<script>
const { useState } = React; const e = React.createElement;
const MODULE_ID = "VEA_05"; const BACK_URL = "index_PIXHARe.html";

const flashcardsData = [
    { question: "C'est quoi un comportement prosocial ?", hint: "[ Clique pour découvrir ]", answer: "Un comportement prosocial, c'est une action volontaire faite pour aider les autres ou le groupe — sans y être obligé(e). Tenir une porte, défendre quelqu'un, partager, consoler : c'est de la prosocialité.", source: "Psychologie sociale" },
    { question: "Pourquoi le groupe bénéficie-t-il quand chacun agit pour lui ?", hint: "[ Clique pour découvrir ]", answer: "Parce que la confiance mutuelle augmente, les tensions diminuent, et chacun se sent plus en sécurité. Un groupe où les gens s'entraident est plus résilient face aux difficultés.", source: "Collectivité & bien-être, Putnam" },
    { question: "C'est quoi la 'diffusion de la responsabilité' ?", hint: "[ Clique pour découvrir ]", answer: "Quand il y a beaucoup de témoins, chacun pense que <b>quelqu'un d'autre</b> va intervenir. Résultat : personne ne le fait. C'est pour ça qu'on peut voir une scène difficile sans que personne ne réagisse.", source: "Latané & Darley, 1968" },
    { question: "Comment briser la diffusion de la responsabilité ?", hint: "[ Clique pour découvrir ]", answer: "En se sentant <b>personnellement concerné(e)</b>. Quand on dit 'c'est mon rôle d'agir', on brise le phénomène. Même un petit geste change la dynamique de groupe.", source: "Psychologie des témoins" },
    { question: "Agir pour le groupe, c'est sacrifier son propre intérêt ?", hint: "[ Clique pour découvrir ]", answer: "Non. Les études montrent que les personnes prosociales ont souvent un <b>bien-être plus élevé</b>. Aider les autres active le système de récompense du cerveau. Agir pour le groupe, c'est aussi agir pour soi.", source: "Neurosciences de l'altruisme" },
];

const quizData = [
    { question: "Cinq élèves voient un camarade tomber. Personne ne l'aide. C'est le phénomène de :", options: ["La peur du ridicule", "La diffusion de la responsabilité"], correct: 1, feedback: "Oui. Chacun pensait que l'autre allait aider. Briser ce phénomène, c'est décider que tu es celui ou celle qui va agir — même si tu n'es pas obligé(e)." },
    { question: "Selon les études, les gens qui font des actes prosociaux régulièrement ont :", options: ["Moins de bien-être (ils s'épuisent)", "Plus de bien-être en général"], correct: 1, feedback: "Exact. Aider active le circuit de récompense du cerveau. La prosocialité bénéficie à celui qui donne autant qu'à celui qui reçoit." },
];

const scenarioData = {
    context: "Dans la cour, tu vois un élève de ta classe assis seul depuis plusieurs jours. Tes amis n'y prêtent pas attention.",
    intro: "Qu'est-ce que tu fais ?",
    choices: [
        { text: "Je vais le voir, même si c'est un peu inconfortable. Je lui dis juste : 'Tu peux venir avec nous si tu veux.' Je ne force pas — mais je lui montre qu'il n'est pas invisible.", result: "✅ C'est du comportement prosocial concret. Un geste simple qui peut changer beaucoup pour quelqu'un qui se sent seul. Tu brises la diffusion de la responsabilité.", positive: true },
        { text: "Je me dis que c'est pas mon problème — il a qu'à aller vers les autres s'il veut.", result: "⚠️ C'est le raisonnement de la diffusion de la responsabilité. Quelqu'un qui se sent seul n'a pas toujours la force d'aller vers les autres. Un tout petit geste de ta part peut avoir un impact énorme.", positive: false },
    ]
};


function getPlayer(){
    try {
        var u = new URLSearchParams(window.location.search), p = u.get('player');
        if (p && p.length > 2) {
            localStorage.setItem('pvs_current_player', p);
            localStorage.setItem('pvs_phare_player', p);
            return p;
        }
    } catch(ex) {}
    var stored = localStorage.getItem('pvs_current_player')
              || localStorage.getItem('pvs_phare_player')
              || '';
    if (stored) {
        try {
            localStorage.setItem('pvs_current_player', stored);
            localStorage.setItem('pvs_phare_player', stored);
        } catch(ex) {}
    }
    return stored;
}

const PHARE_XP_MAP = {"GROUPE_01":100,"GROUPE_02":100,"GROUPE_03":100,"GROUPE_04":100,"GROUPE_05":100,"GROUPE_06":150,"GROUPE_07":175,"GROUPE_08":200,"GROUPE_09":225,"GROUPE_10":300,"HISTOIRE_01":100,"HISTOIRE_02":100,"HISTOIRE_03":100,"HISTOIRE_04":100,"HISTOIRE_05":100,"HISTOIRE_06":150,"HISTOIRE_07":175,"HISTOIRE_08":200,"HISTOIRE_09":225,"HISTOIRE_10":300,"JURIDIQUE_01":300,"JURIDIQUE_02":375,"JURIDIQUE_03":450,"JURIDIQUE_04":525,"JURIDIQUE_05":625,"JURIDIQUE_06":175,"JURIDIQUE_07":350,"JURIDIQUE_08":400,"JURIDIQUE_09":450,"JURIDIQUE_10":500,"NEURO_01":50,"NEURO_02":100,"NEURO_03":100,"NEURO_04":100,"NEURO_05":100,"NEURO_06":150,"NEURO_07":175,"NEURO_08":200,"NEURO_09":225,"NEURO_10":300,"NUMERIQUE_01":75,"NUMERIQUE_02":100,"NUMERIQUE_03":120,"NUMERIQUE_04":150,"NUMERIQUE_05":200,"NUMERIQUE_06":175,"NUMERIQUE_07":200,"NUMERIQUE_08":225,"NUMERIQUE_09":250,"NUMERIQUE_10":300,"VEA_01":75,"VEA_02":100,"VEA_03":100,"VEA_04":120,"VEA_05":150,"VEA_06":175,"VEA_07":175,"VEA_08":200,"VEA_09":225,"VEA_10":300};
const JDR_XP_MAP = {"CERT_JDR_GROUPE_A1":100,"CERT_JDR_GROUPE_A2":100,"CERT_JDR_GROUPE_A3":100,"CERT_JDR_GROUPE_A4":100,"CERT_JDR_HISTOIRE_A1":100,"CERT_JDR_HISTOIRE_A2":100,"CERT_JDR_HISTOIRE_A3":100,"CERT_JDR_HISTOIRE_A4":100,"CERT_JDR_NEURO_A1":100,"CERT_JDR_NEURO_A2":100,"CERT_JDR_NEURO_A3":100,"CERT_JDR_NEURO_A4":100,"CERT_JDR_NUMERIQUE_A1":100,"CERT_JDR_NUMERIQUE_A2":100,"CERT_JDR_NUMERIQUE_A3":100,"CERT_JDR_NUMERIQUE_A4":100,"CERT_JDR_JURIDIQUE_A1":100,"CERT_JDR_JURIDIQUE_A2":100,"CERT_JDR_JURIDIQUE_A3":100,"CERT_JDR_JURIDIQUE_A4":100};
const METACOG_CERT_KEYS = ["CERT_METACOG_GROUPE_A1","CERT_METACOG_HISTOIRE_A1","CERT_METACOG_JURIDIQUE_A1","CERT_METACOG_NEURO_A1","CERT_METACOG_NUMERIQUE_A1","CERT_METACOG_PROTOCOLE_VALDURNE"];
const VEA_LABEL_MAP = {"VEA_01":"PIX pHARe : Qui suis-je vraiment ?","VEA_02":"PIX pHARe : Mes émotions, mes alliées","VEA_03":"PIX pHARe : Voir avec les yeux de l'autre","VEA_04":"PIX pHARe : Dire ce que je pense sans blesser","VEA_05":"PIX pHARe : Agir pour le groupe"};
const PROTOCOLE_VALDURNE_CERT = 'CERT_PROTOCOLE_VALDURNE_01';
const PROTOCOLE_VALDURNE_METACOG = 'CERT_METACOG_PROTOCOLE_VALDURNE';
const PROTOCOLE_VALDURNE_XP = 150;

function getDonePhareModuleIds(){
    var ids = [];
    try {
        for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('CERT_PHARE_') === 0) ids.push(k.slice('CERT_PHARE_'.length));
        }
    } catch(ex) {}
    return Array.from(new Set(ids));
}

function computeCpTotal(){
    return getDonePhareModuleIds().length;
}

function computeHubXpTotal(){
    var xp = 0;
    getDonePhareModuleIds().forEach(function(id){
        xp += Number(PHARE_XP_MAP[id] || 0);
    });
    Object.keys(JDR_XP_MAP).forEach(function(certKey){
        if (localStorage.getItem(certKey)) xp += Number(JDR_XP_MAP[certKey] || 0);
    });
    METACOG_CERT_KEYS.forEach(function(certKey){
        if (localStorage.getItem(certKey)) xp += 100;
    });
    try {
        var pvc = JSON.parse(localStorage.getItem(PROTOCOLE_VALDURNE_CERT) || 'null');
        if (pvc && pvc.f) xp += Number(pvc.xp || PROTOCOLE_VALDURNE_XP);
    } catch(ex) {}
    if (localStorage.getItem(PROTOCOLE_VALDURNE_METACOG)) xp += 100;
    return xp;
}

function dispatchBridgeStorage(){
    try { window.dispatchEvent(new StorageEvent('storage', { key:'pvs_bridge_events' })); } catch(ex) {}
    try { window.dispatchEvent(new StorageEvent('storage', { key:'CERT_PHARE_' + MODULE_ID })); } catch(ex) {}
}

function awardXP(){
    try {
        var player = getPlayer();
        if (player) {
            localStorage.setItem('pvs_current_player', player);
            localStorage.setItem('pvs_phare_player', player);
        }

        var certPayload = JSON.stringify({
            v:1,
            d:new Date().toISOString(),
            m:MODULE_ID,
            f:true
        });
        localStorage.setItem('CERT_PHARE_' + MODULE_ID, certPayload);

        var done = JSON.parse(localStorage.getItem('pvs_phare_done') || '{}');
        done[MODULE_ID] = true;
        localStorage.setItem('pvs_phare_done', JSON.stringify(done));
        localStorage.setItem('pvs_phare_pending', MODULE_ID);

        var cpTotal = computeCpTotal();
        var hubXpTotal = computeHubXpTotal();
        var evts = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
        evts.push({
            id:'PHARE-' + MODULE_ID + '-' + Date.now(),
            type:'PIXHARE_PROGRESS',
            player:player,
            module:MODULE_ID,
            label:VEA_LABEL_MAP[MODULE_ID] || ('PIX pHARe : ' + MODULE_ID),
            xp:Number(PHARE_XP_MAP[MODULE_ID] || 0),
            cpTotal:cpTotal,
            hubXpTotal:hubXpTotal,
            totalXp:hubXpTotal,
            pixhareXpTotal:hubXpTotal,
            d:new Date().toISOString()
        });
        if (evts.length > 700) evts.splice(0, evts.length - 700);
        localStorage.setItem('pvs_bridge_events', JSON.stringify(evts));
        dispatchBridgeStorage();
    } catch(ex) {
        console.error('VEA bridge failure for ' + MODULE_ID, ex);
    }
}


function App(){
    const [gs,setGs]=useState("intro");const [pn,setPn]=useState(getPlayer());const [cf,setCf]=useState(0);const [ff,setFf]=useState(false);const [cq,setCq]=useState(0);const [sa,setSa]=useState(null);const [sqf,setSqf]=useState(false);const [qs,setQs]=useState(0);const [sc,setSc]=useState(null);const [xp,setXp]=useState(0);
    function goBack(){window.location.href=BACK_URL+(pn?'?player='+encodeURIComponent(pn):'');}
    function nextFC(){if(cf<flashcardsData.length-1){setCf(c=>c+1);setFf(false);setXp(x=>x+10);}else{setGs("quiz");setXp(x=>x+20);}}
    function prevFC(){if(cf>0){setCf(c=>c-1);setFf(false);}}
    function validateQ(){setSqf(true);if(sa===quizData[cq].correct){setQs(s=>s+1);setXp(x=>x+15);}}
    function nextQ(){if(cq<quizData.length-1){setCq(q=>q+1);setSa(null);setSqf(false);}else{setGs("scenario");}}
    function chooseS(i){setSc(i);if(scenarioData.choices[i].positive)setXp(x=>x+20);}
    function finish(){awardXP();setGs("complete");}

    if(gs==="intro")return e('div',{className:'app-container'},
        e('div',{className:'header'},e('div',{className:'pillar-icon'},'🤜'),e('h1',{className:'glitch-title'},'AGIR POUR LE GROUPE'),e('div',{className:'subtitle'},'VEA 05 · Vivre Ensemble Actif'),e('div',{className:'module-badge'},'🤜 MODULE 5/6 · 150 XP')),
        e('div',{className:'xp-display'},e('div',{className:'xp-box'},e('div',{className:'xp-value'},'150'),e('div',{className:'xp-label'},'XP disponibles'))),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'🤜'),e('div',{className:'panel-title'},'Comportements prosociaux')),
        e('div',{className:'panel-body intro-screen'},
            e('p',{style:{lineHeight:1.7,marginBottom:16}},"Un groupe scolaire ne devient pas soudé tout seul. Il le devient parce que des gens décident d'agir — pas parce qu'ils y sont obligés, mais parce qu'ils comprennent que ce qui est bon pour le groupe est aussi bon pour eux."),
            e('p',{style:{lineHeight:1.7,marginBottom:16,color:'#4a6b5a'}},"Ce module explore les comportements prosociaux, la diffusion de la responsabilité, et comment un seul geste peut changer la dynamique d'un groupe entier."),
            e('div',{className:'name-input-group'},e('input',{className:'name-input',type:'text',placeholder:'Ton prénom ou identifiant...',value:pn,onChange:ev=>setPn(ev.target.value)}),e('button',{className:'action-btn',onClick:()=>{if(pn.trim())setGs("flashcards");},disabled:!pn.trim()},'Commencer →')))));

    if(gs==="flashcards"){const card=flashcardsData[cf];return e('div',{className:'app-container'},
        e('div',{className:'header'},e('h1',{className:'glitch-title',style:{fontSize:'1.6rem'}},'FLASHCARDS'),e('div',{className:'subtitle'},cf+1+' / '+flashcardsData.length)),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'🃏'),e('div',{className:'panel-title'},'Prosocialité & cohésion')),
