<style>
:root{--p2:#34D399;--p2d:#059669;--p2bg:#F0FDF4;--p2p:#DCFCE7;--sun:#FFD93D;--sun2:#F59E0B;--gre:#34D399;--gre2:#059669;--ink:#0F172A;--ink2:#334155;--ink3:#64748B;--ink4:#CBD5E1;--wh:#FFFFFF;--rs:10px;--rm:18px;--rl:28px;--sh:0 6px 24px rgba(15,23,42,.12);--ft:'Baloo 2',cursive;--fb:'Nunito',sans-serif;--fm:'Space Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--p2bg);color:var(--ink);min-height:100vh;overflow-x:hidden}

.topnav{display:flex;align-items:center;gap:12px;padding:14px 0 0}

.msub{font-size:1rem;color:var(--ink3);font-weight:600}
.pt{display:flex;align-items:center;padding:0 4px;margin:18px 0 12px}
.ps{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.ps::after{content:'';position:absolute;top:18px;left:calc(50% + 18px);width:calc(100% - 36px);height:3px;background:var(--ink4);z-index:0}
.ps:last-child::after{display:none}
.ps.dn::after{background:var(--gre)}
.pd{width:36px;height:36px;border-radius:50%;border:3px solid var(--ink4);background:var(--wh);display:flex;align-items:center;justify-content:center;font-family:var(--ft);font-weight:800;font-size:.9rem;color:var(--ink3);z-index:1;position:relative;transition:all .3s}

.scr{border-radius:var(--rm);padding:14px;margin-bottom:12px;border:2px solid}
.scr.pos{background:#DCFCE7;border-color:var(--gre)}.scr.neg{background:#FEE2E2;border-color:#EF4444}.scr.neu{background:#FFF7ED;border-color:#FCD34D}

.sctip{background:rgba(255,255,255,.7);border:1.5px solid rgba(52,211,153,.2);border-radius:var(--rs);padding:8px 12px;margin-top:9px;font-size:.85rem;font-weight:700;color:var(--p2d)}
.scxp{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:.83rem;font-weight:700;border-radius:50px;padding:5px 14px;margin-top:8px}
.scxp.pos{background:#DCFCE7;color:var(--gre2);border:1.5px solid var(--gre)}.scxp.neg{background:#FEE2E2;color:#B91C1C;border:1.5px solid #EF4444}.scxp.neu{background:#FFF7ED;color:#92400E;border:1.5px solid #FCD34D}
.bdg{display:inline-flex;align-items:center;gap:10px;border-radius:var(--rm);padding:14px 22px;font-family:var(--ft);font-size:1.1rem;font-weight:800}
.bdg.bronze{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border:2px solid #F59E0B;color:#92400E}
.bdg.silver{background:linear-gradient(135deg,#F1F5F9,#E2E8F0);border:2px solid #94A3B8;color:#475569}
.bdg.gold{background:linear-gradient(135deg,#FFF7ED,#FBBF24);border:2px solid #F59E0B;color:#78350F}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.btn{font-family:var(--ft);font-size:.95rem;font-weight:800;border:none;border-radius:50px;padding:11px 26px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.btnp{background:linear-gradient(135deg,var(--p2),var(--p2d));color:#fff;box-shadow:0 4px 14px rgba(5,150,105,.3)}
.btnp:hover{transform:translateY(-2px)}
.btns{background:var(--wh);border:2px solid var(--ink4);color:var(--ink2)}
.btns:hover{border-color:var(--p2);color:var(--p2d)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;padding:10px 22px;border-radius:50px;font-family:var(--fm);font-size:.85rem;font-weight:700;opacity:0;transition:all .35s;z-index:999}

<header class="mhd"><div class="chip">🗺️ Les lieux du collège</div><h1 class="mtitle">Les lieux de<br>vie quotidienne</h1><p class="msub">Cour, réfectoire, casiers — les endroits où tu passeras le plus de temps</p></header>

<script>
const MID='M2_02',NF='p2_m03_apprentissage.html',NN='Les lieux d\'apprentissage',LS='ave6e_progress';

const CUSTOM_LIEUX_IMAGES = {
  cour_principale: [
    'cour_principale.jpg',
    'cour.jpg',
    'cour_college.jpg'
  ],
  refectoire: [
    'refectoire.jpg',
    'cantine.jpg',
    'restaurant_scolaire.jpg'
  ],
  casiers: [
    'casiers.jpg',
    'casiers_eleves.jpg'
  ],
  salle_permanence: [
    'salle_permanence.jpg',
    'permanence.jpg',
    'etude.jpg',
    'salle_etude.jpg'
  ],
  foyer_eleves: [
    'foyer_eleves.jpg',
    'foyer.jpg',
    'salle_detente.jpg'
  ]
};

const ASSET_DIRS = ['', 'assets_6e/', 'assets_college/', 'images/', 'img/'];
const ASSET_EXTS = ['.jpeg', '.jpg', '.png', '.webp'];

function uniqueList(items){
  const seen = new Set();
  return items.filter(function(item){
    if(!item || seen.has(item)) return false;
    seen.add(item);
    return true;
  });
}

function normalizeAssetCandidates(values){
  return uniqueList((values || []).map(function(value){
    return String(value || '').trim();
  }).filter(Boolean));
}

function buildAssetSources(keys){
  const refs = Array.isArray(keys) ? keys : [keys];
  const out = [];
  refs.forEach(function(key){
    normalizeAssetCandidates(CUSTOM_LIEUX_IMAGES[key] || []).forEach(function(candidate){
      out.push(candidate);
    });
    if(typeof key !== 'string') return;
    if(key.indexOf('.') >= 0 || key.indexOf('/') >= 0){
      out.push(key);
      return;
    }
    ASSET_DIRS.forEach(function(dir){
      ASSET_EXTS.forEach(function(ext){
        out.push(dir + key + ext);
      });
    });
  });
  return uniqueList(out);
}

// ── PHOTOS RÉFÉRENCÉES ──────────────────────────────────────

//   casiers.jpeg           — rangée de casiers élèves

//   foyer_eleves.jpeg      — foyer / salle de détente élèves si existant
// ────────────────────────────────────────────────────────────

const LIEUX=[
  {imgs:buildAssetSources(['cour_principale']),caption:'Cour principale — espace de récréation',ico:'🏃',
   titre:'La cour principale',
   desc:'C\'est ici que tu passes les récréations et les intercours. Elle est divisée en zones informelles — avec le temps tu repéreras les habitudes de chacun. Les surveillants (AED) y sont présents en permanence.',
   tip:'Le premier jour, observe avant de t\'installer quelque part. Les espaces dans la cour s\'organisent naturellement — rien de figé, mais ça aide de repérer avant.'},
  {imgs:buildAssetSources(['refectoire']),caption:'Réfectoire — service par demi-pension',ico:'🍽️',
   titre:'Le réfectoire',
   desc:'Les élèves prioritaires mangent en premier. Puis, chaque jour, un niveau différent passe en premier au réfectoire. Repère bien l\'ordre de passage affiché pour savoir quand te présenter.',
   tip:'Ta carte de demi-pensionnaire est indispensable. En cas d\'oubli, signale-le immédiatement à la vie scolaire — il existe une procédure pour les oublis ponctuels.'},
  {imgs:buildAssetSources(['casiers']),caption:'Casiers élèves — couloir principal',ico:'🔑',
   titre:'Ton casier',
   desc:'Chaque élève dispose d\'un casier personnel pour alléger son sac en cours de journée. Tu dois apporter ton propre cadenas à clé et veiller à ne pas perdre cette clé.',
   tip:'Ton casier reste sous ta responsabilité. N\'ouvre pas ton cadenas pour d\'autres élèves et garde toujours ta clé en lieu sûr.'},
  {imgs:buildAssetSources(['salle_permanence']),caption:'Salle de permanence — travail et étude',ico:'📚',
   titre:'La salle de permanence',
   desc:'Quand tu as une heure de cours sans prof (heure de permanence), tu vas en salle de permanence sous la surveillance d\'un AED. On y travaille en silence — c\'est le lieu pour avancer sur les devoirs.',
   tip:'La permanence n\'est pas une récréation. Les AED en charge peuvent noter les comportements dans le carnet de liaison.'},
  {imgs:buildAssetSources(['foyer_eleves']),caption:'Foyer élèves — espace de détente',ico:'🎮',
   titre:'Le foyer élèves',
   desc:'Le foyer est un espace de détente ouvert sur le temps méridien. Il est surveillé par nos partenaires du Local Jeunes.',
   tip:'Le foyer est un privilège, pas un droit automatique. Son accès peut être conditionné par le comportement général.'}
];

const QUIZ=[
  {ctx:'Emma est demi-pensionnaire. À la cantine, elle réalise qu\'elle a oublié sa carte de demi-pensionnaire dans son casier.',
   q:'Que doit faire Emma ?',
   opts:['Faire la queue quand même et expliquer au serveur','Rentrer chez elle pour le repas','Signaler l\'oubli à la vie scolaire avant le service — il existe une procédure','Demander à un camarade de payer à sa place'],
   ok:2,xp:25,
   fb:'Il y a toujours une procédure pour les oublis ponctuels de carte. Mais il faut le signaler AVANT — pas après avoir été refusé à l\'entrée.'},
  {ctx:'Tom a heure de permanence. Il pense que c\'est comme une récréation supplémentaire.',
   q:'Qu\'est-ce que la salle de permanence ?',
   opts:['Une récréation encadrée','Un temps libre où on peut jouer','Un lieu de travail et d\'étude sous surveillance AED','La salle où on va quand on est puni'],
   ok:2,xp:20,
   fb:'La permanence est un temps de travail. C\'est l\'occasion idéale pour avancer sur ses devoirs — et les AED notent les comportements qui peuvent être reportés dans le carnet de liaison.'},
  {ctx:'Lucas a reçu la combinaison de son casier. Son ami la lui demande pour y ranger ses affaires en attendant.',
   q:'Lucas devrait-il prêter sa combinaison ?',
   opts:['Oui, entre amis c\'est normal de s\'entraider','Non — le casier est personnel et la combinaison ne se prête pas','Oui, mais uniquement pendant 5 minutes','Seulement si l\'AED est d\'accord'],
   ok:1,xp:20,
   fb:'Le casier est placé sous ta responsabilité. Ce qui s\'y trouve te concerne — et si quelque chose disparaît ou pose problème dans un casier dont tu as partagé la combinaison, c\'est toi qui en réponds.'}
];

const SC=[
  {ti:'La récré du premier jour',
   ctx:'C\'est la première récréation. Hugo ne connaît personne. Il voit des groupes déjà formés un peu partout dans la cour. Il ne sait pas où aller.',
   q:'Quelle est la meilleure attitude d\'Hugo ?',
   ch:[
     {t:'Rester contre un mur et attendre que quelqu\'un vienne lui parler.',
      r:'Hugo passe les 15 minutes seul contre le mur. La récré suivante, il fait pareil. Au bout d\'une semaine, les groupes sont formés et il est de plus en plus difficile d\'y entrer.',
      ton:'neg',ico:'⚠️',tip:'Attendre que les autres fassent le premier pas, ça peut durer longtemps. L\'initiative, même simple, change tout.',
      xp:-5,lbl:'-5 XP'},
     {t:'Observer d\'abord, puis s\'approcher d\'un groupe en cours de récré pour se présenter.',
      r:'Hugo observe 3 minutes. Il repère un groupe qui discute calmement. Il s\'approche, se présente. La conversation démarre naturellement. Il ne sera pas seul longtemps.',
      ton:'pos',ico:'✅',tip:'Observer avant d\'agir, puis prendre l\'initiative de se présenter — c\'est la méthode qui fonctionne. Pas besoin de grands discours : "Salut, je m\'appelle Hugo, tu es en quelle classe ?" suffit.',
      xp:40,lbl:'+40 XP'},
     {t:'Rentrer dans la salle de permanence pour éviter le stress de la cour.',
      r:'Hugo va en permanence. L\'AED lui demande s\'il a une raison d\'être là. Il explique. L\'AED lui conseille de retourner en cour — la permanence est réservée aux heures sans cours.',
      ton:'neu',ico:'🙂',tip:'La permanence n\'est pas un refuge pour éviter la cour. Mais parler à l\'AED était une bonne idée — ils peuvent aider à trouver des solutions.',
      xp:5,lbl:'+5 XP'}
   ]},
  {ti:'Le casier introuvable',
   ctx:'Léa cherche son casier depuis 10 minutes. Elle a le numéro sur son carnet mais elle ne trouve pas le bon couloir. La sonnerie va bientôt sonner.',
   q:'Que fait Léa ?',
   ch:[
     {t:'Continuer à chercher seule jusqu\'à trouver, même si elle arrive en retard.',
      r:'Léa rate la sonnerie. Elle arrive en cours 8 minutes après. Le prof note le retard. Le lendemain, un AED lui montre en 30 secondes où est son couloir.',
      ton:'neg',ico:'⚠️',tip:'Demander de l\'aide immédiatement coûte 30 secondes. Chercher seul peut coûter 20 minutes.',
      xp:-5,lbl:'-5 XP'},
     {t:'Demander à l\'AED le plus proche de l\'aider à localiser son casier.',
      r:'Léa interpelle l\'AED de permanence dans le couloir. Il lui montre le bon couloir en 30 secondes. Elle a le temps de prendre ses affaires et d\'arriver en cours avant la sonnerie.',
      ton:'pos',ico:'✅',tip:'Demander de l\'aide n\'est pas une faiblesse — c\'est exactement pour ça que les AED sont là dans les couloirs. N\'hésite pas.',
      xp:40,lbl:'+40 XP'},
     {t:'Aller en cours sans ses affaires et expliquer au prof.',
      r:'Le prof comprend. Léa va récupérer ses affaires à la récré suivante. Ce n\'est pas catastrophique — mais aller en cours sans son matériel est évitable avec un peu d\'aide.',
      ton:'neu',ico:'🙂',tip:'Prévenir le prof en avance est toujours mieux qu\'arriver sans rien sans explication.',
      xp:15,lbl:'+15 XP'}
   ]}
];

let S={ph:'intro',ci:0,qi:0,qS:null,qF:false,si:0,sc:null,sr:false,xp:0};
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function gP(){try{return JSON.parse(localStorage.getItem(LS)||'{}')}catch{return{}}}
function save(){const p=gP();if(!Array.isArray(p.modules_done))p.modules_done=[];if(!p.modules_done.includes(MID)){p.modules_done.push(MID);p.xp_total=(p.xp_total||0)+S.xp;localStorage.setItem(LS,JSON.stringify(p));window.dispatchEvent(new StorageEvent('storage',{key:LS}));}}
const PHS=[{l:'Intro'},{l:'Lieux'},{l:'Quiz'},{l:'Scénarios'},{l:'Bilan'}];
const PI={intro:0,cards:1,quiz:2,sc:3,fin:4};
function mk(c){const d=document.createElement('div');d.className=c;return d}
function btn(l,c,fn){const b=document.createElement('button');b.className='btn '+c;b.innerHTML=l;if(fn)b.onclick=fn;return b}
function prog(){const d=$('prog');d.innerHTML='';const t=mk('pt');const pi=PI[S.ph]||0;
PHS.forEach((p,i)=>{const s=mk('ps '+(i<pi?'dn':i===pi?'ac':''));s.innerHTML='<div class="pd">'+(i<pi?'✓':i+1)+'</div><div class="pl">'+p.l+'</div>';t.appendChild(s)});d.appendChild(t)}
function xpbar(items){const d=$('xpb');d.innerHTML='';const w=mk('xps');items.forEach(x=>{const p=mk('xpp'+(x.h?' hl':''));p.innerHTML='<span>'+x.i+'</span>'+x.v;w.appendChild(p)});d.appendChild(w)}
function photo(sources,cap){
  const candidates=Array.isArray(sources)?sources.slice():[sources];
  const w=mk('photo-wrap');
  const img=document.createElement('img');
  let idx=0;
  img.alt=cap;
  function loadNext(){
    if(idx>=candidates.length){
      w.innerHTML='<div class="photo-placeholder"><div class="ico">📷</div><div class="txt">'+(candidates[0]||'image-manquante')+'</div></div>';
      return;
    }
    img.src=candidates[idx];
  }
  img.onerror=function(){
    idx+=1;
    loadNext();
  };
  w.appendChild(img);
  loadNext();
  const c=mk('photo-caption');
  c.textContent=cap;
  return[w,c]
}
function render(){prog();const r=$('root');r.innerHTML='';
if(S.ph==='intro'){xpbar([{i:'⭐',v:S.xp+' XP'}]);intro(r)}
if(S.ph==='cards'){xpbar([{i:'🗺️',v:(S.ci+1)+'/'+LIEUX.length},{i:'⭐',v:S.xp+' XP',h:1}]);cards(r)}
if(S.ph==='quiz'){xpbar([{i:'❓',v:(S.qi+1)+'/'+QUIZ.length},{i:'⭐',v:S.xp+' XP',h:1}]);quiz(r)}
if(S.ph==='sc'){xpbar([{i:'🎯',v:(S.si+1)+'/'+SC.length},{i:'⭐',v:S.xp+' XP',h:1}]);scene(r)}
if(S.ph==='fin'){xpbar([{i:'⭐',v:S.xp+' XP',h:1}]);fin(r)}}
function intro(r){const c=mk('card');
const[pw,pc]=photo(buildAssetSources(['cour_principale']),'La cour — cœur de vie du collège');
c.appendChild(pw);c.appendChild(pc);
c.innerHTML+='<div style="font-family:var(--ft);font-size:1.3rem;font-weight:900;margin-bottom:8px">Les lieux où tu vivras vraiment</div>'+
'<div style="font-size:.95rem;line-height:1.7;color:var(--ink2);margin-bottom:14px">Cours, réfectoire, casiers, permanence — ce sont les lieux que tu fréquenteras chaque jour. Connaître leur fonctionnement évite des surprises.</div>';
const row=mk('row');row.appendChild(btn('Explorer les lieux ➜','btnp',()=>{S.ph='cards';S.xp+=10;render()}));c.appendChild(row);r.appendChild(c)}
function cards(r){const d=LIEUX[S.ci];const c=mk('card');
const[pw,pc]=photo(d.imgs||d.img,d.caption);c.appendChild(pw);c.appendChild(pc);
const zc=mk('zone-card');
zc.innerHTML='<div class="zone-title">'+d.ico+' '+d.titre+'</div><div class="zone-desc">'+d.desc+'</div><div class="zone-tip">💡 '+d.tip+'</div>';
c.appendChild(zc);r.appendChild(c);
const nav=document.createElement('div');nav.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-top:4px';
const bk=btn('← Préc.','btns',()=>{if(S.ci>0){S.ci--;render()}});if(S.ci===0)bk.disabled=true;
const cnt=document.createElement('span');cnt.style.cssText='font-family:var(--fm);font-size:.85rem;font-weight:700;color:var(--ink3)';cnt.textContent=(S.ci+1)+' / '+LIEUX.length;
const isL=S.ci===LIEUX.length-1;
const nx=btn(isL?'Passer au quiz ➜':'Suivant ➜',isL?'btnp':'btns',()=>{if(!isL){S.ci++;S.xp+=6;render()}else{S.ph='quiz';S.xp+=25;render()}});
nav.appendChild(bk);nav.appendChild(cnt);nav.appendChild(nx);r.appendChild(nav)}
function quiz(r){const d=QUIZ[S.qi];const c=mk('card');
if(d.ctx){const cx=mk('qctx');cx.textContent=d.ctx;c.appendChild(cx)}
const qt=mk('qtxt');qt.textContent=d.q;c.appendChild(qt);
const ol=mk('qopts');const val=btn('Valider','btnp',null);val.disabled=true;
d.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='qopt';
b.innerHTML='<span class="qlbl">'+String.fromCharCode(65+i)+'</span><span>'+o+'</span>';
if(S.qF){b.disabled=true;if(i===d.ok)b.classList.add('ok');else if(i===S.qS)b.classList.add('ko')}
else{if(i===S.qS)b.classList.add('sel');b.onclick=()=>{S.qS=i;val.disabled=false;render()}}
ol.appendChild(b)});c.appendChild(ol);
if(S.qF){const fb=mk('qfb '+(S.qS===d.ok?'ok':'ko'));
fb.innerHTML='<div class="qfbt">'+(S.qS===d.ok?'✅ Bonne réponse !':'❌ Pas tout à fait…')+'</div><div class="qfbb">'+d.fb+'</div>';
c.appendChild(fb);const row=mk('row');const isL=S.qi===QUIZ.length-1;
row.appendChild(btn(isL?'Passer aux scénarios ➜':'Question suivante ➜','btnp',()=>{if(isL){S.ph='sc';S.xp+=15;render()}else{S.qi++;S.qS=null;S.qF=false;render()}}));c.appendChild(row)
}else{val.onclick=()=>{if(S.qS===null){toast('Choisis une réponse !');return}S.qF=true;if(S.qS===d.ok)S.xp+=d.xp;render()};
if(S.qS!==null)val.disabled=false;const row=mk('row');row.appendChild(val);c.appendChild(row)}
r.appendChild(c)}
function scene(r){const d=SC[S.si];const c=mk('card');
const ti=document.createElement('div');ti.style.cssText='font-family:var(--ft);font-size:1.1rem;font-weight:900;color:var(--p2d);margin-bottom:8px';ti.textContent='🎯 '+d.ti;c.appendChild(ti);
const cx=mk('scctx');cx.innerHTML=d.ctx;c.appendChild(cx);
const q=mk('scq');q.textContent=d.q;c.appendChild(q);
if(!S.sr){const ch=mk('scch');d.ch.forEach(x=>{const b=document.createElement('button');b.className='scb';b.textContent=x.t;b.onclick=()=>{S.sc=d.ch.indexOf(x);S.sr=true;if(x.xp>0)S.xp+=x.xp;render()};ch.appendChild(b)});c.appendChild(ch)
}else{const x=d.ch[S.sc];const res=mk('scr '+x.ton);
res.innerHTML='<div class="scrt">'+x.ico+' Ce qui se passe…</div><div class="scrb">'+x.r+'</div><div class="sctip">💡 '+x.tip+'</div><div class="scxp '+x.ton+'">'+x.ico+' '+x.lbl+'</div>';
c.appendChild(res);const row=mk('row');const isL=S.si===SC.length-1;
row.appendChild(btn(isL?'Voir mon bilan ➜':'Scénario suivant ➜','btnp',()=>{if(isL){S.ph='fin';save();render()}else{S.si++;S.sc=null;S.sr=false;render()}}));c.appendChild(row)}
r.appendChild(c)}
function fin(r){save();let bd,bc;
if(S.xp>=100){bd='🥇 Expert des lieux !';bc='gold'}else if(S.xp>=65){bd='🥈 Bon repérage';bc='silver'}else{bd='🥉 À explorer encore';bc='bronze'}
const c=mk('card');
c.innerHTML='<div style="text-align:center;padding:10px 0 20px">'+
'<div style="font-size:3rem;margin-bottom:12px">🍽️</div>'+
'<div style="font-family:var(--ft);font-size:1.5rem;font-weight:900;margin-bottom:8px">Module terminé !</div>'+
'<div class="bdg '+bc+'" style="margin:0 auto 16px;display:inline-flex">'+bd+'</div>'+
'<div style="font-family:var(--fm);font-size:1.4rem;font-weight:700;color:var(--p2d);margin-bottom:18px">⭐ '+S.xp+' XP gagnés</div>'+
'<div style="font-size:.95rem;line-height:1.7;color:var(--ink2);max-width:480px;margin:0 auto 22px">Tu connais les lieux de vie quotidienne. Le module suivant t\'emmène dans les espaces d\'apprentissage : salles de cours, CDI, laboratoire de sciences.</div></div>'+
'<div style="background:var(--p2p);border:1.5px solid rgba(52,211,153,.3);border-radius:var(--rm);padding:14px;margin-bottom:14px">'+
'<div style="font-family:var(--ft);font-weight:800;color:var(--p2d);margin-bottom:6px">👉 Module suivant</div>'+
'<div style="font-size:.9rem;color:var(--ink2)">'+NN+' — salles de cours, CDI, labo sciences, salle de sport.</div></div>';
const row=mk('row');row.appendChild(btn('Module suivant ➜','btnp',()=>location.href=NF));row.appendChild(btn('🏠 Accueil','btns',()=>location.href='index.html'));c.appendChild(row);r.appendChild(c)}
render();
</script>
</body>
</html>
