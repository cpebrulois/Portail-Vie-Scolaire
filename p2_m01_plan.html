<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Aventure 6e — Plan général</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--p2:#34D399;--p2d:#059669;--p2bg:#F0FDF4;--p2p:#DCFCE7;--sun:#FFD93D;--sun2:#F59E0B;--gre:#34D399;--gre2:#059669;--ink:#0F172A;--ink2:#334155;--ink3:#64748B;--ink4:#CBD5E1;--wh:#FFFFFF;--rs:10px;--rm:18px;--rl:28px;--sh:0 6px 24px rgba(15,23,42,.12);--ft:'Baloo 2',cursive;--fb:'Nunito',sans-serif;--fm:'Space Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--p2bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 35% at 8% 5%,rgba(52,211,153,.15) 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 92% 15%,rgba(255,217,61,.12) 0%,transparent 65%)}
.app{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:0 16px 64px}
.topnav{display:flex;align-items:center;gap:12px;padding:14px 0 0}
.back{display:inline-flex;align-items:center;gap:6px;background:var(--wh);border:2px solid var(--ink4);border-radius:50px;padding:7px 16px;font-family:var(--ft);font-size:.88rem;font-weight:700;color:var(--ink2);cursor:pointer;text-decoration:none;transition:all .15s}
.back:hover{border-color:var(--p2);color:var(--p2d)}
.crumb{font-size:.8rem;font-weight:700;color:var(--ink3)}
.mhd{text-align:center;padding:28px 20px 20px}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--p2bg);border:2px solid var(--p2);border-radius:50px;padding:6px 18px;font-family:var(--ft);font-size:.85rem;font-weight:800;color:var(--p2d);margin-bottom:14px}
.mtitle{font-family:var(--ft);font-size:clamp(1.8rem,5vw,2.6rem);font-weight:900;line-height:1.15;margin-bottom:8px}
.msub{font-size:1rem;color:var(--ink3);font-weight:600}
.pt{display:flex;align-items:center;padding:0 4px;margin:18px 0 12px}
.ps{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.ps::after{content:'';position:absolute;top:18px;left:calc(50% + 18px);width:calc(100% - 36px);height:3px;background:var(--ink4);z-index:0}
.ps:last-child::after{display:none}
.ps.dn::after{background:var(--gre)}
.pd{width:36px;height:36px;border-radius:50%;border:3px solid var(--ink4);background:var(--wh);display:flex;align-items:center;justify-content:center;font-family:var(--ft);font-weight:800;font-size:.9rem;color:var(--ink3);z-index:1;position:relative;transition:all .3s}
.ps.dn .pd{background:var(--gre);border-color:var(--gre);color:#fff}
.ps.ac .pd{background:var(--sun);border-color:var(--sun2);color:var(--ink);box-shadow:0 0 0 5px rgba(245,158,11,.25);animation:pp 2s infinite}
@keyframes pp{0%,100%{box-shadow:0 0 0 5px rgba(245,158,11,.25)}50%{box-shadow:0 0 0 9px rgba(245,158,11,.1)}}
.pl{font-size:.7rem;font-weight:700;color:var(--ink3);margin-top:5px;text-align:center}
.ps.ac .pl{color:var(--sun2)}.ps.dn .pl{color:var(--gre2)}
.xps{display:flex;gap:10px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
.xpp{display:flex;align-items:center;gap:6px;background:var(--wh);border:2px solid var(--ink4);border-radius:50px;padding:6px 16px;font-family:var(--fm);font-size:.83rem;font-weight:700}
.xpp.hl{border-color:var(--p2);background:var(--p2p);color:var(--p2d)}
.card{background:rgba(255,255,255,.94);border-radius:var(--rl);box-shadow:var(--sh);border:1.5px solid rgba(255,255,255,.9);padding:22px;margin-bottom:14px;animation:fu .35s both}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.photo-wrap{border-radius:var(--rm);overflow:hidden;margin-bottom:14px;background:var(--p2p);border:2px solid rgba(52,211,153,.3);min-height:180px;display:flex;align-items:center;justify-content:center;position:relative}
.photo-wrap img{width:100%;height:100%;object-fit:cover;display:block;border-radius:calc(var(--rm) - 2px)}
.photo-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;padding:32px;color:var(--p2d);opacity:.6}
.photo-placeholder .ico{font-size:2.5rem}
.photo-placeholder .txt{font-family:var(--fm);font-size:.75rem;font-weight:700}
.photo-caption{font-size:.8rem;font-weight:700;color:var(--ink3);text-align:center;margin-top:-8px;margin-bottom:12px;font-family:var(--fm)}
.zone-card{background:var(--p2p);border:2px solid rgba(52,211,153,.3);border-radius:var(--rm);padding:14px 16px;margin-bottom:10px}
.zone-title{font-family:var(--ft);font-size:1rem;font-weight:800;color:var(--p2d);margin-bottom:6px}
.zone-desc{font-size:.9rem;font-weight:600;color:var(--ink2);line-height:1.55}
.zone-tip{font-size:.83rem;font-weight:700;color:var(--p2d);margin-top:6px;padding-top:6px;border-top:1px solid rgba(52,211,153,.25)}
.qctx{background:rgba(52,211,153,.08);border:1.5px solid rgba(52,211,153,.25);border-radius:var(--rs);padding:9px 14px;margin-bottom:12px;font-size:.9rem;font-weight:600;color:var(--ink2);font-style:italic}
.qtxt{font-family:var(--ft);font-size:1.1rem;font-weight:800;margin-bottom:14px;line-height:1.35}
.qopts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.qopt{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.8);border:2px solid var(--ink4);border-radius:var(--rs);padding:11px 14px;cursor:pointer;font-size:.93rem;font-weight:600;text-align:left;transition:all .15s;font-family:var(--fb)}
.qopt:hover:not(:disabled){border-color:var(--p2);background:var(--p2p)}
.qopt.sel{border-color:var(--p2d);background:var(--p2p)}
.qopt.ok{border-color:var(--gre);background:#DCFCE7;color:var(--gre2)}
.qopt.ko{border-color:#EF4444;background:#FEE2E2;color:#B91C1C}

.qlbl{width:28px;height:28px;border-radius:7px;background:var(--ink4);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.8rem;font-weight:700;flex-shrink:0;transition:all .15s}
.qopt.sel .qlbl{background:var(--p2d);color:#fff}
.qopt.ok .qlbl{background:var(--gre);color:#fff}
.qopt.ko .qlbl{background:#EF4444;color:#fff}
.qfb{border-radius:var(--rs);padding:12px 14px;margin-bottom:12px;border:2px solid}
.qfb.ok{background:#DCFCE7;border-color:var(--gre)}
.qfb.ko{background:#FEE2E2;border-color:#EF4444}
.qfbt{font-family:var(--ft);font-weight:800;margin-bottom:4px}
.qfbb{font-size:.87rem;line-height:1.5;color:var(--ink2)}
.scctx{background:var(--p2p);border:1.5px solid rgba(52,211,153,.3);border-radius:var(--rm);padding:14px;font-size:.93rem;line-height:1.65;color:var(--ink2);margin-bottom:14px}
.scq{font-family:var(--ft);font-size:1.1rem;font-weight:800;margin-bottom:14px}
.scch{display:flex;flex-direction:column;gap:8px}
.scb{background:var(--wh);border:2px solid var(--ink4);border-radius:var(--rm);padding:12px 16px;text-align:left;cursor:pointer;font-size:.92rem;font-weight:600;transition:all .15s;font-family:var(--fb)}
.scb:hover:not(:disabled){border-color:var(--p2);background:var(--p2p)}
.scr{border-radius:var(--rm);padding:14px;margin-bottom:12px;border:2px solid}
.scr.pos{background:#DCFCE7;border-color:var(--gre)}
.scr.neg{background:#FEE2E2;border-color:#EF4444}
.scr.neu{background:#FFF7ED;border-color:#FCD34D}
.scrt{font-family:var(--ft);font-weight:800;font-size:1rem;margin-bottom:5px}
.scrb{font-size:.9rem;line-height:1.55;color:var(--ink2)}
.sctip{background:rgba(255,255,255,.7);border:1.5px solid rgba(52,211,153,.2);border-radius:var(--rs);padding:8px 12px;margin-top:9px;font-size:.85rem;font-weight:700;color:var(--p2d)}
.scxp{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:.83rem;font-weight:700;border-radius:50px;padding:5px 14px;margin-top:8px}
.scxp.pos{background:#DCFCE7;color:var(--gre2);border:1.5px solid var(--gre)}
.scxp.neg{background:#FEE2E2;color:#B91C1C;border:1.5px solid #EF4444}
.scxp.neu{background:#FFF7ED;color:#92400E;border:1.5px solid #FCD34D}
.bdg{display:inline-flex;align-items:center;gap:10px;border-radius:var(--rm);padding:14px 22px;font-family:var(--ft);font-size:1.1rem;font-weight:800}
.bdg.bronze{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border:2px solid #F59E0B;color:#92400E}
.bdg.silver{background:linear-gradient(135deg,#F1F5F9,#E2E8F0);border:2px solid #94A3B8;color:#475569}
.bdg.gold{background:linear-gradient(135deg,#FFF7ED,#FBBF24);border:2px solid #F59E0B;color:#78350F}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.btn{font-family:var(--ft);font-size:.95rem;font-weight:800;border:none;border-radius:50px;padding:11px 26px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.btnp{background:linear-gradient(135deg,var(--p2),var(--p2d));color:#fff;box-shadow:0 4px 14px rgba(5,150,105,.3)}
.btnp:hover{transform:translateY(-2px)}
.btns{background:var(--wh);border:2px solid var(--ink4);color:var(--ink2)}
.btns:hover{border-color:var(--p2);color:var(--p2d)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;padding:10px 22px;border-radius:50px;font-family:var(--fm);font-size:.85rem;font-weight:700;opacity:0;transition:all .35s;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<body>
<div id="toast"></div>
<div class="app">
<nav class="topnav"><a href="index.html" class="back">← Accueil</a><span class="crumb">🗺️ Pilier 2 · Module 1/4</span></nav>
<header class="mhd"><div class="chip">🗺️ Les lieux du collège</div><h1 class="mtitle">Plan général —<br>je me repère</h1><p class="msub">Bâtiments, cours, accès — tout voir avant d'arriver</p></header>
<div id="prog"></div><div id="xpb"></div><div id="root"></div>
</div>
<script>
const MID='M2_01',NF='p2_m02_lieux_vie.html',NN='Les lieux de vie quotidienne',LS='ave6e_progress';

const CUSTOM_ZONE_IMAGES = {
  plan_general: [
    'plan_general.jpg',
    'p2_m01_plan.jpg',
    'pr\u00e9sentation coll\u00e8ge.png',
    'presentation_college.png'
  ],
  entree_principale: [
    'entree_principale.jpg'
  ],
  acces_bus: [
    'acces_bus.jpg',
    'portail_bus.jpg',
    'entree_bus.jpg'
  ],
  acces_velo: [
    'acces_velo.jpg'
  ]
};

const ASSET_DIRS = ['', 'assets_6e/', 'assets_college/', 'images/', 'img/'];
const ASSET_EXTS = ['.jpeg', '.jpg', '.png', '.webp'];

function uniqueList(items){
  const seen = new Set();
  return items.filter(function(item){
    if(!item || seen.has(item)) return false;
    seen.add(item);
    return true;
  });
}

function normalizeAssetCandidates(values){
  return uniqueList((values || []).map(function(value){
    return String(value || '').trim();
  }).filter(Boolean));
}

function buildAssetSources(keys){
  const refs = Array.isArray(keys) ? keys : [keys];
  const out = [];
  refs.forEach(function(key){
    normalizeAssetCandidates(CUSTOM_ZONE_IMAGES[key] || []).forEach(function(candidate){
      out.push(candidate);
    });
    if(typeof key !== 'string') return;
    if(key.indexOf('.') >= 0 || key.indexOf('/') >= 0){
      out.push(key);
      return;
    }
    ASSET_DIRS.forEach(function(dir){
      ASSET_EXTS.forEach(function(ext){
        out.push(dir + key + ext);
      });
    });
  });
  return uniqueList(out);
}

// ── PHOTOS RÉFÉRENCÉES ──────────────────────────────────────
// Fichiers attendus dans le même dossier que ce HTML :
//   plan_general.jpeg     — vue aérienne ou plan masse du collège
//   entree_principale.jpeg — portail / hall d'entrée
//   acces_bus.jpeg        — zone dépôt bus / portail bus
//   acces_velo.jpeg       — parking vélos / entrée piétons
// ────────────────────────────────────────────────────────────

const ZONES = [
  { imgs:buildAssetSources(['plan_general']), caption:'Plan général — Château Rance', ico:'🗺️',
    titre:'Vue d\'ensemble', bg:'#F0FDF4', bd:'#6EE7B7', ht:'#065F46',
    desc:'Le collège Château Rance est organisé en plusieurs zones distinctes : les bâtiments d\'enseignement, les espaces de vie (cour, réfectoire), et les accès séparés selon les modes d\'arrivée.',
    tip:'La première semaine, tu te perdras. C\'est normal et tout le monde est passé par là. En 3 jours, tu connaîtras tout par cœur.'},
  { imgs:buildAssetSources(['entree_principale']), caption:'Entrée principale — hall d\'accueil', ico:'🚪',
    titre:'Entrée principale', bg:'#F0FDF4', bd:'#6EE7B7', ht:'#065F46',
    desc:'C\'est par ici que passent les élèves demi-pensionnaires et externes chaque matin. La loge de surveillance est juste à l\'entrée — c\'est là qu\'on signale un retard, une sortie anticipée, ou qu\'on récupère un objet trouvé.',
    tip:'Si tu arrives en retard, tu dois obligatoirement passer par la loge avant de rejoindre ta classe.'},
  { imgs:buildAssetSources(['acces_bus','entree_principale']), caption:'Portail bus — arrivée et départ cars', ico:'🚌',
    titre:'Accès cars scolaires', bg:'#F0FDF4', bd:'#6EE7B7', ht:'#065F46',
    desc:'Les élèves qui prennent le car ont leur propre zone d\'attente et un portail dédié. Les cars arrivent et repartent à des horaires précis — dès la première semaine, note bien les tiens.',
    tip:'Le car n\'attend pas. Si tu rates le départ, préviens immédiatement la vie scolaire pour qu\'ils contactent tes parents.'},
  { imgs:buildAssetSources(['acces_velo']), caption:'Parking vélos / accès piétons', ico:'🚲',
    titre:'Accès vélos et piétons', bg:'#F0FDF4', bd:'#6EE7B7', ht:'#065F46',
    desc:'Les élèves qui viennent à vélo ou à pied utilisent l\'accès piéton. Le parking vélos est couvert — tu peux attacher ton vélo avec ton propre cadenas.',
    tip:'Un vélo non attaché = un vélo qui peut disparaître. Investis dans un bon cadenas avant la rentrée.'}
];

const QUIZ = [
  { ctx:'Tom arrive en retard le premier matin. Il a honte et veut directement aller en classe sans s\'arrêter.',
    q:'Que doit-il faire en arrivant en retard ?',
    opts:['Aller directement en classe pour déranger le moins possible','Passer obligatoirement par la loge avant de rejoindre sa classe','Attendre devant la porte jusqu\'à la récréation','Appeler ses parents depuis la cour'],
    ok:1, xp:25,
    fb:'Tout retard doit être signalé à la loge de surveillance. Le surveillant te donnera un billet de passage pour entrer en classe sans que le prof refuse l\'accès.'},
  { ctx:'Léa prend le car scolaire. Le premier jour, elle ne sait pas où attendre.',
    q:'Où se retrouvent les élèves qui prennent le car ?',
    opts:['Devant l\'entrée principale avec tout le monde','Dans la zone d\'attente cars, portail dédié','Dans la cour principale','Devant le réfectoire'],
    ok:1, xp:20,
    fb:'Les élèves cars ont leur propre zone d\'attente et portail. Repère-la dès le premier jour — notamment pour savoir où aller attendre le soir.'},
  { ctx:'Hugo vient à vélo. Il se demande s\'il peut laisser son vélo n\'importe où dans la cour.',
    q:'Où et comment garer son vélo au collège ?',
    opts:['N\'importe où dans la cour — il y a de la surveillance','Au parking vélos couvert avec son propre cadenas','Contre le mur de la salle de gym','Les vélos ne sont pas autorisés au collège'],
    ok:1, xp:20,
    fb:'Le parking vélos est couvert et sécurisé — mais c\'est à toi d\'apporter un cadenas. Un vélo non attaché peut disparaître même dans une enceinte scolaire.'}
];

const SC = [
  { ti:'Premier jour, premier tour',
    ctx:'Emma arrive le premier matin. Elle ne reconnaît personne. Elle ne sait pas où est sa classe ni où déposer son sac pour aller au réfectoire plus tard.',
    q:'Quelle est la meilleure stratégie pour Emma ?',
    ch:[
      { t:'Errer seule en espérant tomber sur sa classe.',
        r:'Emma passe 20 minutes à tourner en rond. Elle arrive en retard en classe et rate les premières informations importantes données par le professeur principal.',
        ton:'neg', ico:'⚠️', tip:'Le premier matin, chaque minute compte. Un plan même approximatif vaut mieux que l\'improvisation totale.',
        xp:-5, lbl:'-5 XP'},
      { t:'Repérer d\'abord la loge, demander sa classe, puis identifier les zones clés.',
        r:'Emma s\'arrête à la loge. En 2 minutes, elle a le numéro de sa salle et une indication pour le réfectoire. Elle arrive à l\'heure et commence la journée sereinement.',
        ton:'pos', ico:'✅', tip:'La loge est le point d\'information n°1. Les AED et surveillants sont là exactement pour ça — pas la peine d\'errer seule.',
        xp:40, lbl:'+40 XP'},
      { t:'Suivre un groupe d\'élèves qui semblent savoir où ils vont.',
        r:'Le groupe que suit Emma est en 5e et va dans un autre couloir. Elle réalise son erreur et doit faire demi-tour. Elle arrive quand même à l\'heure, mais stressée.',
        ton:'neu', ico:'🙂', tip:'Suivre les autres peut aider — mais vérifier d\'abord qu\'ils vont au même endroit.',
        xp:15, lbl:'+15 XP'}
    ]},
  { ti:'Le car raté',
    ctx:'Lucas sort du collège à 17h. Il a traîné en classe, discuté avec un copain. Il arrive à la zone cars… le car est parti depuis 3 minutes.',
    q:'Que fait Lucas maintenant ?',
    ch:[
      { t:'Rentrer chez lui à pied même si c\'est loin.',
        r:'Lucas commence à marcher. Ses parents ne savent pas où il est. Une heure plus tard, ses parents paniqués appellent le collège — mais c\'est fermé.',
        ton:'neg', ico:'⚠️', tip:'Partir sans prévenir personne quand il y a un problème de transport, c\'est la pire option. Toujours prévenir un adulte en premier.',
        xp:-10, lbl:'-10 XP'},
      { t:'Retourner immédiatement à la vie scolaire pour prévenir et appeler ses parents.',
        r:'Lucas revient à la loge. La surveillante appelle ses parents qui viennent le chercher. Tout le monde sait où il est — pas de panique.',
        ton:'pos', ico:'✅', tip:'Dès qu\'il y a un problème de transport, la vie scolaire est le premier réflexe. Ils ont les contacts des parents et les protocoles pour gérer ça.',
        xp:40, lbl:'+40 XP'},
      { t:'Appeler ses parents depuis son téléphone dans la cour.',
        r:'Lucas appelle. Ses parents viennent le chercher. C\'est une bonne décision — mais il aurait dû prévenir la vie scolaire aussi pour qu\'ils sachent qu\'il est encore dans l\'enceinte.',
        ton:'neu', ico:'🙂', tip:'Appeler ses parents c\'est bien — ET prévenir la vie scolaire que tu attends, c\'est encore mieux.',
        xp:20, lbl:'+20 XP'}
    ]}
];

let S={ph:'intro',ci:0,qi:0,qS:null,qF:false,si:0,sc:null,sr:false,xp:0};
const $=id=>document.getElementById(id);
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function gP(){try{return JSON.parse(localStorage.getItem(LS)||'{}')}catch{return{}}}
function save(){const p=gP();if(!Array.isArray(p.modules_done))p.modules_done=[];if(!p.modules_done.includes(MID)){p.modules_done.push(MID);p.xp_total=(p.xp_total||0)+S.xp;localStorage.setItem(LS,JSON.stringify(p));window.dispatchEvent(new StorageEvent('storage',{key:LS}));}}
const PHS=[{l:'Intro'},{l:'Zones'},{l:'Quiz'},{l:'Scénarios'},{l:'Bilan'}];
const PI={intro:0,cards:1,quiz:2,sc:3,fin:4};
function mk(c){const d=document.createElement('div');d.className=c;return d}
function btn(l,c,fn){const b=document.createElement('button');b.className='btn '+c;b.innerHTML=l;if(fn)b.onclick=fn;return b}
function prog(){const d=$('prog');d.innerHTML='';const t=mk('pt');const pi=PI[S.ph]||0;
PHS.forEach((p,i)=>{const s=mk('ps '+(i<pi?'dn':i===pi?'ac':''));s.innerHTML='<div class="pd">'+(i<pi?'✓':i+1)+'</div><div class="pl">'+p.l+'</div>';t.appendChild(s)});d.appendChild(t)}
function xpbar(items){const d=$('xpb');d.innerHTML='';const w=mk('xps');items.forEach(x=>{const p=mk('xpp'+(x.h?' hl':''));p.innerHTML='<span>'+x.i+'</span>'+x.v;w.appendChild(p)});d.appendChild(w)}
function photo(sources,caption){
  const candidates=Array.isArray(sources)?sources.slice():[sources];
  const wrap=mk('photo-wrap');
  const img=document.createElement('img');
  let idx=0;
  img.alt=caption;
  function loadNext(){
    if(idx>=candidates.length){
      wrap.innerHTML='<div class="photo-placeholder"><div class="ico">📷</div><div class="txt">'+(candidates[0]||'image-manquante')+'</div></div>';
      return;
    }
    img.src=candidates[idx];
  }
  img.onerror=function(){
    idx+=1;
    loadNext();
  };
  wrap.appendChild(img);
  loadNext();
  const cap=mk('photo-caption');cap.textContent=caption;
  return [wrap,cap];
}
function render(){prog();const r=$('root');r.innerHTML='';
if(S.ph==='intro'){xpbar([{i:'⭐',v:S.xp+' XP'}]);intro(r)}
if(S.ph==='cards'){xpbar([{i:'🗺️',v:(S.ci+1)+'/'+ZONES.length},{i:'⭐',v:S.xp+' XP',h:1}]);cards(r)}
if(S.ph==='quiz'){xpbar([{i:'❓',v:(S.qi+1)+'/'+QUIZ.length},{i:'⭐',v:S.xp+' XP',h:1}]);quiz(r)}
if(S.ph==='sc'){xpbar([{i:'🎯',v:(S.si+1)+'/'+SC.length},{i:'⭐',v:S.xp+' XP',h:1}]);scene(r)}
if(S.ph==='fin'){xpbar([{i:'⭐',v:S.xp+' XP',h:1}]);fin(r)}}

function intro(r){const c=mk('card');
const [pw,pc]=photo(buildAssetSources(['plan_general']),'Plan masse — Collège Château Rance');
c.appendChild(pw);c.appendChild(pc);
c.innerHTML+='<div style="font-family:var(--ft);font-size:1.4rem;font-weight:900;margin-bottom:8px">Bienvenue à Château Rance</div>'+
'<div style="font-size:.97rem;line-height:1.7;color:var(--ink2);margin-bottom:16px">Le collège est <strong>plus grand que ton école primaire</strong> — plusieurs bâtiments, plusieurs cours, plusieurs accès différents selon comment tu arrives.<br><br>Ce module te fait visiter le plan général pour que tu ne sois <strong>pas perdu(e) le jour J</strong>.</div>'+
'<div style="background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border:2px solid rgba(52,211,153,.4);border-radius:var(--rm);padding:12px 16px;margin-bottom:14px;font-size:.9rem;font-weight:700;color:var(--p2d)">💡 La règle d\'or : quand tu ne sais pas où aller → loge de surveillance. Toujours.</div>';
const row=mk('row');row.appendChild(btn('Découvrir les zones ➜','btnp',()=>{S.ph='cards';S.xp+=10;render()}));c.appendChild(row);r.appendChild(c)}

function cards(r){const d=ZONES[S.ci];const c=mk('card');
const [pw,pc]=photo(d.imgs||d.img,d.caption);c.appendChild(pw);c.appendChild(pc);
const zc=mk('zone-card');
zc.style.background=d.bg; zc.style.borderColor=d.bd;
zc.innerHTML='<div class="zone-title">'+d.ico+' '+d.titre+'</div>'+
'<div class="zone-desc">'+d.desc+'</div>'+
'<div class="zone-tip">💡 '+d.tip+'</div>';
c.appendChild(zc);r.appendChild(c);
const nav=document.createElement('div');nav.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-top:4px';
const bk=btn('← Préc.','btns',()=>{if(S.ci>0){S.ci--;render()}});if(S.ci===0)bk.disabled=true;
const cnt=document.createElement('span');cnt.style.cssText='font-family:var(--fm);font-size:.85rem;font-weight:700;color:var(--ink3)';cnt.textContent=(S.ci+1)+' / '+ZONES.length;
const isL=S.ci===ZONES.length-1;
const nx=btn(isL?'Passer au quiz ➜':'Suivant ➜',isL?'btnp':'btns',()=>{if(!isL){S.ci++;S.xp+=8;render()}else{S.ph='quiz';S.xp+=30;render()}});
nav.appendChild(bk);nav.appendChild(cnt);nav.appendChild(nx);r.appendChild(nav)}

function quiz(r){const d=QUIZ[S.qi];const c=mk('card');
if(d.ctx){const cx=mk('qctx');cx.textContent=d.ctx;c.appendChild(cx)}
const qt=mk('qtxt');qt.textContent=d.q;c.appendChild(qt);
const ol=mk('qopts');const val=btn('Valider','btnp',null);val.disabled=true;
d.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='qopt';
b.innerHTML='<span class="qlbl">'+String.fromCharCode(65+i)+'</span><span>'+o+'</span>';
if(S.qF){b.disabled=true;if(i===d.ok)b.classList.add('ok');else if(i===S.qS)b.classList.add('ko')}
else{if(i===S.qS)b.classList.add('sel');b.onclick=()=>{S.qS=i;val.disabled=false;render()}}
ol.appendChild(b)});c.appendChild(ol);
if(S.qF){const fb=mk('qfb '+(S.qS===d.ok?'ok':'ko'));
fb.innerHTML='<div class="qfbt">'+(S.qS===d.ok?'✅ Bonne réponse !':'❌ Pas tout à fait…')+'</div><div class="qfbb">'+d.fb+'</div>';
c.appendChild(fb);const row=mk('row');const isL=S.qi===QUIZ.length-1;
row.appendChild(btn(isL?'Passer aux scénarios ➜':'Question suivante ➜','btnp',()=>{if(isL){S.ph='sc';S.xp+=15;render()}else{S.qi++;S.qS=null;S.qF=false;render()}}));c.appendChild(row)
}else{val.onclick=()=>{if(S.qS===null){toast('Choisis une réponse !');return}S.qF=true;if(S.qS===d.ok)S.xp+=d.xp;render()};
if(S.qS!==null)val.disabled=false;const row=mk('row');row.appendChild(val);c.appendChild(row)}
r.appendChild(c)}

function scene(r){const d=SC[S.si];const c=mk('card');
const ti=document.createElement('div');ti.style.cssText='font-family:var(--ft);font-size:1.1rem;font-weight:900;color:var(--p2d);margin-bottom:8px';ti.textContent='🎯 '+d.ti;c.appendChild(ti);
const cx=mk('scctx');cx.innerHTML=d.ctx;c.appendChild(cx);
const q=mk('scq');q.textContent=d.q;c.appendChild(q);
if(!S.sr){const ch=mk('scch');d.ch.forEach(x=>{const b=document.createElement('button');b.className='scb';b.textContent=x.t;b.onclick=()=>{S.sc=d.ch.indexOf(x);S.sr=true;if(x.xp>0)S.xp+=x.xp;render()};ch.appendChild(b)});c.appendChild(ch)
}else{const x=d.ch[S.sc];const res=mk('scr '+x.ton);
res.innerHTML='<div class="scrt">'+x.ico+' Ce qui se passe…</div><div class="scrb">'+x.r+'</div><div class="sctip">💡 '+x.tip+'</div><div class="scxp '+x.ton+'">'+x.ico+' '+x.lbl+'</div>';
c.appendChild(res);const row=mk('row');const isL=S.si===SC.length-1;
row.appendChild(btn(isL?'Voir mon bilan ➜':'Scénario suivant ➜','btnp',()=>{if(isL){S.ph='fin';save();render()}else{S.si++;S.sc=null;S.sr=false;render()}}));c.appendChild(row)}
r.appendChild(c)}

function fin(r){save();let bd,bc;
if(S.xp>=100){bd='🥇 Expert du plan !';bc='gold'}else if(S.xp>=65){bd='🥈 Bon repérage';bc='silver'}else{bd='🥉 À explorer encore';bc='bronze'}
const c=mk('card');
c.innerHTML='<div style="text-align:center;padding:10px 0 20px">'+
'<div style="font-size:3rem;margin-bottom:12px">🗺️</div>'+
'<div style="font-family:var(--ft);font-size:1.5rem;font-weight:900;margin-bottom:8px">Module terminé !</div>'+
'<div class="bdg '+bc+'" style="margin:0 auto 16px;display:inline-flex">'+bd+'</div>'+
'<div style="font-family:var(--fm);font-size:1.4rem;font-weight:700;color:var(--p2d);margin-bottom:18px">⭐ '+S.xp+' XP gagnés</div>'+
'<div style="font-size:.95rem;line-height:1.7;color:var(--ink2);max-width:480px;margin:0 auto 22px">Tu connais maintenant les grandes zones du collège. Le module suivant t\'emmène dans les lieux de vie quotidienne — cour, réfectoire, casiers.</div></div>'+
'<div style="background:var(--p2p);border:1.5px solid rgba(52,211,153,.3);border-radius:var(--rm);padding:14px;margin-bottom:14px">'+
'<div style="font-family:var(--ft);font-weight:800;color:var(--p2d);margin-bottom:6px">👉 Module suivant</div>'+
'<div style="font-size:.9rem;color:var(--ink2)">'+NN+' — la cour, le réfectoire, les casiers : les lieux où tu passeras le plus de temps.</div></div>';
const row=mk('row');row.appendChild(btn('Module suivant ➜','btnp',()=>location.href=NF));row.appendChild(btn('🏠 Accueil','btns',()=>location.href='index.html'));c.appendChild(row);r.appendChild(c)}
render();
</script>
</body>
</html>
