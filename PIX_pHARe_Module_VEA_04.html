        .completion-screen{text-align:center;padding:46px 17px 38px}.completion-icon{font-size:5rem;margin-bottom:19px;animation:veaPulse 2.1s ease-in-out infinite}@keyframes veaPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}.completion-title{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:13px}

<body><div id="root"></div>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState } = React; const e = React.createElement;
const MODULE_ID = "VEA_04"; const BACK_URL = "index_PIXHARe.html";

const flashcardsData = [
    { question: "C'est quoi la communication assertive ?", hint: "[ Clique pour découvrir ]", answer: "Être assertif(ve), c'est exprimer ce qu'on pense, ressent ou veut <b>clairement et respectueusement</b> — sans être agressif(ve), ni se soumettre. C'est ni attaquer, ni fuir.", source: "Psychologie comportementale" },
    { question: "Quelle est la structure de la CNV ?", hint: "[ Clique pour découvrir ]", answer: "Observation → Émotion → Besoin → Demande. Par ex : 'Quand tu coupes la parole (obs.), je me sens frustré(e) (ém.) parce que j'ai besoin d'être entendu(e) (besoin). Peux-tu me laisser finir ? (demande)'", source: "Marshall Rosenberg, CNV" },
    { question: "Pourquoi les accusations créent-elles des conflits ?", hint: "[ Clique pour découvrir ]", answer: "Les accusations ('tu es toujours...' 'tu ne fais jamais...') déclenchent des réactions défensives. Elles coupent le dialogue. Parler de son vécu plutôt que de l'autre réduit la résistance.", source: "Communication Non-Violente" },
    { question: "C'est quoi la différence entre passif, agressif et assertif ?", hint: "[ Clique pour découvrir ]", answer: "Passif : on se tait, on subit. Agressif : on attaque, on blesse. Assertif : on dit ce qu'on pense <b>sans blesser</b> et <b>sans renoncer</b>. C'est le juste milieu — et ça s'apprend.", source: "Wolpe, 1958" },
    { question: "Le 'je' est plus puissant que le 'tu' en communication. Pourquoi ?", hint: "[ Clique pour découvrir ]", answer: "Le 'tu' accuse ('tu m'as blessé(e)'). Le 'je' exprime ('je me suis senti(e) blessé(e)'). Le 'je' parle de toi — pas de l'autre. Ça permet d'être honnête sans déclencher de défense.", source: "Thérapies comportementales" },
];

const quizData = [
    { question: "Léo dit à Maya : 'Tu es toujours en retard, c'est irrespectueux.' Quel est le problème avec cette formulation ?", options: ["Elle est trop douce", "Elle accuse ('tu') et généralise ('toujours'), ce qui risque de déclencher une défense"], correct: 1, feedback: "Exact. Une meilleure formule : 'Quand tu arrives en retard, je me sens ignoré(e). J'aurais besoin qu'on soit à l'heure — tu peux essayer ?' Même message, sans attaque." },
    { question: "Être assertif(ve), c'est toujours obtenir ce qu'on veut ?", options: ["Oui, c'est l'objectif", "Non, c'est exprimer clairement — sans garantie de résultat"], correct: 1, feedback: "L'assertivité ne garantit pas l'accord de l'autre — mais elle garantit une communication honnête et respectueuse. Le résultat dépend des deux personnes." },
];

const scenarioData = {
    context: "Ton ami prend souvent tes affaires sans te demander. Tu n'aimes pas ça, mais tu ne sais pas comment lui dire sans créer de conflit.",
    intro: "Qu'est-ce que tu choisis de faire ?",
    choices: [
        { text: "Je lui dis calmement : 'Quand tu prends mes affaires sans me demander, je me sens pas respecté(e). J'aurais besoin que tu demandes d'abord. C'est possible ?' Et j'attends sa réponse.", result: "✅ Structure CNV parfaite. Observation + émotion + besoin + demande. Tu exprimes ton vécu sans l'accuser — et tu ouvres un dialogue.", positive: true },
        { text: "Je me tais pour éviter le conflit. Je ruminerce lui reprochant en tête.", result: "⚠️ Le silence apparent maintient la paix à court terme, mais la frustration s'accumule. Elle finit souvent par exploser — de manière bien plus violente. Dire les choses avec douceur, c'est éviter les explosions futures.", positive: false },
    ]

function getPlayer(){try{var u=new URLSearchParams(window.location.search),p=u.get('player');if(p&&p.length>2){localStorage.setItem('pvs_current_player',p);return p;}}catch(ex){}return localStorage.getItem('pvs_current_player')||'';}
function awardXP(){try{var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];evts.push({id:'VEA-'+MODULE_ID+'-'+Date.now(),type:'PHARE_PROGRESS',player:getPlayer(),module:MODULE_ID,label:'PIX pHARe : Dire ce que je pense sans blesser',d:new Date().toISOString()});if(evts.length>700)evts.splice(0,evts.length-700);localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));var done=JSON.parse(localStorage.getItem('pvs_phare_done')||'{}');done[MODULE_ID]=true;localStorage.setItem('pvs_phare_done',JSON.stringify(done));}catch(ex){}}

function App(){
    const [gs,setGs]=useState("intro");const [pn,setPn]=useState(getPlayer());const [cf,setCf]=useState(0);const [ff,setFf]=useState(false);const [cq,setCq]=useState(0);const [sa,setSa]=useState(null);const [sqf,setSqf]=useState(false);const [qs,setQs]=useState(0);const [sc,setSc]=useState(null);const [xp,setXp]=useState(0);
    function goBack(){window.location.href=BACK_URL+(pn?'?player='+encodeURIComponent(pn):'');}
    function nextFC(){if(cf<flashcardsData.length-1){setCf(c=>c+1);setFf(false);setXp(x=>x+10);}else{setGs("quiz");setXp(x=>x+20);}}
    function prevFC(){if(cf>0){setCf(c=>c-1);setFf(false);}}
    function validateQ(){setSqf(true);if(sa===quizData[cq].correct){setQs(s=>s+1);setXp(x=>x+15);}}
    function nextQ(){if(cq<quizData.length-1){setCq(q=>q+1);setSa(null);setSqf(false);}else{setGs("scenario");}}
    function chooseS(i){setSc(i);if(scenarioData.choices[i].positive)setXp(x=>x+20);}
    function finish(){awardXP();setGs("complete");}

    if(gs==="intro")return e('div',{className:'app-container'},
        e('div',{className:'header'},e('div',{className:'pillar-icon'},'💬'),e('h1',{className:'glitch-title'},'DIRE CE QUE JE PENSE SANS BLESSER'),e('div',{className:'subtitle'},'VEA 04 · Vivre Ensemble Actif'),e('div',{className:'module-badge'},'💬 MODULE 4/6 · 120 XP')),
        e('div',{className:'xp-display'},e('div',{className:'xp-box'},e('div',{className:'xp-value'},'120'),e('div',{className:'xp-label'},'XP disponibles'))),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'💬'),e('div',{className:'panel-title'},'Communication assertive')),
        e('div',{className:'panel-body intro-screen'},
            e('p',{style:{lineHeight:1.7,marginBottom:16}},"Il y a une manière de dire les choses qui crée du lien — et une manière qui crée de la distance. La Communication Non-Violente (CNV) te donne une structure simple pour dire ce que tu penses vraiment, sans blesser."),
            e('p',{style:{lineHeight:1.7,marginBottom:16,color:'#4a6b5a'}},"Ce module explore l'assertivité, la CNV, et pourquoi le 'je' est souvent plus fort que le 'tu'."),
            e('div',{className:'name-input-group'},e('input',{className:'name-input',type:'text',placeholder:'Ton prénom ou identifiant...',value:pn,onChange:ev=>setPn(ev.target.value)}),e('button',{className:'action-btn',onClick:()=>{if(pn.trim())setGs("flashcards");},disabled:!pn.trim()},'Commencer →')))));

    if(gs==="flashcards"){const card=flashcardsData[cf];return e('div',{className:'app-container'},
        e('div',{className:'header'},e('h1',{className:'glitch-title',style:{fontSize:'1.6rem'}},'FLASHCARDS'),e('div',{className:'subtitle'},cf+1+' / '+flashcardsData.length)),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'🃏'),e('div',{className:'panel-title'},'CNV & Assertivité')),
        e('div',{className:'panel-body'},
            e('div',{className:'flashcard-container'},e('div',{className:'flashcard'+(ff?' flipped':''),onClick:()=>setFf(f=>!f)},
                e('div',{className:'flashcard-face flashcard-front'},e('div',{className:'flashcard-question'},card.question),e('div',{className:'flashcard-hint'},card.hint)),
                e('div',{className:'flashcard-face flashcard-back'},e('div',{className:'flashcard-answer',dangerouslySetInnerHTML:{__html:card.answer}}),e('div',{className:'flashcard-source'},'— '+card.source)))),
            e('div',{className:'flashcard-nav'},e('button',{className:'nav-btn',onClick:prevFC,disabled:cf===0},'← Préc.'),e('button',{className:'nav-btn',onClick:nextFC},cf<flashcardsData.length-1?'Suiv. →':'Quiz →')))));}

    if(gs==="quiz"){const q=quizData[cq];return e('div',{className:'app-container'},
        e('div',{className:'header'},e('h1',{className:'glitch-title',style:{fontSize:'1.6rem'}},'QUIZ'),e('div',{className:'subtitle'},'Question '+(cq+1)+' / '+quizData.length)),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'❓'),e('div',{className:'panel-title'},'Vérifie ta compréhension')),
        e('div',{className:'panel-body'},e('div',{className:'quiz-question'},q.question),
            e('div',{className:'quiz-options'},q.options.map((opt,i)=>e('div',{key:i,className:'quiz-option'+(sqf?(i===q.correct?' correct':(i===sa?' incorrect':'')):(i===sa?' selected':'')),onClick:()=>{if(!sqf)setSa(i);}},e('div',{className:'option-marker'},String.fromCharCode(65+i)),e('div',{className:'option-text'},opt)))),
            sqf?e('div',{className:'feedback-box'+(sa===q.correct?'':' incorrect-feedback')},e('div',{className:'feedback-title'},sa===q.correct?'✅ Correct !':'❌ Pas tout à fait...'),e('p',null,q.feedback),e('button',{className:'action-btn',style:{marginTop:12},onClick:nextQ},cq<quizData.length-1?'Question suivante →':'Scénario →')):e('button',{className:'action-btn',disabled:sa===null,onClick:validateQ},'Valider'))));}

    if(gs==="scenario")return e('div',{className:'app-container'},
        e('div',{className:'header'},e('h1',{className:'glitch-title',style:{fontSize:'1.6rem'}},'SCÉNARIO'),e('div',{className:'subtitle'},'Comment réagis-tu ?')),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'🎭'),e('div',{className:'panel-title'},'Mise en situation')),
        e('div',{className:'panel-body'},e('div',{className:'scenario-context'},'📍 '+scenarioData.context),e('div',{className:'scenario-intro'},scenarioData.intro),
            sc===null?scenarioData.choices.map((c,i)=>e('button',{key:i,className:'choice-btn',onClick:()=>chooseS(i)},c.text)):e('div',null,e('div',{className:'choice-result'},scenarioData.choices[sc].result),e('button',{className:'action-btn',style:{marginTop:16},onClick:finish},'Terminer le module →')))));

    return e('div',{className:'app-container'},e('div',{className:'completion-screen'},
        e('div',{className:'completion-icon'},'💬'),e('div',{className:'completion-title'},'MODULE COMPLÉTÉ !'),
        e('p',{style:{lineHeight:1.7,marginBottom:20,color:'#4a6b5a'}},"La CNV et l'assertivité sont tes outils. Dire ce que tu penses sans blesser — c'est une compétence rare et précieuse."),
        e('div',{className:'stats-grid'},e('div',{className:'stat-card'},e('div',{className:'stat-value'},xp),e('div',{className:'stat-label'},'XP gagnés')),e('div',{className:'stat-card'},e('div',{className:'stat-value'},qs+'/'+quizData.length),e('div',{className:'stat-label'},'Quiz')),e('div',{className:'stat-card'},e('div',{className:'stat-value'},'4/6'),e('div',{className:'stat-label'},'Modules VEA'))),
        e('button',{className:'action-btn',onClick:goBack},'← Retour au hub')));
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
