<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX-pHARe | Module HISTOIRE 02 - La Naissance Scientifique</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');
        
        :root {
            --history-bronze: #cd7f32;
            --history-amber: #d4a574;
            --history-sepia: #b08968;
            --history-parchment: #e8d5b5;
            --history-ink: #2c1810;
            --void-dark: #0a0a0a;
            --deep-dark: #050505;
            --panel-bg: rgba(44, 24, 16, 0.95);
            --text-primary: #f5ede4;
            --text-secondary: #a89984;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--void-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .history-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 50% 20%, rgba(205, 127, 50, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 70%, rgba(176, 137, 104, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(212, 165, 116, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: historyGlow 8s ease-in-out infinite;
        }
        
        @keyframes historyGlow {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.9; }
        }
        
        .stars-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(1px 1px at 20% 30%, rgba(205, 127, 50, 0.6), transparent),
                radial-gradient(1px 1px at 60% 70%, rgba(212, 165, 116, 0.5), transparent),
                radial-gradient(1px 1px at 80% 10%, rgba(176, 137, 104, 0.4), transparent);
            background-size: 200px 200px;
            animation: starsFloat 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes starsFloat {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header { text-align: center; padding: 40px 20px; }
        
        .pillar-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(205, 127, 50, 0.7));
            animation: bookPulse 3s ease-in-out infinite;
        }
        
        @keyframes bookPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(205, 127, 50, 0.7)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 30px rgba(205, 127, 50, 0.9)); }
        }
        
        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--history-bronze), var(--history-amber), var(--history-sepia));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            animation: gradientShift 4s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: var(--history-amber);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .module-badge {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 30px;
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.3), rgba(212, 165, 116, 0.3));
            border: 2px solid var(--history-bronze);
            border-radius: 0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--history-bronze);
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
        }
        
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .progress-node {
            width: 55px;
            height: 55px;
            border: 3px solid var(--text-secondary);
            background: var(--deep-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-secondary);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            transition: all 0.4s ease;
        }
        
        .progress-node.active {
            border-color: var(--history-bronze);
            color: var(--history-bronze);
            box-shadow: 0 0 25px rgba(205, 127, 50, 0.6);
            animation: nodePulse 2s infinite;
        }
        
        .progress-node.completed {
            border-color: var(--history-amber);
            background: rgba(212, 165, 116, 0.2);
            color: var(--history-amber);
        }
        
        @keyframes nodePulse {
            0%, 100% { box-shadow: 0 0 15px rgba(205, 127, 50, 0.6); }
            50% { box-shadow: 0 0 30px rgba(205, 127, 50, 0.9); }
        }
        
        .xp-display {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .xp-box {
            background: var(--panel-bg);
            border: 1px solid var(--history-bronze);
            padding: 12px 20px;
            text-align: center;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
        }
        
        .xp-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .xp-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--history-bronze);
            margin-top: 5px;
        }
        
        .content-panel {
            background: var(--panel-bg);
            border: 1px solid var(--history-bronze);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(205, 127, 50, 0.15);
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(205, 127, 50, 0.3);
        }
        
        .panel-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 10px rgba(205, 127, 50, 0.6));
        }
        
        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--history-bronze);
            text-transform: uppercase;
            letter-spacing: 2px;

        .panel-body {
            color: var(--text-primary);

        .intro-screen p {

        .name-input-group {

            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .input-wrapper label {
            display: block;
            margin-bottom: 8px;
            color: var(--history-bronze);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 12px 15px;
            background: var(--deep-dark);
            border: 1px solid var(--history-bronze);
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;

            box-shadow: 0 0 15px rgba(212, 165, 116, 0.3);
        }
        
        .action-btn {
            background: linear-gradient(135deg, var(--history-bronze), var(--history-sepia));
            color: var(--text-primary);
            border: none;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(205, 127, 50, 0.3);
        }
        
        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(205, 127, 50, 0.5);
        }
        
        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .flashcard-container {
            perspective: 1000px;
            margin: 30px 0;
        }
        
        .flashcard {
            width: 100%;
            min-height: 320px;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        
        .flashcard-face {
            width: 100%;
            min-height: 320px;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 35px;
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.1), rgba(212, 165, 116, 0.1));
            border: 2px solid var(--history-bronze);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(205, 127, 50, 0.2);
        }
        
        .flashcard-front {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.15), rgba(176, 137, 104, 0.15));
        }
        
        .flashcard-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.15), rgba(232, 213, 181, 0.15));
        }
        
        .flashcard-question {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--history-bronze);
            margin-bottom: 15px;
        }
        
        .flashcard-hint {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--history-amber);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .flashcard-answer {
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: center;
            color: var(--text-primary);
        }
        
        .flashcard-answer strong {
            color: var(--history-amber);
        }
        
        .flashcard-nav {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 12px 25px;
            background: transparent;
            border: 2px solid var(--history-bronze);
            color: var(--history-bronze);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: var(--history-bronze);
            color: var(--void-dark);
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.5);
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .quiz-question {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--history-bronze);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(205, 127, 50, 0.05);
            border: 2px solid rgba(205, 127, 50, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quiz-option:hover {
            background: rgba(205, 127, 50, 0.15);
            border-color: var(--history-bronze);
            transform: translateX(5px);
        }
        
        .quiz-option.selected {
            background: rgba(205, 127, 50, 0.2);
            border-color: var(--history-bronze);
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.3);
        }
        
        .quiz-option.correct {
            background: rgba(212, 165, 116, 0.2);
            border-color: var(--history-amber);
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.4);
        }
        
        .quiz-option.incorrect {
            background: rgba(176, 137, 104, 0.2);
            border-color: var(--history-sepia);
            box-shadow: 0 0 20px rgba(176, 137, 104, 0.4);
        }
        
        .option-marker {
            width: 35px;
            height: 35px;
            background: var(--history-bronze);
            color: var(--void-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }
        
        .option-text {
            flex: 1;
            font-size: 1rem;
            line-height: 1.5;
        }
        
        .feedback-box {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.15), rgba(232, 213, 181, 0.15));
            border: 2px solid var(--history-amber);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 0 25px rgba(212, 165, 116, 0.3);
        }
        
        .feedback-box.incorrect-feedback {
            background: linear-gradient(135deg, rgba(176, 137, 104, 0.15), rgba(205, 127, 50, 0.15));
            border-color: var(--history-sepia);
            box-shadow: 0 0 25px rgba(176, 137, 104, 0.3);
        }
        
        .feedback-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--history-amber);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .incorrect-feedback .feedback-title {
            color: var(--history-sepia);
        }
        
        .scenario-context {
            background: rgba(205, 127, 50, 0.1);
            border-left: 4px solid var(--history-bronze);
            padding: 15px 20px;
            margin-bottom: 20px;
            font-style: italic;
            color: var(--text-secondary);
        }
        
        .scenario-intro {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 25px;
        }
        
        .choices {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .choice-btn {
            padding: 18px 25px;
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.1), rgba(212, 165, 116, 0.1));
            border: 2px solid rgba(205, 127, 50, 0.4);
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            line-height: 1.5;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.2), rgba(212, 165, 116, 0.2));
            border-color: var(--history-bronze);
            transform: translateX(8px);
            box-shadow: 0 0 25px rgba(205, 127, 50, 0.3);
        }
        
        .choice-result {
            background: rgba(176, 137, 104, 0.1);
            border: 2px solid var(--history-sepia);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .choice-result p {
            line-height: 1.7;
            margin-bottom: 15px;
        }
        
        .impact-score {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        
        .impact-item {
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .impact-item.positive {
            background: rgba(212, 165, 116, 0.2);
            border: 1px solid var(--history-amber);
            color: var(--history-amber);
        }
        
        .impact-item.negative {
            background: rgba(176, 137, 104, 0.2);
            border: 1px solid var(--history-sepia);
            color: var(--history-sepia);
        }
        

        .save-code-box {
            background: rgba(0,0,0,0.6);
            border: 2px solid var(--history-bronze);
            border-radius: 8px;
            padding: 20px;
            margin: 28px 0 10px 0;
            text-align: center;
        }
        .save-code-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .save-code {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.78rem;

        }
        .copy-btn {
            padding: 10px 24px;
            background: var(--history-bronze);
            color: var(--history-ink);
            border: none;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: var(--history-amber); }
        .completion-screen {
            text-align: center;
            padding: 40px 20px;
        }
        
        .completion-icon {

            margin-bottom: 25px;
            filter: drop-shadow(0 0 30px rgba(205, 127, 50, 0.8));
            animation: completionFloat 3s ease-in-out infinite;

        @keyframes completionFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .completion-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--history-bronze), var(--history-amber));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;

        .completion-subtitle {

            border: 2px solid var(--history-bronze);
            border-radius: 8px;
            padding: 20px;
            text-align: center;

        .stat-value {

            margin-bottom: 8px;

        .stat-label {

            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;

<body>
    <div class="history-bg"></div>
    <div class="stars-overlay"></div>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const { useState } = React;
        const e = React.createElement;

        const MODULE_ID = "HISTOIRE_02";
        const MODULE_TITLE = "La Naissance Scientifique";
        const MODULE_VERSION = "2.0";

        const flashcardsData = [
            {
                question: "Qui est Peter-Paul Heinemann et pourquoi est-il crucial ?",
                hint: "[ Clique pour révéler ]",
                answer: "Médecin suédois qui, en <strong>1969, introduit le terme 'mobbing'</strong> pour décrire l'attaque collective d'enfants contre un camarade 'déviant'. Inspiré de l'éthologie (Konrad Lorenz), il est le <strong>premier à nommer scientifiquement</strong> la violence de groupe entre pairs."
            },
            {
                question: "Quelle est la révolution d'Olweus (années 1970) ?",
                hint: "[ Clique pour révéler ]",
                answer: "Dan Olweus définit le <strong>'bullying'</strong> par 3 critères objectifs : <strong>intentionnalité</strong> (volonté de nuire), <strong>répétition</strong> (durée certaine), <strong>déséquilibre de pouvoir</strong> (asymétrie). Il transforme une intuition floue en concept scientifique mesurable."
            },
            {
                question: "Quel événement déclenche la première campagne nationale (1982) ?",
                hint: "[ Clique pour révéler ]",
                answer: "Le <strong>suicide de trois jeunes Norvégiens</strong> victimes de harcèlement crée une onde de choc. La Norvège lance la <strong>première campagne nationale anti-harcèlement</strong> de l'histoire, dirigée par Olweus. Le problème passe du statut d'anecdote à celui de <strong>crise de santé publique</strong>."
            },
            {
                question: "Pourquoi les 3 critères d'Olweus sont-ils révolutionnaires ?",
                hint: "[ Clique pour révéler ]",
                answer: "Ils permettent de <strong>distinguer le harcèlement d'un conflit ponctuel</strong>. Intention + Répétition + Déséquilibre = harcèlement. Un coup isolé ≠ harcèlement. Cette définition objective a rendu possible <strong>la mesure, la recherche, et la prévention</strong>."
            }
        ];

        const quizData = [
            {
                question: "Heinemann parle de 'mobbing'. Pourquoi ce mot emprunté à l'éthologie (étude du comportement animal) est-il important ?",
                options: [
                    "Parce qu'il veut comparer les enfants à des animaux",
                    "Parce qu'il identifie un mécanisme de groupe pathologique, pas juste un problème individuel",
                    "Parce qu'il n'avait pas d'autre mot",
                    "Parce que les Suédois aiment les animaux"
                ],
                correct: 1,
                feedback: "Exact. Le 'mobbing' (harcèlement de meute) montre que le problème n'est pas 'un méchant + une victime', mais une DYNAMIQUE DE GROUPE toxique. L'attaque collective révèle une pathologie sociale, pas juste individuelle."
            },
            {
                question: "Les 3 critères d'Olweus : Intention, Répétition, Déséquilibre. Pourquoi est-ce crucial de tous les avoir ?",
                options: [
                    "Pour remplir des formulaires administratifs",
                    "Pour différencier harcèlement (systémique, asymétrique) et conflit ponctuel (bilatéral, résolvable)",
                    "Pour faire savant",
                    "Parce que c'est plus facile à retenir en 3"
                ],
                correct: 1,
                feedback: "Parfait. Sans ces critères, tout devient 'harcèlement' (même une dispute d'un jour). Olweus permet de cibler les vraies violences systémiques où la victime est piégée (déséquilibre) dans une spirale qui dure (répétition) et qui est voulue (intention)."
            },
            {
                question: "1982 : 3 jeunes Norvégiens se suicident. Pourquoi cet événement change-t-il tout ?",
                options: [
                    "Parce que les médias en parlent",
                    "Parce qu'il force la société à reconnaître que le harcèlement TUE, transformant un problème 'moral' en urgence de santé publique",
                    "Parce que les parents portent plainte",
                    "Parce que la Norvège est un petit pays"
                ],
                correct: 1,
                feedback: "Exactement. Le suicide rend le harcèlement visible comme MORTEL. Ce n'est plus 'juste une phase de l'enfance', c'est une violence létale. Cela légitime l'intervention étatique massive (première campagne nationale mondiale)."
            },
            {
                question: "Avant Olweus (1970), pourquoi les écoles n'agissaient-elles pas contre le harcèlement malgré sa présence ?",
                options: [
                    "Parce qu'elles étaient méchantes",
                    "Parce que sans définition scientifique claire, impossible de mesurer, former, ou intervenir de manière systématique",
                    "Parce qu'elles n'avaient pas de budget",
                    "Parce que les élèves ne se plaignaient jamais"
                ],
                correct: 1,
                feedback: "Parfait. 'Ce qui ne se mesure pas n'existe pas pour l'institution'. Sans critères objectifs (Olweus), comment former les profs ? Comment évaluer une politique ? La science a rendu le problème OPÉRATIONNEL pour les institutions."
            }
        ];

        const scenarioData = [
            {
                title: "Le Critère Manquant",
                context: "Deux élèves se disputent violemment depuis 1 semaine. Ils ont la même force physique et sociale. C'est tendu, mais aucun des deux ne domine vraiment.",
                intro: "Un adulte te demande : 'C'est du harcèlement ?' Grâce aux 3 critères d'Olweus, que réponds-tu ?",
                choices: [
                    {
                        text: "Oui, c'est du harcèlement parce qu'ils se battent depuis 1 semaine (répétition)",
                        result: "Erreur. Il manque le DÉSÉQUILIBRE DE POUVOIR. Si les deux ont la même force et peuvent se défendre mutuellement, c'est un conflit bilatéral, pas du harcèlement. Olweus distingue précisément ces cas.",
                        impact: { precision: -20, comprehension: -15 }
                    },
                    {
                        text: "Non, ce n'est pas du harcèlement. Il y a répétition et intention, mais pas de déséquilibre : c'est un conflit qui nécessite médiation, pas protocole anti-harcèlement",
                        result: "Excellent. Tu appliques rigoureusement les 3 critères. L'absence d'asymétrie change la nature du problème ET la réponse institutionnelle. Confondre conflit et harcèlement dilue les ressources et banalise le vrai harcèlement.",
                        impact: { precision: +35, comprehension: +35 }
                    },
                    {
                        text: "Je ne sais pas, c'est compliqué",
                        result: "Dommage. Les 3 critères d'Olweus existent précisément pour trancher ces cas ambigus. C'est un outil de diagnostic, pas une opinion subjective.",
                        impact: { precision: -10, comprehension: -5 }
                    }
                ]
            },
            {
                title: "L'Héritage d'Olweus",
                context: "Ton collège met en place un 'protocole anti-harcèlement'. Mais il se contente de punir les agresseurs après coup, sans travail préventif sur les dynamiques de groupe.",
                intro: "Tu te souviens qu'Heinemann parlait de 'mobbing' (dynamique collective). Que penses-tu de ce protocole ?",
                choices: [
                    {
                        text: "C'est bien, punir les harceleurs suffit",
                        result: "Non. Heinemann a montré que le harcèlement est un phénomène DE GROUPE. Punir l'individu sans traiter la dynamique collective (témoins passifs, climat permissif) ne résout rien. Le groupe produira un nouveau harceleur.",
                        impact: { vision: -30, efficacite: -25 }
                    },
                    {
                        text: "C'est insuffisant. Le harcèlement est une pathologie de groupe (Heinemann). Il faut former TOUS les élèves (témoins inclus) pour changer les normes collectives, pas juste punir",
                        result: "Parfait. Tu comprends l'insight d'Heinemann : le 'mobbing' est systémique. Seule une intervention sur le CLIMAT SCOLAIRE (formation ambassadeurs, empathie collective, responsabilisation témoins) peut briser la dynamique. C'est la base de pHARe.",
                        impact: { vision: +40, efficacite: +35 }
                    },
                    {
                        text: "Je ne sais pas, c'est au collège de décider",
                        result: "Passivité. Pourtant, tu as les connaissances historiques pour identifier un protocole inefficace. Les chercheurs des années 70 ont montré la voie : agir sur le groupe, pas juste l'individu.",
                        impact: { vision: -15, efficacite: -10 }
                    }
                ]
            }
        ];

        function encodeSaveCode(data) { return btoa(JSON.stringify(data)); }

        function App() {
            const [gameState, setGameState] = useState("intro");
            const [playerData, setPlayerData] = useState({
                name: localStorage.getItem('pvs_current_player') || 'Anonyme',
                class: "",
                xp: 0,
                score: 0,
                quizScore: 0,
                scenarioScore: 0
            });

            const [currentFlashcard, setCurrentFlashcard] = useState(0);
            const [flashcardFlipped, setFlashcardFlipped] = useState(false);

            const [currentQuiz, setCurrentQuiz] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showQuizFeedback, setShowQuizFeedback] = useState(false);

            const [currentScenario, setCurrentScenario] = useState(0);
            const [scenarioChoice, setScenarioChoice] = useState(null);
            const [showScenarioResult, setShowScenarioResult] = useState(false);

            function startGame() {
                if (playerData.name.trim()) {
                    setGameState("flashcards");
                }

            function generateSaveCode() {
                const saveData = {
                    v: 1,
                    d: new Date().toISOString(),
                    m: MODULE_ID,
                    mv: MODULE_VERSION,
                    n: playerData.name,
                    l: 3,
                    s: playerData.score,
                    x: playerData.xp,
                    q: playerData.quizScore,
                    sc: playerData.scenarioScore,
                    f: true
                };
                return encodeSaveCode(saveData);
            }

            function copyCode() {
                const code = generateSaveCode();
                navigator.clipboard.writeText(code)
                    .then(() => alert("\u2705 Code copié dans le presse-papier !"))
                    .catch(() => prompt("Copie ce code manuellement :", code));
            }

            }

            function nextFlashcard() {
                if (currentFlashcard < flashcardsData.length - 1) {
                    setCurrentFlashcard(prev => prev + 1);
                    setFlashcardFlipped(false);
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 10 }));
                } else {
                    setGameState("quiz");
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 40 }));
                }
            }

            function prevFlashcard() {
                if (currentFlashcard > 0) {
                    setCurrentFlashcard(prev => prev - 1);
                    setFlashcardFlipped(false);
                }
            }

            function selectQuizAnswer(index) {
                if (showQuizFeedback) return;
                setSelectedAnswer(index);
            }

            function validateQuizAnswer() {
                setShowQuizFeedback(true);
                const isCorrect = selectedAnswer === quizData[currentQuiz].correct;
                if (isCorrect) {
                    setPlayerData(prev => ({
                        ...prev,
                        score: prev.score + 25,
                        quizScore: prev.quizScore + 25,
                        xp: prev.xp + 25
                    }));
                }
            }

            function nextQuizQuestion() {
                if (currentQuiz < quizData.length - 1) {
                    setCurrentQuiz(prev => prev + 1);
                    setSelectedAnswer(null);
                    setShowQuizFeedback(false);
                } else {
                    setGameState("scenarios");
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 50 }));
                }
            }

            function makeScenarioChoice(index) {
                setScenarioChoice(index);
                setShowScenarioResult(true);

                const choice = scenarioData[currentScenario].choices[index];
                const values = Object.values(choice.impact);
                const totalChange = Math.max(0, values.reduce((a, b) => a + b, 0));

                setPlayerData(prev => ({
                    ...prev,
                    score: prev.score + totalChange,
                    scenarioScore: prev.scenarioScore + totalChange,
                    xp: prev.xp + 20
                }));
            }

            function nextScenario() {
                if (currentScenario < scenarioData.length - 1) {
                    setCurrentScenario(prev => prev + 1);
                    setScenarioChoice(null);
                    setShowScenarioResult(false);
                } else {
                    try {
                        var _ck = 'CERT_PHARE_' + MODULE_ID;
                        if (!localStorage.getItem(_ck)) {
                            localStorage.setItem(_ck, JSON.stringify({v:1,d:new Date().toISOString(),m:MODULE_ID,f:true}));
                        }
                    } catch(_ce) {}

                    // ── Remontée XP vers Superhub PVS ──
                    try {
                        var _pvs = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
                        _pvs.push({
                            id: 'PIXHARE-' + MODULE_ID + '-' + Date.now(),
                            type: 'PIXHARE_PROGRESS',
                            player: playerData.name,
                            module: MODULE_ID,
                            score: playerData.score,
                            xp: playerData.xp,
                            d: new Date().toISOString()
                        });
                        localStorage.setItem('pvs_bridge_events', JSON.stringify(_pvs));
                        window.dispatchEvent(new StorageEvent('storage', { key: 'pvs_bridge_events' }));
                    } catch (_e) { /* silencieux */ }
                    // ── Fin bridge ──
                    setGameState("complete");
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 75 }));
                }
            }

            function renderIntro() {
                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, "PIX-pHARe"),
                        e("div", { className: "subtitle" }, "Pilier Histoire Sociétale"),
                        e("div", { className: "module-badge" }, "MODULE 02")
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "🔬"),
                            e("div", { className: "panel-title" }, MODULE_TITLE)
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "intro-screen" },
                                e("p", null,
                                    "1969-1982 : en moins de 15 ans, le harcèlement passe de l'invisibilité totale au statut de ", 
                                    e("strong", { style: { color: "var(--history-amber)" } }, "problème de santé publique"), "."
                                ),
                                e("p", null,
                                    "Grâce à Heinemann (mobbing), Olweus (bullying + 3 critères), et au choc du suicide de 3 jeunes Norvégiens, ", 
                                    e("strong", { style: { color: "var(--history-bronze)" } }, "la science crée les outils"),
                                    " pour combattre ce qui était autrefois 'normal'."
                                ),
                                e("p", null,
                                    "Tu vas découvrir comment ", e("strong", null, "nommer scientifiquement un problème"), 
                                    " le rend visible, mesurable, et donc combattable."
                                )
                            ),
                            e("div", { style: { textAlign: "center", marginTop: "20px" } },
                                e("div", { style: { padding: "10px 16px", background: "rgba(205,127,50,0.12)", border: "1px solid var(--history-bronze)", borderRadius: "6px", marginBottom: "16px", fontSize: "0.9rem", color: "var(--history-amber)" } },
                                    "🔗 Connecté via Portail Vie Scolaire"
                                ),
                                e("button", { className: "action-btn", onClick: startGame }, "[ COMMENCER ]")
                            )
                        )
                    )
                );
            }

            function renderFlashcards() {
                const card = flashcardsData[currentFlashcard];

                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, MODULE_TITLE),
                        e("div", { className: "subtitle" }, "Niveau 1 : Révolution Conceptuelle")
                    ),
                    e("div", { className: "progress-bar" },
                        e("div", { className: "progress-node active" }, "1"),
                        e("div", { className: "progress-node" }, "2"),
                        e("div", { className: "progress-node" }, "3")
                    ),
                    e("div", { className: "xp-display" },
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "XP"),
                            e("div", { className: "xp-value" }, playerData.xp)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Carte"),
                            e("div", { className: "xp-value" }, `${currentFlashcard + 1}/${flashcardsData.length}`)
                        )
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "📚"),
                            e("div", { className: "panel-title" }, "Pionniers de la Recherche")
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "flashcard-container" },
                                e("div", {
                                    className: `flashcard ${flashcardFlipped ? "flipped" : ""}`,
                                    onClick: () => setFlashcardFlipped(!flashcardFlipped)
                                },
                                    e("div", { className: "flashcard-face flashcard-front" },
                                        e("div", { className: "flashcard-question" }, card.question),
                                        e("div", { className: "flashcard-hint" }, card.hint)
                                    ),
                                    e("div", { className: "flashcard-face flashcard-back" },
                                        e("div", {
                                            className: "flashcard-answer",
                                            dangerouslySetInnerHTML: { __html: card.answer }
                                        })
                                    )
                                )
                            ),
                            e("div", { className: "flashcard-nav" },
                                e("button", {
                                    className: "nav-btn",
                                    onClick: prevFlashcard,
                                    disabled: currentFlashcard === 0
                                }, "◄ PRÉC"),
                                e("button", {
                                    className: "nav-btn",
                                    onClick: nextFlashcard
                                }, currentFlashcard < flashcardsData.length - 1 ? "SUIV ►" : "NIVEAU 2 ►")
                            )
                        )
                    )
                );
            }

            function renderQuiz() {
                const question = quizData[currentQuiz];

                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, MODULE_TITLE),
                        e("div", { className: "subtitle" }, "Niveau 2 : Compréhension")
                    ),
                    e("div", { className: "progress-bar" },
                        e("div", { className: "progress-node completed" }, "✓"),
                        e("div", { className: "progress-node active" }, "2"),
                        e("div", { className: "progress-node" }, "3")
                    ),
                    e("div", { className: "xp-display" },
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "XP"),
                            e("div", { className: "xp-value" }, playerData.xp)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Score Quiz"),
                            e("div", { className: "xp-value" }, playerData.quizScore)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Question"),
                            e("div", { className: "xp-value" }, `${currentQuiz + 1}/${quizData.length}`)
                        )
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "🔍"),
                            e("div", { className: "panel-title" }, "Analyse Scientifique")
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "quiz-question" }, question.question),
                            e("div", { className: "quiz-options" },
                                question.options.map((opt, idx) => {
                                    let optClass = "quiz-option";
                                    if (showQuizFeedback) {
                                        if (idx === question.correct) optClass += " correct";
                                        else if (idx === selectedAnswer) optClass += " incorrect";
                                    } else if (idx === selectedAnswer) {
                                        optClass += " selected";
                                    }

                                    return e("div", {
                                        key: idx,
                                        className: optClass,
                                        onClick: () => selectQuizAnswer(idx)
                                    },
                                        e("div", { className: "option-marker" }, String.fromCharCode(65 + idx)),
                                        e("div", { className: "option-text" }, opt)
                                    );
                                })
                            ),
                            showQuizFeedback && e("div", {
                                className: `feedback-box ${selectedAnswer !== question.correct ? "incorrect-feedback" : ""}`
                            },
                                e("div", { className: "feedback-title" },
                                    selectedAnswer === question.correct ? "✓ EXACT" : "✗ PAS TOUT À FAIT"
                                ),
                                e("p", null, question.feedback)
                            ),
                            e("div", { style: { textAlign: "center", marginTop: "25px" } },
                                !showQuizFeedback ?
                                    e("button", {
                                        className: "action-btn",
                                        onClick: validateQuizAnswer,
                                        disabled: selectedAnswer === null
                                    }, "[ VALIDER ]") :
                                    e("button", {
                                        className: "action-btn",
                                        onClick: nextQuizQuestion
                                    }, currentQuiz < quizData.length - 1 ? "[ SUIVANT ]" : "[ NIVEAU 3 ]")
                            )
                        )
                    )
                );
            }

            function renderScenarios() {
                const scenario = scenarioData[currentScenario];

                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, MODULE_TITLE),
                        e("div", { className: "subtitle" }, "Niveau 3 : Cas Pratiques")
                    ),
                    e("div", { className: "progress-bar" },
                        e("div", { className: "progress-node completed" }, "✓"),
                        e("div", { className: "progress-node completed" }, "✓"),
                        e("div", { className: "progress-node active" }, "3")
                    ),
                    e("div", { className: "xp-display" },
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "XP Total"),
                            e("div", { className: "xp-value" }, playerData.xp)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Score"),
                            e("div", { className: "xp-value" }, playerData.score)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Scénario"),
                            e("div", { className: "xp-value" }, `${currentScenario + 1}/${scenarioData.length}`)
                        )
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "⚖️"),
                            e("div", { className: "panel-title" }, scenario.title)
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "scenario-context" }, scenario.context),
                            e("div", { className: "scenario-intro" }, scenario.intro),
                            !showScenarioResult ?
                                e("div", { className: "choices" },
                                    scenario.choices.map((choice, idx) =>
                                        e("button", {
                                            key: idx,
                                            className: "choice-btn",
                                            onClick: () => makeScenarioChoice(idx)
                                        }, choice.text)
                                    )
                                ) :
                                e("div", { className: "choice-result" },
                                    e("p", { style: { marginBottom: "15px" } }, scenario.choices[scenarioChoice].result),
                                    e("div", { className: "impact-score" },
                                        Object.entries(scenario.choices[scenarioChoice].impact).map(([key, val]) =>
                                            e("div", {
                                                key: key,
                                                className: `impact-item ${val > 0 ? "positive" : "negative"}`
                                            }, `${key}: ${val > 0 ? "+" : ""}${val}`)
                                        )
                                    ),
                                    e("div", { style: { textAlign: "center", marginTop: "25px" } },
                                        e("button", {
                                            className: "action-btn",
                                            onClick: nextScenario
                                        }, currentScenario < scenarioData.length - 1 ? "[ SUIVANT ]" : "[ TERMINER ]")
                                    )
                                )
                        )
                    )
                );
            }

            function renderComplete() {
                return e("div", { className: "app-container" },
                    e("div", { className: "completion-screen" },
                        e("div", { className: "completion-icon" }, "✅"),
                        e("h1", { className: "completion-title" }, "MODULE COMPLÉTÉ"),
                        e("p", { className: "completion-subtitle" },
                            `Bravo ${playerData.name} ! Tu maîtrises maintenant les fondements scientifiques.`
                        ),
                        e("div", { className: "stats-grid" },
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.score),
                                e("div", { className: "stat-label" }, "Score Total")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.xp),
                                e("div", { className: "stat-label" }, "XP Gagnés")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.quizScore),
                                e("div", { className: "stat-label" }, "Score Quiz")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.scenarioScore),
                                e("div", { className: "stat-label" }, "Score Scénarios")
                            )
                        ),
                        e("div", { className: "content-panel", style: { marginTop: "30px", textAlign: "left" } },
                            e("div", { className: "panel-header" },
                                e("div", { className: "panel-icon" }, "💡"),
                                e("div", { className: "panel-title" }, "Ce Que Tu As Appris")
                            ),
                            e("div", { className: "panel-body" },
                                e("p", null,
                                    "En 15 ans (1969-1982), la recherche scientifique a transformé le harcèlement de 'brutalités normales' en ", 
                                    e("strong", null, "problème de santé publique mesurable"), "."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    "Les 3 critères d'Olweus (Intention, Répétition, Déséquilibre) ont permis de ", 
                                    e("strong", null, "distinguer harcèlement et conflit"),
                                    ", rendant possible la prévention ciblée."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    "Prochain module : tu verras comment cette science s'est traduite en ", 
                                    e("strong", { style: { color: "var(--history-amber)" } }, "lois, protocoles, et protections juridiques"), 
                                    " dans les années 1990-2010."
                                )
                            )
                        )
                    )
                );
            }

            switch (gameState) {
                case "intro": return renderIntro();
                case "flashcards": return renderFlashcards();
                case "quiz": return renderQuiz();
                case "scenarios": return renderScenarios();
                case "complete": return renderComplete();
                default: return renderIntro();
            }
        }

        ReactDOM.createRoot(document.getElementById("root")).render(e(App));
    </script>
</body>
</html>
