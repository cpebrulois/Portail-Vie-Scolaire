<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FRATERNITÉ | FRA_SOL03 — Solidarité nationale et internationale</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;600;700&family=Share+Tech+Mono&display=swap');
:root{--bg:#0a0804;--acc:#f97316;--acc-d:#c2410c;--text:#fdf6e8;--muted:#9d8060;--border:#2a1a08}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;padding:32px 16px 60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(249,115,22,0.09) 0%,transparent 55%)}
#root{width:100%;max-width:820px;position:relative;z-index:1}
.card{background:rgba(10,8,4,0.93);border:2px solid var(--acc);padding:36px 40px;border-radius:6px;
  box-shadow:0 0 50px rgba(0,0,0,0.7);backdrop-filter:blur(10px);position:relative;overflow:hidden}
.card::before{content:'FRATERNITÉ';position:absolute;top:-20px;right:-10px;font-family:'Playfair Display';
  font-size:4.5rem;opacity:0.04;transform:rotate(-12deg);color:var(--acc);pointer-events:none}
h1,h2{font-family:'Playfair Display',serif;color:var(--acc);text-align:center;margin-bottom:14px}
h1{font-size:1.55rem}h2{font-size:1.2rem}
p{line-height:1.75;margin-bottom:12px;color:#e8d8c0}
.quote{font-style:italic;color:var(--muted);border-left:3px solid var(--acc);padding-left:14px;margin-bottom:18px;line-height:1.7}
.tag{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'Share Tech Mono',monospace;margin-bottom:12px;text-align:center}
.xp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.25);padding:4px 12px;border-radius:20px;font-size:0.7rem;color:#ffd700;font-family:'Share Tech Mono',monospace}
.player-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:0.68rem;color:var(--muted);font-family:'Share Tech Mono',monospace}
.btn{background:var(--acc);color:#000;border:none;padding:13px 28px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:.25s;display:block;margin:18px auto 0;border-radius:4px;font-family:'Montserrat',sans-serif}
.btn:hover{filter:brightness(1.12);transform:translateY(-2px)}
.progress{height:3px;background:rgba(255,255,255,0.07);margin-bottom:24px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:2px;transition:width .5s ease}
.step-tag{font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.opt{display:block;width:100%;text-align:left;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:16px 18px;margin:10px 0;cursor:pointer;transition:.22s;border-radius:4px;font-size:0.88rem;line-height:1.5;font-family:'Montserrat',sans-serif}
.opt:hover{background:rgba(255,255,255,0.09);border-color:var(--acc)}
.summary-box{background:rgba(255,255,255,0.03);border-left:3px solid var(--acc);padding:16px 18px;margin:16px 0;line-height:1.75}
.summary-box p{margin-bottom:8px;font-size:0.85rem;color:#c8b89a}
.seal{text-align:center;font-size:2.8rem;margin:14px 0}
.nav-back{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;border-radius:3px;font-size:0.7rem;font-family:'Montserrat',sans-serif;font-weight:600;transition:.2s;margin-bottom:18px}
.nav-back:hover{background:rgba(255,255,255,0.09);color:#fff}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
</style></head>
<body><div id="root"></div>
<script>
const e = React.createElement;
const MODULE_ID = 'FRA_SOL03';
const CERT_KEY  = 'CERT_FRATERNITE_SOL3';
const XP_AMOUNT = 50;
const BACK_URL  = 'index_PIX_FRATERNITE.html';
const CERT_KEYS = ["CERT_FRATERNITE_SOL1","CERT_FRATERNITE_SOL2","CERT_FRATERNITE_SOL3","CERT_FRATERNITE_SOL4","CERT_FRATERNITE_DIS1","CERT_FRATERNITE_DIS2","CERT_FRATERNITE_DIS3","CERT_FRATERNITE_DIS4","CERT_FRATERNITE_VIE1","CERT_FRATERNITE_VIE2","CERT_FRATERNITE_VIE3","CERT_FRATERNITE_VIE4"];

const QUESTIONS = [
  {
    q: "Le RSA (Revenu de Solidarité Active) est une illustration de quelle forme de solidarité ?",
    a: ["Solidarité internationale", "Solidarité nationale institutionnalisée — l'État garantit un revenu minimum aux plus démunis via les cotisations collectives", "Solidarité associative privée", "Solidarité familiale obligatoire"],
    c: 1,
    wrong: "Le RSA est un dispositif de solidarité nationale : il garantit un revenu minimum à ceux qui n'ont pas de ressources suffisantes, financé par les cotisations et impôts de l'ensemble de la collectivité nationale."
  },
  {
    q: "Médecins Sans Frontières (MSF) incarne quel principe de solidarité internationale ?",
    a: ["La solidarité ne s'applique qu'entre citoyens du même pays", "L'humanité universelle : soigner toute personne en danger, sans distinction de nationalité, religion ou opinion", "L'aide conditionnelle aux pays alliés politiquement", "La solidarité économique entre États riches"],
    c: 1,
    wrong: "MSF a été fondé en 1971 sur le principe d'humanité universelle : le droit aux soins ne dépend pas de l'appartenance nationale ou politique. C'est une solidarité qui dépasse les frontières des États."
  },
  {
    q: "L'ONU fixe aux pays développés un objectif d'Aide Publique au Développement (APD) de 0,7% du Revenu National Brut. La France se situe à environ...",
    a: ["0,1% (très loin de l'objectif)", "0,5% (significatif mais encore sous l'objectif)", "0,7% (objectif atteint)", "1,2% (au-dessus de l'objectif)"],
    c: 1,
    wrong: "La France consacre environ 0,5% de son RNB à l'APD — ce qui représente des milliards d'euros et un engagement réel, mais qui reste en deçà de l'objectif fixé par l'ONU. Seuls quelques pays (Norvège, Suède, Luxembourg...) atteignent ou dépassent les 0,7%."
  }
];

const SCENARIO = {
  title: "La collecte humanitaire",
  p: "Ton collège organise une collecte pour une association humanitaire. Certains de tes camarades disent : 'Ça sert à rien, nos 5€ ne changeront rien dans le monde.' Comment réagis-tu ?",
  options: [
    {
      text: "Je leur explique que c'est l'agrégation des petits gestes qui fait la solidarité à grande échelle. Une collecte de classe, multipliée par des milliers de classes en France, devient une aide significative. Et au-delà de l'argent, le geste crée une culture de la solidarité — aussi important que la somme elle-même.",
      ok: true,
      fb: ""
    },
    {
      text: "Ils ont raison, 5€ c'est négligeable.",
      ok: false,
      fb: "Le raisonnement 'mon geste ne compte pas' est le même que celui qui empêche de voter, de trier ses déchets, de signer une pétition. La solidarité à grande échelle est précisément l'agrégation de milliers de petits gestes — et aucun d'eux n'est négligeable."
    },
    {
      text: "Je dis rien et je donne quand même.",
      ok: false,
      fb: "Donner discrètement, c'est bien. Mais répondre à l'argument défaitiste aurait une valeur ajoutée : ça crée une conversation et peut entraîner d'autres à donner."
    }
  ]
};

const SYNTHESIS = [
  {icon:"🏥", t:"RSA :", v:"Solidarité nationale institutionnalisée. Filet de sécurité collectif pour les plus démunis."},
  {icon:"✈️", t:"MSF / Croix-Rouge :", v:"Solidarité internationale fondée sur l'humanité universelle. Les soins ne connaissent pas de frontières."},
  {icon:"💰", t:"APD française :", v:"Environ 0,5% du RNB. Un engagement réel, mais sous l'objectif ONU de 0,7%."},
  {icon:"🌊", t:"L'agrégation :", v:"La solidarité à grande échelle est la somme de milliers de petits gestes. Chacun compte."}
];

function getPlayer(){return localStorage.getItem('pvs_current_player')||'anonyme';}
function countCerts(){let n=0;CERT_KEYS.forEach(k=>{try{if(localStorage.getItem(k))n++;}catch(ex){}});return n;}

function awardXP(){
  try{
    const raw=localStorage.getItem('pvs_bridge_events');
    const evts=raw?JSON.parse(raw):[];
    evts.push({
      id:'FRA-'+MODULE_ID+'-'+Date.now(),
      type:'FRATERNITE_PROGRESS',
      player:getPlayer(),
      module:MODULE_ID,
      cpTotal:countCerts(),
      label:'FRATERNITÉ : Solidarité nationale et internationale',
      d:new Date().toISOString()
    });
    if(evts.length>700)evts.splice(0,evts.length-700);
    localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage',{key:'pvs_bridge_events'}));
  }catch(ex){}
}

function App(){
  const [step,setStep]=React.useState('intro');
  const [qIdx,setQIdx]=React.useState(0);

  const finish=()=>{
    const cert={v:2,d:new Date().toISOString(),m:MODULE_ID,n:getPlayer(),f:true};
    localStorage.setItem(CERT_KEY,JSON.stringify(cert));
    awardXP();
    setStep('complete');
  };

  const goBack=()=>{window.location.href=BACK_URL;};
  const PlayerChip=()=>e('div',{className:'player-chip'},'🎮 ',getPlayer());

  const renderIntro=()=>e('div',{className:'card'},
    e('div',{className:'top-row'},
      e('button',{className:'nav-back',onClick:goBack},'← Fraternité'),
      PlayerChip()
    ),
    e('div',{className:'tag'},'Solidarité · Module 3/4'),
    e('h1',null,"Solidarité nationale et internationale"),
    e('p',{className:'quote'},"« Chaque fois que tu fais du bien à quelqu'un d'autre, tu participes à la guérison du monde. » — inspiré d'Albert Camus"),
    e('p',null,"La solidarité ne s'arrête pas aux frontières de la classe ou du quartier. La France a construit un système de solidarité nationale élaboré : Sécurité sociale, RSA, allocations chômage — des filets qui protègent chacun parce que tous y contribuent."),
    e('p',null,"Au-delà des frontières nationales, des organisations comme Médecins Sans Frontières ou la Croix-Rouge incarnent une solidarité universelle : le droit aux soins ne dépend pas du passeport. Et les États eux-mêmes peuvent s'engager collectivement via l'Aide Publique au Développement — un engagement chiffré, mesurable, mais souvent insuffisant."),
    e('div',{style:{textAlign:'center'}},
      e('div',{className:'xp-badge'},'⚡ +50 XP à la clé')),
    e('button',{className:'btn',onClick:()=>setStep('quiz')},"Élargir les cercles")
  );

  const renderQuiz=()=>{
    const q=QUESTIONS[qIdx];
    const pct=25+Math.round((qIdx/QUESTIONS.length)*30);
    return e('div',{className:'card'},
      e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:pct+'%'}})),
      e('div',{className:'step-tag'},'Question '+(qIdx+1)+' / '+QUESTIONS.length),
      e('h2',null,q.q),
      q.a.map((opt,i)=>e('button',{
        key:i,className:'opt',
        onClick:()=>{
          if(i===q.c){if(qIdx<QUESTIONS.length-1)setQIdx(qIdx+1);else setStep('scenario');}
          else alert(q.wrong||'La solidarité à grande échelle a ses propres logiques. Réessaie.');
        }
      },opt))
    );
  };

  const renderScenario=()=>e('div',{className:'card'},
    e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'70%'}})),
    e('div',{className:'step-tag'},'Mise en situation'),
    e('h2',null,SCENARIO.title),
    e('p',null,SCENARIO.p),
    SCENARIO.options.map((opt,i)=>e('button',{
      key:i,className:'opt',
      onClick:()=>{if(opt.ok)setStep('synthesis');else alert(opt.fb);}
    },opt.text))
  );

  const renderSynthesis=()=>e('div',{className:'card'},
    e('div',{className:'progress'},e('div',{className:'progress-fill',style:{width:'88%'}})),
    e('div',{className:'step-tag'},'Synthèse'),
    e('h2',null,"Ce qu'il faut retenir"),
    e('div',{className:'summary-box'},
      SYNTHESIS.map((s,i)=>e('p',{key:i},e('strong',null,s.icon+' '+s.t+' '),s.v))
    ),
    e('button',{className:'btn',onClick:finish},'Valider ce module →')
  );

  const renderComplete=()=>e('div',{className:'card'},
    e('div',{className:'seal'},'🌍'),
    e('h1',null,"La solidarité sans frontières maîtrisée !"),
    e('p',{style:{textAlign:'center'}},"Module validé — du RSA aux ONG, la solidarité a mille visages."),
    e('div',{style:{textAlign:'center',margin:'8px 0'}},
      e('div',{className:'xp-badge'},'⚡ +50 XP envoyés au Portail')),
    e('button',{className:'btn',onClick:goBack},'← Retour au Hub Fraternité')
  );

  switch(step){
    case 'intro':     return renderIntro();
    case 'quiz':      return renderQuiz();
    case 'scenario':  return renderScenario();
    case 'synthesis': return renderSynthesis();
    case 'complete':  return renderComplete();
    default:          return renderIntro();
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
