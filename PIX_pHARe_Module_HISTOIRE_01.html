<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX-pHARe | Module HISTOIRE 01 - Avant le Mot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');
        
        :root {
            --history-bronze: #cd7f32;
            --history-amber: #d4a574;
            --history-sepia: #b08968;
            --history-parchment: #e8d5b5;
            --history-ink: #2c1810;
            --void-dark: #0a0a0a;
            --deep-dark: #050505;
            --panel-bg: rgba(44, 24, 16, 0.95);
            --text-primary: #f5ede4;
            --text-secondary: #a89984;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--void-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .history-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 50% 20%, rgba(205, 127, 50, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 70%, rgba(176, 137, 104, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(212, 165, 116, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: historyGlow 8s ease-in-out infinite;
        }
        
        @keyframes historyGlow {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.9; }
        }
        
        .stars-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(1px 1px at 20% 30%, rgba(205, 127, 50, 0.6), transparent),
                radial-gradient(1px 1px at 60% 70%, rgba(212, 165, 116, 0.5), transparent),
                radial-gradient(1px 1px at 80% 10%, rgba(176, 137, 104, 0.4), transparent);
            background-size: 200px 200px;
            animation: starsFloat 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes starsFloat {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header { text-align: center; padding: 40px 20px; }
        
        .pillar-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(205, 127, 50, 0.7));
            animation: bookPulse 3s ease-in-out infinite;
        }
        
        @keyframes bookPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(205, 127, 50, 0.7)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 30px rgba(205, 127, 50, 0.9)); }
        }
        
        .glitch-title {
            font-family: 'Orbitron', sans-serif;

            background: linear-gradient(135deg, var(--history-bronze), var(--history-amber), var(--history-sepia));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            animation: gradientShift 4s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            font-family: 'Share Tech Mono', monospace;

            border-radius: 0;

<body>
    <div class="history-bg"></div>
    <div class="stars-overlay"></div>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const { useState } = React;
        const e = React.createElement;

        const MODULE_ID = "HISTOIRE_01";
        const MODULE_TITLE = "Avant le Mot";
        const MODULE_VERSION = "2.0";

        const flashcardsData = [
            {
                question: "Pourquoi le harcèlement était-il invisible avant 1970 ?",
                hint: "[ Clique pour révéler ]",
                answer: "Parce que <strong>le mot n'existait pas</strong>. Sans nom, pas de visibilité. La violence entre élèves était vue comme un 'rite de passage' nécessaire ou un simple 'durcissement' formatif. L'institution scolaire se concentrait sur la discipline verticale (maîtres → élèves), ignorant la violence horizontale (entre pairs)."
            },
            {
                question: "Qu'est-ce que le bizutage historiquement ?",
                hint: "[ Clique pour révéler ]",
                answer: "Un <strong>rite d'initiation</strong> par l'humiliation et la souffrance, présent dès le Moyen Âge dans les universités. Exemple : statuts de Leipzig (1495) interdisant d'asperger les nouveaux d'urine. Le bizutage était vu comme un 'passage' vers l'élite, légitimant la violence codifiée."
            },
            {
                question: "Quelle vision la littérature classique donne-t-elle du harcèlement ?",
                hint: "[ Clique pour révéler ]",
                answer: "Elle montre des <strong>'souffre-douleur' victimes de tyrans</strong>, mais sans analyse systémique. Dickens (David Copperfield), Hughes (Tom Brown), Vallès (L'Enfant) : la violence scolaire est dépeinte comme intrinsèque à la société rigide, mais jamais questionnée comme problème de santé publique."
            },
            {
                question: "Quel était le paradigme du 'durcissement' ?",
                hint: "[ Clique pour révéler ]",
                answer: "L'idée que <strong>subir la violence forge le caractère</strong>. Dans les écoles-casernes du XIXe-XXe siècle, les brimades étaient vues comme un test de virilité préparant aux 'rudesses de la vie'. Cette croyance légitimait l'inaction institutionnelle face aux violences entre élèves."
            }
        ];

        const quizData = [
            {
                question: "Pourquoi l'absence du mot 'harcèlement' avant 1970 est-elle un problème majeur ?",
                options: [
                    "Parce que les enseignants ne parlaient pas bien français",
                    "Parce que sans nom, un phénomène reste invisible et ne peut être combattu",
                    "Parce que les élèves ne savaient pas lire",
                    "Parce que c'était interdit par la loi de nommer les violences"
                ],
                correct: 1,
                feedback: "Exact. 'Nommer, c'est faire exister'. Sans concept linguistique pour désigner la violence répétée entre pairs, impossible de la reconnaître, de la mesurer, de la prévenir. Le langage structure notre perception du réel."
            },
            {
                question: "Le bizutage universitaire du Moyen Âge nous enseigne quoi sur le harcèlement ?",
                options: [
                    "Que c'est une invention moderne",
                    "Que la violence ritualisée entre pairs existe depuis des siècles, souvent tolérée voire institutionnalisée",
                    "Que les étudiants étaient plus méchants qu'aujourd'hui",
                    "Que c'était réservé aux universités"
                ],
                correct: 1,
                feedback: "Parfait. Le bizutage montre que la violence entre pairs n'est pas nouvelle, mais qu'elle a longtemps été acceptée comme 'rite de passage'. Comprendre cette continuité historique aide à déconstruire l'idée que 'ça a toujours été comme ça, donc c'est normal'."
            },
            {
                question: "Dans les romans de Dickens ou Vallès, pourquoi les personnages harcelés ne sont-ils jamais secourus par l'institution ?",
                options: [
                    "Parce que l'institution elle-même était basée sur la violence verticale et la discipline rigide",
                    "Parce que les enseignants étaient tous méchants",
                    "Parce que les élèves ne dénonçaient jamais",
                    "Parce que les romans mentent"
                ],
                correct: 0,
                feedback: "Exact. L'école-caserne du XIXe siècle reposait sur l'autorité par la punition corporelle (maîtres → élèves). Cette violence descendante créait un environnement où la domination physique était normalisée, rendant la violence horizontale (entre élèves) invisible ou acceptable."
            },
            {
                question: "Le paradigme du 'durcissement' (subir la violence forge le caractère) est problématique parce que :",
                options: [
                    "Il confond souffrance et apprentissage, légitimant des traumatismes inutiles",
                    "Il rend les élèves plus forts physiquement",
                    "Il prépare vraiment à la vie adulte",
                    "Il a été prouvé scientifiquement efficace"
                ],
                correct: 0,
                feedback: "Parfait. Le mythe du 'ce qui ne tue pas rend plus fort' appliqué aux enfants est dangereux. Les neurosciences montrent que les traumatismes précoces altèrent le développement cérébral. La résilience se construit par le soutien, pas par l'exposition à la violence."
            }
        ];

        const scenarioData = [
            {
                title: "L'Héritage du Silence",
                context: "Tu lis un vieux règlement scolaire de 1920. Il détaille les punitions pour insolence envers les maîtres, mais aucune mention des violences entre élèves.",
                intro: "Un camarade te dit : 'De toute façon, avant c'était pire, et personne ne s'en plaignait. Pourquoi en faire tout un plat aujourd'hui ?' Comment réagis-tu ?",
                choices: [
                    {
                        text: "Tu es d'accord : 'Oui, les jeunes d'aujourd'hui sont trop sensibles'",
                        result: "Erreur de perspective historique. Ce n'est pas que 'c'était mieux avant' : c'est que la violence était invisible car non nommée. Les victimes souffraient en silence, sans recours. L'absence de plainte ≠ absence de souffrance.",
                        impact: { lucidite: -30, compassion: -20 }
                    },
                    {
                        text: "Tu dis : 'Justement, on a compris que ce silence causait des dégâts énormes. Nommer le problème, c'est le premier pas pour le résoudre.'",
                        result: "Excellent. Tu comprends que l'évolution n'est pas dans la 'sensibilité' des victimes, mais dans la reconnaissance institutionnelle du problème. Le silence d'avant était une forme de violence systémique, pas une preuve d'absence de souffrance.",
                        impact: { lucidite: +35, compassion: +30 }
                    },
                    {
                        text: "Tu changes de sujet pour éviter le débat",
                        result: "Tu reproduis le silence historique. Ne pas questionner les mythes du passé, c'est les perpétuer. L'histoire montre que l'inaction se nourrit de l'indifférence collective.",
                        impact: { lucidite: -10, compassion: -5 }
                    }
                ]
            },
            {
                title: "Le Bizutage Moderne",
                context: "Dans ton collège, des 3èmes ont une 'tradition' : faire passer des 'épreuves' aux 6èmes la première semaine. Ils appellent ça 'l'intégration'.",
                intro: "Grâce à ce que tu sais de l'histoire du bizutage, tu reconnais un schéma ancien. Que fais-tu ?",
                choices: [
                    {
                        text: "Tu participes : 'C'est une tradition, ça les aidera à s'intégrer'",
                        result: "Tu reproduis exactement la logique médiévale du bizutage. 'Tradition' n'est pas synonyme de 'légitime'. Les universités interdisaient déjà ces pratiques en 1495 parce qu'elles reconnaissaient leur caractère humiliant et dangereux.",
                        impact: { lucidite: -35, compassion: -30 }
                    },
                    {
                        text: "Tu en parles à un adulte référent : 'Ce qu'on appelle 'tradition' ressemble au bizutage historique, une violence ritualisée qu'on devrait arrêter'",
                        result: "Parfait. Tu utilises ta connaissance historique pour identifier un pattern toxique. Nommer le bizutage pour ce qu'il est (violence codifiée) permet de briser le mythe de la 'tradition inoffensive'. C'est exactement ce qu'ont fait les chercheurs des années 1970.",
                        impact: { lucidite: +40, compassion: +35 }
                    },
                    {
                        text: "Tu refuses de participer mais sans intervenir pour protéger les 6èmes",
                        result: "Intégrité personnelle préservée, mais passivité collective. L'histoire montre que le silence des témoins est ce qui a permis au bizutage de perdurer pendant des siècles. Ne pas participer c'est bien, mais insuffisant.",
                        impact: { lucidite: +10, compassion: +5 }
                    }
                ]
            }
        ];

        function encodeSaveCode(data) { return btoa(JSON.stringify(data)); }

        function App() {
            const [gameState, setGameState] = useState("intro");
            const [playerData, setPlayerData] = useState({
                name: localStorage.getItem('pvs_current_player') || 'Anonyme',
                class: "",
                xp: 0,
                score: 0,
                quizScore: 0,
                scenarioScore: 0
            });

            const [currentFlashcard, setCurrentFlashcard] = useState(0);
            const [flashcardFlipped, setFlashcardFlipped] = useState(false);

            const [currentQuiz, setCurrentQuiz] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showQuizFeedback, setShowQuizFeedback] = useState(false);

            const [currentScenario, setCurrentScenario] = useState(0);
            const [scenarioChoice, setScenarioChoice] = useState(null);
            const [showScenarioResult, setShowScenarioResult] = useState(false);

            function startGame() {
                if (playerData.name.trim()) {
                    setGameState("flashcards");
                }

            function generateSaveCode() {
                const saveData = {
                    v: 1,
                    d: new Date().toISOString(),
                    m: MODULE_ID,
                    mv: MODULE_VERSION,
                    n: playerData.name,
                    l: 3,
                    s: playerData.score,
                    x: playerData.xp,
                    q: playerData.quizScore,
                    sc: playerData.scenarioScore,
                    f: true
                };
                return encodeSaveCode(saveData);
            }

            function copyCode() {
                const code = generateSaveCode();
                navigator.clipboard.writeText(code)
                    .then(() => alert("\u2705 Code copié dans le presse-papier !"))
                    .catch(() => prompt("Copie ce code manuellement :", code));
            }

            }

            function nextFlashcard() {
                if (currentFlashcard < flashcardsData.length - 1) {
                    setCurrentFlashcard(prev => prev + 1);
                    setFlashcardFlipped(false);
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 10 }));
                } else {
                    setGameState("quiz");
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 40 }));
                }
            }

            function prevFlashcard() {
                if (currentFlashcard > 0) {
                    setCurrentFlashcard(prev => prev - 1);
                    setFlashcardFlipped(false);
                }
            }

            function selectQuizAnswer(index) {
                if (showQuizFeedback) return;
                setSelectedAnswer(index);
            }

            function validateQuizAnswer() {
                setShowQuizFeedback(true);
                const isCorrect = selectedAnswer === quizData[currentQuiz].correct;
                if (isCorrect) {
                    setPlayerData(prev => ({
                        ...prev,
                        score: prev.score + 25,
                        quizScore: prev.quizScore + 25,
                        xp: prev.xp + 25
                    }));
                }
            }

            function nextQuizQuestion() {
                if (currentQuiz < quizData.length - 1) {
                    setCurrentQuiz(prev => prev + 1);
                    setSelectedAnswer(null);
                    setShowQuizFeedback(false);
                } else {
                    setGameState("scenarios");
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 50 }));
                }
            }

            function makeScenarioChoice(index) {
                setScenarioChoice(index);
                setShowScenarioResult(true);

                const choice = scenarioData[currentScenario].choices[index];
                const values = Object.values(choice.impact);
                const totalChange = Math.max(0, values.reduce((a, b) => a + b, 0));

                setPlayerData(prev => ({
                    ...prev,
                    score: prev.score + totalChange,
                    scenarioScore: prev.scenarioScore + totalChange,
                    xp: prev.xp + 20
                }));
            }

            function nextScenario() {
                if (currentScenario < scenarioData.length - 1) {
                    setCurrentScenario(prev => prev + 1);
                    setScenarioChoice(null);
                    setShowScenarioResult(false);
                } else {

                    // ── Remontée XP vers Superhub PVS ──
                    try {
                        var _pvs = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
                        _pvs.push({
                            id: 'PIXHARE-' + MODULE_ID + '-' + Date.now(),
                            type: 'PIXHARE_PROGRESS',
                            player: playerData.name,
                            module: MODULE_ID,
                            score: playerData.score,
                            xp: playerData.xp,
                            d: new Date().toISOString()
                        });
                        localStorage.setItem('CERT_PHARE_HISTOIRE_01',JSON.stringify({v:1,d:new Date().toISOString(),m:'HISTOIRE_01',f:true}));
                    localStorage.setItem('pvs_bridge_events', JSON.stringify(_pvs));
                        window.dispatchEvent(new StorageEvent('storage', { key: 'pvs_bridge_events' }));
                    } catch (_e) { /* silencieux */ }
                    // ── Fin bridge ──
                    setGameState("complete");
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 75 }));
                }
            }

            function renderIntro() {
                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, "PIX-pHARe"),
                        e("div", { className: "subtitle" }, "Pilier Histoire Sociétale"),
                        e("div", { className: "module-badge" }, "MODULE 01")
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "🕰️"),
                            e("div", { className: "panel-title" }, MODULE_TITLE)
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "intro-screen" },
                                e("p", null,
                                    "Avant 1970, le mot ", e("strong", { style: { color: "var(--history-amber)" } }, "'harcèlement scolaire'"),
                                    " n'existait pas. Sans nom, la violence entre élèves restait invisible."
                                ),
                                e("p", null,
                                    "Tu vas découvrir comment l'école-caserne, le bizutage médiéval, et la littérature classique ont façonné un ", 
                                    e("strong", { style: { color: "var(--history-bronze)" } }, "silence institutionnel"),
                                    " qui a protégé les agresseurs pendant des siècles."
                                ),
                                e("p", null,
                                    "Comprendre cette 'préhistoire' du harcèlement, c'est comprendre pourquoi ", 
                                    e("strong", null, "nommer un problème est le premier acte de résistance"), "."
                                )
                            ),
                            e("div", { style: { textAlign: "center", marginTop: "20px" } },
                                e("div", { style: { padding: "10px 16px", background: "rgba(205,127,50,0.12)", border: "1px solid var(--history-bronze)", borderRadius: "6px", marginBottom: "16px", fontSize: "0.9rem", color: "var(--history-amber)" } },
                                    "🔗 Connecté via Portail Vie Scolaire"
                                ),
                                e("button", { className: "action-btn", onClick: startGame }, "[ COMMENCER ]")
                            )
                        )
                    )
                );
            }

            function renderFlashcards() {
                const card = flashcardsData[currentFlashcard];

                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, MODULE_TITLE),
                        e("div", { className: "subtitle" }, "Niveau 1 : Archéologie du Silence")
                    ),
                    e("div", { className: "progress-bar" },
                        e("div", { className: "progress-node active" }, "1"),
                        e("div", { className: "progress-node" }, "2"),
                        e("div", { className: "progress-node" }, "3")
                    ),
                    e("div", { className: "xp-display" },
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "XP"),
                            e("div", { className: "xp-value" }, playerData.xp)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Carte"),
                            e("div", { className: "xp-value" }, `${currentFlashcard + 1}/${flashcardsData.length}`)
                        )
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "📚"),
                            e("div", { className: "panel-title" }, "Archives Historiques")
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "flashcard-container" },
                                e("div", {
                                    className: `flashcard ${flashcardFlipped ? "flipped" : ""}`,
                                    onClick: () => setFlashcardFlipped(!flashcardFlipped)
                                },
                                    e("div", { className: "flashcard-face flashcard-front" },
                                        e("div", { className: "flashcard-question" }, card.question),
                                        e("div", { className: "flashcard-hint" }, card.hint)
                                    ),
                                    e("div", { className: "flashcard-face flashcard-back" },
                                        e("div", {
                                            className: "flashcard-answer",
                                            dangerouslySetInnerHTML: { __html: card.answer }
                                        })
                                    )
                                )
                            ),
                            e("div", { className: "flashcard-nav" },
                                e("button", {
                                    className: "nav-btn",
                                    onClick: prevFlashcard,
                                    disabled: currentFlashcard === 0
                                }, "◄ PRÉC"),
                                e("button", {
                                    className: "nav-btn",
                                    onClick: nextFlashcard
                                }, currentFlashcard < flashcardsData.length - 1 ? "SUIV ►" : "NIVEAU 2 ►")
                            )
                        )
                    )
                );
            }

            function renderQuiz() {
                const question = quizData[currentQuiz];

                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, MODULE_TITLE),
                        e("div", { className: "subtitle" }, "Niveau 2 : Analyse Critique")
                    ),
                    e("div", { className: "progress-bar" },
                        e("div", { className: "progress-node completed" }, "✓"),
                        e("div", { className: "progress-node active" }, "2"),
                        e("div", { className: "progress-node" }, "3")
                    ),
                    e("div", { className: "xp-display" },
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "XP"),
                            e("div", { className: "xp-value" }, playerData.xp)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Score Quiz"),
                            e("div", { className: "xp-value" }, playerData.quizScore)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Question"),
                            e("div", { className: "xp-value" }, `${currentQuiz + 1}/${quizData.length}`)
                        )
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "🔍"),
                            e("div", { className: "panel-title" }, "Compréhension Historique")
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "quiz-question" }, question.question),
                            e("div", { className: "quiz-options" },
                                question.options.map((opt, idx) => {
                                    let optClass = "quiz-option";
                                    if (showQuizFeedback) {
                                        if (idx === question.correct) optClass += " correct";
                                        else if (idx === selectedAnswer) optClass += " incorrect";
                                    } else if (idx === selectedAnswer) {
                                        optClass += " selected";
                                    }

                                    return e("div", {
                                        key: idx,
                                        className: optClass,
                                        onClick: () => selectQuizAnswer(idx)
                                    },
                                        e("div", { className: "option-marker" }, String.fromCharCode(65 + idx)),
                                        e("div", { className: "option-text" }, opt)
                                    );
                                })
                            ),
                            showQuizFeedback && e("div", {
                                className: `feedback-box ${selectedAnswer !== question.correct ? "incorrect-feedback" : ""}`
                            },
                                e("div", { className: "feedback-title" },
                                    selectedAnswer === question.correct ? "✓ EXACT" : "✗ PAS TOUT À FAIT"
                                ),
                                e("p", null, question.feedback)
                            ),
                            e("div", { style: { textAlign: "center", marginTop: "25px" } },
                                !showQuizFeedback ?
                                    e("button", {
                                        className: "action-btn",
                                        onClick: validateQuizAnswer,
                                        disabled: selectedAnswer === null
                                    }, "[ VALIDER ]") :
                                    e("button", {
                                        className: "action-btn",
                                        onClick: nextQuizQuestion
                                    }, currentQuiz < quizData.length - 1 ? "[ SUIVANT ]" : "[ NIVEAU 3 ]")
                            )
                        )
                    )
                );
            }

            function renderScenarios() {
                const scenario = scenarioData[currentScenario];

                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, MODULE_TITLE),
                        e("div", { className: "subtitle" }, "Niveau 3 : Application")
                    ),
                    e("div", { className: "progress-bar" },
                        e("div", { className: "progress-node completed" }, "✓"),
                        e("div", { className: "progress-node completed" }, "✓"),
                        e("div", { className: "progress-node active" }, "3")
                    ),
                    e("div", { className: "xp-display" },
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "XP Total"),
                            e("div", { className: "xp-value" }, playerData.xp)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Score"),
                            e("div", { className: "xp-value" }, playerData.score)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Scénario"),
                            e("div", { className: "xp-value" }, `${currentScenario + 1}/${scenarioData.length}`)
                        )
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "⚖️"),
                            e("div", { className: "panel-title" }, scenario.title)
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "scenario-context" }, scenario.context),
                            e("div", { className: "scenario-intro" }, scenario.intro),
                            !showScenarioResult ?
                                e("div", { className: "choices" },
                                    scenario.choices.map((choice, idx) =>
                                        e("button", {
                                            key: idx,
                                            className: "choice-btn",
                                            onClick: () => makeScenarioChoice(idx)
                                        }, choice.text)
                                    )
                                ) :
                                e("div", { className: "choice-result" },
                                    e("p", { style: { marginBottom: "15px" } }, scenario.choices[scenarioChoice].result),
                                    e("div", { className: "impact-score" },
                                        Object.entries(scenario.choices[scenarioChoice].impact).map(([key, val]) =>
                                            e("div", {
                                                key: key,
                                                className: `impact-item ${val > 0 ? "positive" : "negative"}`
                                            }, `${key}: ${val > 0 ? "+" : ""}${val}`)
                                        )
                                    ),
                                    e("div", { style: { textAlign: "center", marginTop: "25px" } },
                                        e("button", {
                                            className: "action-btn",
                                            onClick: nextScenario
                                        }, currentScenario < scenarioData.length - 1 ? "[ SUIVANT ]" : "[ TERMINER ]")
                                    )
                                )
                        )
                    )
                );
            }

            function renderComplete() {
                return e("div", { className: "app-container" },
                    e("div", { className: "completion-screen" },
                        e("div", { className: "completion-icon" }, "✅"),
                        e("h1", { className: "completion-title" }, "MODULE COMPLÉTÉ"),
                        e("p", { className: "completion-subtitle" },
                            `Bravo ${playerData.name} ! Tu comprends maintenant l'histoire du silence.`
                        ),
                        e("div", { className: "stats-grid" },
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.score),
                                e("div", { className: "stat-label" }, "Score Total")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.xp),
                                e("div", { className: "stat-label" }, "XP Gagnés")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.quizScore),
                                e("div", { className: "stat-label" }, "Score Quiz")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.scenarioScore),
                                e("div", { className: "stat-label" }, "Score Scénarios")
                            )
                        ),
                        e("div", { className: "content-panel", style: { marginTop: "30px", textAlign: "left" } },
                            e("div", { className: "panel-header" },
                                e("div", { className: "panel-icon" }, "💡"),
                                e("div", { className: "panel-title" }, "Ce Que Tu As Appris")
                            ),
                            e("div", { className: "panel-body" },
                                e("p", null,
                                    "Avant 1970, le harcèlement n'avait pas de nom. Cette invisibilité linguistique protégeait un système où la violence entre pairs était ", 
                                    e("strong", null, "tolérée, ritualisée, voire encouragée"), "."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    "Le bizutage, les 'rites de passage', l'école-caserne : autant de formes de violence codifiée que la société acceptait. ", 
                                    e("strong", null, "Comprendre ce passé, c'est refuser de le reproduire"), "."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    "Prochain module : tu découvriras comment, dans les années 1970, des chercheurs nordiques ont ", 
                                    e("strong", { style: { color: "var(--history-amber)" } }, "nommé le problème"), 
                                    " et lancé la première révolution scientifique contre le harcèlement."
                                )
                            )
                        )
                    )
                );
            }

            switch (gameState) {
                case "intro": return renderIntro();
                case "flashcards": return renderFlashcards();
                case "quiz": return renderQuiz();
                case "scenarios": return renderScenarios();
                case "complete": return renderComplete();
                default: return renderIntro();
            }
        }

        ReactDOM.createRoot(document.getElementById("root")).render(e(App));
    </script>
</body>
</html>
