<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX-pHARe | Module HISTOIRE 05 - Comprendre pour Prévenir [CERTIFICATION]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');
        
        :root {
            --history-bronze: #cd7f32;
            --history-amber: #d4a574;
            --history-sepia: #b08968;
            --history-parchment: #e8d5b5;
            --history-ink: #2c1810;
            --void-dark: #0a0a0a;
            --deep-dark: #050505;
            --panel-bg: rgba(44, 24, 16, 0.95);
            --text-primary: #f5ede4;
            --text-secondary: #a89984;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--void-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .history-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 50% 20%, rgba(205, 127, 50, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 70%, rgba(176, 137, 104, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(212, 165, 116, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: historyGlow 8s ease-in-out infinite;
        }
        
        @keyframes historyGlow {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.9; }
        }
        
        .stars-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(1px 1px at 20% 30%, rgba(205, 127, 50, 0.6), transparent),
                radial-gradient(1px 1px at 60% 70%, rgba(212, 165, 116, 0.5), transparent),
                radial-gradient(1px 1px at 80% 10%, rgba(176, 137, 104, 0.4), transparent);
            background-size: 200px 200px;
            animation: starsFloat 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes starsFloat {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header { text-align: center; padding: 40px 20px; }
        
        .pillar-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(205, 127, 50, 0.7));
            animation: bookPulse 3s ease-in-out infinite;
        }
        
        @keyframes bookPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(205, 127, 50, 0.7)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 30px rgba(205, 127, 50, 0.9)); }
        }
        
        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--history-bronze), var(--history-amber), var(--history-sepia));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            animation: gradientShift 4s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: var(--history-amber);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .module-badge {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 30px;
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.3), rgba(212, 165, 116, 0.3));
            border: 2px solid var(--history-bronze);
            border-radius: 0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--history-bronze);
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
        }
        
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .progress-node {
            width: 55px;
            height: 55px;
            border: 3px solid var(--text-secondary);
            background: var(--deep-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-secondary);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            transition: all 0.4s ease;
        }
        
        .progress-node.active {
            border-color: var(--history-bronze);
            color: var(--history-bronze);
            box-shadow: 0 0 25px rgba(205, 127, 50, 0.6);
            animation: nodePulse 2s infinite;
        }
        
        .progress-node.completed {
            border-color: var(--history-amber);
            background: rgba(212, 165, 116, 0.2);
            color: var(--history-amber);
        }
        
        @keyframes nodePulse {
            0%, 100% { box-shadow: 0 0 15px rgba(205, 127, 50, 0.6); }
            50% { box-shadow: 0 0 30px rgba(205, 127, 50, 0.9); }
        }
        
        .xp-display {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .xp-box {
            background: var(--panel-bg);
            border: 1px solid var(--history-bronze);
            padding: 12px 20px;
            text-align: center;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
        }
        
        .xp-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .xp-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--history-bronze);
            margin-top: 5px;
        }
        
        .content-panel {
            background: var(--panel-bg);
            border: 1px solid var(--history-bronze);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(205, 127, 50, 0.15);
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(205, 127, 50, 0.3);
        }
        
        .panel-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 10px rgba(205, 127, 50, 0.6));
        }
        
        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--history-bronze);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .panel-body {
            color: var(--text-primary);
            line-height: 1.7;
        }
        
        .intro-screen p {
            margin-bottom: 15px;
            font-size: 1.05rem;
        }
        
        .name-input-group {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .input-wrapper label {
            display: block;
            margin-bottom: 8px;
            color: var(--history-bronze);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 12px 15px;
            background: var(--deep-dark);
            border: 1px solid var(--history-bronze);
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--history-amber);
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.3);
        }
        
        .action-btn {
            background: linear-gradient(135deg, var(--history-bronze), var(--history-sepia));
            color: var(--text-primary);
            border: none;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(205, 127, 50, 0.3);
        }
        
        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(205, 127, 50, 0.5);
        }
        
        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .flashcard-container {
            perspective: 1000px;
            margin: 30px 0;
        }
        
        .flashcard {
            width: 100%;
            min-height: 320px;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        
        .flashcard-face {
            width: 100%;
            min-height: 320px;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 35px;
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.1), rgba(212, 165, 116, 0.1));
            border: 2px solid var(--history-bronze);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(205, 127, 50, 0.2);
        }
        
        .flashcard-front {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.15), rgba(176, 137, 104, 0.15));
        }
        
        .flashcard-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.15), rgba(232, 213, 181, 0.15));
        }
        
        .flashcard-question {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--history-bronze);
            margin-bottom: 15px;
        }
        
        .flashcard-hint {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--history-amber);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .flashcard-answer {
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: center;
            color: var(--text-primary);
        }
        
        .flashcard-answer strong {
            color: var(--history-amber);
        }
        
        .flashcard-nav {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 12px 25px;
            background: transparent;
            border: 2px solid var(--history-bronze);
            color: var(--history-bronze);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: var(--history-bronze);
            color: var(--void-dark);
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.5);
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .quiz-question {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--history-bronze);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(205, 127, 50, 0.05);
            border: 2px solid rgba(205, 127, 50, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quiz-option:hover {
            background: rgba(205, 127, 50, 0.15);
            border-color: var(--history-bronze);
            transform: translateX(5px);
        }
        
        .quiz-option.selected {
            background: rgba(205, 127, 50, 0.2);
            border-color: var(--history-bronze);
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.3);
        }
        
        .quiz-option.correct {
            background: rgba(212, 165, 116, 0.2);
            border-color: var(--history-amber);
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.4);
        }
        
        .quiz-option.incorrect {
            background: rgba(176, 137, 104, 0.2);
            border-color: var(--history-sepia);
            box-shadow: 0 0 20px rgba(176, 137, 104, 0.4);
        }
        
        .option-marker {
            width: 35px;
            height: 35px;
            background: var(--history-bronze);
            color: var(--void-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }
        
        .option-text {
            flex: 1;
            font-size: 1rem;
            line-height: 1.5;
        }
        
        .feedback-box {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.15), rgba(232, 213, 181, 0.15));
            border: 2px solid var(--history-amber);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 0 25px rgba(212, 165, 116, 0.3);
        }
        
        .feedback-box.incorrect-feedback {
            background: linear-gradient(135deg, rgba(176, 137, 104, 0.15), rgba(205, 127, 50, 0.15));
            border-color: var(--history-sepia);
            box-shadow: 0 0 25px rgba(176, 137, 104, 0.3);
        }
        
        .feedback-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--history-amber);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .incorrect-feedback .feedback-title {
            color: var(--history-sepia);
        }
        
        .scenario-context {
            background: rgba(205, 127, 50, 0.1);
            border-left: 4px solid var(--history-bronze);
            padding: 15px 20px;
            margin-bottom: 20px;
            font-style: italic;
            color: var(--text-secondary);
        }
        
        .scenario-intro {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 25px;
        }
        
        .choices {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .choice-btn {
            padding: 18px 25px;
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.1), rgba(212, 165, 116, 0.1));
            border: 2px solid rgba(205, 127, 50, 0.4);
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            line-height: 1.5;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.2), rgba(212, 165, 116, 0.2));
            border-color: var(--history-bronze);
            transform: translateX(8px);
            box-shadow: 0 0 25px rgba(205, 127, 50, 0.3);
        }
        
        .choice-result {
            background: rgba(176, 137, 104, 0.1);
            border: 2px solid var(--history-sepia);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .choice-result p {
            line-height: 1.7;
            margin-bottom: 15px;
        }
        
        .impact-score {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        
        .impact-item {
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .impact-item.positive {
            background: rgba(212, 165, 116, 0.2);
            border: 1px solid var(--history-amber);
            color: var(--history-amber);
        }
        
        .impact-item.negative {
            background: rgba(176, 137, 104, 0.2);
            border: 1px solid var(--history-sepia);
            color: var(--history-sepia);
        }
        
        .completion-screen {
            text-align: center;
            padding: 40px 20px;
        }
        
        .completion-icon {
            font-size: 5rem;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 30px rgba(205, 127, 50, 0.8));
            animation: completionFloat 3s ease-in-out infinite;
        }
        
        @keyframes completionFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .completion-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--history-bronze), var(--history-amber));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .completion-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        
        .mastery-badge {
            display: inline-block;
            padding: 15px 40px;
            margin: 25px 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(205, 127, 50, 0.5);
        }
        
        .mastery-expert {
            background: linear-gradient(135deg, var(--history-bronze), var(--history-amber));
            color: var(--text-primary);
            border: 3px solid var(--history-sepia);
        }
        
        .mastery-confirmed {
            background: linear-gradient(135deg, var(--history-sepia), var(--history-bronze));
            color: var(--text-primary);
            border: 3px solid var(--history-amber);
        }
        
        .mastery-training {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.3), rgba(212, 165, 116, 0.3));
            color: var(--text-primary);
            border: 3px solid var(--history-bronze);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: var(--panel-bg);
            border: 2px solid var(--history-bronze);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--history-bronze);
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .save-code-box {
            background: var(--panel-bg);
            border: 2px solid var(--history-amber);
            border-radius: 8px;
            padding: 25px;
            margin: 30px 0;
        }
        
        .save-code-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--history-amber);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .save-code {
            background: var(--deep-dark);
            border: 1px solid var(--history-bronze);
            padding: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: var(--history-bronze);
            word-break: break-all;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .copy-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--history-amber), var(--history-bronze));
            border: none;
            color: var(--text-primary);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(212, 165, 116, 0.5);
        }
    </style>
</head>
<body>
    <div class="history-bg"></div>
    <div class="stars-overlay"></div>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const { useState } = React;
        const e = React.createElement;

        const MODULE_ID = "HISTOIRE_05";
        const MODULE_TITLE = "Comprendre pour Prévenir";
        const MODULE_VERSION = "2.0";

        const flashcardsData = [
            {
                question: "Quelle est la leçon principale du silence historique (pré-1970) ?",
                hint: "[ Clique pour révéler ]",
                answer: "<strong>Ce qui n'est pas nommé n'existe pas institutionnellement</strong>. Sans mot, pas de visibilité. Sans visibilité, pas de reconnaissance. Sans reconnaissance, pas de protection. Nommer un problème est le premier acte de résistance."
            },
            {
                question: "Pourquoi les 3 critères d'Olweus restent-ils essentiels aujourd'hui ?",
                hint: "[ Clique pour révéler ]",
                answer: "Ils permettent de <strong>distinguer harcèlement (asymétrique, répété, intentionnel) et conflit (bilatéral, ponctuel)</strong>. Cette distinction oriente l'intervention : médiation pour conflit, protocole protecteur pour harcèlement. Confondre les deux dilue les ressources et banalise le vrai harcèlement."
            },
            {
                question: "Quelle tension existe entre loi et prévention ?",
                hint: "[ Clique pour révéler ]",

        function getMasteryLevel(score) {
            if (score >= 450) return { level: "Historien Expert", class: "mastery-expert" };
            if (score >= 280) return { level: "Historien Confirmé", class: "mastery-confirmed" };
            return { level: "En Formation", class: "mastery-training" };
        }

        function App() {
            const [gameState, setGameState] = useState("intro");
            const [playerData, setPlayerData] = useState({
                name: localStorage.getItem('pvs_current_player') || 'Anonyme',
                class: "",
                level: 1,
                score: 0,
                xp: 0,
                quizScore: 0,
                scenarioScore: 0,
                flashcardsViewed: 0,
                finished: false
            });

            const [currentFlashcard, setCurrentFlashcard] = useState(0);
            const [flashcardFlipped, setFlashcardFlipped] = useState(false);

            const [currentQuiz, setCurrentQuiz] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showQuizFeedback, setShowQuizFeedback] = useState(false);

            const [currentScenario, setCurrentScenario] = useState(0);
            const [scenarioChoice, setScenarioChoice] = useState(null);
            const [showScenarioResult, setShowScenarioResult] = useState(false);

            function startGame() {
                if (playerData.name.trim()) {
                    setGameState("flashcards");
                }
            }

            function nextFlashcard() {
                if (currentFlashcard < flashcardsData.length - 1) {
                    setCurrentFlashcard(prev => prev + 1);
                    setFlashcardFlipped(false);
                    setPlayerData(prev => ({
                        ...prev,
                        flashcardsViewed: Math.max(prev.flashcardsViewed, currentFlashcard + 2),
                        xp: prev.xp + 15
                    }));
                } else {
                    setGameState("quiz");
                    setPlayerData(prev => ({
                        ...prev,
                        level: 2,
                        flashcardsViewed: flashcardsData.length,
                        xp: prev.xp + 50
                    }));
                }
            }

            function prevFlashcard() {
                if (currentFlashcard > 0) {
                    setCurrentFlashcard(prev => prev - 1);
                    setFlashcardFlipped(false);
                }
            }

            function selectQuizAnswer(index) {
                if (showQuizFeedback) return;
                setSelectedAnswer(index);
            }

            function validateQuizAnswer() {
                setShowQuizFeedback(true);
                const isCorrect = selectedAnswer === quizData[currentQuiz].correct;
                if (isCorrect) {
                    setPlayerData(prev => ({
                        ...prev,
                        score: prev.score + 30,
                        quizScore: prev.quizScore + 30,
                        xp: prev.xp + 30
                    }));
                }
            }

            function nextQuizQuestion() {
                if (currentQuiz < quizData.length - 1) {
                    setCurrentQuiz(prev => prev + 1);
                    setSelectedAnswer(null);
                    setShowQuizFeedback(false);
                } else {
                    setGameState("scenarios");
                    setPlayerData(prev => ({
                        ...prev,
                        level: 3,
                        xp: prev.xp + 60
                    }));
                }
            }

            function makeScenarioChoice(index) {
                setScenarioChoice(index);
                setShowScenarioResult(true);

                const choice = scenarioData[currentScenario].choices[index];
                const values = Object.values(choice.impact);
                const totalChange = Math.max(0, values.reduce((a, b) => a + b, 0));

                setPlayerData(prev => ({
                    ...prev,
                    score: prev.score + totalChange,
                    scenarioScore: prev.scenarioScore + totalChange,
                    xp: prev.xp + 25
                }));
            }

            function nextScenario() {
                if (currentScenario < scenarioData.length - 1) {
                    setCurrentScenario(prev => prev + 1);
                    setScenarioChoice(null);
                    setShowScenarioResult(false);
                } else {
                    completeModule();
                }
            }

            function completeModule() {
                setPlayerData(prev => ({
                    ...prev,
                    finished: true,
                    xp: prev.xp + 100
                }));
                setGameState("complete");
                // ── Validation automatique — pose le CERT et le bridge ──
                try {
                    var _player = localStorage.getItem('pvs_current_player')
                                || localStorage.getItem('pvs_phare_player')
                                || new URLSearchParams(window.location.search).get('player')
                                || '';
                    localStorage.setItem('CERT_PHARE_HISTOIRE_05', JSON.stringify({
                        v:1, d:new Date().toISOString(), m:'HISTOIRE_05', f:true
                    }));
                    var _pvs = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
                    _pvs.push({
                        id: 'PIXHARE-HISTOIRE_05-' + Date.now(),
                        type: 'PIXHARE_PROGRESS',
                        player: _player,
                        module: 'HISTOIRE_05',
                        xp: 100,
                        d: new Date().toISOString()
                    });
                    if(_pvs.length > 500) _pvs.splice(0, _pvs.length - 500);
                    localStorage.setItem('pvs_bridge_events', JSON.stringify(_pvs));
                    window.dispatchEvent(new StorageEvent('storage', {key:'pvs_bridge_events'}));
                } catch(_e) {}
            }

            function generateSaveCode() {
                const saveData = {
                    v: 1,
                    d: new Date().toISOString(),
                    m: MODULE_ID,
                    mv: MODULE_VERSION,
                    n: playerData.name,
                    c: playerData.class,
                    l: 3,
                    s: playerData.score,
                    x: playerData.xp,
                    q: playerData.quizScore,
                    sc: playerData.scenarioScore,
                    f: true
                };
                return encodeSaveCode(saveData);
            }

            function copyCode() {
                const code = generateSaveCode();
                navigator.clipboard.writeText(code).then(() => {
                    alert("Code copié dans le presse-papier !");

                            e("div", { className: "panel-title" }, "Test Final")
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "quiz-question" }, question.question),
                            e("div", { className: "quiz-options" },
                                question.options.map((opt, idx) => {
                                    let optClass = "quiz-option";

                                        if (idx === question.correct) optClass += " correct";
                                        else if (idx === selectedAnswer) optClass += " incorrect";
                                    } else if (idx === selectedAnswer) {
                                        optClass += " selected";
                                    }

                                        className: optClass,
                                        onClick: () => selectQuizAnswer(idx)

                                        e("div", { className: "option-marker" }, String.fromCharCode(65 + idx)),
                                        e("div", { className: "option-text" }, opt)
                                    );

                        e("h1", { className: "completion-title" }, "CERTIFICATION VALIDÉE"),
                        e("p", { className: "completion-subtitle" },
                            `Bravo ${playerData.name} ! Tu maîtrises l'histoire du combat anti-harcèlement.`
                        ),
                        e("div", { className: `mastery-badge ${mastery.class}` }, mastery.level),
                        e("div", { className: "stats-grid" },
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.score),
                                e("div", { className: "stat-label" }, "Score Total")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.xp),
                                e("div", { className: "stat-label" }, "XP Gagnés")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.quizScore),
                                e("div", { className: "stat-label" }, "Score Quiz")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.scenarioScore),
                                e("div", { className: "stat-label" }, "Score Scénarios")
                            )
                        ),

                        e("div", { className: "content-panel", style: { marginTop: "30px", textAlign: "left" } },
                            e("div", { className: "panel-header" },
                                e("div", { className: "panel-icon" }, "✨"),
                                e("div", { className: "panel-title" }, "L'Héritage Que Tu Portes")
                            ),
                            e("div", { className: "panel-body" },
                                e("p", null,
                                    "Tu es désormais l'héritier·ère de 50 ans de combat : Heinemann (1969), Olweus (1970), les lois (1990-2010), pHARe (2019)."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    "Chaque génération construit sur la précédente. ", 
                                    e("strong", null, "Ta génération (2025) a hérité d'outils que les victimes de 1970 n'avaient pas"), 
                                    ". Utilise-les. Diffuse-les. Perfectionne-les."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    "Comprendre l'histoire, c'est refuser de la reproduire. Tu sais maintenant ", 
                                    e("strong", { style: { color: "var(--history-amber)" } }, "pourquoi le silence tue"), 
                                    ", ", e("strong", { style: { color: "var(--history-bronze)" } }, "pourquoi nommer est un acte de résistance"), 
                                    ", et ", e("strong", null, "pourquoi ton rôle d'ambassadeur est crucial"), "."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    e("strong", null, "Porte cet héritage. Transmets-le. Et continues le combat.")
                                )
                            )
                        )
                    )
                );
            }

            switch (gameState) {
                case "intro": return renderIntro();
                case "flashcards": return renderFlashcards();
                case "quiz": return renderQuiz();
                case "scenarios": return renderScenarios();
                case "complete": return renderComplete();
                default: return renderIntro();
            }
        }

        ReactDOM.createRoot(document.getElementById("root")).render(e(App));
    </script>
</body>
</html>
