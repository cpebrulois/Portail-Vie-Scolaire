        .completion-screen{text-align:center;padding:46px 17px 38px}.completion-icon{font-size:5rem;margin-bottom:19px;animation:veaPulse 2.1s ease-in-out infinite}@keyframes veaPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}.completion-title{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:13px}

<body><div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState } = React; const e = React.createElement;
const MODULE_ID = "VEA_03"; const BACK_URL = "index_PIXHARe.html";

const flashcardsData = [
    { question: "C'est quoi l'empathie ?", hint: "[ Clique pour découvrir ]", answer: "L'empathie, c'est la capacité à <b>comprendre ce que vit l'autre</b> (ce qu'il pense, ressent) et à s'en préoccuper. Ce n'est pas forcément ressentir la même chose — c'est s'intéresser vraiment à la réalité de l'autre.", source: "Neurosciences affectives" },
    { question: "L'empathie et la pitié, c'est la même chose ?", hint: "[ Clique pour découvrir ]", answer: "Non. La pitié regarde l'autre <b>de haut</b> ('je suis content de ne pas être à ta place'). L'empathie descend au niveau de l'autre <b>sans le juger</b>. Brené Brown : 'L'empathie crée du lien. La pitié crée de la distance.'", source: "Brené Brown, 2010" },
    { question: "Pourquoi les neurones miroirs nous aident-ils ?", hint: "[ Clique pour découvrir ]", answer: "Les neurones miroirs sont des cellules du cerveau qui s'activent quand on <b>observe</b> quelqu'un agir ou ressentir quelque chose. Ils nous permettent de 'simuler' le vécu d'autrui — base neurologique de l'empathie.", source: "Rizzolatti, 1996" },
    { question: "Peut-on pratiquer l'empathie sans approuver ?", hint: "[ Clique pour découvrir ]", answer: "Oui. Comprendre pourquoi quelqu'un a fait quelque chose n'est pas l'excuser. L'empathie donne accès à la <b>perspective</b> de l'autre — pas à un jugement sur sa valeur.", source: "Psychologie sociale" },
    { question: "C'est quoi l'écoute active ?", hint: "[ Clique pour découvrir ]", answer: "C'est écouter avec tout son attention — sans préparer sa réponse, sans juger, sans minimiser. C'est reformuler ce qu'on entend pour s'assurer d'avoir bien compris. L'écoute active dit : 'je suis là pour toi.'", source: "Carl Rogers, 1951" },
];

const quizData = [
    { question: "Nathan sait exactement pourquoi Emma est triste — et il s'en moque. Qu'a-t-il ?", options: ["De l'empathie complète", "L'empathie cognitive, mais pas affective"], correct: 1, feedback: "Il comprend sans se soucier. C'est l'empathie cognitive (la compréhension) sans l'empathie affective (la résonance). L'empathie complète nécessite les deux." },
    { question: "Dire à quelqu'un 'je comprends ce que tu ressens' est toujours une bonne formule ?", options: ["Oui, ça montre de l'empathie", "Pas forcément — il vaut mieux reformuler son vécu"], correct: 1, feedback: "Reformuler ce qu'on entend ('tu te sens seul(e), c'est ça ?') est souvent plus efficace que la formule toute faite. Elle montre qu'on a vraiment écouté — pas qu'on a juste récité une réponse." },
];

const scenarioData = {
    context: "Ton amie Yasmine pleure. Elle vient de rater un examen important. Tu ne sais pas quoi dire.",
    intro: "Que fais-tu ?",
    choices: [
        { text: "Je reste à côté d'elle, sans rien forcer. Je lui dis : 'Je vois que c'est difficile pour toi. Tu veux parler ou juste ne pas être seule ?'", result: "✅ Parfait. Tu valides son émotion sans minimiser, et tu lui donnes le choix. C'est de l'empathie en acte — être là, sans prendre le contrôle.", positive: true },
        { text: "Je lui dis : 'Allez, c'est pas grave, tu vas te rattraper la prochaine fois !'", result: "⚠️ C'est bien intentionné, mais ça minimise ce qu'elle ressent. Pour Yasmine, c'est grave maintenant. L'empathie commence par accueillir — pas par rassurer trop vite.", positive: false },
    ]

function getPlayer(){try{var u=new URLSearchParams(window.location.search),p=u.get('player');if(p&&p.length>2){localStorage.setItem('pvs_current_player',p);return p;}}catch(ex){}return localStorage.getItem('pvs_current_player')||'';}
function awardXP(){try{var raw=localStorage.getItem('pvs_bridge_events'),evts=raw?JSON.parse(raw):[];evts.push({id:'VEA-'+MODULE_ID+'-'+Date.now(),type:'PHARE_PROGRESS',player:getPlayer(),module:MODULE_ID,label:"PIX pHARe : Voir avec les yeux de l'autre",d:new Date().toISOString()});if(evts.length>700)evts.splice(0,evts.length-700);localStorage.setItem('pvs_bridge_events',JSON.stringify(evts));var done=JSON.parse(localStorage.getItem('pvs_phare_done')||'{}');done[MODULE_ID]=true;localStorage.setItem('pvs_phare_done',JSON.stringify(done));}catch(ex){}}

function App(){
    const [gs,setGs]=useState("intro");const [pn,setPn]=useState(getPlayer());const [cf,setCf]=useState(0);const [ff,setFf]=useState(false);const [cq,setCq]=useState(0);const [sa,setSa]=useState(null);const [sqf,setSqf]=useState(false);const [qs,setQs]=useState(0);const [sc,setSc]=useState(null);const [xp,setXp]=useState(0);
    function goBack(){window.location.href=BACK_URL+(pn?'?player='+encodeURIComponent(pn):'');}
    function nextFC(){if(cf<flashcardsData.length-1){setCf(c=>c+1);setFf(false);setXp(x=>x+10);}else{setGs("quiz");setXp(x=>x+20);}}
    function prevFC(){if(cf>0){setCf(c=>c-1);setFf(false);}}
    function validateQ(){setSqf(true);if(sa===quizData[cq].correct){setQs(s=>s+1);setXp(x=>x+15);}}
    function nextQ(){if(cq<quizData.length-1){setCq(q=>q+1);setSa(null);setSqf(false);}else{setGs("scenario");}}
    function chooseS(i){setSc(i);if(scenarioData.choices[i].positive)setXp(x=>x+20);}
    function finish(){awardXP();setGs("complete");}

    if(gs==="intro")return e('div',{className:'app-container'},
        e('div',{className:'header'},e('div',{className:'pillar-icon'},'👁️'),e('h1',{className:'glitch-title'},"VOIR AVEC LES YEUX DE L'AUTRE"),e('div',{className:'subtitle'},'VEA 03 · Vivre Ensemble Actif'),e('div',{className:'module-badge'},'👁️ MODULE 3/6 · 100 XP')),
        e('div',{className:'xp-display'},e('div',{className:'xp-box'},e('div',{className:'xp-value'},'100'),e('div',{className:'xp-label'},'XP disponibles'))),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'👁️'),e('div',{className:'panel-title'},'Empathie et écoute')),
        e('div',{className:'panel-body intro-screen'},
            e('p',{style:{lineHeight:1.7,marginBottom:16}},"L'empathie, ce n'est pas être d'accord avec tout le monde. C'est être capable de se mettre à la place de l'autre — de comprendre sa perspective, même si on ne la partage pas."),
            e('p',{style:{lineHeight:1.7,marginBottom:16,color:'#4a6b5a'}},"Ce module explore comment pratiquer l'empathie au quotidien : comprendre sans juger, écouter vraiment, et créer des liens de qualité."),
            e('div',{className:'name-input-group'},e('input',{className:'name-input',type:'text',placeholder:'Ton prénom ou identifiant...',value:pn,onChange:ev=>setPn(ev.target.value)}),e('button',{className:'action-btn',onClick:()=>{if(pn.trim())setGs("flashcards");},disabled:!pn.trim()},'Commencer →')))));

    if(gs==="flashcards"){const card=flashcardsData[cf];return e('div',{className:'app-container'},
        e('div',{className:'header'},e('h1',{className:'glitch-title',style:{fontSize:'1.6rem'}},'FLASHCARDS'),e('div',{className:'subtitle'},cf+1+' / '+flashcardsData.length)),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'🃏'),e('div',{className:'panel-title'},"Empathie & écoute active")),
        e('div',{className:'panel-body'},
            e('div',{className:'flashcard-container'},e('div',{className:'flashcard'+(ff?' flipped':''),onClick:()=>setFf(f=>!f)},
                e('div',{className:'flashcard-face flashcard-front'},e('div',{className:'flashcard-question'},card.question),e('div',{className:'flashcard-hint'},card.hint)),
                e('div',{className:'flashcard-face flashcard-back'},e('div',{className:'flashcard-answer',dangerouslySetInnerHTML:{__html:card.answer}}),e('div',{className:'flashcard-source'},'— '+card.source)))),
            e('div',{className:'flashcard-nav'},e('button',{className:'nav-btn',onClick:prevFC,disabled:cf===0},'← Préc.'),e('button',{className:'nav-btn',onClick:nextFC},cf<flashcardsData.length-1?'Suiv. →':'Quiz →')))));}

    if(gs==="quiz"){const q=quizData[cq];return e('div',{className:'app-container'},
        e('div',{className:'header'},e('h1',{className:'glitch-title',style:{fontSize:'1.6rem'}},'QUIZ'),e('div',{className:'subtitle'},'Question '+(cq+1)+' / '+quizData.length)),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'❓'),e('div',{className:'panel-title'},'Vérifie ta compréhension')),
        e('div',{className:'panel-body'},e('div',{className:'quiz-question'},q.question),
            e('div',{className:'quiz-options'},q.options.map((opt,i)=>e('div',{key:i,className:'quiz-option'+(sqf?(i===q.correct?' correct':(i===sa?' incorrect':'')):(i===sa?' selected':'')),onClick:()=>{if(!sqf)setSa(i);}},e('div',{className:'option-marker'},String.fromCharCode(65+i)),e('div',{className:'option-text'},opt)))),
            sqf?e('div',{className:'feedback-box'+(sa===q.correct?'':' incorrect-feedback')},e('div',{className:'feedback-title'},sa===q.correct?'✅ Correct !':'❌ Pas tout à fait...'),e('p',null,q.feedback),e('button',{className:'action-btn',style:{marginTop:12},onClick:nextQ},cq<quizData.length-1?'Question suivante →':'Scénario →')):e('button',{className:'action-btn',disabled:sa===null,onClick:validateQ},'Valider'))));}

    if(gs==="scenario")return e('div',{className:'app-container'},
        e('div',{className:'header'},e('h1',{className:'glitch-title',style:{fontSize:'1.6rem'}},'SCÉNARIO'),e('div',{className:'subtitle'},'Comment réagis-tu ?')),
        e('div',{className:'content-panel'},e('div',{className:'panel-header'},e('div',{className:'panel-icon'},'🎭'),e('div',{className:'panel-title'},'Mise en situation')),
        e('div',{className:'panel-body'},e('div',{className:'scenario-context'},'📍 '+scenarioData.context),e('div',{className:'scenario-intro'},scenarioData.intro),
            sc===null?scenarioData.choices.map((c,i)=>e('button',{key:i,className:'choice-btn',onClick:()=>chooseS(i)},c.text)):e('div',null,e('div',{className:'choice-result'},scenarioData.choices[sc].result),e('button',{className:'action-btn',style:{marginTop:16},onClick:finish},'Terminer le module →')))));

    return e('div',{className:'app-container'},e('div',{className:'completion-screen'},
        e('div',{className:'completion-icon'},'👁️'),e('div',{className:'completion-title'},'MODULE COMPLÉTÉ !'),
        e('p',{style:{lineHeight:1.7,marginBottom:20,color:'#4a6b5a'}},"Tu sais maintenant voir avec les yeux de l'autre. L'empathie crée des liens que rien d'autre ne peut créer."),
        e('div',{className:'stats-grid'},e('div',{className:'stat-card'},e('div',{className:'stat-value'},xp),e('div',{className:'stat-label'},'XP gagnés')),e('div',{className:'stat-card'},e('div',{className:'stat-value'},qs+'/'+quizData.length),e('div',{className:'stat-label'},'Quiz')),e('div',{className:'stat-card'},e('div',{className:'stat-value'},'3/6'),e('div',{className:'stat-label'},'Modules VEA'))),
        e('button',{className:'action-btn',onClick:goBack},'← Retour au hub')));
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script></body></html>
