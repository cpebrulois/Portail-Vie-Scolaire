<!DOCTYPE html>
<html lang="fr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX-pHARe | Module VEA 01 — Qui suis-je vraiment ?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');

        .xp-value { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--vea-accent); }

        .content-panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--accent-gradient); }
        .panel-header { background: linear-gradient(135deg, #eafdf3, #f6fdf4); padding: 15px 22px; border-bottom: 1px solid #22c55e40; display: flex; align-items: center; gap: 12px; border-radius: 8px 8px 0 0; }
        .panel-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--vea-accent), #22c55e); display: flex; align-items: center; justify-content: center; font-size: 1.25rem; border-radius: 50%; }
        .panel-title { font-family: 'Orbitron', sans-serif; font-size: 1.06rem; font-weight: 700; color: var(--vea-accent); text-transform: uppercase; letter-spacing: 1.5px; }
        .panel-body { padding: 22px; }
        .intro-screen { text-align: center; padding: 22px 14px 30px 14px; }
        .name-input-group { margin: 22px auto 0 auto; max-width: 330px; }
        .name-input { width: 100%; padding: 12px; background: #f5fdf8; border: 2px solid var(--vea-accent); color: var(--text-primary); font-family: 'Share Tech Mono', monospace; font-size: 1rem; margin-bottom: 13px; border-radius: 6px; }
        .name-input:focus { outline: none; border-color: var(--vea-green); box-shadow: 0 0 9px #22c55e46; }
        .name-input::placeholder { color: #adc3b2; }
        .flashcard-container { perspective: 1100px; margin-bottom: 20px; }

        .flashcard-hint { font-family: 'Share Tech Mono', monospace; font-size: 0.86rem; color: var(--vea-green); text-align: center; }
        .flashcard-answer { font-size: 1rem; line-height: 1.7; color: var(--text-primary); font-style: italic; }
        .flashcard-source { color: var(--vea-green); font-size: 0.93em; margin-top: 11px; text-align: right; }
        .flashcard-nav { display: flex; justify-content: center; gap: 14px; margin-top: 15px; }
        .nav-btn { background: transparent; border: 2px solid var(--vea-green); color: var(--vea-green); padding: 10px 23px; font-family: 'Share Tech Mono', monospace; font-size: 0.93rem; cursor: pointer; border-radius: 5px; transition: all 0.3s; text-transform: uppercase; }
        .nav-btn:hover { background: #22c55e1a; box-shadow: 0 0 7px #22c55e40; }
        .nav-btn:disabled { opacity: 0.34; cursor: not-allowed; }
        .quiz-question { font-size: 1.08rem; font-weight: 600; margin-bottom: 17px; padding: 17px; background: linear-gradient(135deg, #eafdf3 90%, #f6fdf4 100%); border-left: 4px solid var(--vea-accent); border-radius: 5px 0 0 5px; }
        .quiz-options { display: flex; flex-direction: column; gap: 11px; }
        .quiz-option { background: #f5fdf8; border: 2px solid #c3ebd0; padding: 12px 16px; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; gap: 14px; border-radius: 5px; }
        .quiz-option:hover:not(.selected):not(.correct):not(.incorrect) { border-color: var(--vea-accent); background: #eafdf3; transform: translateX(5px); }
        .quiz-option.selected { border-color: var(--vea-green); background: #cbf2d8; }
        .quiz-option.correct { border-color: var(--vea-green); background: #c7f2e4; }
        .quiz-option.incorrect { border-color: var(--vea-bronze); background: #f3e7cf; }
        .option-marker { width: 33px; height: 33px; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-weight: 700; border-radius: 50%; }
        .option-text { flex: 1; font-size: 0.98rem; }
        .feedback-box { margin-top: 17px; padding: 17px; border-left: 4px solid var(--vea-green); background: #e2f5ee; border-radius: 5px; }
        .feedback-box.incorrect-feedback { border-color: var(--vea-bronze); background: #f6e9d4; }
        .feedback-title { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--vea-green); margin-bottom: 8px; }
        .feedback-box.incorrect-feedback .feedback-title { color: var(--vea-bronze); }
        .scenario-context { font-family: 'Share Tech Mono', monospace; font-size: 0.93rem; color: var(--vea-bronze); margin-bottom: 13px; padding: 10px 13px; background: #f3e7cf; border: 1px dashed var(--vea-bronze); border-radius: 4px; }
        .scenario-intro { font-size: 1.02rem; line-height: 1.7; margin-bottom: 17px; padding: 13px; background: #eafdf3; border: 1px solid #cbf2d8; border-radius: 4px; }
        .choice-btn { display: block; width: 100%; background: #f6fdf4; border: 2px solid #c3ebd0; padding: 14px 13px; margin-bottom: 10px; text-align: left; cursor: pointer; transition: all 0.25s; font-family: 'Rajdhani', sans-serif; font-size: 1rem; color: var(--text-primary); border-radius: 6px; }
        .choice-btn:hover { border-color: var(--vea-accent); background: #eafdf3; transform: translateX(5px); }
        .choice-result { margin-top: 17px; padding: 15px; background: #f5fdf8; border: 2px solid var(--vea-green); border-radius: 7px; }
        .action-btn { display: inline-block; background: var(--accent-gradient); color: white; border: none; padding: 12px 33px; font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1.7px; transition: all 0.25s; border-radius: 24px; margin-top: 8px; }
        .action-btn:hover { transform: scale(1.07); box-shadow: 0 0 15px #22c55e44; }
        .action-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .completion-screen { text-align: center; padding: 46px 17px 38px 17px; }
        .completion-icon { font-size: 5rem; margin-bottom: 19px; animation: veaPulse 2.1s ease-in-out infinite; }
        @keyframes veaPulse { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.12) rotate(3deg); } }
        .completion-title { font-family: 'Orbitron', sans-serif; font-size: 2.1rem; font-weight: 900; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 13px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(138px, 1fr)); gap: 19px; margin: 25px 0; }
        .stat-card { background: #f5fdf8; border: 2px solid var(--vea-accent); padding: 16px; text-align: center; border-radius: 9px; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 1.42rem; font-weight: 700; color: var(--vea-accent); }
        .stat-label { font-family: 'Share Tech Mono', monospace; font-size: 0.86rem; color: var(--text-secondary); text-transform: uppercase; margin-top: 5px; }
        @media (max-width: 600px) { .glitch-title { font-size: 1.3rem; } .progress-node { width: 39px; height: 39px; font-size: 0.93rem; } .panel-body { padding: 11px; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const { useState } = React;
        const e = React.createElement;
        const MODULE_ID = "VEA_01";
        const MODULE_TITLE = "Qui suis-je vraiment ?";
        const BACK_URL = "index_PIXHARe.html";

        const flashcardsData = [
            { question: "C'est quoi une 'force personnelle' ?", hint: "[ Clique pour découvrir ]", answer: "Une force personnelle, c'est quelque chose que tu fais naturellement bien et qui te donne de l'énergie. Ce n'est pas que ce que tu réussis — c'est ce qui te fait te sentir vivant(e) quand tu le fais.", source: "Peterson & Seligman, 2004" },
            { question: "Pourquoi connaître ses forces aide-t-il à aller bien ?", hint: "[ Clique pour découvrir ]", answer: "Quand on utilise ses forces, on se sent plus confiant(e), plus motivé(e), et moins fragile face aux difficultés. Se connaître, c'est avoir une boussole intérieure.", source: "Psychologie positive" },
            { question: "Qu'est-ce que les valeurs ?", hint: "[ Clique pour découvrir ]", answer: "Les valeurs sont ce qui compte vraiment pour toi — pas ce que les autres attendent, mais ce qui guide tes choix quand tu agis selon ta conscience. Par ex : loyauté, honnêteté, curiosité.", source: "Théorie de l'identité" },
            { question: "Peut-on avoir des forces sans le savoir ?", hint: "[ Clique pour découvrir ]", answer: "Oui. Beaucoup de forces sont invisibles à leurs propriétaires. Les autres les voient souvent avant nous. C'est pourquoi écouter ce que les proches admirent en nous est précieux.", source: "Approche narrative" },
            { question: "Connaissance de soi = se critiquer ?", hint: "[ Clique pour découvrir ]", answer: "Non. La connaissance de soi, c'est voir <b>aussi bien ses forces que ses difficultés</b>. Se concentrer uniquement sur ses défauts, c'est une déformation — pas de la lucidité.", source: "Psychologie humaniste, Rogers" },
        ];

        const quizData = [
            { question: "Camille dit : 'Je suis nulle en tout.' Qu'est-ce que cette affirmation révèle ?", options: ["Une lucidité sur ses limites", "Un biais de vision uniquement négatif"], correct: 1, feedback: "Exact. 'Je suis nulle en tout' est une généralisation qui efface les forces réelles. La connaissance de soi équilibrée voit aussi les points d'appui." },
            { question: "Connaître ses valeurs aide à :", options: ["Copier les choix des autres", "Prendre des décisions qui nous ressemblent"], correct: 1, feedback: "Juste ! Les valeurs sont la boussole. Elles t'aident à choisir sans te perdre." },
        ];

        const scenarioData = {
            context: "On te demande de présenter une de tes forces à ton groupe. Tu hesites — tu as peur qu'on pense que tu te vantes.",
            intro: "Qu'est-ce que tu choisis de faire ?",
            choices: [
                { text: "Je dis une force réelle, avec un exemple concret : 'Je suis quelqu'un d'attentif(ve) aux autres — j'ai remarqué quand mon ami était triste avant même qu'il parle.'", result: "✅ C'est exactement ça. Nommer une force avec un exemple concret, ce n'est pas se vanter — c'est se présenter honnêtement. Ça aide les autres à te connaître.", positive: true },
                { text: "Je dis quelque chose de vague pour pas paraître prétentieux(se) : 'Je sais pas, je suis assez normale.'", result: "⚠️ Minimiser ses forces ne protège pas — ça empêche les autres de vraiment te connaître. Et toi, tu passes à côté de quelque chose de précieux.", positive: false },
            ]
        };

        
function getPlayer(){
    try {
        var u = new URLSearchParams(window.location.search), p = u.get('player');
        if (p && p.length > 2) {
            localStorage.setItem('pvs_current_player', p);
            localStorage.setItem('pvs_phare_player', p);
            return p;
        }
    } catch(ex) {}
    var stored = localStorage.getItem('pvs_current_player')
              || localStorage.getItem('pvs_phare_player')
              || '';
    if (stored) {
        try {
            localStorage.setItem('pvs_current_player', stored);
            localStorage.setItem('pvs_phare_player', stored);
        } catch(ex) {}
    }
    return stored;
}

const PHARE_XP_MAP = {"GROUPE_01":100,"GROUPE_02":100,"GROUPE_03":100,"GROUPE_04":100,"GROUPE_05":100,"GROUPE_06":150,"GROUPE_07":175,"GROUPE_08":200,"GROUPE_09":225,"GROUPE_10":300,"HISTOIRE_01":100,"HISTOIRE_02":100,"HISTOIRE_03":100,"HISTOIRE_04":100,"HISTOIRE_05":100,"HISTOIRE_06":150,"HISTOIRE_07":175,"HISTOIRE_08":200,"HISTOIRE_09":225,"HISTOIRE_10":300,"JURIDIQUE_01":300,"JURIDIQUE_02":375,"JURIDIQUE_03":450,"JURIDIQUE_04":525,"JURIDIQUE_05":625,"JURIDIQUE_06":175,"JURIDIQUE_07":350,"JURIDIQUE_08":400,"JURIDIQUE_09":450,"JURIDIQUE_10":500,"NEURO_01":50,"NEURO_02":100,"NEURO_03":100,"NEURO_04":100,"NEURO_05":100,"NEURO_06":150,"NEURO_07":175,"NEURO_08":200,"NEURO_09":225,"NEURO_10":300,"NUMERIQUE_01":75,"NUMERIQUE_02":100,"NUMERIQUE_03":120,"NUMERIQUE_04":150,"NUMERIQUE_05":200,"NUMERIQUE_06":175,"NUMERIQUE_07":200,"NUMERIQUE_08":225,"NUMERIQUE_09":250,"NUMERIQUE_10":300,"VEA_01":75,"VEA_02":100,"VEA_03":100,"VEA_04":120,"VEA_05":150,"VEA_06":175,"VEA_07":175,"VEA_08":200,"VEA_09":225,"VEA_10":300};
const JDR_XP_MAP = {"CERT_JDR_GROUPE_A1":100,"CERT_JDR_GROUPE_A2":100,"CERT_JDR_GROUPE_A3":100,"CERT_JDR_GROUPE_A4":100,"CERT_JDR_HISTOIRE_A1":100,"CERT_JDR_HISTOIRE_A2":100,"CERT_JDR_HISTOIRE_A3":100,"CERT_JDR_HISTOIRE_A4":100,"CERT_JDR_NEURO_A1":100,"CERT_JDR_NEURO_A2":100,"CERT_JDR_NEURO_A3":100,"CERT_JDR_NEURO_A4":100,"CERT_JDR_NUMERIQUE_A1":100,"CERT_JDR_NUMERIQUE_A2":100,"CERT_JDR_NUMERIQUE_A3":100,"CERT_JDR_NUMERIQUE_A4":100,"CERT_JDR_JURIDIQUE_A1":100,"CERT_JDR_JURIDIQUE_A2":100,"CERT_JDR_JURIDIQUE_A3":100,"CERT_JDR_JURIDIQUE_A4":100};
const METACOG_CERT_KEYS = ["CERT_METACOG_GROUPE_A1","CERT_METACOG_HISTOIRE_A1","CERT_METACOG_JURIDIQUE_A1","CERT_METACOG_NEURO_A1","CERT_METACOG_NUMERIQUE_A1","CERT_METACOG_PROTOCOLE_VALDURNE"];
const VEA_LABEL_MAP = {"VEA_01":"PIX pHARe : Qui suis-je vraiment ?","VEA_02":"PIX pHARe : Mes émotions, mes alliées","VEA_03":"PIX pHARe : Voir avec les yeux de l'autre","VEA_04":"PIX pHARe : Dire ce que je pense sans blesser","VEA_05":"PIX pHARe : Agir pour le groupe"};
const PROTOCOLE_VALDURNE_CERT = 'CERT_PROTOCOLE_VALDURNE_01';
const PROTOCOLE_VALDURNE_METACOG = 'CERT_METACOG_PROTOCOLE_VALDURNE';
const PROTOCOLE_VALDURNE_XP = 150;

function getDonePhareModuleIds(){
    var ids = [];
    try {
        for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('CERT_PHARE_') === 0) ids.push(k.slice('CERT_PHARE_'.length));
        }
    } catch(ex) {}
    return Array.from(new Set(ids));
}

function computeCpTotal(){
    return getDonePhareModuleIds().length;
}

function computeHubXpTotal(){
    var xp = 0;
    getDonePhareModuleIds().forEach(function(id){
        xp += Number(PHARE_XP_MAP[id] || 0);
    });
    Object.keys(JDR_XP_MAP).forEach(function(certKey){
        if (localStorage.getItem(certKey)) xp += Number(JDR_XP_MAP[certKey] || 0);
    });
    METACOG_CERT_KEYS.forEach(function(certKey){
        if (localStorage.getItem(certKey)) xp += 100;
    });
    try {
        var pvc = JSON.parse(localStorage.getItem(PROTOCOLE_VALDURNE_CERT) || 'null');
        if (pvc && pvc.f) xp += Number(pvc.xp || PROTOCOLE_VALDURNE_XP);
    } catch(ex) {}
    if (localStorage.getItem(PROTOCOLE_VALDURNE_METACOG)) xp += 100;
    return xp;
}

function dispatchBridgeStorage(){
    try { window.dispatchEvent(new StorageEvent('storage', { key:'pvs_bridge_events' })); } catch(ex) {}
    try { window.dispatchEvent(new StorageEvent('storage', { key:'CERT_PHARE_' + MODULE_ID })); } catch(ex) {}
}

function awardXP(){
    try {
        var player = getPlayer();
        if (player) {
            localStorage.setItem('pvs_current_player', player);
            localStorage.setItem('pvs_phare_player', player);
        }

        var certPayload = JSON.stringify({
            v:1,
            d:new Date().toISOString(),
            m:MODULE_ID,
            f:true
        });
        localStorage.setItem('CERT_PHARE_' + MODULE_ID, certPayload);

        var done = JSON.parse(localStorage.getItem('pvs_phare_done') || '{}');
        done[MODULE_ID] = true;
        localStorage.setItem('pvs_phare_done', JSON.stringify(done));
        localStorage.setItem('pvs_phare_pending', MODULE_ID);

        var cpTotal = computeCpTotal();
        var hubXpTotal = computeHubXpTotal();
        var evts = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
        evts.push({
            id:'PHARE-' + MODULE_ID + '-' + Date.now(),
            type:'PIXHARE_PROGRESS',
            player:player,
            module:MODULE_ID,
            label:VEA_LABEL_MAP[MODULE_ID] || ('PIX pHARe : ' + MODULE_ID),
            xp:Number(PHARE_XP_MAP[MODULE_ID] || 0),
            cpTotal:cpTotal,
            hubXpTotal:hubXpTotal,
            totalXp:hubXpTotal,
            pixhareXpTotal:hubXpTotal,
            d:new Date().toISOString()
        });
        if (evts.length > 700) evts.splice(0, evts.length - 700);
        localStorage.setItem('pvs_bridge_events', JSON.stringify(evts));
        dispatchBridgeStorage();
    } catch(ex) {
        console.error('VEA bridge failure for ' + MODULE_ID, ex);
    }
}


function App() {
            const [gameState, setGameState] = useState("intro");
            const [playerName, setPlayerName] = useState(getPlayer());
            const [currentFlashcard, setCurrentFlashcard] = useState(0);
            const [flashcardFlipped, setFlashcardFlipped] = useState(false);
            const [currentQuiz, setCurrentQuiz] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showQuizFeedback, setShowQuizFeedback] = useState(false);
            const [quizScore, setQuizScore] = useState(0);
            const [scenarioChoice, setScenarioChoice] = useState(null);
            const [xp, setXp] = useState(0);

            function goBack() { window.location.href = BACK_URL + (playerName ? '?player=' + encodeURIComponent(playerName) : ''); }

            function startGame() { if (playerName.trim()) setGameState("flashcards"); }

            function nextFlashcard() {
                if (currentFlashcard < flashcardsData.length - 1) { setCurrentFlashcard(c => c + 1); setFlashcardFlipped(false); setXp(x => x + 10); }
                else { setGameState("quiz"); setXp(x => x + 20); }
            }
            function prevFlashcard() { if (currentFlashcard > 0) { setCurrentFlashcard(c => c - 1); setFlashcardFlipped(false); } }

            function selectAnswer(i) { if (!showQuizFeedback) setSelectedAnswer(i); }
            function validateAnswer() {
                setShowQuizFeedback(true);
                if (selectedAnswer === quizData[currentQuiz].correct) { setQuizScore(s => s + 1); setXp(x => x + 15); }
            }
            function nextQuiz() {
                if (currentQuiz < quizData.length - 1) { setCurrentQuiz(q => q + 1); setSelectedAnswer(null); setShowQuizFeedback(false); }
                else { setGameState("scenario"); }
            }

            function chooseScenario(idx) {
                setScenarioChoice(idx);
                if (scenarioData.choices[idx].positive) setXp(x => x + 20);
            }

            function finishModule() { awardXP(); setGameState("complete"); }

            // INTRO
            if (gameState === "intro") return e('div', { className: 'app-container' },
                e('div', { className: 'header' },
                    e('div', { className: 'pillar-icon' }, '🌱'),
                    e('h1', { className: 'glitch-title' }, 'QUI SUIS-JE VRAIMENT ?'),
                    e('div', { className: 'subtitle' }, 'VEA 01 · Vivre Ensemble Actif'),
                    e('div', { className: 'module-badge' }, '🌱 MODULE 1/6 · 75 XP')
                ),
                e('div', { className: 'xp-display' }, e('div', { className: 'xp-box' }, e('div', { className: 'xp-value' }, '75'), e('div', { className: 'xp-label' }, 'XP disponibles'))),
                e('div', { className: 'content-panel' },
                    e('div', { className: 'panel-header' }, e('div', { className: 'panel-icon' }, '🌱'), e('div', { className: 'panel-title' }, 'Connaissance de soi')),
                    e('div', { className: 'panel-body intro-screen' },
                        e('p', { style: { lineHeight: 1.7, marginBottom: 16 } }, "Se connaître, c'est avoir une boussole intérieure. Pas pour être parfait(e) — pour savoir d'où tu pars, ce qui te donne de l'énergie, et ce qui compte vraiment pour toi."),
                        e('p', { style: { lineHeight: 1.7, marginBottom: 16, color: '#4a6b5a' } }, "Ce module explore tes forces, tes valeurs, et comment les reconnaître — en toi et chez les autres."),
                        e('div', { className: 'name-input-group' },
                            e('input', { className: 'name-input', type: 'text', placeholder: 'Ton prénom ou identifiant...', value: playerName, onChange: ev => setPlayerName(ev.target.value) }),
                            e('button', { className: 'action-btn', onClick: startGame, disabled: !playerName.trim() }, 'Commencer →')
                        )
                    )
                )
            );

            // FLASHCARDS
            if (gameState === "flashcards") {
                const card = flashcardsData[currentFlashcard];
                return e('div', { className: 'app-container' },
                    e('div', { className: 'header' }, e('h1', { className: 'glitch-title', style: { fontSize: '1.6rem' } }, 'FLASHCARDS'), e('div', { className: 'subtitle' }, currentFlashcard + 1 + ' / ' + flashcardsData.length)),
                    e('div', { className: 'content-panel' },
                        e('div', { className: 'panel-header' }, e('div', { className: 'panel-icon' }, '🃏'), e('div', { className: 'panel-title' }, 'Mes forces et valeurs')),
                        e('div', { className: 'panel-body' },
                            e('div', { className: 'flashcard-container' },
                                e('div', { className: 'flashcard' + (flashcardFlipped ? ' flipped' : ''), onClick: () => setFlashcardFlipped(f => !f) },
                                    e('div', { className: 'flashcard-face flashcard-front' }, e('div', { className: 'flashcard-question' }, card.question), e('div', { className: 'flashcard-hint' }, card.hint)),
                                    e('div', { className: 'flashcard-face flashcard-back' }, e('div', { className: 'flashcard-answer', dangerouslySetInnerHTML: { __html: card.answer } }), e('div', { className: 'flashcard-source' }, '— ' + card.source))
                                )
                            ),
                            e('div', { className: 'flashcard-nav' },
                                e('button', { className: 'nav-btn', onClick: prevFlashcard, disabled: currentFlashcard === 0 }, '← Préc.'),
                                e('button', { className: 'nav-btn', onClick: nextFlashcard }, currentFlashcard < flashcardsData.length - 1 ? 'Suiv. →' : 'Quiz →')
                            )
                        )
                    )
                );
            }

            // QUIZ
            if (gameState === "quiz") {
                const q = quizData[currentQuiz];
                return e('div', { className: 'app-container' },
                    e('div', { className: 'header' }, e('h1', { className: 'glitch-title', style: { fontSize: '1.6rem' } }, 'QUIZ'), e('div', { className: 'subtitle' }, 'Question ' + (currentQuiz + 1) + ' / ' + quizData.length)),
                    e('div', { className: 'content-panel' },
                        e('div', { className: 'panel-header' }, e('div', { className: 'panel-icon' }, '❓'), e('div', { className: 'panel-title' }, 'Vérifie ta compréhension')),
                        e('div', { className: 'panel-body' },
                            e('div', { className: 'quiz-question' }, q.question),
                            e('div', { className: 'quiz-options' },
                                q.options.map((opt, i) => e('div', {
                                    key: i, className: 'quiz-option' + (showQuizFeedback ? (i === q.correct ? ' correct' : (i === selectedAnswer ? ' incorrect' : '')) : (i === selectedAnswer ? ' selected' : '')),
                                    onClick: () => selectAnswer(i)
                                }, e('div', { className: 'option-marker' }, String.fromCharCode(65 + i)), e('div', { className: 'option-text' }, opt)))
                            ),
                            showQuizFeedback ? e('div', { className: 'feedback-box' + (selectedAnswer === q.correct ? '' : ' incorrect-feedback') },
                                e('div', { className: 'feedback-title' }, selectedAnswer === q.correct ? '✅ Correct !' : '❌ Pas tout à fait...'),
                                e('p', null, q.feedback),
                                e('button', { className: 'action-btn', style: { marginTop: 12 }, onClick: nextQuiz }, currentQuiz < quizData.length - 1 ? 'Question suivante →' : 'Scénario →')
                            ) : e('button', { className: 'action-btn', disabled: selectedAnswer === null, onClick: validateAnswer }, 'Valider')
                        )
                    )
                );
            }

            // SCENARIO
            if (gameState === "scenario") return e('div', { className: 'app-container' },
                e('div', { className: 'header' }, e('h1', { className: 'glitch-title', style: { fontSize: '1.6rem' } }, 'SCÉNARIO'), e('div', { className: 'subtitle' }, 'Comment réagis-tu ?')),
                e('div', { className: 'content-panel' },
                    e('div', { className: 'panel-header' }, e('div', { className: 'panel-icon' }, '🎭'), e('div', { className: 'panel-title' }, 'Mise en situation')),
                    e('div', { className: 'panel-body' },
                        e('div', { className: 'scenario-context' }, '📍 ' + scenarioData.context),
                        e('div', { className: 'scenario-intro' }, scenarioData.intro),
                        scenarioChoice === null
                            ? scenarioData.choices.map((c, i) => e('button', { key: i, className: 'choice-btn', onClick: () => chooseScenario(i) }, c.text))
                            : e('div', null,
                                e('div', { className: 'choice-result' }, scenarioData.choices[scenarioChoice].result),
                                e('button', { className: 'action-btn', style: { marginTop: 16 }, onClick: finishModule }, 'Terminer le module →')
                            )
                    )
                )
            );

            // COMPLETE
            return e('div', { className: 'app-container' },
                e('div', { className: 'completion-screen' },
                    e('div', { className: 'completion-icon' }, '🌱'),
                    e('div', { className: 'completion-title' }, 'MODULE COMPLÉTÉ !'),
                    e('p', { style: { lineHeight: 1.7, marginBottom: 20, color: '#4a6b5a' } }, "Tu connais maintenant la différence entre forces, valeurs, et jugements. Cette connaissance de toi-même est ta boussole."),
                    e('div', { className: 'stats-grid' },
                        e('div', { className: 'stat-card' }, e('div', { className: 'stat-value' }, xp), e('div', { className: 'stat-label' }, 'XP gagnés')),
                        e('div', { className: 'stat-card' }, e('div', { className: 'stat-value' }, quizScore + '/' + quizData.length), e('div', { className: 'stat-label' }, 'Quiz')),
                        e('div', { className: 'stat-card' }, e('div', { className: 'stat-value' }, '1/6'), e('div', { className: 'stat-label' }, 'Modules VEA'))
                    ),
                    e('button', { className: 'action-btn', onClick: goBack }, '← Retour au hub')
                )
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(e(App));
    </script>
</body>
</html>
