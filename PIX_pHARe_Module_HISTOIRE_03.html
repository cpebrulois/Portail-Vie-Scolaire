<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX-pHARe | Module HISTOIRE 03 - La Reconnaissance Juridique</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');
        
        :root {
            --history-bronze: #cd7f32;
            --history-amber: #d4a574;
            --history-sepia: #b08968;
            --history-parchment: #e8d5b5;
            --history-ink: #2c1810;
            --void-dark: #0a0a0a;
            --deep-dark: #050505;
            --panel-bg: rgba(44, 24, 16, 0.95);
            --text-primary: #f5ede4;
            --text-secondary: #a89984;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--void-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .history-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 50% 20%, rgba(205, 127, 50, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 70%, rgba(176, 137, 104, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(212, 165, 116, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: historyGlow 8s ease-in-out infinite;
        }
        
        @keyframes historyGlow {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.9; }
        }
        
        .stars-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(1px 1px at 20% 30%, rgba(205, 127, 50, 0.6), transparent),
                radial-gradient(1px 1px at 60% 70%, rgba(212, 165, 116, 0.5), transparent),
                radial-gradient(1px 1px at 80% 10%, rgba(176, 137, 104, 0.4), transparent);
            background-size: 200px 200px;
            animation: starsFloat 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes starsFloat {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header { text-align: center; padding: 40px 20px; }
        
        .pillar-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(205, 127, 50, 0.7));
            animation: bookPulse 3s ease-in-out infinite;
        }
        
        @keyframes bookPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(205, 127, 50, 0.7)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 30px rgba(205, 127, 50, 0.9)); }
        }
        
        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--history-bronze), var(--history-amber), var(--history-sepia));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            animation: gradientShift 4s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: var(--history-amber);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .module-badge {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 30px;
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.3), rgba(212, 165, 116, 0.3));
            border: 2px solid var(--history-bronze);
            border-radius: 0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--history-bronze);
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
        }
        
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .progress-node {
            width: 55px;
            height: 55px;
            border: 3px solid var(--text-secondary);
            background: var(--deep-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-secondary);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            transition: all 0.4s ease;
        }
        
        .progress-node.active {
            border-color: var(--history-bronze);
            color: var(--history-bronze);
            box-shadow: 0 0 25px rgba(205, 127, 50, 0.6);
            animation: nodePulse 2s infinite;
        }
        
        .progress-node.completed {
            border-color: var(--history-amber);
            background: rgba(212, 165, 116, 0.2);
            color: var(--history-amber);
        }
        
        @keyframes nodePulse {
            0%, 100% { box-shadow: 0 0 15px rgba(205, 127, 50, 0.6); }
            50% { box-shadow: 0 0 30px rgba(205, 127, 50, 0.9); }
        }
        
        .xp-display {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .xp-box {
            background: var(--panel-bg);
            border: 1px solid var(--history-bronze);
            padding: 12px 20px;
            text-align: center;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
        }
        
        .xp-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .xp-value {

            font-size: 1.4rem;
            font-weight: 700;
            color: var(--history-bronze);
            margin-top: 5px;
        }
        
        .content-panel {
            background: var(--panel-bg);
            border: 1px solid var(--history-bronze);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(205, 127, 50, 0.15);
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(205, 127, 50, 0.3);
        }
        
        .panel-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 10px rgba(205, 127, 50, 0.6));

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--history-bronze);
            text-transform: uppercase;
            letter-spacing: 2px;

        .panel-body {

        .intro-screen p {

        .name-input-group {

        .input-wrapper label {
            display: block;
            margin-bottom: 8px;
            color: var(--history-bronze);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            text-transform: uppercase;

        .input-wrapper input {

            border: 1px solid var(--history-bronze);

        .action-btn {
            background: linear-gradient(135deg, var(--history-bronze), var(--history-sepia));
            color: var(--text-primary);
            border: none;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(205, 127, 50, 0.3);
        }
        
        .action-btn:hover:not(:disabled) {

            box-shadow: 0 6px 25px rgba(205, 127, 50, 0.5);
        }
        
        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .flashcard-container {
            perspective: 1000px;
            margin: 30px 0;
        }
        
        .flashcard {
            width: 100%;
            min-height: 320px;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        
        .flashcard-face {
            width: 100%;
            min-height: 320px;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 35px;
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.1), rgba(212, 165, 116, 0.1));
            border: 2px solid var(--history-bronze);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(205, 127, 50, 0.2);
        }
        
        .flashcard-front {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.15), rgba(176, 137, 104, 0.15));
        }
        
        .flashcard-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.15), rgba(232, 213, 181, 0.15));
        }
        
        .flashcard-question {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--history-bronze);
            margin-bottom: 15px;
        }
        
        .flashcard-hint {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--history-amber);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .flashcard-answer {
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: center;
            color: var(--text-primary);
        }
        
        .flashcard-answer strong {
            color: var(--history-amber);
        }
        
        .flashcard-nav {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 12px 25px;
            background: transparent;
            border: 2px solid var(--history-bronze);
            color: var(--history-bronze);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: var(--history-bronze);
            color: var(--void-dark);
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.5);
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .quiz-question {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--history-bronze);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(205, 127, 50, 0.05);
            border: 2px solid rgba(205, 127, 50, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quiz-option:hover {
            background: rgba(205, 127, 50, 0.15);
            border-color: var(--history-bronze);
            transform: translateX(5px);
        }
        
        .quiz-option.selected {
            background: rgba(205, 127, 50, 0.2);
            border-color: var(--history-bronze);
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.3);
        }
        
        .quiz-option.correct {
            background: rgba(212, 165, 116, 0.2);
            border-color: var(--history-amber);
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.4);
        }
        
        .quiz-option.incorrect {
            background: rgba(176, 137, 104, 0.2);
            border-color: var(--history-sepia);
            box-shadow: 0 0 20px rgba(176, 137, 104, 0.4);
        }
        
        .option-marker {
            width: 35px;
            height: 35px;
            background: var(--history-bronze);
            color: var(--void-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }
        
        .option-text {
            flex: 1;
            font-size: 1rem;
            line-height: 1.5;
        }
        
        .feedback-box {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.15), rgba(232, 213, 181, 0.15));
            border: 2px solid var(--history-amber);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 0 25px rgba(212, 165, 116, 0.3);
        }
        
        .feedback-box.incorrect-feedback {
            background: linear-gradient(135deg, rgba(176, 137, 104, 0.15), rgba(205, 127, 50, 0.15));
            border-color: var(--history-sepia);
            box-shadow: 0 0 25px rgba(176, 137, 104, 0.3);
        }
        
        .feedback-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--history-amber);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .incorrect-feedback .feedback-title {
            color: var(--history-sepia);
        }
        
        .scenario-context {
            background: rgba(205, 127, 50, 0.1);
            border-left: 4px solid var(--history-bronze);
            padding: 15px 20px;
            margin-bottom: 20px;
            font-style: italic;
            color: var(--text-secondary);
        }
        
        .scenario-intro {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 25px;
        }
        
        .choices {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .choice-btn {
            padding: 18px 25px;
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.1), rgba(212, 165, 116, 0.1));
            border: 2px solid rgba(205, 127, 50, 0.4);
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            line-height: 1.5;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.2), rgba(212, 165, 116, 0.2));
            border-color: var(--history-bronze);
            transform: translateX(8px);
            box-shadow: 0 0 25px rgba(205, 127, 50, 0.3);
        }
        
        .choice-result {
            background: rgba(176, 137, 104, 0.1);
            border: 2px solid var(--history-sepia);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .choice-result p {
            line-height: 1.7;
            margin-bottom: 15px;
        }
        
        .impact-score {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        
        .impact-item {
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .impact-item.positive {
            background: rgba(212, 165, 116, 0.2);
            border: 1px solid var(--history-amber);
            color: var(--history-amber);
        }
        
        .impact-item.negative {

        .save-code-box {
            background: rgba(0,0,0,0.6);

        }
        .save-code-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;

        .save-code {
            font-family: 'Share Tech Mono', monospace;

        .copy-btn {

            border: none;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;

        .copy-btn:hover { background: var(--history-amber); }
        .completion-screen {

        .completion-icon {

        @keyframes completionFloat {
            0%, 100% { transform: translateY(0); }

        .completion-title {

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

<body>
    <div class="history-bg"></div>
    <div class="stars-overlay"></div>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const { useState } = React;
        const e = React.createElement;

        const MODULE_ID = "HISTOIRE_03";
        const MODULE_TITLE = "La Reconnaissance Juridique";
        const MODULE_VERSION = "2.0";

        const flashcardsData = [
            {
                question: "Pourquoi la loi était-elle impuissante avant les années 1990 ?",
                hint: "[ Clique pour révéler ]",
                answer: "Parce que le harcèlement scolaire n'était pas reconnu comme <strong>infraction pénale</strong>. Les codes juridiques ne nommaient que les violences ponctuelles (coups, insultes). La <strong>répétition systémique</strong> échappait au droit. Sans cadre légal, pas de protection."
            },
            {
                question: "Qu'apportent les premières lois anti-harcèlement (1990-2010) ?",
                hint: "[ Clique pour révéler ]",
                answer: "Elles créent un <strong>délit spécifique</strong> reconnaissant la répétition et l'asymétrie de pouvoir. Le harcèlement devient poursuivable pénalement. Les victimes obtiennent un <strong>recours juridique</strong>, les établissements une <strong>obligation de protection</strong>."
            },
            {
                question: "Quelle est l'innovation de la loi française de 2019 ?",
                hint: "[ Clique pour révéler ]",
                answer: "Elle introduit la notion de <strong>'harcèlement moral scolaire'</strong> dans le Code de l'Éducation. Elle impose aux établissements un <strong>protocole obligatoire</strong> et reconnaît le cyberharcèlement. C'est la traduction institutionnelle de décennies de recherche."
            },
            {
                question: "En quoi la loi seule est-elle insuffisante ?",
                hint: "[ Clique pour révéler ]",
                answer: "Parce que <strong>punir après coup ne prévient pas</strong>. La loi crée un cadre, mais sans éducation (empathie, climat scolaire), elle reste réactive. Les pays efficaces (Finlande, Norvège) combinent <strong>loi + prévention systémique</strong>."
            }
        ];

        const quizData = [
            {
                question: "Avant 1990, un élève harcelé pouvait-il porter plainte pour harcèlement ?",
                options: [
                    "Oui, le harcèlement était déjà dans le Code pénal",
                    "Non, seules les violences ponctuelles (coups, insultes isolés) étaient poursuivables, pas la répétition systémique",
                    "Oui, mais seulement dans les écoles privées",
                    "Non, parce que les enfants ne pouvaient pas porter plainte"
                ],
                correct: 1,
                feedback: "Exact. Le droit ne reconnaissait que les actes isolés. Un coup = agression. Mais 100 coups répartis sur 6 mois par un groupe dominant ? Aucun texte ne l'encadrait. La répétition systémique était invisible juridiquement."
            },
            {
                question: "Pourquoi la création d'un 'délit de harcèlement' (1990-2010) est-elle révolutionnaire ?",
                options: [
                    "Parce qu'elle permet d'emprisonner tous les harceleurs",
                    "Parce qu'elle reconnaît que la répétition + l'asymétrie créent une violence d'une nature différente, nécessitant une réponse juridique spécifique",
                    "Parce qu'elle augmente les budgets scolaires",
                    "Parce qu'elle oblige les parents à surveiller leurs enfants"
                ],
                correct: 1,
                feedback: "Parfait. Le droit s'adapte à la science (Olweus). Il ne s'agit plus de 'plusieurs agressions', mais d'une VIOLENCE SYSTÉMIQUE qui détruit psychologiquement la victime. Cette reconnaissance légitime des protections institutionnelles fortes."
            },
            {
                question: "La loi française de 2019 impose un 'protocole obligatoire' aux établissements. Pourquoi est-ce crucial ?",
                options: [
                    "Pour remplir des formulaires administratifs",
                    "Parce que sans obligation légale, de nombreux établissements minimisaient ou ignoraient le harcèlement par peur du scandale",
                    "Pour augmenter le travail des CPE",
                    "Parce que c'est une mode"
                ],
                correct: 1,
                feedback: "Exactement. Avant l'obligation légale, certains établissements étouffaient les affaires pour protéger leur réputation. La loi crée une RESPONSABILITÉ JURIDIQUE : ignorer le harcèlement devient poursuivable. C'est un levier institutionnel."
            },
            {
                question: "Pourquoi dit-on que 'la loi seule ne suffit pas' ?",
                options: [
                    "Parce qu'il faut aussi des campagnes de sensibilisation et une éducation à l'empathie dès le plus jeune âge",
                    "Parce que les lois ne sont jamais appliquées",
                    "Parce que le harcèlement n'existe pas vraiment",
                    "Parce qu'il faut plus de prisons"
                ],
                correct: 0,
                feedback: "Parfait. La Norvège (1982) a compris ça : loi + éducation préventive. La France rattrape son retard (pHARe 2019). Punir après coup sauve une victime, mais ne change pas la culture. Seule l'éducation massive transforme les normes collectives."
            }
        ];

        const scenarioData = [
            {
                title: "Le Vide Juridique",
                context: "Année 1985. Un élève est quotidiennement humilié, poussé, isolé par un groupe. Cela dure 8 mois. Ses parents veulent porter plainte.",
                intro: "L'avocat leur dit : 'Le harcèlement scolaire n'existe pas dans la loi. On peut poursuivre pour coups ponctuels, mais pas pour la répétition systémique.' Que penses-tu de cette situation ?",
                choices: [
                    {
                        text: "C'est normal, la loi ne peut pas tout prévoir",
                        result: "Erreur. Ce n'est pas que 'la loi ne peut pas tout prévoir', c'est qu'elle REFUSE de nommer un phénomène pourtant documenté depuis 15 ans (Olweus 1970). Ce vide juridique protège les agresseurs et abandonne les victimes.",
                        impact: { lucidite: -25, justice: -30 }
                    },
                    {
                        text: "C'est injuste. Si la science a prouvé en 1970 que le harcèlement est une violence spécifique, la loi aurait dû s'adapter dans les années 80. Ce retard coûte des vies",
                        result: "Exactement. Il y a 15 ans de décalage entre science (1970) et droit (années 90). Pendant ce temps, combien de victimes sans recours ? Ce module t'apprend que nommer scientifiquement ne suffit pas : il faut aussi traduire en droit.",
                        impact: { lucidite: +35, justice: +35 }
                    },
                    {
                        text: "Je ne sais pas, c'est compliqué",
                        result: "C'est effectivement complexe, mais l'histoire montre qu'il y a eu un vrai retard institutionnel. Les victimes de 1985 n'avaient aucun recours légal malgré des preuves scientifiques établies depuis 1970.",
                        impact: { lucidite: +5, justice: +5 }
                    }
                ]
            },
            {
                title: "L'Obligation Légale",
                context: "2019 : la loi impose aux établissements un protocole anti-harcèlement. Un principal dit : 'C'est de la paperasse inutile, on gérait déjà bien avant.'",
                intro: "Tu as étudié l'histoire. Que réponds-tu ?",
                choices: [
                    {
                        text: "Il a raison, c'est de la bureaucratie",
                        result: "Non. L'histoire montre que sans obligation légale, de nombreux établissements minimisaient le problème pour protéger leur image. La 'gestion' d'avant était souvent du silence complice. L'obligation crée une responsabilité juridique.",
                        impact: { vision: -30, protection: -25 }
                    },
                    {
                        text: "Avant 2019, certains établissements ignoraient le harcèlement par peur du scandale. L'obligation légale force une prise en charge systématique, pas arbitraire. C'est un progrès",
                        result: "Parfait. Tu comprends que le droit ne fait pas confiance au volontariat. Sans obligation, seuls les 'bons' établissements agissent. La loi garantit une ÉGALITÉ DE PROTECTION pour tous les élèves, partout.",
                        impact: { vision: +40, protection: +35 }
                    },
                    {
                        text: "Je ne me prononce pas, je ne connais pas assez la loi",
                        result: "Dommage. Tu as pourtant les connaissances historiques pour identifier l'importance de l'obligation légale. C'est un tournant majeur dans la protection des victimes.",
                        impact: { vision: -10, protection: -10 }
                    }
                ]
            }
        ];

        function encodeSaveCode(data) { return btoa(JSON.stringify(data)); }

        function App() {
            const [gameState, setGameState] = useState("intro");
            const [playerData, setPlayerData] = useState({
                name: localStorage.getItem('pvs_current_player') || 'Anonyme',
                class: "",
                xp: 0,
                score: 0,
                quizScore: 0,
                scenarioScore: 0
            });

            const [currentFlashcard, setCurrentFlashcard] = useState(0);
            const [flashcardFlipped, setFlashcardFlipped] = useState(false);

            const [currentQuiz, setCurrentQuiz] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showQuizFeedback, setShowQuizFeedback] = useState(false);

            const [currentScenario, setCurrentScenario] = useState(0);
            const [scenarioChoice, setScenarioChoice] = useState(null);
            const [showScenarioResult, setShowScenarioResult] = useState(false);

            function startGame() {
                if (playerData.name.trim()) {
                    setGameState("flashcards");
                }

            function generateSaveCode() {
                const saveData = {
                    v: 1,
                    d: new Date().toISOString(),
                    m: MODULE_ID,
                    mv: MODULE_VERSION,
                    n: playerData.name,
                    l: 3,
                    s: playerData.score,
                    x: playerData.xp,
                    q: playerData.quizScore,
                    sc: playerData.scenarioScore,
                    f: true
                };
                return encodeSaveCode(saveData);
            }

            function copyCode() {
                const code = generateSaveCode();
                navigator.clipboard.writeText(code)
                    .then(() => alert("\u2705 Code copié dans le presse-papier !"))
                    .catch(() => prompt("Copie ce code manuellement :", code));
            }

            }

            function nextFlashcard() {
                if (currentFlashcard < flashcardsData.length - 1) {
                    setCurrentFlashcard(prev => prev + 1);
                    setFlashcardFlipped(false);
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 10 }));
                } else {
                    setGameState("quiz");
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 40 }));
                }
            }

            function prevFlashcard() {
                if (currentFlashcard > 0) {
                    setCurrentFlashcard(prev => prev - 1);
                    setFlashcardFlipped(false);
                }
            }

            function selectQuizAnswer(index) {
                if (showQuizFeedback) return;
                setSelectedAnswer(index);
            }

            function validateQuizAnswer() {
                setShowQuizFeedback(true);
                const isCorrect = selectedAnswer === quizData[currentQuiz].correct;
                if (isCorrect) {
                    setPlayerData(prev => ({
                        ...prev,
                        score: prev.score + 25,
                        quizScore: prev.quizScore + 25,
                        xp: prev.xp + 25
                    }));
                }
            }

            function nextQuizQuestion() {
                if (currentQuiz < quizData.length - 1) {
                    setCurrentQuiz(prev => prev + 1);
                    setSelectedAnswer(null);
                    setShowQuizFeedback(false);
                } else {
                    setGameState("scenarios");
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 50 }));
                }
            }

            function makeScenarioChoice(index) {
                setScenarioChoice(index);
                setShowScenarioResult(true);

                const choice = scenarioData[currentScenario].choices[index];
                const values = Object.values(choice.impact);
                const totalChange = Math.max(0, values.reduce((a, b) => a + b, 0));

                setPlayerData(prev => ({
                    ...prev,
                    score: prev.score + totalChange,
                    scenarioScore: prev.scenarioScore + totalChange,
                    xp: prev.xp + 20
                }));
            }

            function nextScenario() {
                if (currentScenario < scenarioData.length - 1) {
                    setCurrentScenario(prev => prev + 1);
                    setScenarioChoice(null);
                    setShowScenarioResult(false);
                } else {

                    // ── Remontée XP vers Superhub PVS ──
                    try {
                        var _pvs = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
                        _pvs.push({
                            id: 'PIXHARE-' + MODULE_ID + '-' + Date.now(),
                            type: 'PIXHARE_PROGRESS',
                            player: playerData.name,
                            module: MODULE_ID,
                            score: playerData.score,
                            xp: playerData.xp,
                            d: new Date().toISOString()
                        });
                        localStorage.setItem('pvs_bridge_events', JSON.stringify(_pvs));
                        window.dispatchEvent(new StorageEvent('storage', { key: 'pvs_bridge_events' }));
                    } catch (_e) { /* silencieux */ }
                    // ── Fin bridge ──
                    setGameState("complete");
                    setPlayerData(prev => ({ ...prev, xp: prev.xp + 75 }));
                }
            }

            function renderIntro() {
                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, "PIX-pHARe"),
                        e("div", { className: "subtitle" }, "Pilier Histoire Sociétale"),
                        e("div", { className: "module-badge" }, "MODULE 03")
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "⚖️"),
                            e("div", { className: "panel-title" }, MODULE_TITLE)
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "intro-screen" },
                                e("p", null,
                                    "Pendant 20 ans (1970-1990), la science a documenté le harcèlement. Mais ", 
                                    e("strong", { style: { color: "var(--history-amber)" } }, "le droit restait muet"), "."
                                ),
                                e("p", null,
                                    "Les années 1990-2010 marquent la création des premières ", 
                                    e("strong", { style: { color: "var(--history-bronze)" } }, "lois anti-harcèlement"), 
                                    ". Le problème passe du registre moral (c'est mal) au registre juridique (c'est illégal)."
                                ),
                                e("p", null,
                                    "Tu vas comprendre pourquoi ", e("strong", null, "la loi est nécessaire mais insuffisante"), 
                                    ", et comment elle doit s'articuler avec l'éducation préventive."
                                )
                            ),
                            e("div", { style: { textAlign: "center", marginTop: "20px" } },
                                e("div", { style: { padding: "10px 16px", background: "rgba(205,127,50,0.12)", border: "1px solid var(--history-bronze)", borderRadius: "6px", marginBottom: "16px", fontSize: "0.9rem", color: "var(--history-amber)" } },
                                    "🔗 Connecté via Portail Vie Scolaire"
                                ),
                                e("button", { className: "action-btn", onClick: startGame }, "[ COMMENCER ]")
                            )
                        )
                    )
                );
            }

            function renderFlashcards() {
                const card = flashcardsData[currentFlashcard];

                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, MODULE_TITLE),
                        e("div", { className: "subtitle" }, "Niveau 1 : Du Vide au Cadre")
                    ),
                    e("div", { className: "progress-bar" },
                        e("div", { className: "progress-node active" }, "1"),
                        e("div", { className: "progress-node" }, "2"),
                        e("div", { className: "progress-node" }, "3")
                    ),
                    e("div", { className: "xp-display" },
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "XP"),
                            e("div", { className: "xp-value" }, playerData.xp)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Carte"),
                            e("div", { className: "xp-value" }, `${currentFlashcard + 1}/${flashcardsData.length}`)
                        )
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "📚"),
                            e("div", { className: "panel-title" }, "Évolution Législative")
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "flashcard-container" },
                                e("div", {
                                    className: `flashcard ${flashcardFlipped ? "flipped" : ""}`,
                                    onClick: () => setFlashcardFlipped(!flashcardFlipped)
                                },
                                    e("div", { className: "flashcard-face flashcard-front" },
                                        e("div", { className: "flashcard-question" }, card.question),
                                        e("div", { className: "flashcard-hint" }, card.hint)
                                    ),
                                    e("div", { className: "flashcard-face flashcard-back" },
                                        e("div", {
                                            className: "flashcard-answer",
                                            dangerouslySetInnerHTML: { __html: card.answer }
                                        })
                                    )
                                )
                            ),
                            e("div", { className: "flashcard-nav" },
                                e("button", {
                                    className: "nav-btn",
                                    onClick: prevFlashcard,
                                    disabled: currentFlashcard === 0
                                }, "◄ PRÉC"),
                                e("button", {
                                    className: "nav-btn",
                                    onClick: nextFlashcard
                                }, currentFlashcard < flashcardsData.length - 1 ? "SUIV ►" : "NIVEAU 2 ►")
                            )
                        )
                    )
                );
            }

            function renderQuiz() {
                const question = quizData[currentQuiz];

                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, MODULE_TITLE),
                        e("div", { className: "subtitle" }, "Niveau 2 : Analyse Juridique")
                    ),
                    e("div", { className: "progress-bar" },
                        e("div", { className: "progress-node completed" }, "✓"),
                        e("div", { className: "progress-node active" }, "2"),
                        e("div", { className: "progress-node" }, "3")
                    ),
                    e("div", { className: "xp-display" },
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "XP"),
                            e("div", { className: "xp-value" }, playerData.xp)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Score Quiz"),
                            e("div", { className: "xp-value" }, playerData.quizScore)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Question"),
                            e("div", { className: "xp-value" }, `${currentQuiz + 1}/${quizData.length}`)
                        )
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "🔍"),
                            e("div", { className: "panel-title" }, "Compréhension du Droit")
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "quiz-question" }, question.question),
                            e("div", { className: "quiz-options" },
                                question.options.map((opt, idx) => {
                                    let optClass = "quiz-option";
                                    if (showQuizFeedback) {
                                        if (idx === question.correct) optClass += " correct";
                                        else if (idx === selectedAnswer) optClass += " incorrect";
                                    } else if (idx === selectedAnswer) {
                                        optClass += " selected";
                                    }

                                    return e("div", {
                                        key: idx,
                                        className: optClass,
                                        onClick: () => selectQuizAnswer(idx)
                                    },
                                        e("div", { className: "option-marker" }, String.fromCharCode(65 + idx)),
                                        e("div", { className: "option-text" }, opt)
                                    );
                                })
                            ),
                            showQuizFeedback && e("div", {
                                className: `feedback-box ${selectedAnswer !== question.correct ? "incorrect-feedback" : ""}`
                            },
                                e("div", { className: "feedback-title" },
                                    selectedAnswer === question.correct ? "✓ EXACT" : "✗ PAS TOUT À FAIT"
                                ),
                                e("p", null, question.feedback)
                            ),
                            e("div", { style: { textAlign: "center", marginTop: "25px" } },
                                !showQuizFeedback ?
                                    e("button", {
                                        className: "action-btn",
                                        onClick: validateQuizAnswer,
                                        disabled: selectedAnswer === null
                                    }, "[ VALIDER ]") :
                                    e("button", {
                                        className: "action-btn",
                                        onClick: nextQuizQuestion
                                    }, currentQuiz < quizData.length - 1 ? "[ SUIVANT ]" : "[ NIVEAU 3 ]")
                            )
                        )
                    )
                );
            }

            function renderScenarios() {
                const scenario = scenarioData[currentScenario];

                return e("div", { className: "app-container" },
                    e("div", { className: "header" },
                        e("div", { className: "pillar-icon" }, "📜"),
                        e("h1", { className: "glitch-title" }, MODULE_TITLE),
                        e("div", { className: "subtitle" }, "Niveau 3 : Application")
                    ),
                    e("div", { className: "progress-bar" },
                        e("div", { className: "progress-node completed" }, "✓"),
                        e("div", { className: "progress-node completed" }, "✓"),
                        e("div", { className: "progress-node active" }, "3")
                    ),
                    e("div", { className: "xp-display" },
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "XP Total"),
                            e("div", { className: "xp-value" }, playerData.xp)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Score"),
                            e("div", { className: "xp-value" }, playerData.score)
                        ),
                        e("div", { className: "xp-box" },
                            e("div", { className: "xp-label" }, "Scénario"),
                            e("div", { className: "xp-value" }, `${currentScenario + 1}/${scenarioData.length}`)
                        )
                    ),
                    e("div", { className: "content-panel" },
                        e("div", { className: "panel-header" },
                            e("div", { className: "panel-icon" }, "⚖️"),
                            e("div", { className: "panel-title" }, scenario.title)
                        ),
                        e("div", { className: "panel-body" },
                            e("div", { className: "scenario-context" }, scenario.context),
                            e("div", { className: "scenario-intro" }, scenario.intro),
                            !showScenarioResult ?
                                e("div", { className: "choices" },
                                    scenario.choices.map((choice, idx) =>
                                        e("button", {
                                            key: idx,
                                            className: "choice-btn",
                                            onClick: () => makeScenarioChoice(idx)
                                        }, choice.text)
                                    )
                                ) :
                                e("div", { className: "choice-result" },
                                    e("p", { style: { marginBottom: "15px" } }, scenario.choices[scenarioChoice].result),
                                    e("div", { className: "impact-score" },
                                        Object.entries(scenario.choices[scenarioChoice].impact).map(([key, val]) =>
                                            e("div", {
                                                key: key,
                                                className: `impact-item ${val > 0 ? "positive" : "negative"}`
                                            }, `${key}: ${val > 0 ? "+" : ""}${val}`)
                                        )
                                    ),
                                    e("div", { style: { textAlign: "center", marginTop: "25px" } },
                                        e("button", {
                                            className: "action-btn",
                                            onClick: nextScenario
                                        }, currentScenario < scenarioData.length - 1 ? "[ SUIVANT ]" : "[ TERMINER ]")
                                    )
                                )
                        )
                    )
                );
            }

            function renderComplete() {
                return e("div", { className: "app-container" },
                    e("div", { className: "completion-screen" },
                        e("div", { className: "completion-icon" }, "✅"),
                        e("h1", { className: "completion-title" }, "MODULE COMPLÉTÉ"),
                        e("p", { className: "completion-subtitle" },
                            `Bravo ${playerData.name} ! Tu comprends maintenant le cadre juridique.`
                        ),
                        e("div", { className: "stats-grid" },
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.score),
                                e("div", { className: "stat-label" }, "Score Total")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.xp),
                                e("div", { className: "stat-label" }, "XP Gagnés")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.quizScore),
                                e("div", { className: "stat-label" }, "Score Quiz")
                            ),
                            e("div", { className: "stat-card" },
                                e("div", { className: "stat-value" }, playerData.scenarioScore),
                                e("div", { className: "stat-label" }, "Score Scénarios")
                            )
                        ),
                        e("div", { className: "content-panel", style: { marginTop: "30px", textAlign: "left" } },
                            e("div", { className: "panel-header" },
                                e("div", { className: "panel-icon" }, "💡"),
                                e("div", { className: "panel-title" }, "Ce Que Tu As Appris")
                            ),
                            e("div", { className: "panel-body" },
                                e("p", null,
                                    "Entre 1990 et 2010, le droit a rattrapé la science. La création de ", 
                                    e("strong", null, "délits spécifiques de harcèlement"), 
                                    " a donné aux victimes un recours juridique."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    "Mais la loi seule est insuffisante : ", 
                                    e("strong", null, "punir après coup ne prévient pas"),
                                    ". Les pays efficaces combinent droit répressif et éducation préventive."
                                ),
                                e("p", { style: { marginTop: "15px" } },
                                    "Prochain module : tu découvriras ", 
                                    e("strong", { style: { color: "var(--history-amber)" } }, "pHARe, le 3018, et les dispositifs modernes"), 
                                    " qui appliquent aujourd'hui 50 ans de recherche et de combat juridique."
                                )
                            )
                        )
                    )
                );
            }

            switch (gameState) {
                case "intro": return renderIntro();
                case "flashcards": return renderFlashcards();
                case "quiz": return renderQuiz();
                case "scenarios": return renderScenarios();
                case "complete": return renderComplete();
                default: return renderIntro();
            }
        }

        ReactDOM.createRoot(document.getElementById("root")).render(e(App));
    </script>
</body>
</html>
