<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIX pHARe — Hub de Formation</title>
<style>
:root {
  --bg:#0a0e1a; --card:#111827; --border:rgba(255,255,255,.08);
  --text:#e2e8f0; --muted:#64748b;
  --accent:#f97316; --green:#22c55e; --red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:70px;}

.hero{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);border-bottom:1px solid var(--border);padding:24px 20px 18px;text-align:center;}
.hero h1{font-size:clamp(1.4rem,5vw,2rem);font-weight:800;letter-spacing:-.5px;color:#fff;}
.hero h1 span{color:var(--accent);}
.hero p{color:var(--muted);font-size:.85rem;margin-top:5px;}

#player-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 20px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);font-size:.85rem;flex-wrap:wrap;text-align:center;}
.pb-connected{color:var(--green);}
.pb-name{font-weight:700;color:#fff;}
.pb-disconnected{color:var(--red);}
.pb-xp{color:var(--green);font-weight:700;}

.container{max-width:780px;margin:0 auto;padding:20px 14px;}

.pillar-block{margin-bottom:22px;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--card);}
.pillar-header{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.pillar-icon{font-size:1.8rem;flex-shrink:0;}
.pillar-info{flex:1;}
.pillar-title{font-weight:700;font-size:1rem;}
.pillar-desc{color:var(--muted);font-size:.78rem;margin-top:2px;}
.pillar-stats{text-align:right;flex-shrink:0;}
.pillar-count{font-size:.78rem;color:var(--muted);}
.pillar-pct{font-size:.9rem;font-weight:700;}
.prog-outer{height:3px;background:rgba(255,255,255,.07);}
.prog-inner{height:3px;transition:width .4s;}

.mod-list{padding:4px 0;}
.mod-row{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;}
.mod-row:last-child{border-bottom:none;}
.mod-row.clickable{cursor:pointer;}
.mod-row.clickable:hover{background:rgba(255,255,255,.05);}
.mod-row.locked{opacity:.4;cursor:not-allowed;}
.mod-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;border:2px solid currentColor;}
.mod-info{flex:1;}
.mod-name{font-weight:600;font-size:.9rem;}
.mod-sub{font-size:.75rem;color:var(--muted);margin-top:1px;}
.mod-ico{font-size:1.1rem;flex-shrink:0;}

#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:10px;font-size:.85rem;z-index:900;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;}
#toast.show{opacity:1;}

#admin-fab{position:fixed;bottom:18px;right:16px;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--muted);padding:7px 13px;border-radius:8px;font-size:.78rem;cursor:pointer;z-index:800;}
#admin-fab:hover{background:rgba(255,255,255,.12);}

#admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:950;align-items:center;justify-content:center;}
#admin-overlay.open{display:flex;}
#admin-box{background:#1e293b;border:1px solid var(--border);border-radius:16px;padding:24px;width:min(440px,93vw);max-height:88vh;overflow-y:auto;}
#admin-box h3{font-size:1.1rem;margin-bottom:14px;color:var(--accent);}
.ai{width:100%;padding:9px 12px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:.88rem;margin-bottom:10px;}
.ai:focus{outline:none;border-color:var(--accent);}
.arow{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.ab{padding:8px 15px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:.84rem;}
.ab-p{background:var(--accent);color:#fff;}
.ab-g{background:var(--green);color:#000;}
.ab-r{background:var(--red);color:#fff;}
.ab-n{background:rgba(255,255,255,.12);color:var(--text);}
.asec{margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}
.asec h4{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.mcl{display:flex;flex-direction:column;gap:3px;max-height:320px;overflow-y:auto;}
.mc{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;background:rgba(255,255,255,.04);cursor:pointer;transition:background .1s;}
.mc:hover{background:rgba(255,255,255,.08);}
.mc input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer;flex-shrink:0;}
.mc-lbl{font-size:.84rem;flex:1;}
.mc-done{color:var(--green);font-size:.72rem;margin-left:6px;}
.psep{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 4px 4px;border-top:1px solid var(--border);margin-top:4px;}
.psep:first-child{border-top:none;padding-top:0;}
.aerr{color:var(--red);font-size:.8rem;margin-top:6px;}
.aok{color:var(--green);font-size:.8rem;margin-top:6px;}
.aplayer{font-size:.82rem;padding:8px 10px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:7px;color:var(--green);margin-bottom:10px;}
</style>
</head>
<body>

<div class="hero">
  <h1>PIX <span>pHARe</span></h1>
  <p>Programme de Formation Anti-Harcèlement · Collège Château Rance</p>
</div>

<div id="player-bar">
  <span id="pb-status"></span>
  <span id="pb-xp"></span>
</div>

<div class="container" id="app"></div>

<div id="toast"></div>
<button id="admin-fab" onclick="openAdmin()">⚙ Admin</button>

<div id="admin-overlay">
  <div id="admin-box">
    <h3>⚙ Administration PIXHARe</h3>

    <div id="admin-login">
      <p style="font-size:.83rem;color:var(--muted);margin-bottom:10px;">
        Entrez votre code CPE pour accéder à la validation manuelle des modules.
      </p>
      <input class="ai" type="password" id="admin-pwd"
             placeholder="Code administrateur…"
             onkeydown="if(event.key==='Enter')adminLogin()"/>
      <div class="arow">
        <button class="ab ab-p" onclick="adminLogin()">Connexion</button>
        <button class="ab ab-n" onclick="closeAdmin()">Annuler</button>
      </div>
      <div class="aerr" id="admin-err"></div>
    </div>

    <div id="admin-panel" style="display:none;">
      <div class="aplayer" id="admin-player-info"></div>

      <div class="asec">
        <h4>Sélectionner les modules à valider</h4>
        <div class="mcl" id="admin-mod-list"></div>
      </div>

      <div class="asec">
        <div class="arow">
          <button class="ab ab-g" onclick="adminValidateSelected()">✓ Valider la sélection</button>
          <button class="ab ab-r" onclick="adminResetAll()">🗑 Tout réinitialiser</button>
          <button class="ab ab-n" onclick="closeAdmin()">✕ Fermer</button>
        </div>
        <div id="admin-fb"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config admin ───────────────────────────────────────────────
const ADMIN_PASS = 'CPE59!-Chateau-70+';

const PILLARS = [

      {id:'NEURO_04', file:'PIX_pHARe_Module_NEURO_04.html', name:'Émotions & Décision', xp:100},

    ]
  },
  {

    modules:[
      {id:'NUMERIQUE_01', file:'PIX_pHARe_Module_NUMERIQUE_01.html', name:'La Machine à Attention', xp:75},
      {id:'NUMERIQUE_02', file:'PIX_pHARe_Module_NUMERIQUE_02.html', name:"Les Architectes de l'Ombre", xp:100},
      {id:'NUMERIQUE_03', file:'PIX_pHARe_Module_NUMERIQUE_03.html', name:'Bulles & Miroirs', xp:120},
      {id:'NUMERIQUE_04', file:'PIX_pHARe_Module_NUMERIQUE_04.html', name:'Tes Droits, Ton Armure', xp:150},
      {id:'NUMERIQUE_05', file:'PIX_pHARe_Module_NUMERIQUE_05.html', name:'Maître du Feed', xp:200},

// ── Joueur ─────────────────────────────────────────────────────
// PRIORITÉ : ?player= dans l'URL (posé par openTracked du superhub)
// FALLBACK  : localStorage pvs_current_player
function initPlayer() {
  var urlParams = new URLSearchParams(window.location.search);
  var urlPlayer = urlParams.get('player');
  if (urlPlayer && urlPlayer.length > 2) {
    localStorage.setItem('pvs_current_player', urlPlayer);
    localStorage.setItem('pvs_phare_player',   urlPlayer);
  }
}

function getPlayer() {
  return localStorage.getItem('pvs_current_player')
      || localStorage.getItem('pvs_phare_player')
      || '';
}

// ── Certificats ────────────────────────────────────────────────
function ckey(id) { return 'CERT_PHARE_' + id; }
function isDone(id) { return !!localStorage.getItem(ckey(id)); }
function isUnlocked(pillar, idx) {
  return idx === 0 || isDone(pillar.modules[idx - 1].id);
}
function doneCount() {
  var n = 0;
  PILLARS.forEach(function(p){ p.modules.forEach(function(m){ if(isDone(m.id)) n++; }); });
  return n;
}
function totalXP() {
  var xp = 0;
  PILLARS.forEach(function(p){ p.modules.forEach(function(m){ if(isDone(m.id)) xp += (m.xp||0); }); });
  return xp;
}

// ── Validation ─────────────────────────────────────────────────
function validateModule(moduleId, silent) {
  var was = isDone(moduleId);
  localStorage.setItem(ckey(moduleId), JSON.stringify({
    v:1, d:new Date().toISOString(), m:moduleId, f:true
  }));
  if (!was) pushBridge(moduleId);
  render();
  if (!silent) toast('✅ ' + moduleId + ' validé !');
}

function pushBridge(moduleId) {
  var player = getPlayer();
  try {
    var evts = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
    evts.push({ id:'PHARE-'+moduleId+'-'+Date.now(), type:'PIXHARE_PROGRESS',
                player:player, module:moduleId, cpTotal:doneCount(),
                d:new Date().toISOString() });
    if(evts.length > 500) evts.splice(0, evts.length-500);
    localStorage.setItem('pvs_bridge_events', JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage', {key:'pvs_bridge_events'}));
  } catch(e) {}
}

function checkReturn() {
  var changed = false;
  PILLARS.forEach(function(p){
    p.modules.forEach(function(m){
      if(localStorage.getItem(ckey(m.id)) && !isDone(m.id)){
        validateModule(m.id, true); changed = true;
      }
    });
  });
  try {
    var evts = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
    evts.forEach(function(ev){
      if(ev.type === 'PIXHARE_PROGRESS' && ev.module && !isDone(ev.module)){
        if(PILLARS.some(function(p){ return p.modules.some(function(m){ return m.id===ev.module; }); })){
          validateModule(ev.module, true); changed = true;
        }
      }
    });
  } catch(e) {}
  if(changed) render();
}

// ── Navigation vers module ──────────────────────────────────────
function openModule(file, moduleId) {
  var player = getPlayer();
  if(player){
    localStorage.setItem('pvs_current_player', player);
    localStorage.setItem('pvs_phare_player',   player);
  }
  localStorage.setItem('pvs_phare_pending', moduleId);
  // Passer le joueur en param URL pour que le module le retrouve
  var sep = file.includes('?') ? '&' : '?';
  var url  = player ? file + sep + 'player=' + encodeURIComponent(player) : file;
  window.location.href = url;
}

// ── Rendu ───────────────────────────────────────────────────────
function render() {
  var player = getPlayer();
  var xp     = totalXP();
  var done   = doneCount();
  var total  = PILLARS.reduce(function(s,p){ return s + p.modules.length; }, 0);

  var pbStatus = document.getElementById('pb-status');
  var pbXp     = document.getElementById('pb-xp');

  if(player) {
    pbStatus.innerHTML = '<span class="pb-connected">✅</span> <span class="pb-name">' + player + '</span>';
    pbXp.textContent   = xp + ' XP · ' + done + '/' + total + ' modules complétés';
  } else {
    pbStatus.innerHTML = '<span class="pb-disconnected">⚠️ Non connecté — ouvre ce hub depuis le Portail Vie Scolaire</span>';
    pbXp.textContent   = '';
  }

  var app = document.getElementById('app');
  app.innerHTML = '';

  PILLARS.forEach(function(pillar) {
    var doneN  = pillar.modules.filter(function(m){ return isDone(m.id); }).length;
    var totalN = pillar.modules.length;
    var pct    = Math.round(doneN / totalN * 100);

    var block = document.createElement('div');
    block.className = 'pillar-block';

    var hdr = document.createElement('div');
    hdr.className = 'pillar-header';
    hdr.innerHTML =
      '<div class="pillar-icon">' + pillar.icon + '</div>' +
      '<div class="pillar-info">' +
        '<div class="pillar-title" style="color:' + pillar.color + '">' + pillar.title + '</div>' +
        '<div class="pillar-desc">' + pillar.desc + '</div>' +
      '</div>' +
      '<div class="pillar-stats">' +
        '<div class="pillar-count">' + doneN + '/' + totalN + '</div>' +
        '<div class="pillar-pct" style="color:' + pillar.color + '">' + pct + '%</div>' +
      '</div>';
    block.appendChild(hdr);

    var po = document.createElement('div'); po.className = 'prog-outer';
    var pi = document.createElement('div'); pi.className = 'prog-inner';
    pi.style.cssText = 'width:' + pct + '%;background:' + pillar.color;
    po.appendChild(pi); block.appendChild(po);

    var list = document.createElement('div');
    list.className = 'mod-list';

    pillar.modules.forEach(function(mod, idx) {
      var done_m   = isDone(mod.id);
      var unlocked = isUnlocked(pillar, idx);
      var color    = (done_m || unlocked) ? pillar.color : '#475569';

      var row = document.createElement('div');
      row.className = 'mod-row' + ((unlocked || done_m) ? ' clickable' : ' locked');

      row.innerHTML =
        '<div class="mod-num" style="color:' + color + ';border-color:' + color + '">' +
          (done_m ? '✓' : (idx+1)) +
        '</div>' +
        '<div class="mod-info">' +
          '<div class="mod-name">' + mod.name + '</div>' +
          '<div class="mod-sub">' + mod.xp + ' XP' +
            (!unlocked && !done_m ? ' · 🔒 Module précédent requis' : '') +
          '</div>' +
        '</div>' +
        '<div class="mod-ico">' + (done_m ? '🏅' : (unlocked ? '▶' : '🔒')) + '</div>';

      if(unlocked || done_m) {
        (function(f, mid){ row.addEventListener('click', function(){ openModule(f, mid); }); })(mod.file, mod.id);
      }
      list.appendChild(row);
    });
    block.appendChild(list);
    app.appendChild(block);
  });
}

// ── Admin ───────────────────────────────────────────────────────
var adminUnlocked = false;

function openAdmin() {
  adminUnlocked = false;
  document.getElementById('admin-login').style.display = 'block';
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('admin-pwd').value = '';
  document.getElementById('admin-err').textContent = '';
  document.getElementById('admin-fb').textContent  = '';
  document.getElementById('admin-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('admin-pwd').focus(); }, 80);
}

function closeAdmin() {
  document.getElementById('admin-overlay').classList.remove('open');
  adminUnlocked = false;
}

function adminLogin() {
  var pwd = document.getElementById('admin-pwd').value.trim();
  if(pwd !== ADMIN_PASS) {
    document.getElementById('admin-err').textContent = '❌ Code incorrect';
    return;
  }
  adminUnlocked = true;
  document.getElementById('admin-login').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  buildAdminList();
}

function buildAdminList() {
  var player = getPlayer();
  document.getElementById('admin-player-info').textContent =
    player ? 'Joueur actif : ' + player
           : '⚠️ Aucun joueur — connecte un élève depuis le superhub avant de valider';

  var list = document.getElementById('admin-mod-list');
  list.innerHTML = '';

  PILLARS.forEach(function(pillar) {
    var sep = document.createElement('div');
    sep.className = 'psep';
    sep.textContent = pillar.icon + ' ' + pillar.title;
    list.appendChild(sep);

    pillar.modules.forEach(function(mod) {
      var done_m = isDone(mod.id);
      var wrap   = document.createElement('label');
      wrap.className = 'mc';

      var chk = document.createElement('input');
      chk.type    = 'checkbox';
      chk.value   = mod.id;
      chk.checked = done_m;

      var lbl = document.createElement('span');
      lbl.className = 'mc-lbl';
      lbl.innerHTML = mod.name + (done_m ? '<span class="mc-done">✓ validé</span>' : '');

      wrap.appendChild(chk);
      wrap.appendChild(lbl);
      list.appendChild(wrap);
    });
  });
}

function adminValidateSelected() {
  if(!adminUnlocked) return;
  var boxes = document.querySelectorAll('#admin-mod-list input[type=checkbox]');
  var count = 0;
  boxes.forEach(function(chk){
    if(chk.checked && !isDone(chk.value)){
      validateModule(chk.value, true);
      count++;
    }
  });
  var fb = document.getElementById('admin-fb');
  if(count > 0) {
    fb.className = 'aok'; fb.textContent = '✅ ' + count + ' module(s) validé(s) avec succès';
    buildAdminList();
  } else {
    fb.className = 'aerr'; fb.textContent = 'Aucun nouveau module à valider dans la sélection';
  }
}

function adminResetAll() {
  if(!adminUnlocked) return;
  if(!confirm('Supprimer TOUTE la progression PIXHARe du joueur actuel ?')) return;
  PILLARS.forEach(function(p){
    p.modules.forEach(function(m){ localStorage.removeItem(ckey(m.id)); });
  });
  localStorage.removeItem('pvs_phare_pending');
  var fb = document.getElementById('admin-fb');
  fb.className = 'aok'; fb.textContent = '🗑 Progression supprimée';
  buildAdminList();
  render();
}

// ── Toast ───────────────────────────────────────────────────────
var _tt;
function toast(msg, ms) {
  var t = document.getElementById('toast');
  t.textContent = msg || ''; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(function(){ t.classList.remove('show'); }, ms||3000);
}

// ── Événements ──────────────────────────────────────────────────
window.addEventListener('focus', function(){ checkReturn(); render(); });
window.addEventListener('storage', function(e){
  if(!e.key || e.key.startsWith('CERT_PHARE_') || e.key === 'pvs_bridge_events'){
    checkReturn(); render();
  }
});

// ── Init ────────────────────────────────────────────────────────
initPlayer();
