<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIX pHARe — Hub de Formation</title>
<style>
:root {
  --bg: #0a0e1a;
  --card: #111827;
  --border: rgba(255,255,255,.08);
  --text: #e2e8f0;
  --muted: #64748b;
  --accent: #f97316;
  --green: #22c55e;
  --red: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  padding: 0 0 60px;
}
.hero {
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
  border-bottom: 1px solid var(--border);
  padding: 28px 20px 22px;
  text-align: center;
}
.hero h1 {
  font-size: clamp(1.4rem, 5vw, 2rem);
  font-weight: 800;
  letter-spacing: -0.5px;
  color: #fff;
}
.hero h1 span { color: var(--accent); }
.hero p { color: var(--muted); font-size: .9rem; margin-top: 6px; }

#player-bar {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 12px 20px;
  background: rgba(255,255,255,.03);
  border-bottom: 1px solid var(--border);
  font-size: .88rem;
}
#player-bar .badge {
  background: rgba(249,115,22,.15);
  border: 1px solid rgba(249,115,22,.4);
  color: var(--accent);
  padding: 3px 10px; border-radius: 20px; font-weight: 700;
}
#player-bar .xp { color: var(--green); font-weight: 700; }

.container { max-width: 780px; margin: 0 auto; padding: 24px 16px; }

.pillar-block {
  margin-bottom: 28px;
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  background: var(--card);
}
.pillar-header {
  padding: 16px 20px;
  display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
.pillar-icon { font-size: 2rem; }
.pillar-info { flex: 1; }
.pillar-title { font-weight: 700; font-size: 1.05rem; }
.pillar-desc { color: var(--muted); font-size: .82rem; margin-top: 2px; }
.pillar-stats { text-align: right; }
.pillar-count { font-size: .82rem; color: var(--muted); }
.pillar-xptotal { font-size: .9rem; font-weight: 700; }

.progress-bar-outer {
  height: 4px; background: rgba(255,255,255,.07);
}
.progress-bar-inner {
  height: 4px; border-radius: 2px;
  transition: width .4s ease;
}

.modules-list { padding: 8px 0; }
.module-row {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 20px;
  border-bottom: 1px solid rgba(255,255,255,.04);
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.module-row:last-child { border-bottom: none; }
.module-row:hover:not(.locked) { background: rgba(255,255,255,.04); }
.module-row.locked { cursor: not-allowed; opacity: .5; }
.module-row.done { opacity: 1; }

.mod-num {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; font-weight: 700;
  flex-shrink: 0;
  border: 2px solid currentColor;
}
.mod-info { flex: 1; }
.mod-name { font-weight: 600; font-size: .93rem; }
.mod-xp { font-size: .78rem; color: var(--muted); margin-top: 2px; }
.mod-status { font-size: 1.1rem; }

/* Toast */
#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #1e293b; border: 1px solid var(--border);
  color: var(--text); padding: 10px 20px; border-radius: 10px;
  font-size: .88rem; z-index: 999;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
#toast.show { opacity: 1; pointer-events: auto; }

/* Admin */
#admin-btn {
  position: fixed; bottom: 20px; right: 16px;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--border);
  color: var(--muted); padding: 6px 12px;
  border-radius: 8px; font-size: .75rem; cursor: pointer;
}
#admin-panel {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 100;
  align-items: center; justify-content: center;
}
#admin-panel.open { display: flex; }
#admin-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px; max-width: 360px; width: 90%;
}
#admin-box h3 { margin-bottom: 16px; }
#admin-box input {
  width: 100%; padding: 10px;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  color: var(--text); border-radius: 8px;
  margin-bottom: 12px;
}
#admin-box button { margin-right: 8px; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; }
.btn-validate { background: var(--green); color: #000; font-weight: 700; }
.btn-reset { background: var(--red); color: #fff; }
.btn-close-admin { background: var(--muted); color: #fff; }
#admin-module-select { width: 100%; margin-bottom: 12px; }
#admin-module-select select {
  width: 100%; padding: 8px;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  color: var(--text); border-radius: 8px;
}
</style>
</head>
<body>

<div class="hero">
  <h1>PIX <span>pHARe</span></h1>
  <p>Programme de Formation Anti-Harcèlement — Collège Château Rance</p>
</div>

<div id="player-bar">
  <span id="pb-name">Non connecté</span>
  <span class="xp" id="pb-xp"></span>
</div>

<div class="container" id="app">
  <!-- rendu JS -->
</div>

<div id="toast"></div>
<button id="admin-btn" onclick="openAdmin()">⚙ Admin</button>

<div id="admin-panel">
  <div id="admin-box">
    <h3>⚙ Administration</h3>
    <input type="password" id="admin-pwd" placeholder="Mot de passe admin" />
    <div id="admin-module-select" style="display:none">
      <select id="select-module">
        <option value="">-- Choisir un module --</option>
      </select>
      <div style="margin: 10px 0; display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn-validate" onclick="adminValidate()">✓ Valider</button>
        <button class="btn-reset" onclick="hardReset()">🗑 Tout réinitialiser</button>
        <button class="btn-close-admin" onclick="closeAdmin()">✕ Fermer</button>
      </div>
    </div>
    <div id="admin-err" style="color:var(--red); font-size:.82rem; margin-top:8px;"></div>
    <div style="margin-top:12px; display:flex; gap:8px;" id="admin-login-btns">
      <button class="btn-validate" onclick="adminLogin()">Connexion</button>
      <button class="btn-close-admin" onclick="closeAdmin()">✕</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DONNÉES PILIERS
// ═══════════════════════════════════════════════════════
const PILLARS = [
  {
    key:'GRP', icon:'🔺', color:'#a855f7', glow:'rgba(168,85,247,.13)',
    title:'Pilier Groupe',
    desc:'Dynamiques de groupe, témoins, manipulation collective',
    modules:[
      {id:'GROUPE_01', file:'PIX_pHARe_Module_GROUPE_01.html', name:'Le Triangle du Témoin', xp:100},
      {id:'GROUPE_02', file:'PIX_pHARe_Module_GROUPE_02.html', name:'La Mécanique des Foules', xp:100},
      {id:'GROUPE_03', file:'PIX_pHARe_Module_GROUPE_03.html', name:'Bystander Effect', xp:100},
      {id:'GROUPE_04', file:'PIX_pHARe_Module_GROUPE_04.html', name:'Résistance au Groupe', xp:100},
      {id:'GROUPE_05', file:'PIX_pHARe_Module_GROUPE_05.html', name:'Ambassadeur en Action', xp:100},
    ]
  },
  {
    key:'HIS', icon:'📜', color:'#f59e0b', glow:'rgba(245,158,11,.13)',
    title:'Pilier Histoire',
    desc:'Harcèlement à travers les âges, mémoire collective, figures de résistance',
    modules:[
      {id:'HISTOIRE_01', file:'PIX_pHARe_Module_HISTOIRE_01.html', name:'Aux Origines du Harcèlement', xp:100},
      {id:'HISTOIRE_02', file:'PIX_pHARe_Module_HISTOIRE_02.html', name:'Les Grandes Affaires', xp:100},
      {id:'HISTOIRE_03', file:'PIX_pHARe_Module_HISTOIRE_03.html', name:'L'École et la Violence', xp:100},
      {id:'HISTOIRE_04', file:'PIX_pHARe_Module_HISTOIRE_04.html', name:'Témoins de l'Histoire', xp:100},
      {id:'HISTOIRE_05', file:'PIX_pHARe_Module_HISTOIRE_05.html', name:'Résistances et Renaissances', xp:100},
    ]
  },
  {
    key:'JUR', icon:'⚖️', color:'#3b82f6', glow:'rgba(59,130,246,.13)',
    title:'Pilier Juridique',
    desc:'Droit pénal, procédures, droits et devoirs de l'élève et de l'établissement',
    modules:[
      {id:'JURIDIQUE_01', file:'PIX_pHARe_Module_JURIDIQUE_01.html', name:'L'Armure Juridique', xp:300},
      {id:'JURIDIQUE_02', file:'PIX_pHARe_Module_JURIDIQUE_02.html', name:'La Mécanique des Ombres', xp:375},
      {id:'JURIDIQUE_03', file:'PIX_pHARe_Module_JURIDIQUE_03.html', name:'Le Spectre Numérique', xp:450},
      {id:'JURIDIQUE_04', file:'PIX_pHARe_Module_JURIDIQUE_04.html', name:'Le Protocole pHARe', xp:525},
      {id:'JURIDIQUE_05', file:'PIX_pHARe_Module_JURIDIQUE_05.html', name:'Maître de la Loi', xp:625},
    ]
  },
  {
    key:'NEU', icon:'🧠', color:'#10b981', glow:'rgba(16,185,129,.13)',
    title:'Pilier Neuro',
    desc:'Cerveau, émotions, empathie, mécanismes neurobiologiques du harcèlement',
    modules:[
      {id:'NEURO_01', file:'PIX_pHARe_Module_NEURO_01.html', name:'Le Cerveau sous Pression', xp:50},
      {id:'NEURO_02', file:'PIX_pHARe_Module_NEURO_02.html', name:'Empathie & Miroirs', xp:100},
      {id:'NEURO_03', file:'PIX_pHARe_Module_NEURO_03.html', name:'Stress & Mémoire', xp:100},
      {id:'NEURO_04', file:'PIX_pHARe_Module_NEURO_04.html', name:'Émotions & Décision', xp:100},
      {id:'NEURO_05', file:'PIX_pHARe_Module_NEURO_05.html', name:'Résilience Neuronale', xp:100},
    ]
  },
  {
    key:'NUM', icon:'💻', color:'#00d4ff', glow:'rgba(0,212,255,.13)',
    title:'Pilier Numérique',
    desc:'Algorithmes, attention, droits numériques et maîtrise du feed',
    modules:[
      {id:'NUMERIQUE_01', file:'PIX_pHARe_Module_NUMERIQUE_01.html', name:'La Machine à Attention', xp:75},
      {id:'NUMERIQUE_02', file:'PIX_pHARe_Module_NUMERIQUE_02.html', name:"Les Architectes de l'Ombre", xp:100},
      {id:'NUMERIQUE_03', file:'PIX_pHARe_Module_NUMERIQUE_03.html', name:'Bulles & Miroirs', xp:120},
      {id:'NUMERIQUE_04', file:'PIX_pHARe_Module_NUMERIQUE_04.html', name:'Tes Droits, Ton Armure', xp:150},
      {id:'NUMERIQUE_05', file:'PIX_pHARe_Module_NUMERIQUE_05.html', name:'Maître du Feed', xp:200},
    ]
  }
];

// ═══════════════════════════════════════════════════════
// UTILS localStorage
// ═══════════════════════════════════════════════════════
const ckey = id => 'CERT_PHARE_' + id;

function getPlayer(){
  // pvs_current_player posé par le superhub ; pvs_phare_player fallback posé par ce hub
  return localStorage.getItem('pvs_current_player')
      || localStorage.getItem('pvs_phare_player')
      || '';
}

function isDone(id){
  return !!localStorage.getItem(ckey(id));
}

function doneCount(){
  let n = 0;
  PILLARS.forEach(p => p.modules.forEach(m => { if(isDone(m.id)) n++; }));
  return n;
}

function totalXP(){
  let xp = 0;
  PILLARS.forEach(p => p.modules.forEach(m => { if(isDone(m.id)) xp += (m.xp || 0); }));
  return xp;
}

function isUnlocked(pillar, idx){
  if(idx === 0) return true;
  return isDone(pillar.modules[idx-1].id);
}

// ═══════════════════════════════════════════════════════
// COMMUNICATION MODULE → HUB
// ═══════════════════════════════════════════════════════
function validateModule(moduleId, silent){
  if(!moduleId) return;
  const already = isDone(moduleId);
  // Écrire CERT dans ce hub aussi (cohérence)
  localStorage.setItem(ckey(moduleId), JSON.stringify({
    v:1, d:new Date().toISOString(), m:moduleId, f:true
  }));
  if(!already) pushBridge(moduleId);
  render();
  if(!silent) toast('✅ ' + moduleId + ' validé !');
}

function pushBridge(moduleId){
  const player = getPlayer();
  try {
    var evts = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
    evts.push({
      id:     'PHARE-' + moduleId + '-' + Date.now(),
      type:   'PIXHARE_PROGRESS',
      player:  player,
      module:  moduleId,
      cpTotal: doneCount(),
      d:       new Date().toISOString()
    });
    if(evts.length > 500) evts.splice(0, evts.length - 500);
    localStorage.setItem('pvs_bridge_events', JSON.stringify(evts));
    window.dispatchEvent(new StorageEvent('storage', {key:'pvs_bridge_events'}));
  } catch(e){}
}

// checkReturn : appelé au focus — lit les CERT_PHARE_* écrits par les modules
function checkReturn(){
  let changed = false;
  PILLARS.forEach(p => p.modules.forEach(m => {
    const cert = localStorage.getItem(ckey(m.id));
    if(cert && !isDone(m.id)){
      validateModule(m.id, true);
      changed = true;
    }
  }));
  // Lire aussi le bridge events (double filet)
  try {
    const evts = JSON.parse(localStorage.getItem('pvs_bridge_events') || '[]');
    evts.forEach(ev => {
      if(ev.type === 'PIXHARE_PROGRESS' && ev.module && !isDone(ev.module)){
        const found = PILLARS.some(p => p.modules.some(m => m.id === ev.module));
        if(found){ validateModule(ev.module, true); changed = true; }
      }
    });
  } catch(e){}
  if(changed) render();
}

// ═══════════════════════════════════════════════════════
// NAVIGATION VERS MODULE
// ═══════════════════════════════════════════════════════
function openModule(file, moduleId){
  const player = getPlayer();
  if(!player){
    toast('⚠️ Connecte-toi au Portail Vie Scolaire avant de commencer !');
    return;
  }
  // S'assurer que le module peut lire le joueur
  localStorage.setItem('pvs_phare_player', player);
  // Si pvs_current_player absent, l'écrire pour que le module le trouve
  if(!localStorage.getItem('pvs_current_player')){
    localStorage.setItem('pvs_current_player', player);
  }
  localStorage.setItem('pvs_phare_pending', moduleId);
  window.location.href = file;
}

// ═══════════════════════════════════════════════════════
// RENDU
// ═══════════════════════════════════════════════════════
function render(){
  const player = getPlayer();
  const xp = totalXP();
  const done = doneCount();
  const total = PILLARS.reduce((s,p) => s + p.modules.length, 0);

  document.getElementById('pb-name').textContent = player || 'Non connecté';
  document.getElementById('pb-xp').textContent = player
    ? `${xp} XP — ${done}/${total} modules`
    : '';

  const app = document.getElementById('app');
  app.innerHTML = '';

  PILLARS.forEach(pillar => {
    const doneInPillar = pillar.modules.filter(m => isDone(m.id)).length;
    const totalInPillar = pillar.modules.length;
    const pct = Math.round(doneInPillar / totalInPillar * 100);

    const block = document.createElement('div');
    block.className = 'pillar-block';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'pillar-header';
    hdr.innerHTML = `
      <div class="pillar-icon">${pillar.icon}</div>
      <div class="pillar-info">
        <div class="pillar-title" style="color:${pillar.color}">${pillar.title}</div>
        <div class="pillar-desc">${pillar.desc}</div>
      </div>
      <div class="pillar-stats">
        <div class="pillar-count">${doneInPillar}/${totalInPillar}</div>
        <div class="pillar-xptotal" style="color:${pillar.color}">${pct}%</div>
      </div>
    `;
    block.appendChild(hdr);

    // Barre de progression
    const barOuter = document.createElement('div');
    barOuter.className = 'progress-bar-outer';
    const barInner = document.createElement('div');
    barInner.className = 'progress-bar-inner';
    barInner.style.cssText = `width:${pct}%; background:${pillar.color};`;
    barOuter.appendChild(barInner);
    block.appendChild(barOuter);

    // Liste modules
    const list = document.createElement('div');
    list.className = 'modules-list';

    pillar.modules.forEach((mod, idx) => {
      const done_mod = isDone(mod.id);
      const unlocked = isUnlocked(pillar, idx);
      const row = document.createElement('div');
      row.className = 'module-row' + (done_mod ? ' done' : '') + (!unlocked ? ' locked' : '');

      const numColor = done_mod ? pillar.color : (unlocked ? pillar.color : '#475569');

      row.innerHTML = `
        <div class="mod-num" style="color:${numColor}; border-color:${numColor}">
          ${done_mod ? '✓' : (idx+1)}
        </div>
        <div class="mod-info">
          <div class="mod-name">${mod.name}</div>
          <div class="mod-xp">${mod.xp} XP${!unlocked ? ' — 🔒 Termine le module précédent' : ''}</div>
        </div>
        <div class="mod-status">${done_mod ? '🏅' : (unlocked ? '▶' : '🔒')}</div>
      `;

      if(unlocked && !done_mod){
        row.addEventListener('click', () => openModule(mod.file, mod.id));
      } else if(done_mod){
        row.style.cursor = 'default';
        row.title = 'Module terminé';
      }
      list.appendChild(row);
    });
    block.appendChild(list);
    app.appendChild(block);
  });
}

// ═══════════════════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════════════════
const ADMIN_PWD = 'AGORA-ADMIN';

function openAdmin(){
  // Peupler la liste des modules
  const sel = document.getElementById('select-module');
  sel.innerHTML = '<option value="">-- Choisir un module --</option>';
  PILLARS.forEach(p => p.modules.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = (isDone(m.id) ? '✓ ' : '') + m.id + ' — ' + m.name;
    sel.appendChild(opt);
  }));
  document.getElementById('admin-panel').classList.add('open');
}

function closeAdmin(){
  document.getElementById('admin-panel').classList.remove('open');
  document.getElementById('admin-pwd').value = '';
  document.getElementById('admin-err').textContent = '';
  document.getElementById('admin-module-select').style.display = 'none';
  document.getElementById('admin-login-btns').style.display = 'flex';
}

function adminLogin(){
  const pwd = document.getElementById('admin-pwd').value;
  if(pwd !== ADMIN_PWD){
    document.getElementById('admin-err').textContent = '❌ Mot de passe incorrect';
    return;
  }
  document.getElementById('admin-module-select').style.display = 'block';
  document.getElementById('admin-login-btns').style.display = 'none';
  document.getElementById('admin-err').textContent = '';
}

function adminValidate(){
  const id = document.getElementById('select-module').value;
  if(!id){ toast('⚠️ Choisis un module'); return; }
  validateModule(id, false);
  openAdmin(); // rafraîchir la liste
}

function hardReset(){
  if(!confirm('Supprimer TOUTES les progressions PIXHARe ?')) return;
  PILLARS.forEach(p => p.modules.forEach(m => {
    localStorage.removeItem(ckey(m.id));
  }));
  localStorage.removeItem('pvs_phare_pending');
  closeAdmin();
  render();
  toast('🗑 Réinitialisé');
}

function toast(msg, duration=3000){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), duration);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
window.addEventListener('focus', () => { checkReturn(); render(); });
window.addEventListener('storage', e => {
  if(e.key === 'pvs_bridge_events' || e.key && e.key.startsWith('CERT_PHARE_')){
    checkReturn();
    render();
  }
});

// Au chargement : vérifier les CERT déjà présents (si on revient d'un module)
document.addEventListener('DOMContentLoaded', () => {
  checkReturn();
  render();
});
</script>
</body>
</html>
